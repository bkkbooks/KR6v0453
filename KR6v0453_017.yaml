body:
  text: 明梅鼎祚輯南齊一武帝姓蕭氏諱賾字宣遠南蘭陵人高帝長子致沙門法獻論僧遠書釋僧遠姓皇渤海重合人通明數論貫大小乘居鍾山五十年永明二年卒定林上寺武帝致書於獻獻姓徐西海回水人住定林上寺為僧正尺牘作明帝誤承遠上無常弟子夜中已自知之遠上此去甚得好處諸佳非一不復增悲也一二遲見法師方可敘瑞夢耳今正為作功德所須可具疏來也高僧傳知之佛祖統紀作冥知竟陵王蕭子良字雲英武帝子崇仰釋宗深達至教與法獻書子良為遠營墳山南立碑頌德太尉王儉製文遠法師一代名德志節清高潛山樹美四海餐風弟子暗昧謬蒙師範方欲仰稟仁化用洗煩慮不謂此疾奄成異世悲痛之心特不可忍遠上即既業行圓通曠劫希有弟子意不欲遺形影迹雜處衆僧墓中得別卜餘地是所願也方應樹剎表奇刻石銘德矣高僧傳諫武帝射雉啓忽聞外議伏承當更射雉臣下情震越心懷憂悚猶謂疑妄事不必然伏度陛下以信心明照所以傾金寶於禪靈仁愛廣洽得使禽魚養命於江澤豈惟國慶民歡乃以翱翔致樂夫衛生保命人獸不殊重軀愛體彼我無異故禮云聞其聲不食其肉見其生不忍其死且萬乘之尊降同匹夫之樂夭殺無辜傷仁害福之本菩薩不殺壽命得長施物安樂自無恐怖不惱衆生身無患苦臣見功德有此果報所以日夜劬勤厲身奉法實願聖躬康豫若此每至寢夢脫有異見不覺身心立就焦爛陛下常日捨財修福臣私心顒顒尚恨其少豈可今日見此事一損福業追悔便難臣此啓聞私心實切若是大事不可易改亦願陛下照臣此誠曲垂三思况此嬉遊之間非關當否而動輒傷生實可深慎臣聞子孝奉君臣忠事主莫不靈祇通感徵祥證登臣近假仰啓賜希受戒天心洞遠誠未達勝善之途而聖恩遲疑尚未垂履曲降尊極豈可今月復隨此事臣不隱心即實上啓南齊書此全以果報功德為指故置釋部一啓在前與孔中丞釋疑惑書覽君書具一二每患浮言之妨正道激烈之傷純和亦已久矣孟子有云君王無好智君王無好勇勇智之過生乎患禍所遵正當仁義為本今因修釋訓始見斯行之所發誓念履行欲卑高同其美且取解脫之喻不得不小失存其大至於形外之間自不足及言真俗之教其致一耳取之者未達故橫起異同君云積業栖信便是言行相舛豈有奉親一毀一敬而云大孝未之前聞夫仁人之行非是殘害加其美廉潔之操不藉貪竊成其德如此則三歸五戒豈得一念而可捨十善八正寧瞥想之可遺未見輕其本而能重其末所謂本既傾矣而後枝葉從之今云二途雖異何得相順此言固是見其淺近之談耳君非不覩經律所辨何為偏志一方埋沒通路夫士未嘗離俗施訓即世之教可以知之若云斯法空成詭妄更增疑惑應當毀滅就即因而言閨門孝悌者連鄉接黨竟有幾人今可得以無其多絓諸訓誥經史針戒悉可焚之不君今遲疑於內教亦復與此何殊哉所以歸心勝法者本不以禮敬標其心兢仰祗崇者不以在我故忘物今之殷勤克己者政為君輩之徒耳欲今相與去驕矜除慢傲莭情欲制貪求修禮讓習謙恭奉仁義敦孝悌課之以博施廣之以泛愛賞之以英賢拔之以俊異復何慙於鬼神乎孜孜策勵良在於斯雖未能奉尊亦意不忘之今未有夜光之投而按劒已起欲相望於道德寧不多愧當由未見此情故常信斯心耳在懷則不然每苦其不及司徒之府本五教是勸方共敦斯美行以率無欲使邪詭諂侫望門而自殄浮僞蕩逸踐庭而變迹等彼息心之館齊此無欲之臺不亦善乎一則仰順宸極普天之慈二則敬奉儲皇垂愛之善宵旦而警惕者正患此心無遂耳悠悠之語好自多端其云願善政言未知傷化之重倘令詭事以忠孝侫悅以仁義虛設以禮讓假枉以方直乃至一日克己天下歸仁況能旬朔有餘所望過矣本自開心所納正若此矯不多如其此煩未廣故鄙薄深慨君正應規諫其乖開發未達云何言傷孝本語損義基於邑有懷非所望也若此事可棄則欣聞餘善又云未必勸人持戒當令善由下發必如此而弘教者放勛須四凶革而啓聖虞舜待商均賢而德明如斯而遂美其可望乎君之此意則應廣有所折便當詰堯以土階之儉嘉離宮之麗貶禹以茅茨之陋崇阿房之貴耻汲黯之正容榮祝鮀之媚色其餘節義貞信謙恭之德皆當改途而反面復何行之可修也凡聞於言必察其行覩於行必求於理若理不乖而行不越者請無造於異端真殊途同歸未必孱然一貫頃亦多有與君此意同者今寄言此紙情不專一者厝心於疑妄國君普宣示之略言其懷無見髣佛翰迹易煩中不盡意比見君別更委悉也又夫人心之不同猶若其貌豈其容一而等其知乎鑒有待之參差足見情靈之乖舛矣一得其志者非言談之所盡一背其途者豈游說之所見君雖復言面委盡而不及此處者良由彼我之見既異幸可各保其方差無須空構是非橫起謗議耳栖心入信者前良不無此志今以效善之為樂故挫憍陵以待物君若以德越往賢聖逾前修智超羣類位極人貴者自可逍遙世表以道化物高其懷無求自足而退於前良恐未能懸絶空秉兩塗獨異勝法若悠悠相期本不及言意在不薄為復示斯懷耳比靣別一二近聊有此釋滯兩卷想於外已當見之令送相示若已覽者付反𦍒無勞形目脫未覩者為可一厯意本不期他翻正是自釋疑滯耳君見之必當撫掌也蕭子良疏此二書字有脫誤孔稚圭答蕭司徒書稚圭字德璋會稽山隂人厯太子詹事稚圭啓民蚤奉明公提拂之仁深蒙大慈弘引之訓恩獎所驅性命必盡敢瀝肝髓乞照神襟民積世門業依奉李老以沖靜為心以素退成行迹𮛫萬善之淵神期至順之宅民仰攀先軌自絶秋塵而宗心所向猶未敢墜至於大覺明教般若正源民生平所崇初不違背常推之於至理理至則歸一置之於極宗宗極不容二自仰稟明公之訓憑接明公之風導之以正乘引之以通戒使民六滯頓祛五情方旭回心頂禮合掌願持民齊敬歸依蚤自淨信重律輕條素已半合所以未變衣鉢眷黃老者實以門業有本不忍一日頓棄心世有源不欲終朝悔遁既以二道大同本不敢惜心回向實顧言稱先業直不忍棄門志耳豈不思樂方廣勤志一乘況仰資明公齊禮道德加須奉誦明公清信至制淨住子序萬門朗奧億品宣玄言雖願違心不覺醉更未測明公善誘之妙一至如此博約紛綸精暉照出欲罷尚其不能欲背何以免向而昔而前民固不敏而今而後斯語請事民之愚心正執門範情於釋老非敢異同始私追尋民門昔嘗明一同之義經以此訓張融融乃著通源之論其名少子少子所明會同道佛融之此悟出於民家民家既爾民復何礙始乃遲遲執迹今輒兼敬以心一不空棄黃老一則歸依正覺不期一朝霍然大悟悟之所導舉自明公不勝踴躍之至謹啓又事以聞復竊研道之異佛止在論極極未盡耳道以論極極在諸天佛乃鄙此不出三界斯則精粗遠近實有慙於大方矣然尋道家此教指設機權其猶仲尼外典極惟天地蓋起百姓所見二儀而已教本因心取會萬物用其所見順而尊之當其尊地俱窮妙物故老子之槖籥維摩之無我合德天地易家有太極所以因物之崇天仍崇之以極妙而至極終有地固淵于於天表老子亦云有物混成先天地生已是道在天外稍不以天為道也何異佛家羅漢亦指極四果方至勝鬘自知有餘地道之崇天極猶佛有羅漢果佛竟不止於羅漢道亦於天不息甫信道之所道定與佛道通源矣民今心之所歸輒歸明公之一向道家戒善故與佛家同耳兩同之處民不苟捨道法道之所異輒婉輒入公大乘請於今日不敢復位異同矣服膺之至謹啓下誠伏願採其末悔亮其始位退自悔始自恭自懼謹啓十一月二十九日州民御史中丞孔稚圭啓得示具懷甚有欣然理本無二取捨多途諍論云云常所慨也但在始通道則宜然斆而學者則未可君但廣尋諸經不患淪滯其迹也比靣別一二答孔中丞書君此書甚佳宜廣示諸未達者竝弘明集淨住子序文選任昉竟陵王行狀注引淨住子序遺教經云波羅提木義是汝大師若住於世無異我也又云波羅提木義住則我法住波羅提木義滅則我法滅是故衆僧於望海再說禁戒謂之布薩外國云布薩此云淨住亦名長養亦名增進所謂淨住身口意身潔意如戒而住故曰淨住子者紹繼為義以沙門淨身口七支不起諸惡長養增進菩提善根如是修習成佛無差則能紹續三世佛種是佛之子故云淨住子淨住子淨行法門三十一條竝王融頌皇覺辨德門一九十六種道而佛道為最上勝者非無其義夫立名所以表德非德無以顯名有名未必具德有德名非虛唱是知名有真假德有虛實豈可道俗混同竊名假實而不辨析者乎今覩殊教異軌分衢舛迹未嘗不有其名而闕其德不無其稱而求其用是知有名無德者外道也有德有名者佛道也譬若濟海託舟踐途寄足故經云直心是道場無虛假故發行是道場能辦事故如是四弘六度俱稱道場藉如此之勝因獲若斯之妙果所以解脫去其纍般若窮其照相好表其容法身顯其德語其至仁則三念齊想言其自在則無畏獨步談其纍功則十力為用仰其妙極則不共之法神通方便無量法門洞達三世了照萬有卓然明顯英聖超羣故號如來十號具足既自覺於生死昏夜又復起於未覺悟者斯可謂有其名德無不包具其美德無不備故知形端則影直聲調則響和未見貌醜鑒鏡有悅目之華體矬照水發溢羣之觀書云不登山無以知天之高不測水無以知地之厚也凡如斯之異學皆漏於佛之大道矣故經云世間亦有常樂我淨出世亦有常樂我淨世間者有名無義出世者有名有義故六師結誓經問佛名德佛答云最正覺自得不染一切法一切智無畏自然無師保至獨無等倫自獲於正道如來天人尊一切智無畏今各既知至德有歸邪正異趣善惡分徑凡聖路隔幸得信因果悟非常順智流入正道諸聖並能悼川上之不追悟交臂之潛往病生滅之無窮慕我淨之恆樂凡我咸已仰風餐化割愛辭榮豈得不懍然增到形命相競者乎故當清和其性哀愍有形等心存濟以法惠施不犯不取有求不逆常志大乘內外相副是名具足清淨度門頌曰紫實昧朱狂斯濫哲舛徑揚鑣分源競枻麗景或幽澄舒每缺水激波生煙深火滅情端徒總理向空徹不有明心誰驅聖轍開物歸信門二如來愍念衆生愛同一子何嘗不以善權方便弘濟益之津乎所以垂形丈六表現靈儀隨方應感法身匪一及其金容託體相好莊嚴顯發衆生欣樂瞻覩行則大千震動衆魔懾伏住則洞達諸定外道歸化坐則演示方等釋梵咨仰臥則開一實道三乘稟德言則三塗靜苦笑則四生受樂聞聲者證道見形者解脫當此之時豈不盛哉今者雖稟精靈昏惑障重進不覩分衛國城退不聞八音辨說將由罪業深厚煩惱牢固非惟恐不見前佛後佛來聖近賢深憂惡道無由可絶發如此意實有切情之悲運如是想不覺痛心之苦豈容順默使流晏安苦海沉淪沸火而不自拔者乎當須慷慨凜厲挫情折意生增上心懺悔滅罪去諸塵纍乃可歸信自不堅強其志忘身捨命捍勞忍苦銜悲惻愴者將恐煩惱熾火無由而滅無明重暗開了未期譬如牢獄重囚具嬰衆苦抱長枷牢大械帶金鉗負鐵鎖捶撲其軀膿瘡穢爛周遍形骸臭惡纏匝而欲以此狀求見國主貴臣雖復一心無怠懇誠嘉到恐升高殿踐王筵亦無由而果假令愍念欲覩為難何以故以其具諸罪惡不離苦具故若去枷脫鎖洗垢嚴服王不我礙自然而現今欲歸信亦復如斯將見如來相好光明者先當淨身口意洗除心垢六塵愛染永滅不起十惡重障淨盡無餘業纍既除表裏俱淨方可運明想於迦維標清心於寶剎去諸塵勞入歸信門必然仰覩法身無礙如囚脫枷鎖自然見於王我今除煩惱亦必覩諸佛若不如是雖復殷勤倍切直恐障礙難通豈可不五體投地如太山崩一心歸信無復疑想奉為至尊皇太子七廟聖靈龍神八部一切劇苦衆生敬禮十方一切三世諸佛求哀懺悔既悔已後常行柔軟調和心堪受心不放逸心寂滅心真正心不雜心無貪吝心勝心大心慈悲安樂心善歡喜心度一切心守護衆生心無我所心如來心發如是等廣勝妙心專求多聞修離欲定奉戒清淨念報恩德常懷悅豫不舍衆生頌曰生浮命舛識罔情違業雲結影慧日潛暉逶迤修道極夜無歸登山小魯泛海難沂參珉見璧辨礫知璣迷其未遠匪正何依滌除三業門三身口意三禍患之首故經云有身則苦生無身則苦滅既知其患苦則應挫而滅之滅苦之要莫過懺悔懺悔之法先當潔其心靜其慮端其形整其貌恭其身肅其容內懷慚愧鄙恥外發書云禮無不敬敖不可長又曰過而能改是謂無過經云於一切衆生敬之如親想各自省其過然後懺悔衆等從無始世界已來至於此生由於身意造諸苦業並緣愚癡多違至教遂乃憍慢懈怠形用不恭眠坐放逸行動輕傲或入出僧坊登上堂殿禮拜旋繞形不卑恭或於父母師長上中下座善友知識前服用不端動止乖法非禮而觀用違體製或盜三寶財及親屬物一切他有抄掠強奪欺誑增減非分相陵或淫佚恣縱非時非處罔隔禽獸不避親族或造五逆水火焚澆攻略坑陷加毒無罪或剠劓刖刵考掠斫射傷毀斬截殘害剝裂屠割炮燒煮炙燖瀹諸如此罪或為淫欲或為財利或為慳貪或為癡我無慚賢愚不愧聖達今思此過若影隨形怖懼慚愧悲惻懺悔痛苦懺悔已有相加害者從今已去為真善友生生相向以法示誨願十方佛特加攝念悔身業障永更不造次懺口業此是患苦之門禍纍之始書曰一言可以興邦一言可以喪國又曰言行君子之樞機樞機一發榮辱之主經云不得離間惡口妄言綺語諂曲華詞構扇狡亂故知有言之患招報實重廣如自愛經彰斯業相又如經云失命因緣尚不妄語何況戲笑構扇是非常以直心懺悔口業次懺意業意為身口之本罪福之門書云檢七情務九思思無邪動必正七情者喜怒憂懼憎愛惡欲者也九思者視思明聽思聰色思溫貌思恭言思忠事思敬疑思問忿思難見利思義此皆所以洗除胸懷去邪務正經云不得貪欲瞋恚愚癡邪見故知萬惡川流事由心造何以知其然若瞥緣心起故口發惡言言由意顯便行重罪今欲緘其言而正其身者未若先挫其心而次折其意故經云制之一處無事不辦既心會於道身過不遏而止意順於理口失不防而滅然身口業粗易可抑絶意造細微難可壑盡廣如諸經說其相狀頌曰樂由生滅患以身全業資意造事假言筌利衰畢倚榮辱茲纏燕驥匪躡周鍇徒鐫惑端夙緒愛境旌懸不勤一至何階四禪修理六根門四經云罪無定相隨因緣造既是因緣而生今亦隨因緣而滅前已懺其重惡則三業俱明又欲莊嚴容體則須六根清淨固知心之驅役諸識亦猶君之總策諸臣故書云君人者懍乎如朽索之御六馬言其畏敬御物不及於亡驗之此事曉然俱了但以萬境森然感發內外更相因倚構接心識故經云心王若正則六臣不邪須各慚愧制馭根識如法句經心意品說昔有道人河邊學道但念六塵曾無寧息從河出水狗將噉縮頭尾四腳藏於甲中不能得便狗去還出便得入水道人因悟我不及放恣六情不知死至輪轉五道皆由意根故須總明六根罪業我從無始已來眼根因緣隨逐諸色見勝美之事不能修學見不善之事隨順履行獲此雙眼其淨甚少惟見無慚無恥之色不見賢聖神通方便作用之色雖有雙目與盲不異是大可恥一也我從無始已來耳根因緣隨逐外聲聞說正善信忠勸美不能修學反生憤結聞邪惡事歡然順行緣此因故唯聞一切不善音聲不聞清淨正法之聲十方諸佛常說妙法我今不聞生聾不異是大可恥二也我從無始已來鼻根因緣若聞正教戒德妙香初不樂聞反生妨礙聞諸惡欲邪𡡾之香深心耽著由此業故墮大地獄生在邊地不聞賢聖五分之香不聞三乘四攝等香使我輪回常與善隔是大可恥三也我從無始已來舌根因緣造過特多貪著厚味不淨說法致此罪緣常淪生死是大可恥四也我從無始已來身根因緣多造衆罪自重輕他增長癡愛由此業故得下賤報於佛勝緣無由攀附是大可恥五也我從無始已來意根因緣僃造衆惡至人經教拔苦出要心不希行更生違拒乃學異論規圖罪種致無正信求名求利增長我見乖僻尤重臨死之時方悔虛過此大可恥六也頌曰傾都麗佳繞梁之曲肥馬輕裘蕙肴芳醁晦黑滋生昏嚚競欲貌蕩魂浮身甘意觸靈攝根晴葵衛足蟲草或虞人如不勗生老病死門五尋夫遠劫已來三業所纏六根所惑染愛潤業沈沒迄今生老病死實為大苦故經云一身死壞復受一身生死無數盡天下草木斬以為籌計吾故身不能數矣所以達人興厭高升界繫之表愚夫貪生恆淪死生之獄故須識過可得長辭如胞胎經云衆生受胎冥冥漠漠狀若浮塵在胎十月四十二變識微苦毒楚痛難忍臭處迫迮劇於牢獄飢渴寒熱過於餓鬼母飽急塞母飢悶絶食冷如氷食熱如火飲多如漂大海行急如墮險谷坐久如土鎮笮立久如懸廁屋下熏上壓無時不苦及將欲生倍復艱難如赤身赴刃呌聲震烈雖具此苦復多不全若一日百日一月十月或在胞胎墮落或出生母子喪命當思此生實是大苦次思老苦經云年耆相熟形變色衰坐起苦極餘命無幾涅槃經云譬如燈炷唯賴膏油膏油既盡光炷非久人亦如是唯賴壯膏壯膏既盡衰老之炷何得久住又如折軸無所復用如遭霜花人不欲視又經云是日已過命亦隨減如少水魚斯有何樂當思此老復為大苦次思病苦皆由風寒冷熱食飲不節四時變改則水石乖扶況此假合之體危脆之形望免四大不虧百一無惱豈可得也及至苦患切身心煩愁塞求生不差求死不絶痛楚百端窮憂自結屎尿臭處妻子為之改容形骸不攝傍人為之變色况單身寄病誰肯提攜故經云慈父孝子至病死時不能相救此至言也實為大苦次思死苦經云死者盡也氣絶神逝形體蕭索人物一統無生不終又經云去處懸遠而無伴侶無所破壞見者愁毒等經又云獨生獨死身自當之幽冥幽冥會見無期是以聖人以身為患豈復以死更受生乎往來五道勞我精神誓斷貪源絶其生本是故死苦實由此身如來出家立言此意頌曰穠華易遷繁蕉不實星髮鮐肌鄰光愒日二豎潛言十闕空術生之往矣高松蕭瑟即化翻靈從緣墜質噬臍有譏嗟然何汩尅責身心門六身為苦本自所造集於生死中復增惡業不能改悔隨順佛語是故特須深自尅責經云見人之過口不得言己身有惡則應發露書云聞人之過如聞父母之名耳可得聞口不得言又云君子顯其過經云讚人之善不言己美書云君子揚人之美不伐其善經云恕己可為譬勿殺勿行杖書云己所不欲勿施於人今以經書交映內外之教其本均同正是音殊名異若使理乖義越者則不容有此同致所以稱內外者本非形分但以心表為言也經云佛為衆生說法斷除暗惑猶如良醫隨疾授藥書云天道無親唯仁是與若出家之人觀空無常厭離生死行出世法是則為內乖此為外在家之人歸崇三寶持戒修善奉行禮義是則為內乖此為外今內外道俗共知內美之稱由心外惡之名在行豈得不捨外惡勤修內善若欲修行先自尅責當知求進是假名退檢是實法欲涉千里者必裹糧衛足而致也欲升彼岸者必聚智糧具戒足而登也所以能果者實由退檢覺察挍試輕重故能却斷無明退截老死愚暗滅則慧光發四相遷則戒德顯故知廉退者進之兆也貪進者退之萌也夫求而獲者虛則實愛情深故有傾危墮墜之苦此外道之法也退而獲者實則意無深戀故得常安涅槃之樂斯佛道之法也今者但應退檢不及以自責躬若志求進必損我傷物退檢失則彼我兼利當知尅責心口是八正之路檢察身行是解脫之蹤是故如上善自尅責則無善而不歸也頌曰瞻彼進德莫敢惑遑顧咨小智徒以太康豈無通術跋此榛荒雖有重離迹照螢光循情內負撫事外傷層羅一舉空念高翔檢覆三業門七尅責之情猶昧審的之旨未彰故以事檢心校所修習既知不及彌增悚恧何謂檢校檢我此身從旦至中從中至暮從暮至夜從夜至曉乃至一時一刻一念一頃有幾心幾行幾善幾惡幾心欲摧滅煩惱幾心欲降伏魔怨幾心念三寶四諦幾心念苦空無常幾心念報父母恩慈幾心願代衆生受苦幾心發念菩薩道業幾心欲布施持戒幾心欲忍辱精進幾心欲禪寂顯慧幾心欲慈濟五道幾心欲勸勵行所難行幾心欲超求辨所難辨幾心欲忍苦建立佛法幾心欲作佛化度羣生上已檢心次復檢口如上時刻從旦已來已得演說幾句深義已得披讀幾卷經典已得理誦幾許文字已得幾過歎佛功德已得幾過稱菩薩行已得幾過稱讚隨喜已得幾過回向發願次復檢身如上時刻已得幾過屈身禮佛幾拜已得幾過屈身禮法禮僧已得幾過執勞掃塔塗地已得幾過燒香𢿨華然燈已得幾過拂除塵垢正列供具已得幾過懸幡表剎合掌供養已得幾過繞佛恭敬幾十百匝如是檢察會理甚少違道極多白淨之業裁不足言煩惱重障森然滿目暗礙轉積解脫何由如上檢察自救無功何有時閒議人善惡故須三業自相訓責知我所作幾善幾惡頌曰渾風緬沒旅俗膠加競文內疾誰靦心瑕再惟情反三省身華貴危窮濫貧懾豪奢邅回六蔽紛綸七邪不圖厥始逸馬難𦊨訶詰四大門八四大謂地水火風也上已檢校所行多諸廢惰由此四大招致懈怠是故訶詰令其覺悟夫三界遐曠六道繁滋莫不依因四大相資成體聚則為身散則歸空然風火性殊地水質異各稱其分皆欲求適求適非一所以乖忤易動故一大不調四大俱疾乍增乍損痾疹續生風輕而地重水冷而火熱互相煎惱無時得安經喻四蛇信哉可患又此四大無慚無恥無恩無義我今恐其不安所以資給所須然彼四大初無愧感何以知之至如悲風霜殞嚴冬雪零便須綿纊衣裘臥褥溫室若季夏鬱蒸熇赫炎烈復須輕絺廣室風扇牙簟春秋改節氣候清爽復須輕軟服御乃至食則甘肥珍肴充滿飲則瓜果溫漿冷水隨時資給安苦求樂此皆四大所須而我供贍未曾拒逆而此四大求索無慚不知有無有則充給不厭無則恐迫令得如飢須食不可暫闕脫致乖違內愁外戰增發火大不知我艱辛不恕我空乏唯欲貪求無有休息是名無慚云何無恥汝之所須無窮我隨給汝不少雖然當受初無愧容我既役智盡謀以相資贍而汝初無矜念於我於少日中不須衣食云何無恩今既得我如此供給未嘗為我造作善事獲我衣食飽暖怡懌反更思念作一切惡少時禪誦禮拜即生懈怠云何無義此四大身不可期懷不可委信我今為汝種種供須反復橫起種種愛著驅逼於我行殺盜淫我既愚癡不能制革還相隨順生諸疾病或遭王法牢獄鞭杖為汝所招我既嬰苦汝亦無利猶復不知更求更索從今日去不復隨汝流轉老病生死大海汝當隨我行道作諸善業方可給汝隨病衣食趣得支身以除飢渴汝當善自驅策令我蚤得五分法身常化遊行自在無礙頌曰迅矣百齡綿茲六入出沒昏疑興居愛習矻矻豫求營營爾給匪德日歸惟殃斯集貪人敗類無厭自及昭回不希玄墟何泣出家順善門九上已檢挍所行知乖道實遠剋責自咎則進趣有途前雖道俗總論混知其過然在家罪重出家罪輕但出家之人行業階差生熟難辨然阡陌而觀亦粗見其迹今出家者未登聖境而期望之人恆引聖責凡良由大教勝遠尊之者責重法律精微信之者望深何以知然今欲見雅形妙相之體當覩儀容端麗之人欲觀仁義盛德之風當尋有禮有義之行何常見衆多之口競譏棄諸外道正以不足及言所以息議在於衆僧動為論端實由我法清勝嫉之者多我法高遠毀之者衆書云城高則衝生道尊則魔盛今乍聞詰誚之言乃足驚怪就理而尋非無義而發試為檢其所修比其所習福之深濃罪之厚薄可加意察之夫父母是孝戀難遣而能辭親妻子恩染難奪而能割愛勢位物情所競而能棄榮飢苦是人所難忍而能節食滋味是人所貪嗜而甘厭蔬澀翹勤是人所厭怠而能精苦七珍是人所吝惜而能捨離錢帛是人所蓄聚而能棄散奴僮是人所資侍而自給不使五色是人所欣覩而棄之不顧八音是人所競聞而絶之不聽飾玩細滑人所保著而能精粗無礙安身養體人所共同而能忘形捨命眠臥是人所不免而晝夜不寢為業恣口朋遊人所恆習而處靜自檢白衣飲饌不知紀極而進食如毒白衣日夜無所不甘而已限以晷刻虛腹白衣則華屋偶而已塜間離著又行住坐臥如是法禮拜圍繞如是法讀誦講說如是法食飲便利如是法受供行施如是法修道習行如是法略說如上無非有法數則三千威儀廣則說不可盡餘如出家功德經說頌曰澡身浴德晦迹埋名將安寶地誰化城道場曠謐禪徑閒清風飄弗響震轍徒驚嘯傲焉慮脫落何營長捐有結永置無生在家從惡門十俗士每言談之次或問白衣歸向何法無不答云釋氏純臣縱復實心錯背亦羞言其乖各所以爾者實由大法精勝不欲與善相違故也既言其信當事與言同若言事相反者便是矯僞諛諂側邪𡡾天下所驚嗟四海所駭歎若欲真實期於三世者見沙門之過當知凡劣形服雖異喜怒何殊便思其理可崇本不在人何得以鄙吝之行用廢大道乎且其積習勝業已積熙連沙喻可不深思今諸士女試自檢察實自多過瞋恚不避尊貴惡罵無復高卑貪求不計毀辱慳吝不知禮節淫欲不擇禽獸黜退不避親族加以憍慢放逸貢高懟恨諍訟邪命詐現異相以利求利惡求多求無有恭敬不隨教誨身見有見及以無見未嘗省退以禮自制一何苦哉唯恐我不勝人人莫及我經說起慢此業熾盛燒滅宿世所種善根又云為惡雖少後苦無邊如毒在身終為重患諸俗人等唯欲營生不知顧死然生不可保死必奄至尋此危命非朝則夕俄頃之間凶變無常如佛為愚癡富老公說偈汲汲憂子財非我何所有愚人多預慮莫知當來變廣文如彼何得不思貪求積聚終必散失身死名滅唯業相隨又觀女人所起患毒倍於男子經云女人甚深惡難與為因緣恩愛一著牽人入罪門女人有何好但是諸不淨何不審諦觀為此發狂亂郁伽長者經云在家修道當觀女人生厭離想非常久想不淨潔想臭穢惡想羅剎惡鬼恆噉人想貪色難飽無止足想惡知識妨淨行想三惡道增憂苦不斷目靣脣口惑人之具人為所惑破家滅國殺親害子衆禍之本皆由女色頌曰石磨則磷玉生雖堅維居必徙豈曰能賢氷開春日蘭敗秋年教隨類反習乃情遷命符三漏生偕十纏兹焉遂往憂畏方延沈冥地獄門十一萬法雖差功用不一至於明昧相形唯善惡二途而已語善則人天勝果差別於目驗述惡則三途劇苦皎然而非虛而愚惑之夫好起疑異多言人天是妄造地獄非實說以不覩故便不知推因以測果由不了故復不知驗果以尋因既因果未分空扇是非疑途亂起明在何日無論未來其事難了但以即今善惡是驗冥漠非妄夫有形則影現有聲則響應未見形存而影滅聲續而響乖故知善惡相資亦復如是幸各明信無厝疑心何謂地獄經中廣說此洲地下八大地獄最下阿鼻四萬由旬鐵城四周表裏火徹銅狗黑蛇哮吼嚼咋甚可怖畏諸小獄者散在鐵圍山間海渚空野衆處僃受寒熱難可具說獄各有主牛頭阿傍其性殘虐無一慈忍見受苦者唯憂不苦唯憂不毒或問獄卒衆生受苦甚可憐愍而汝無慈常懷毒害獄卒答曰諸受苦者由是不孝父母謗佛法僧罵辱親疏毀陷一切破壞和合瞋恚殺害貪淫欺詐邪命邪求及以邪見憍慢懈怠放逸怨恨迷沒聲色耽著酒食犯所受戒不知慚愧具足惡業來此受苦受苦既畢恆加諫喻此是惡處今已得脫勿復重來然此衆生初無改悔今日得出俄頃復來勞我形力加毒於彼今觀此輩既不修善往趣泥洹則是無知不識避苦所以倍痛害之何由得生慈忍又經云有十惡業殺生偷盜能令衆生墮於地獄畜生餓鬼無量劫數乃得為人還受短命貧窮等報又感外報棘刺沙礫水草少味不如意等且身口意此三發業之始自作教人見作隨喜此三成業之由現報生報後報此三感業之所故論云三三合九種從三煩惱生然前九位業通善惡受三塗報唯在三毒是故行人先須觀彼於此人身可有出理頌曰冥津殊復曉高聽亦能卑隂牆雖兩密幽夜有四知炎山翻烈火水澗匝寒澌羅城振雲幕鋒樹鬱霜枝茹荼非云苦集木豈稱危求仁曾已得長歎欲何為出家懷道門十二自大聖已還性體未圓三相所遷四山作固所以如來智周域外尚假苦切之言令諸有生得入律行今居在凡愚善惡雜糅何能免點纍之愆愛染之失若聞所說當深歎悼何時免離若斯之過不得內懷驚疑增其忿憾也然則起忿之來誠由著我如經所說執我見者生死大患第一破戒且舉一我無人不患自非正聚誰不弊之出家本意為滅此惑故諸行者常須遮制積功不已漸得出有迷此不修還同無始徒在僧倫更招苦業今聞出家之美不得便言無惡又聞俗人之惡不可便言無善故通述之宜各警策夫出家者猶信故入道也當去愛著順佛語則出世之行成也若於行有虧則非謂之信也內既無信則剪落納衣瓶鉢等於身無用略引數條不得自怠已去憒閙得空閒已離俗愛無攀緣已出馳動入寂定已離染著得無礙已捨苦境得無惱已離妻子無纏縛已棄飾好厭華侈已絶聲色滅貪求已斷榮辱去我見已向八正趣道門已披弘誓忍辱鎧已服解脫涅槃衣已望畢竟空寂舍已登慈悲喜捨堂已見回向之大利已聽多聞自覺音佛見出家之利樂如此所以勸獎誡勵修學故經云蓋聞沙門之為道也捨家妻子捐棄愛欲斷絶六情守戒無為其清淨一心者則萬邪滅矣一心之道者聲色不能汙榮位不能動免離憂苦存亡自在塊然獨立捨五慳除兩穢二堅縛二障法二種垢二雨雹二癰瘡二燒法二種病四破戒者一謂三業不淨二謂聞空怖畏三謂不為泥洹四謂貪著我見又如經說菩薩修行先除四失謂捨欺誑重報恩决嫌疑滅諂心如是僃行諸度妙行清淨廣大安住寂靜頌曰韞石諒非真飾瓶信為假竊服臯門上濫吹溜軒下鳳祀徒驚心騶文終好野實相豈或照浮榮未能捨迹殊冠冕客事襲驅馳者已矣歇鄭聲無然亂周雅欽定四庫全書
