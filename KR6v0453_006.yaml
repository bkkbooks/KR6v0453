body:
  text: 明梅鼎祚輯晉四支敏度先西域人晉成世與康僧淵等過江聰哲有譽開元釋教録云晉惠時豫章山沙門合維摩詰經序蓋維摩詰經者先哲之格言弘道之宏標也其文微而婉厥旨幽而遠可謂唱高和寡故舉世罕覽然斯經梵本出自維耶離在昔漢興始流茲土于時有優婆塞支恭明逮及於晉有法護叔蘭此三賢者並博綜稽古研機極玄殊方異音兼通開解先後譯傳別為三經同本人殊出異或辭句出入先後不同或有無離合多少各異或方言訓古字乖趣同或其文梵越其趣亦乖或文義混雜在疑似之間若此之比其塗非一若其偏執一經則失兼通之功廣披其三則文煩難究余是以合兩令相附以明所出為本以蘭所出為子分章斷句使事類相從令尋之者瞻上視下讀彼案此足以釋乖忤之勞易則易知矣若能參考校異極數通變則萬流同歸百慮一致庶可以闢大通於未寤闔同異於均致若其配不相疇儻失其類者俟後明哲君子刊之從正合首楞嚴經記梵文同晉音勇伏定意此經本有記云支讖所譯出讖月支人也漢桓靈之世來在中國其博學淵妙才思測微凡所出經類多深玄貴尚實中不在文飾今之小品阿闍世伅真般舟悉讖所出也又有支越字恭明亦月支人也其父亦漢靈帝之世來獻中國越在漢生似不及見讖也又支亮字紀明資學於讖故越得受業於亮焉越才學深徹內外備通以季世尚文時好簡略故其出經頗從文麗然其屬辭析理文而不越約而義顯真可謂深入者也以漢末沸亂南度奔吳黃武至建興中所出諸經凡數十本自有別傳記録亦云出此經今不見復有異本也然此首楞嚴自有小不同辭有豐約文有晉梵較而尋之要不足以為異人別出也恐是越嫌讖所譯者辭質多梵音所異者刪而定之其所同者述而不改二家各有記録耳此一本於諸本中辭最省便又少梵音遍行於世即越所定者也至大晉之初有沙門支法護白衣竺叔蘭並更譯此經求之於義互相發明披尋三部勞而難兼欲令學者即得其對今以越所定者為母護所出為子蘭所譯者繫之其所無者輒於其位記而別之或有文義皆同或有義同而文有小小增減不足重書者亦混以為同雖無益於大趣分部章句差見可耳勇伏定記曰元康元年四月九日燉煌菩薩支法護手執梵經口出首楞嚴三昧聶承遠筆受願令四輩覽綜奉宣觀異同意並出三藏記集康法邃譬喻經序隋費長房歷代三寶紀東晉録云譬喻經十卷成帝世沙門康法邃類集衆經撰出此部事甚要妙譬喻經者皆是如來隨時方便四説之辭敷演弘教訓誘之要牽物引類轉相證據互明善惡罪福報應皆可寤心免彼三塗如今所聞億未載一而前後所寫互多復重今復撰集事取一篇以為十卷比次首尾皆令條別趣使易了於心無疑願率土之賢有所遵承永升福堂為將來基出三藏記集釋道安姓衛常山扶丫人博涉經義南投襄陽化行樊沔後歸符堅建元中終長安五級寺安般注序安窮覽經典注般若道行密迹安般諸經序致淵富妙盡深旨安般者出入也道之所寄無往不因德之所寓無往不託是故安般寄息以成守四禪寓骸以成定也寄息故有六階之差寓骸故有四級之別階差者損之又損之以至於無為級別者忘之又忘之以至於無欲也無為故無形而不因無欲故無事而不適無形而不因故能開物無事而不適故能成務成務者即萬有而自彼開物者使天下兼忘我也彼我雙廢者守乎唯守也故修行經以斯二法而成寂得斯寂者舉足而大千震揮手而日月捫疾吹而鐵圍飛微噓而須彌舞斯皆乘四禪之妙止御六息之大辨者也夫執寂以御有崇本以動末有何難也安般居十念之一於五根則念根也故撰法句者屬唯念品也昔漢氏之末有安世高者博聞稽古特專阿毗曇學其所出經禪數最悉此經其所譯也茲乃趣道之要徑何莫由斯道也魏初康會為之注義義或隱而未顯者安竊不自量敢因前人為解其下庶欲蚊翮以助隨藍霧潤以增巨壑也陰持入經序陰持入者世之深病也馳騁人心變德成狂耳聾口爽耽醉榮寵抱癡投冥酸號三趣其為病也猶癩疾焉入骨徹髓良醫拱手猶蹎蹶焉來則冥然莫有所識大聖悼茲痛心內發忘身安赴塗炭含厚德忍舞擊觀羅密於重雲止罝網于八極洪癡不得振其翼巨愛不得逞其足採善心於毫芒拔凶頑於虎口以大寂為至樂五音不能聾其耳矣以無為為滋味五味不能爽其口矣曜形濁世拯擢難計陟降教終潛淪無名諸無著等尋各騰逝大弟子衆深懼妙法混然廢沒於是令迦葉集結阿難所傳凡三藏焉該羅幽廓難度難測也世雄授藥必因本病病不能均是故衆經相待乃備非彥非聖罔能綜練自兹以後神通高士各為訓釋或攬撰諸經以為行式譬瓔璣歟擇彼珠珍以色相發佩之冠之為光為飾喻繪事歟調別衆彩以圖暉列諸明睿者所撰亦然此經則是其數也有捨家開士出自安息字世高大慈流洽播化斯土譯梵為晉微顯闡幽其所敷宣專務禪觀醇玄道數深矣遠矣是經其所出也陰入之弊人莫知苦是故先聖照以止觀陰結日損成泥洹品自非知機其孰能與於此乎從首至於九絶都是四十五藥也以慧斷知入三部者成四諦也十二因緣訖淨法部者成四信也其為行也唯神矣故不言而成唯妙矣故不行而至統斯行者則明白四達立根得眼成十力子紹胄法王奪澤大千若取證則拔三結住壽成道徑至應真此乃大乘之舟楫泥洹之關路于斯晉土禪觀弛廢學徒雖興蔑有盡漏何者禪思守玄練微入寂在取何道猶覘于掌墯替斯要而希見證不亦難乎安末近積罪生逢百罹世事孔棘世乏聖導潛遁晉山孤居離衆幽處窮壑竊覽篇目淺識獨見滯而不達夙宵抱疑咨諏靡質會太陽比丘竺法濟并州道人支曇講陟岨冒寇重爾遠集此二學士高朗博通誨而不倦者也遂與析槃暢礙造茲注解世不值佛又處邊國音殊俗異規矩不同又以愚量聖難以逮也冀未踐緒者少有微補非敢自必析究經旨人本欲生經序人本欲生經者照乎十二因緣而成四諦也本者癡也欲者愛也生者生死也略舉十二之三以為目也人在生死莫不浪滯於三世飄縈於九止綢繆八縛者也十二因緣於九止則第一人亦天也四諦所鑒鑒乎九止八解所正正乎八邪邪正則無往而不恬止鑒則無往而不愈無往而不愈故能洞照傍通無往而不恬故能神變應會神變應會則不疾而速洞照傍通則不言而化不言而化故無棄人不疾而速故無遺物物之不遺人之不棄斯禪智之由也故經曰道從禪智得近泥洹豈虛也哉誠近歸之要也斯經似安世高譯為晉言也言古文悉義妙理婉覩其幽堂之美闕庭之富或寡矣安每覽其文欲疲不能所樂而玩者三觀之妙也所思而存者想滅之辭也敢以餘暇為之撮注其義同而文別者無所加訓焉了本生死經序夫四信妙輿者衆祐之寶軒也以運連縛倒見衆生凡在三界罔弗冠癡佩行嬰舞生死而趨陰堂揖讓色味惑載疑驅馳九止者也既則狎賢侮聖從其姦慝貪劒恚鏚梟截玄路羣誹上要殃禍僃嘗矣世雄顧愍深圖變謀法旍曜於重霓道鼓震於雷吼寂千障乎八紘慧戈陷乎三有於是碎癡冠決嬰珮升信車入諦軌則因緣息成四喜矣故曰了本生死也了猶解也本則癡也元也如來指舉一隅身子伸敷高旨引興幽讚美矣盛矣夫計身有命則隨緣縛謗佛毀信若彌綸於幽室矣夫解空無命則成四諦照然立信若日殿之麗乾矣斯乃五十六藥之崇基淵乎蓋衆行之宗也開微成務孰先者乎佛始得道隆建大哀比經則十六之一也其在天竺三藏聖師莫不以為教首而研幾也漢之季世此經始降茲土雅邃奧邈少達旨歸者也魏代之初有高士河南支恭明為作注解探玄暢滯真可謂入室者矣俊哲先人足以折中也然童蒙之倫猶有未悟故仍前迹附釋末訓非苟穿鑿以紫亂朱也儻孤居始進者可以辨惑焉十二門經序十二門者要定之目號六雙之關徑也定有三義焉禪也等也空也用療三毒綢繆重病嬰斯幽厄其日深矣貪囹恚圄癡城至固世人遊此猶登春臺甘處欣欣如居花殿嬉樂自娛莫知為苦嘗酸速禍因憊五道夫唯正覺乃識其謬耳哀倒見之苦傷蓬流之痛為設方便防萌塞漸闢茲慧定令自浣滌挫鋭解紛返神玄路苟非至德其道不凝也夫邪僻之心必有微著是故禪法以四為差焉貪淫囹者荒色悖蒸不別尊卑渾心耽緬習以成狂亡國傾身莫不由之虛迷空醉不知為幻故以死尸散落自悟漸斷微想以至于寂味乎無味故曰四禪也瞋恚圄者爭纖芥之虛聲結瀝血之重咎恩親絶於快心交友腐於縱忿含怒徹髓不悛滅族聖人見強梁者不得其死故訓之以等丹心讐親至柔其志受垢含苦治之未亂淳德邃厚兕不措角況人害乎故曰四等也愚癡城者誹古聖謗真諦慢二親輕師傅斯病尤重矣以慧探本知從癡愛分別末流了之為惑練心攘慝狂病瘳矣故曰四空也行者挹禪海之深醴溉昏迷之盛火激空淨之淵流蕩癡塵之穢垢則皎然成大素矣行斯三者則知所以宰身也所以宰身者則知所以安神也所以安神者則知所以度人也然則經無巨細出自佛口神心所制言為世寶慧日既沒三界喪目經藏雖存淵玄難測自非至精孰達其微於是諸開士應真各為訓解釋其幽賾辨其差貫則爛然易見矣窮神知化何復加乎從十二門已後則是訓傳也凡學者行十二門却盡神足滅外止粗謂之成五道也三向諸根進消內結謂盡諸漏也始入盡漏名不退轉諸佛嘉歎記其成號深不可測獨見曉焉神不可量獨能精焉陵雲輕舉淨光燭幽移海飛嶽風出電入淺者如是況成佛乎是乃三乘之大路何莫由斯定也自始發迹逮于無漏靡不周而復始習茲定也行者欲崇德廣業而不進斯法者其猶無柯而求伐不飯而徇飽難以獲矣醒寤之士得聞要定不亦妙乎安宿不敏生值佛後又處異國楷範多闕仰希古烈滯而未究寤寐憂悸有若疾首每惜茲邦禪業替廢敢作注于句末雖未足光融聖典且發蒙者儻易覽焉安世高善開禪數斯經似其所出故録之于末大十二門經序夫淫息存乎解色不係防間也有絶存乎解形不係念空也色解則冶容不能縛形解則無色不能滯不縛者雖天魔玉顏窈窕艷姿莫足傾之之謂固也不滯者雖遊空無識泊然永壽莫足礙之之謂真也何者執古以御有心妙以了色雖羣居猶芻靈泥洹猶如幻豈多制形而重無色哉是故聖人以四禪防淫淫無遺焉以四空滅有有無現焉淫有之息要在明乎萬形之未始有百化猶逆旅也怨憾之興興於此彼此彼既興遂成仇敵仇敵適成勃然赫怒赫怒已發無所不至至不可至神幽想獄乃毒乃辛欣之甘之是以如來訓之以等等所難等何往不等等心既富怨本息矣豈非為之乎未有圖難於其易者乎夫然則三事凶耽廢然息矣十二重關廓然闢矣根立而道生覺立而道成莫不由十二門立乎定根以逆道休也大人揮變榮光四塞彈撇安明吹沫千万默動異剎必先正受明夫匪禪無以統乎無方而不留匪定無以周乎萬形而不礙禪定不愆於神變乎何有也至矣盡矣蔑以加矣此經世高所出也辭旨雅密正而不豔比諸禪經最為精悉案經後記云嘉禾七年在建鄴周司隸舍寫緘在篋匱向二百年矣冥然不行無聞名者比丘竺道護於束垣界賢者經中得送詣護澤乃得流布得經之後俄而其家遇火護若不覩為灰炭矣自然將喪斯禪也後死者不得與聞此經也此經也八音所誨四道作訓約無乏文重無簡矣精義入神何以上乎前世又為懸解一家之傳故筌而次之然世高出經貴本不飾天竺古文文通尚質倉卒尋之時有不達今為略注繼前人之末非敢亂朱冀有以寤焉道行般若波羅蜜經序大哉智度萬聖資通咸宗以成也地合日照無法不周不恃不處纍彼有名既外有名亦病無形兩忘玄莫塊然無主此智之紀也夫永壽莫美乎上乾而齊之殤子神偉莫美於凌虛而同之涓滯至德莫大乎真人而比之朽種高妙莫大乎世雄而喻之幻夢由此論之亮為衆聖宗矣何者執道御有卑高有差此有為之域耳非據真如遊法性冥然無名也據真如遊法性冥然無名者智度之奧室也名教遠想者智度之蘧廬也然存乎證者莫不契其無生而煌眩存乎迹者莫不忿其蕩冥而誕誹道動必反優劣致殊眩誹不其宜乎不其宜乎要斯法也與進度齊軫逍遙俱遊千行萬定莫不以成衆行得字而智進全名諸法參相成者求之此列也且其經也進咨第一義以為語端追述權便以為談首行無細而不歷數無微而不極言似煩而各有宗義似重而各有主璅見者慶其邇教而悅寤宏哲者望其遠標而絶目陟者彌高而不能階涉者彌深而不能測謀者慮不能規尋者度不能盡暨杳冥矣真可謂大業淵藪妙矣者哉然凡諭之者考文以徵其理者昏其趣者也察句以驗其義者迷其旨者也何則考文則異同每為辭尋句則觸類每為旨為辭則喪其卒成之致為旨則忽其始擬之義矣若率初以要其終或忘文以全其質者則大智玄通居可知也從始發意逮一切智曲成決著八地無染謂之智也故曰遠離也三脫照空四非明有統鑑諸法因後成用藥病雙亡謂之觀也明此二行於三十萬言其如視諸掌乎顛沛造次無起無止也佛泥曰後外國高士抄九十章為道行品桓靈之世朔佛齎詣京師譯為漢文因本順旨轉音如已敬順聖言了不加飾也然經既抄撮合成章投音殊俗異譯人口傳自非三達胡能一一得本緣故乎由是道行頗有首尾隱者古賢論之往往有滯任行恥此尋求其本到于闐乃得送詣倉垣出為放光品斥重省刪務令婉便若其悉文將過三倍善出無生論空持巧傳譯如是難為繼矣二家所出足令大智煥爾闡幽支讖全本其亦應然何者抄經刪削所害必多委本從聖乃佛之至誡也安不量末學庶幾斯心載詠載玩未墜于地檢其所出事本終始猶令折傷玷戢然無際假無放光何由解斯經乎永謝先哲所蒙多矣今集所見為解句下始現有首終隱現尾出經見異銓其得否舉本證抄敢增損也幸我同好飾其瑕謫也大藏淡字函塊作隤合放光光讚略解序放光光讚同本異譯耳其本俱出于闐國持來其年相去無幾光讚于闐沙門祗多羅以泰康七年齎來護公以其年十一月二十五日出之放光分如檀以泰康三年于闐為師送至洛陽到元康元年五月乃得出耳先光讚來四年後光讚出九年也放光于闐沙門無叉羅執梵竺叔蘭為譯言少事約刪削重復事事顯炳煥然易觀也而從約必有所遺於天竺辭及騰每大簡焉光讚護公執梵本聶承遠筆受言準天竺事不加飾悉則悉矣而辭質勝文也每至事首輒多不便諸反覆相明又不顯灼也考其所出事周密耳互相補益所悟實多恨其寢逸涼土九十一年幾至泯滅乃達此邦也斯經既殘不具並放光尋出大行華京息心居士翕然傳焉中山支和上遣人於倉垣斷寫之持還中山中山王及衆僧城南四十里幢幡迎經其行世如是是故光讚人無知者昔在趙魏迸得其第一品知有茲經而求之不得至此會慧常進行慧辨等將如天竺路經涼州寫而因焉展轉秦雍以晉泰元元年五月二十四日乃達襄陽尋之玩之欣有所益輒記其所長為略解如左般若波羅蜜者成無上正真道之根也正者等也不二入也等道有三義焉法身也如也真際也故其為經也以如為首以法身為宗也如者爾也本末等爾無能令不爾也佛之興滅綿綿常存悠然無寄故曰如也法身者一也常淨也有無均淨未始有名故於戒則無戒無犯在定則無定無亂處智則無智無愚泯爾都忘二三盡息皎然不緇故曰淨也常道也真際者無所著也泊然不動湛爾玄齊無為也無不為也萬法有為而此法淵默故曰無所有者是法之真也由是其經萬行雨廢觸章輒無也何者癡則無往而非徼終日言盡物也故為八萬四千塵垢門也慧則無往而非妙終日言盡道也故為八萬四千度無極也所謂執大淨而萬行正正而不害妙乎大也凡論般若推諸病之壃服者理徹者也尋衆藥之封域者斷迹者也高談其轍迹者失其所以指南也其所以指南者若假號章之不住五通品之不貢高是其涉百辟而不失午者也宜精理其轍迹又思存其所指則始可與言智已矣何者諸五陰至薩云若則是菩薩來往所現法慧可道之道也諸一相無相則是菩薩來往所現真慧明乎常道也可道故後章或曰世俗或曰説已也常道則或曰無為或曰復説也此兩者同謂之智而不可相無也斯乃轉法輪之目要般若波羅蜜之常例也摩訶鉢羅若波羅蜜經抄序昔在漢陰十有五載講放光經歲常再遍及至京師漸四年矣亦恆歲二未敢墯息然每至滯句首尾隱沒釋卷深思恨不見護公叉羅等會建元十八年正車師前部王名彌第來朝其國師字鳩摩羅跋提獻梵天品一部四百二牒言二十千首盧首盧三十二字梵數經法也即審數之凡十七千二百六十首盧殘二十七字都并五十五萬二千四百七十五字天竺沙門曇摩蜱執本佛護為譯對而檢之慧進筆受與放光光讚同者無所更出也其二經譯人所漏者隨其失處稱而正焉其義異不知孰是者輒併而兩存之往往為訓其下凡四卷其一紙二紙異者出別為一卷合五卷也譯梵為秦有五失本也一者梵語盡倒而使從秦一失本也二者梵經尚質秦人好文傳可衆心非文不合斯二失本也三者梵經委悉至於歎詠叮嚀反覆或三或四不嫌其煩而今裁斥三失本也四者梵有義説正似亂辭尋説向語文無以異或千五百剗而不存四失本也五者事已全成將更傍及反騰前辭已乃後説而悉除此五失本也然般若經三達之心覆面所演聖必因時俗有易而刪雅古以適今時一不易也愚智天隔聖人叵階乃欲以千歲之上微言傳使合百王之下末俗二不易也阿難出經去佛未久尊者大迦葉令五百六通迭察迭書今離千年而以近意量裁彼阿羅漢乃兢兢若此此生死人而平平若此豈將不知法者勇乎斯三不易也涉茲五失經三不易譯梵為秦詎可不慎乎正當以不聞異言傳令知會通耳何復嫌大匠之得失乎是乃未所敢知也前人出經攴讖世高審得梵本難繫者也又羅支越斫鑿之巧者也巧則巧矣懼竅成而混沌終矣若夫以詩為煩重以尚書為質朴而刪令合今則馬鄭所深恨者也近出此撮欲使不雜推經言旨唯懼失實也其有方言古辭自為解其下也於常首尾相違句不通者則冥如合符厭如復析乃見前人之深謬欣通外域之嘉會也於九十章蕩然無錯疑毫芒之間泯然無微疹已矣乎增一阿含經序四阿含義同中阿含首以明其指不復重序也增一阿含者比法條貫以數相次也數終十令加其一故曰增一也且數數皆增以增為義也其為法也多録禁律繩墨切厲乃度世檢栝也外國巖岫之士江海之人於四阿含多詠味茲焉有外國沙門曇摩難提者兜佉勒國人也齠齔出家孰與廣聞誦二阿含溫故日新周行諸國無土不涉以秦建元二十年來詣長安外國鄉人咸皆善之武威太守趙文業求令出焉佛念譯傳曇嵩筆受歲在甲申夏出至來春乃訖為四十一卷分為上下部上部二十六卷全無遺忘下部十五卷失其録偈也余與法和共考正之僧䂮僧茂助校漏失四十日乃了此年有阿城之役伐鼓近郊而正專在斯業之中全具二阿含一百卷鞞婆娑婆和須蜜僧伽羅剎傳此五大經自法東流出經之優者也四阿含四十應真之所集也十人撰一部題其起盡為録焉懼法留世久遺逸散落也斯土前出諸經班班有其中者令為二阿含各為新録一卷全其故目注其得失使見經尋之差易也合上下部四百七十二經凡諸學士撰此二阿含其中往往有律語外國不通與沙彌白衣共視也而今已後幸共護之使與律同此乃茲邦之急者也斯諄諄之誨幸勿藐藐聽也廣見而不知護禁乃是學士通中創也中本起康孟祥出出大愛道品乃不知是禁經比丘尼法甚慊切真割而去之此乃是大鄙可痛恨者也此二經有力道士乃能見當以著心焉如其輕忽不以為意者幸我同志鳴鼓攻之可也大藏形字函見載道地經序夫道地者應真之玄堂升仙之奧室也無本之城杳然難陟矣無為之牆邈然難踰矣微門妙闥少窺其庭者也蓋為器也猶海與行者日酌之而不竭返精者無數而不滿其為像也含弘靜泊綿綿若存寂寥無言辨之者幾矣恍惚無行求矣漭乎其難測聖人有以見因華可以成實覩末可以達本乃為布不言之教陳無轍之軌闡止啓觀式成定諦髦彥六雙率由斯路歸精谷神於乎羡矣夫地也者包潤施育稼穡以成鏐鐐瓊琛罔弗以載有喻止觀莫近於此故曰道地也昔在衆祐三達遐鑒八音四辨赫奕敷化識病而療聲典難算至如來善逝而大訓絶五百無著遷而靈教乖於是有三藏沙門厥名衆護仰雅諸行布在羣籍俯愍發進不能悉洽粗述衆經撰要約行目其次序以為一部二十七章其於行也要猶人首與可終身載不可須臾下猶氣息與可終身通不可須臾閉息閉則命殞首下則身殪若行者暫去斯法姦宄之匿入矣有開士世高者安息王元子也禪國高讓納萬乘位克明俊德改容修道越境流化爰適此邦其所傳訓淵微優邃又析護所集者七章譯為漢文音近雅質敦兮若朴或變質從文或因質不飾皇矣世高審得厥旨夫絶愛原滅榮冀息馳騁莫先於止了癡惑達九道見身幻莫首於觀大聖以是達五根登無漏揚美化易頑俗莫先於止靡不由茲也真可謂盛德大業至矣哉行自五陰盡于成壞則是苦諦漏盡之迹也神足章者則是禪思五通之要也五十五觀者則是四非常度三結之本也人之處世曚昧未祛熙熙甘露如饗大牢由處穢海幽厄九月既生迍邅罹遘百凶尋旋老死嬰苦万端漂溺五流莫能自返聖人深見以為苦證遊神八路長陟永安專精稽古則佚樂若此關情縱欲則酸毒若彼二道顯著宜順所從石以淬壁剝堅截剛素質精染五色炳燦由是論之可不勉哉豫生不辰值皇綱紐絶玁狁猾夏山左蕩沒避難濩澤師殞友析周爰咨謀顧靡所詢時鴈門沙門支曇講鄴都沙門竺僧輔此二仁者聰明有融信而好古冒嶮遠至得與酬酢尋章察句造此訓傳希權與進者暫可微寤蚊蚋奮翼以助隨藍蟻壟增封嵩嶽之頂豈其能益於高猛哉探賾奧邈唯八輩難之況末學小子庶幾茲哉然天竺聖邦道岨遼遠幽見碩儒少來周化先哲既逝來聖未至進退狼跋咨嗟涕洟故作章句伸己丹赤冀諸神道照我顒顒必枉靈趾燭謬正闕也十法句義經序夫有欲之激百轉千化搖蕩成教亦何得一端乎是故正覺因心所遷即名為經邪止名正亂止名定方圓隨器合散從俗隨器故因質而立名從俗故緣對而授藥立名無常名則神通矣授藥無常藥則感而通故矣即已不器又通其故則諸行泛然因法而結也二三至十在乎其人病有衆寡以人為目耳譬藥分劑有單有復診脈視色投藥緣疾法參相成不其然乎自佛即幽阿難所傳分為三藏纂乎前緒部別諸經小乘則為阿含四行中阿含者數之藏府也阿毗曇者數之苑藪也其在赤澤碩儒通人不學阿毗曇者蓋闕如也夫造舟而濟者其體也安粹數而立者其業也美是故般若啓卷必數了諸法卒數以成經斯乃衆經之喉襟為道之樞極也可不務乎可不務乎於戲前徒不忘玄數者鶖鷺子也于茲繼武有自來矣篤斯業者或不成也爰晉土者世高其俊也偉哉數學淵源流清抱德惠和播馨此域安雖希高迹末由也已然旋焉周焉藏焉修焉未墜地也并一不惑以成積習移志𮛫遠移質緣以高尚欲疲不能也人亦有言曰聖人也者人情之積也聖由積靡爐鎚之間惡可已乎經之大例皆異説同行異説者明夫一行之歸致同行者其要不可相無則行必俱行全其歸致則同處而不新不新故頓至而不惑俱行故叢萃而不迷也所謂知異知同是乃大通既同既異是謂大備也以此察之義焉廋哉義焉廋哉夫玄覽莫美乎同異而得其門者或寡矣明白莫過乎辨數而入其室者鮮矣昔嚴調撰十慧章句康僧會集六度要目每尋其迹欣有寤焉然猶有闕文行未録者今抄而第之名曰十法句義若其常行之注解若昔未集之貽後同我之倫儻可察焉僧伽羅剎經序秦言衆護僧伽羅剎者須賴國人也佛去世後七百年生此國出家學道遊教諸邦至犍陀越土甄陀罽二王師焉高明絶世多所述作此土修行經大道地經其所集也又著此經憲章世尊自始成道迄于淪虛行無巨細必因事而演遊化夏坐莫不曲備雖普耀本行度世諸經載佛起居至謂為密今覽斯經所悟復多矣傳其將終我若立根得力大士誠不虛者立斯樹下手援其葉而棄此身使那羅延力大象之勢無能移余如毛髮也正使就耶維者當不燋此葉言然之後便即立終罽二王自臨而不能動遂以巨絙象挽未始能搖即就耶維炎葉不傷尋升兜術與彌勒大士高談彼宮將補佛處賢劫第八以建元二十年罽賓沙門僧伽跋澄齎此經本來詣長安武威太守趙文業請令出焉佛念為譯慧嵩筆受正值慕容作難於近郊然譯出不𮕱余與法和對檢定之十一月三十日乃了也此年出中阿含六十卷增一阿含四十六卷伐鼓擊柝之中而出斯一百五卷窮通不改其恬詎非先師之故迹乎阿毗曇八犍度論序阿毗曇者秦言大法也衆祐有所見道果之至頤擬性形容執乎真像謂之大也有以道慧之至齊觀如司南察乎一相謂之法故曰大法也中阿含世尊責優陀耶曰汝致詰阿毗曇乎夫然佛以身子五法為大阿毗曇也戒定慧名無漏也佛般涅槃後迦旃延義第一也以十部經浩博難究撰其大法為一部八犍度四十四品也其為經也富莫上焉邃莫加焉要道無行而不由可不謂之富乎至德無妙而不出可不謂之邃乎富邃洽備故能微顯闡幽也其説智也周其説根也密其説禪也悉其説道也具周則二八用各適時密則二十迭為賓主悉則味淨遍遊其門具則利鈍各別其所以故為高座者所咨嗟三藏者所鼓舞也其身毒來諸沙門莫不祖述此經憲章鞞婆沙詠歌有餘味者也然乃大荒之外蔥嶺之表雖欲從之末由見也以建元十九年罽賓沙門僧伽禘婆誦此經甚利來詣長安比丘釋法和請令出之佛念譯傳慧力僧茂筆受和理其指歸自四月三十日出至十月二十三日乃訖其日檢校譯人頗雜義辭龍蛇同淵金鍮共肆者彬彬如也和憮然恨之余亦深謂不可遂令更出夙夜匪解四十六日而得盡定損可損者四卷焉至於事須懸解起盡之處皆為細其下梵本十五千七十二首盧四十八萬二千五百四言秦言十九萬五千二百五十言其人忘因緣一品云言數可與十門等也周攬斯經有碩人所尚者三焉以高座者尚其博以盡漏者尚其要以研幾者尚其密密者龍象翹鼻鳴不造耳非人中之至恬其孰能與於此也要者八忍九斷巨細畢載非人中之至練其孰能致於此也博者衆微衆妙六八曲備非人中之至懿其孰能綜於此也其將來諸學者遊槃於其中何求而不得乎大藏夏字函見載十四卷鞞婆沙序阿難所出十二部經於九十日佛意三昧之所傳也其後別其徑至小乘法為四阿含阿難之功於斯而已迦旃延子撮其要行引經訓釋為阿毗曇四十四品要約婉顯外國重之優波離裁之所由為毗尼與阿毗曇四阿含並為三藏身毒甚珍未墜於地也其後曇摩多羅剎集修行亦大行於世也又有三羅漢一名尸陀槃尼二名達悉三名鞞羅尼撰鞞婆沙廣引聖證言輒據古釋阿毗曇焉其所引據皆是大士真人佛印印者也達悉迷而近煩鞞羅要而近略尸陀最折中焉其在身毒登無畏座僧中唱言何莫由斯道也其經猶大海與深廣浩汗千寶出焉猶崑嶽與嵬峩幽藹百珍之藪資生之徒於焉斯在茲經如是何求而不有乎有祕書郎趙政文業者好古索隱之士也常聞外國尤重此經思存想見然乃在崑嶽之右芃野之西眇爾絶域末由也已會建元十九年罽賓沙門僧伽跋澄諷誦此經四十二處是尸陀槃尼所撰者也來至長安趙郎飢虛在往求令出焉其國沙門曇無難提筆受為梵文佛圖羅剎譯傳敏智筆受為此秦言趙郎正義起盡自四月出至八月二十九日乃訖梵本一萬一千七百五十二首盧長五字也凡三十七萬六千六十四言也秦言為十六萬五千九百七十五字經本甚多其人忘失唯四十事是釋阿毗曇十門之本而分十五事為小品回著前以二十五事為大品而著後此大小二品全無所損其後二處是忘失之遺者令第而次之趙郎謂譯人曰爾雅有釋古釋言者明古今不同也昔來出經者多嫌梵言方質而改適今俗此政所不取也何者傳梵為秦以不間方言求知辭趣耳何嫌文質文質是時幸勿易之經之巧質有自來矣唯傳事不盡乃譯人之咎耳衆咸稱善斯真實言也遂案本而傳不令有損言遊字時改倒句餘盡實録也余欣秦土忽有此經挈海移嶽奄在茲域載玩載詠欲疲不能遂佐對校一月四日然後乃知大方之家富昔見之至狹也恨八九之年方窺其牖耳願欲求如意珠者必牢裝強伴勿令不周滄海之實者也出三藏記集又有道埏六十卷阿毗曇毗婆沙經序見宋比丘尼大戒序世尊立教法有三焉一者戒律也二者禪定也三者智慧也斯三者至道之由戶泥洹之關要也戒者斷三惡之干將也禪者絶分散之利器也慧者齊藥病之妙醫也具此三者於取道乎何有也夫然用之有次在家出家莫不始戒以為基址也何者戒雖檢形形乃百行舟輿也須臾不矜不莊則傷戒之心入矣傷戒之心入而後欲求不入三惡道未所前聞也故如來舉為三藏之首也外國重律每寺立持律月月相率説戒説戒之日終夜達曉諷乎切教以目維攝犯律必彈如鷹隼之逐鳥雀也大法東流其日未遠我之諸師始秦受戒又乏譯人考校者鮮先人所傳相承謂是至澄和上多所正焉余昔在鄴少習其事未及檢戒遂遇世亂每以怏怏不盡於此至歲在鶉火自襄陽至關右見外國道人曇摩侍諷阿毗曇於律特善遂令涼州沙門竺佛念寫其梵文道賢為譯慧常筆受徑夏漸冬其文乃訖考前常行世戒其謬多矣或殊失旨或粗舉意昔從武遂法潛得一部戒其言煩直意常恨之而今侍戒規矩與同猶如何符出門應轍也然後乃知淡乎無味乃直道味也而嫌其丁寧文多反復稱即命慧常令斥重去復常乃避席謂大不宜爾戒猶禮也禮執而不誦重先制也慎舉止也戒乃徑廣長舌相三達心制八輩聖士珍之寶之師師相付一言乖本有逐無赦外國持律其事實爾此土尚書及與河洛其文朴質無敢措手明祇先王之法言而慎神命也何至佛戒聖賢所貴而可改之以從方言乎恐失四依不嚴之教也與其巧便寧守雅正譯梵為秦東教之士猶或非之願不刊削以從飾也衆咸稱善於是案梵文書唯有言倒時從順耳前出戒十三事中起室與檀越議三十事中至大姓家及綺紅錦繡衣及七因緣法如斯之比失旨多矣將來學者審欲求先聖雅言者宜詳攬焉諸出為秦言便約不煩者皆蒲萄酒之被水者也外國云戒有七篇而前出戒皆八篇今戒七悔過後曰尸義罽賴尼尸義罽賴尼有百七事明也如斯則七篇矣又侍尸義罽賴尼有百一十事余嫌其多侍曰我持律許口受十事一記無長也尋僧純在丘慈國佛陀舌彌許得比丘尼大戒來出之正與侍同百有一十爾乃知其審不多也然則比丘戒不止二百五十阿夷戒不止五百也比丘大戒本欲説戒維那出堂前唱不淨者出次曰庾跋門怒鉢羅鞞處然後入唱行籌曰頞簸含陀阿素舍羅遮麗吏布薩陀心密栗楴娑㯓鞞度舍羅姞隸怒説戒者乃曰僧和集會未受大戒者出僧何等作為答説戒不來者屬授清淨説説已那春夏冬若干日已過去僧盡共思惟一切生死過求於度世道若精進持戒同亦當歸死不精進持戒同亦當歸死寧持戒而死不犯戒而生譬如駛水流日月不常住人命疾於彼去者不復還並出三藏記集答郗超書超遣使遺米千斛修書纍紙深致殷勤安答書損米千斛彌覺有待之為煩高僧傳襄陽金像銘道安所造更歷晉宋迄于齊梁屢感靈相周武滅法建德三年甲午鎔毀於腋下倒垂衣內有銘年月悉符案安間通陰陽此必安所預定晉太元十九年歲次甲午比丘道安於襄陽西郭造丈八金像此像三周甲午百八十年當滅唐釋道宣續高僧傳欽定四庫全書
