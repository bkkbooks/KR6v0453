body:
  text: 明梅鼎祚輯梁七陶弘景字通明丹陽秣陵人隱句曲山敬重佛法朝夕懺悔恆讀佛經答釋曇鸞書曇鸞或為巒未詳其氏雁門人出家五臺因注大集經感氣疾欲學佛法慮年命促減承江南陶隱居者廣博弘贍遂達某朝求諸方術乃致書通問及接對欣然酬以仙方十卷辭還魏境魏主重之號為神鸞馬終平遙寺法琳辨正論作大鸞去月耳聞音聲兹辰眼受文字將由頂禮歲積故使真應來儀正𠇍整拂藤蒲具陳花水端襟斂思佇聆警錫也續高僧傳去月一作去朔將由作或由故使作故致具陳作采汲斂思作儼思陸倕字佐公吳人安成王主簿天寺碑法雲旦聚則浸潤被乎重沙慧日晨登則暉燭於有頃皇帝乃把神珠握靈鏡擊天鼓撞地鐘驅日月之師勒星辰之陳九流外籍五明內典鳥策餘文龍宮遺教莫不神遊房奧迹遍門牆思洞希微言窮名象珉陛凌虛瓊樓鬱起可使龍城愧飾鴈塔慙珍日宇奪暉月宮掩麗昔者姬水壽丘載紀山川之目丹陵負夏僅傳鄉黨之名歌酒故邑賜復窮乎身世塤篪舊里高會止於當年銘曰被物如露偃民猶草解髫傳珠抽衣受寶化違宅火功超河岸捨我神居興兹靈館八龍豐殿四柱高廊並陳金璧旁建玉廂縱橫雜樹間廁衆芳保志法師墓志銘志天監十三年卒葬鍾山詔倕為銘墓法師自説姓朱名保志其生緣桑梓莫能知之齊故特進吳人張緒興皇寺僧釋法義並見法師於宋太始初出入鍾山往來都邑年可五六十歲未知其異也齊宋之交稍顯靈迹被髮徒跣負杖挾鏡或徵索酒殽或數日不食豫言未兆懸識他心一時之中分身數處天監十三年即化于華林園之佛堂先是忽移寺之金剛像出置戶外語僧衆云菩薩當去爾後旬日無疾而隕沈舟之痛有切皇心殯葬資須事豐供厚望方墳而隕涕瞻白帳而拊心爰詔有司式刊景行銘曰欲化毗城金粟降靈猗歟大士權迹帝京緒胄莫詳邑都罕見譬彼涌出猶如空現哀茲景像愍此風電將導舟梁假我方便形煩心寂外荒內辨觀往測來覩微知顯動足墟立發言風偃業窮難紹因謝弗援慧雲晝歇慈燈夜昏並藝文類聚都一作居王僧孺字僧孺東海剡人南康王咨議參軍慧印三昧及濟方等學二經序讚夫六書相因懸日月而無改二字一吐更天地而靡渝雖書不盡言言非書不闡言不盡意意非言不稱是以諦聽善思承茲利喜俯首屈足恭此受持若讀若誦已説今説一音一偈莫非舟梁一讚一稱動成輪軌況夫五力方圓四攝無怠開方便門示真實相流方等之妙説得菩提之至因沐此寶池照茲法炬香雲靡靡慧露傍流出伽耶之妙城發娑羅之寶樹建安殿下含章基性育德成體憓聲溢於秋水美義灮於冬日事高祖丘兔園名出前意後蒼損己利人忘我濟物傍通兼善無礙無私若空谷之必應如洪鍾之虛受匡法弘道以善為樂重以植顯因於永劫襲妙果於茲生託意紹隆用心依止妙達空有深辨權實而玉體不安有虧涼暑行仁莫顯楚君日見其瘳施德靡言漢相方饗其樂桂葉龜腦固風寒之易銷荔葩鸞骨更騰飛之可孱况復慧身方漸善根宿樹無勞湔腸浣胃不待望色察聲有廣州南海郡民何規以歲次協洽月旅黃鍾天監之十四年十月二十三日采藥於豫章胡翼山幸非放子逐臣乃類尋仙招隱登峯十所里霄若有來將循曲陌先限清澗或如止水乍有潔流方從揭厲且就褰攬未濟之間忽不自覺見澗之西隅有一長者語規勿渡規於時即留其人面色正青徒跣捨屨年可八九十面已皺斂鬚長五六寸髭半於鬚耳過於眉眉皆下被眉之長毛長二三寸隨風相靡脣色甚赤語響而清手爪正黃指毛亦長二三寸著赭布帔下有赭布泥洹僧手捉書一卷遙投與規規即捧持望禮三拜語規可以此經與建安王兼言王之姓字此經若至宜作三七日宿齋若不曉齋法可問下林寺副公副法師者戒行精苦恬憺無為遺嗜欲等豪賤蔬藿自充禪寂無怠此長者言畢便去行十餘步間忽不復覩規開卷敬視名為慧印三昧經經旨以至極法身無相為體理出百非義踰名相寂同法相妙等真如言其慧冥此理有若恆印心照凝寂故以三昧為名後又有濟諸方等學經此下又題云天竺薩和鞞曰僧迦與海虎王經旨以流通至教軌法有體所以誡示大士化物方法言若濟諸蒼氓宜弘方等之教方等者大乘之通名究竟之弘旨其軸題云燉煌菩薩沙門支法護所出竺法首筆受共為一卷寫以流通軸用淳漆書甚緊潔點製可觀究尋義趣或微或顯稱在羅閲山著陀鄰尼行無來無去非住非止斯蓋鷲嶽鶴林之別記寶殿孤園之後述不殊玉檢靡異寶函理出希微辭深鉤致是唯正説曾匪異端雖王導之得四十二章安清之出百六十品無以或異大王沐浴持奉擎跪鑽習多寫廣述闡揚玄旨孰匪醫王即斯藥樹不待眼瞬無勞苦口捨茲六術屏此十巫昔或授編書於汜上授揣術於谷裏乍有寓言且或假夢未有因應炳發若此其至焉受命下才式旍上道敢因滓賤率此顓蒙其辭曰雷音震響緑簡青編匪言曷教非迹靡傳是資妙象實寄幽筌照之慧燭濟以寶船懇哉至矣在應斯圓覆其靉靆浸此熙漣救焚援溺去蓋銷纏灼灼應韓英英河楚松孤桂鬱鸞棲鵬舉照野灮朝潤山枯渚濫源茲永覆簣已多鬱為蕃幹擢此天柯寄誠梵表託好禪河接足能仁心直妙覺用遺滯染是祛塵濁靡向非真何背非俗一忘受想將捐味觸無德不酬有感必召吐彼神訣示我玄要既蠲既已留華及少等以北恆均之東曜出三藏記集中寺碑夫玉律追天故躔次之期不變緹室候景則發斂之氣罔踰是以忘言種覺絶纍於後心寄像聲形啓機於前教兼真假之雙燭均空有而兩忘蘊三明而過十地圓萬行而包四等道周百億化起大千奬導羣有滋濡萬類是用發廣大心吐微妙理將同商主取喻醫王開方便門示真實相固以濯之慈水銷以慧刀永言六趣用均一子中寺者晉太元五年會稽王司馬道子之所立也斜出旗亭事非湫隘傍超壁水望異狹斜天監十五年上座僧慈等更揆日締架赫然霞立信以填金可埒引繩斯擬寫妙金樓模麗瓊闕岧嶤偃蹇故三休而可至䆗窱周流方中宿而斯盡萬楹百栱合沓相持繡梲玉題分灮爭映燭龍夭矯將舉復宛威鳳鏗鏘如鳴更戢旁攀鏤檻斜登鈿砌煜爚金鋪玲瓏綺欂無風自響不拂而淨耽耽肅肅信息心之勝地穆穆愔愔固忘想之嘉所銘曰玄黃雖弭權輿未測生滅相輪成壞不極篋蛇爭赴藤鼠無息情塵莫捨心火方赫是用三明實開五力湛寂無方示現多所踟躇吉樹殷勤禪渚斯道誰匡蒸哉我王施踰寶鉢供等檀牀蕭宮改構梵宇方莊階飛瑞采地起泥香日流閃爍風度清鏘道踰厥極固與天長棲玄寺雲法師碑銘渺渺大象茫茫真朴多淪愛有莫辨塵濁猗歟息心言高理邈居之匪絢得之靡學刻情幾種厲想玄覺且説且定以披以握來遵北渚至依西嶽西嶽峩峩北渚回波庭棲弱羽簷挂輕蘿甘粗衣惡棄厚安薄滅意囂湫寄心廖廓並藝文類聚禮佛唱導發願文夫至覺玄湛本絶聲言妙慮虛通固略筌象雖事絶百非而有來斯應理亡四句故無感不燭皇上道照機前思超繫表凝神汾水則心謝寰中屈道軒丘則形勞宇內斯乃法忍降迹示現閻浮之境大權住地俯應娑婆之域故欲洗拔萬有度脫羣生濯淨水於寶池蔭高枝於道樹折伏攝受之仁遇緣而咸拯苦言軟語之德有感而斯唱日用不知利益莫限衆等相與增到奉逮至尊五體歸命敬禮云云仰願皇帝陛下至道與四時並運玄風與八埏共廣反淳源於三古捨澆波於九代至治已覩於今日大道復屬於此時虎豹蹈而不驚虺蛇蹍而莫噬埋金抵玉毀契焚文嘉禾生醴泉出金車玉馬自相暉曜玄鶴丹鳳飛鳴來往灮景之所照燭舟車之所驅泛莫不屈膝係頸回首革音入侍藁街迎拜渭水與天地而長久等金石而逾固中嶽可轉長河有清而我聖皇愈溫愈睟不言而化行無為而教肅夫道備監撫望表元良察遠知微貫宗句極不勞斧藻無待審諭況復靜悟空有同觀真俗能行能説既信既持衆等齊誠奉逮儲君殿下歸命敬禮云云仰願皇太子殿下厚德體於蒼蒼廣載侔於磻礴前星照曜東離煥炳淑聞自遠和氣熏天異才爭入端人並至玉體怡清金聲妙越夫茂實英聲道周德廣秉圭襲袞之貴坐槐憩棠之尊猶應共惜東暾俱吝西崦悟蕉蘆之非實知鏡月之虛衒信秉電之不留驗畫水之隨合唯宜照之智炬灌以寶瀾增此睿根成斯妙植又各增到奉逮太尉等諸王殿下歸命敬禮云云仰願諸王既明且哲聲跨於河楚令聞令望道均於旦奭德貫右戚義藹周親作鉉則與二曜相終臨嶽則與四維等固若彭涓之遐永譬松筠之貞悅夫天枝峻密帝葉英芬莫不玉震蘭搖金鏘桂縟覩寸文而驗錦觀一毛而測鳳並能才高銅爵詞富雲臺彬彬亹亹超超灼灼以斯勝善奉逮諸王殿下歸命敬禮云云仰願諸王殿下穆穆與清風並扇英英將白雲共朗永鍾清祉長享元吉出牧則聲高民上入朝則譽光物右德重山王智超海藏鏗鏘麗於珠樹皎鏡光於玉田夫道流雲幄德感椒闈必以前藉勝因宿稟嘉數况重霑法雨更披慧日雖異薑后解珥請罪於周王不待樊姬捨肉有激於荊后而遵恭儉去嗜欲棄雕璣撤靡麗了心不滯正見無疑衆等齊誠奉為六宮眷屬歸命敬禮云云願六宮眷屬業華姬日聲麗媯辰震彩鐫圖傳芳詩史位齊寶印行等月光具六神通得四無礙夫稟賢明之德懷深妙之心豈非修習有本故能依止無倦義興等諸公主忘斯華重甘此翹到並宿世之所記別故現前所以信了影響至真寤寐玄極人各增到仰為諸公主歸命敬禮云云願諸公主日增智性彌長慧根四攝四依已遵已蹈七善七定靡退靡輟盛此王姬光茲帝女長享湯沐與河山而同固永服緹綺貫寒暑而無窮夫三相雷奔八苦電激或方火宅乍擬駛河故以尺波寸景大力所不能駐月御日車雄才莫之能遏其間飲苦餐毒抱痛銜悲身口為十使所由意思乃八疵之主衆等相與彼我齊到懺悔業纏無始已來至于今日所為十惡自作教他見善不讚聞惡隨喜焚林涸澤走犬揚鷹窮鄭衛之響極甘旨之味戲笑為惡倐忽成非侮慢形像陵踐塔寺不敬方等毀離和合自定權衡棄他斗斛愧心負理昧主欺親雖七尺非他方寸在我而能性其情在人未易恣此心口衆罪所集各運丹懇五體自投歸命敬禮云云願現前衆等身口清淨行願具足消三障業朗三達智五眼六通得意自在懺悔禮佛文夫有非自有有取所以有無非自無無著所以無故有取之惑興倐成萬纍無著之念起一超九劫是知道之所貴空有兼忘行之所重真假雙照稟氣含靈莫聞斯本肖形賦影靡測由來故發茲識窟猶綿蒙其莫辨導此愚相尚窈冥而未悟茫茫有同暗海幽幽實在危城業風縈薄三有長騖惑水邅回二死相屬以苦捨苦從暗入暗尋本不離色心即事莫非生滅是用抱此纏蓋輪回生死恣其六愛興其八邪或狙詐而克昌乍仁義而溘死或才均智等此賤彼豪或共日並時人升我墜唯言報施寂寥不知因對皎徹曩緣今果過現殖成有如符契不謬毫髮而欲以促生運其長術浮命回其冥數當知剎那交謝瞬息不流東榑才吐西崦已仄譬閲川之駛流若棲葉之輕露偽城易弛毒樹自攻若非假實兩明真俗俱辨豈能寫誠回向刻意修習不退不沒愈堅愈固南平大王殿下含辰象之正氣畜海嶽之淳靈宿侍八恆早遊七覺藉妙因於永劫招勝果於茲地若真金之愈鎣美玉之載琢是用未積已散不藏而捨故今式招靈指仰屈神儀建此齋肅譬茲關楗盛來緇素濟濟洋洋名香遍室寶華覆地高梵宛轉寧止震木遏雲清桴遙奕非直騰魚御馬仰願四部至誠五體歸命東方云云願大王殿下五畏內遣十力外扶百福莊嚴萬祉周集愕夢無忤其慮甘寢有恬其神更闢寶衢愈興慧業夫玄極凝淡非學者所窺妙本難思豈行人能測是以十地云覩有羅縠之疑三乘稱見懷狂羊之惑自非鑒窮機覺照極冥虛窮理盡性體元含一安能濟世仁壽拯物阽危道包碧海聲高赤縣昔堯曜唯在即世舜黑不兼來果四巡疲於禹迹六事倦於湯身並域中之勤勞方內之成益豈有度元元於苦海拔冗冗於畏塗運神力震法吼究香城之妙理窮金河之奧説慧高龍樹智出馬鳴必欲洗濯臣民奬導緇白天覆地養水産陸生咸降慈悲悉蒙平等奉為皇帝陛下儲君太子歸命敬禮云云仰願皇帝陛下景祚與七政相齊皇基與二曜均永地平天成樂和禮洽玉燭道正氛氳無爽條風祥雨膏潤相屬却馬偃伯鑄戟銷戈南洎北臨西被東漸灑甘雨布慧雲唯繩可結在冠已盡唐哉皇哉為導為首又願皇太子殿下睿業清暉與貞明而並燭粹範溫儀從嵩霍而俱峻聲出姬誦道越漢莊永沐智水長照慧日上妙居身至仁在己自雙樹八枝潛灮匿曜寶城不闢慧扇方掩而聖后騖法輪於長路棹寶舟於遙壑道浹人祗福隆祧墠肅事園寢虔奉宗祏藉斯妙果奉逮七廟聖靈歸命敬禮云云仰願重明纍聖僾然如在騰神淨國總駕天宮託化金蕖遨遊寶殿夫誠心內惻則至覺如在形力外殫則法身咫步衆等相與增到為諸王兄弟妃主戚屬歸命敬禮云云願諸王殿下裂壤盛於諸姬磐石過於隆漢德高魯衛義重間平論道則百辟依風作翰則羣黎仰化弘闡至教紹隆季像第內少長並膺此多福若百華之春麗譬萬寶之秋成信解堅深翹向無怠夫小乘志劣事唯一己大士意均乃包六趣今日檀主信等明珠無勞傍鏡質同挺玉不待外灮常欲物我均心怨親等觀衆等各歸誠為二十八天四王釋梵人間貧病地獄辛楚敬禮尊儀靈像菩提寶塔云云大乘奧藏妙法深經大身無邊身大力無量力四向四果八賢八聖願六氣氛氳四序熙穆至治灮萬宇玄化洞九幽襲介披鱗濕生卵化八苦六窮三塗五道俱蒙惠利並識遵依刀林輟刃劒樹摧險迷域開道直指四衢暗室生明大啓三曜俱向道場同登種覺初夜文夫遠自無始至於有身生死輪騖塵轢莫之比明暗遞來薪火不能譬逝水非駛千月難保蓼蟲習苦桂蠧喜甘大睡劇於據梧長昏甚於枕義非他召事實已招曾不知稟此形骸所由而至將斯心識竟欲何歸唯以勢位相高爭驕華於一旦車徒自盛競馳騖於當年莫不恃其雄心壯齒紅顏緇髮口恣肥醲身安輕靡繁絃促柱極滔湮而不厭玉牀象席窮靡曼而無已謂悲泉若木出沒曾不關人蹲烏顧免升落常自在彼殊不知命均脆草身為苦器何異犬羊之趣屠肆麋鹿之入膳廚秋蛾拂焰而不疑春蠶縈絲而靡悟未辨先對不識因習及其一觸畏途孟門非險轘裂肢解方斯不臻其痛斷趾鑿肩比茲未極其苦輪回起伏杳杳悠悠是以天中之天降悲提引壅夏河之長瀉撲秋原之猛燎或同商主乍等醫王形遍三千教傳百億或恣其神力或寂諸梵境言則三塗離苦笑則四生受樂乃應病投機解紛説理制之日夜稱為八關以八正鑰為法關楗斯實出世之妙津在家之雄行等衆相與運誠奉逮南平王殿下歸命敬禮云云仰願大王殿下睿業清暉與南嶽而相固貞心峻節等東溟而共廣萬纍煙消百災霧滅巧幻所不惑強魔莫能嬈逐慘舒而適體隨暄涼而得性自稟儀天之氣永固膳衛之道得六神通力具四無礙智夫日在昆吾則慮繁事擾景落濛汜則神靜志怡璧月珠星含華相照輕雲薄霧朗然自戢鳴鐘浮響灮燈吐輝法幢卷舒拂高軒而徐薄名香郁馥出重簷而輕轉金表含映珠柱洞色況復天尊端嶷威灮四照煥發青蓮容與珂雪覺祇衛之咫尺若林園之斯在大招離垢之賓廣集應真之侶清梵含吐一唱三歎密義抑揚連環不輟南平王體得機之敏資入神之微抱德含和經仁緯義善無細而不窮纍有輕而必捨受同虛籥照如懸鏡忘魯衛之尊高略柎萼之華重建希有之勝席臨難遇之法場相與五體歸命敬禮云云仰願大王殿下入不二門登一相道德階不動智超遠行洋溢惠聲與八風而共遠優遊玉體等六律而相調餐雪山之良藥挹露城之甘味衮服瓛圭與四時而永久朱輪緹幟貫千祀而常然並廣弘明集陸雲公字子龍吳人中書黃門侍郎廣弘明作陸雲誤御講般若經序夫理臻畢竟而照盡空寂入三門而了觀導五濁而超津譬茲烈炎遠衆邪而不觸如彼出日示一相以趨道自羅閲闡其玄言香域弘其妙説彌勒表字於圓灮帝釋念善於明呪受持讀誦神力折於猛風恭敬尊重福利踰於寶塔蓋衆聖之圓極而萬法之本源也皇帝真智自己大慈應物送迎日月緯絡天地鎮三季之澆風緝五際之頽俗出臨衢室退事齋居非以黃屋為尊每以蒼生為念德遍區宇未足顯於至仁理絶名言更殷勤於密説昔慧燈隱耀法藏分流二乘踳駁五部乖謬訶黎狹劣徒仰黑月之灮毗曇褊滯未見沈珠之寶自聖皇應期探盡幾妙決散羣述摧伏異學極天宮之浩博窮龍殿之祕深於是大發菩提深弘般若永斷煩惑同歸清淨潤甘露於羣生轉法輪而不息上以天監十一年注釋大品自茲已來躬事講説重以所明三慧最為奧遠乃區出一品別立經卷亦由觀音力重特顯普門之章登住行深乃出華嚴之品故以撮舉機要昭悟新學者焉大僧正慧令蓋法門之上首亦總持之神足願等須提之問遂同迦葉之請乃啓請御講説斯經有詔許焉爰以大同七年三月十二日講金字般若波羅蜜三慧經於華林園之重雲殿華林園者蓋江左已來後遊宴之所也自晉迄齊年將二百世屬威夷主多奢替舞堂鍾肆等阿房之舊基酒池肉林同朝歌之故所自至人御宇屏棄聲色歸傾宮之美女共靈囿於庶人重以華園毀拆悟一切之無常寶臺假合資十力而方固捨茲天苑爰建道場莊嚴法事招集僧侶肅肅神宇結翠巘之隂峩峩重閣臨丹雉之上廣博灮明有邁菴羅之地身心安樂實符歡喜之園於時三春屆節萬物舒榮風日依遲不寒不暑瑞華寶樹照曜七重玉底金池淪漪八德洞啓高門雲集大衆趨法席以沸喧聽鳴鐘而寂靜皇太子智均悉達德邁曇摩捨三殿之俗娛延二座以問道宣城王及王侯宗室等亦咸發深心並修淨行熏戒香以調善服染衣而就列廕映蟬冕委蛇冠帶排金門登玉階者濟濟成羣既而警蹕北趨棨戟東轉門揚清梵傍吐香煙被淨居之服升須彌之座八種妙聲發言無滯十方竦聽隨類得解甚深之義在挹注而難竭樂説之辨既往復而彌新至如宿學耆僧亟淪偏執專仗數論未了經文變小意以稱量仰天尊而發問於是操持慧刃解除疑網示之迷方歸以正轍莫不渙然冰釋欣然頂戴若蓮華之漸開譬月初而增長凡諸聽衆自皇太子王侯宗室外戚及尚書令何敬容百辟𡖖士蕃使主崔長謙使副陽休之及外域雜使一千三百六十人皆路逾九驛途遙萬里仰皇化以載馳聞大華而躍踊頭面伸其盡禮讚歎從其下陳又別請義學僧一千人於同泰寺夜覆制義並名擅龍象智曉江河傳習譬於瀉瓶諷誦同於疾雨沙門釋法隆年將百嵗學周三藏識洞八禪説法度人顯名於關塞之北聞中國應講摩訶般若經故自遠而至時僧正慧令猶未啓講京師道俗亦不知御應講也至發講之日又有外國僧衆不可勝數並衆所不識同集法座故知放灮遍照地神唱告豈勞馳象之使冥符信鼓之期會稽鄮縣阿育王寺釋法顯修習苦行志求慧解既等鬱多之思惟亦同波崙之懇到乃於講所自陳願力刺血灑地用表至誠昔剜體供養析骨書寫歸依正法匪吝身命以今望古信非虛説凡講二十三日自開講迄於解座日設遍供普施京師文武侍衛並加班賚上灮宅天下四十餘年躬務儉約體安菲素常御小殿裁庇風雨所居幄座僅於容膝外絶三驅之禮內屏千鍾之宴膳夫所掌嵗撤萬金掖庭之費年減巨億兼以博收地利同入珍於撓海盈息泉府譬無盡於龍金故能不勞人力無損國度財法兼施周流不竭是講也靈異雜沓不可思議一則宮中佛像悉放灮明二則大地震動備諸踊沒三門夜必澍雨朝則晴霽淑氣妍華埃塵不起四則犍椎既鳴講筵將合重肩絓轂填溢四門而人馬調和不相驚擾五則所施法席止坐萬人而恆沙大衆更無迫迮六則四部曠遠咸聞妙説軒檻之外聽受益明七則淨供遍設廚匪宿辦妙食應時百味盈溢八則氛氳異香從風滿觸九則鏗鏘雅樂自然發響十則同聲讚善遍於虛空斯蓋先佛證見諸天應感超踊寶於昔靈邁雨華於往瑞是時率土藻抃含靈慶悅願預福田爭事喜捨上皆區其心迹為發大願竊以一句奉持尚生衆善二字經耳猶階勝報況廣運大乘遍揚正法等發慧根同趣妙果方當祕諸寶函傳彼金字亘萬劫以灮明彌大千而利益盛矣哉信無德而稱也小臣預在講筵職參史載謹録時事以立今序蕭子顯字景陽蘭陵人吳興太守御講摩訶般若經序庖犧乃神八象所以成列周文克聖六虛所以廣陳蓋導俗之偏典非通方之大訓至如漢明自講局以儒術簡文談疏復謝專經猶靈若之觀井甃雲夢之在胸中也皇帝體至道而揚盛烈亶聰明而作元后十地斯在俯應人王八福是生允歸世主玄覽無際眇塵劫之初寂照所通該六合之外屈此無為示同有學檀忍兼修禪慧雙舉超國城而大捨既等王宮之時量珍寶於四天又同轉輪之日輕之若鴻毛去之如脫屣故以道駕皇王事高方册若非蘊生知之上德蓄機神於懷抱洞比三明齊功二智孰能與於此者哉金字摩訶般若波羅蜜經者蓋法部之為尊乃圓聖之極教開宗以無相明本發軫與究竟同流奧義雲霏深文海富前世學人鮮能堪受皇上愛重大乘遨遊法藏道同意合眷懷總持親動王言妙踰綸綍導明心之遠筌標空解之奇趣乃摛以翠縑刻為金篆衆具寶飾品窮無價芝英讓巧金碧相輝雖榮灮之翊河圖方此非瑞青玉之為仙簡於焉已劣皇太子承萬幾之暇日藉聽朝之間覽譬彼薰風願聞弘説殷勤奏請然後獲從以中大通七年太歲癸丑二月己未朔二十六日甲申輿駕出大通門幸同泰寺發講設道俗無遮大會萬騎龍趨千乘雷動天樂九成梵音四合震震填填塵霧連天以造于道場而建乎福田也既而龍袞輟御法服尊臨殿華紫紺座延高廣上界莫之擬新學不能升天容有穆降詔音旨弘捷疾之辨騁無畏之辭炙輠無窮連自解恣所請問渙然冰釋滯義同遣疑網皆除亦猶懸鏡之不藏衢樽之俟酌加以長筵亘陛冠冕千羣充堂溢霤僧侶山積對別殿而重肩環高廊而接坐錐立不容棘刺無地承法雨之通潤悅甘露而忘歸如百川之赴巨海類衆星之仰日月自皇太子王侯已下侍中司空袁昂等六百九十八人其僧正慧令等義學僧鎮座一千人晝則同心聽受夜則更述制義其餘僧尼及優婆塞優婆夷衆男冠道士女冠道士白衣居士波斯國使于闐國使北館歸化人講肆所班供帳所設三十一萬九千六百四十二人又二宮武衛𪧐直之身植葆戈駐金甲並蒙講饌別錫泉府復數萬人不在聽衆之例外國道人沙呵耶奢年將百歲在檀特山中坐禪聞中國應有大講故自遠而至機感先通咫尺萬里言語不達重譯乃宣三藏之解聖情懸照又波斯國使王安拘越荒服遠夷列參近座膜拜露頂欣受未聞多種出家聞義為貴即有四人同時落髮先是寶志法師者神通不測靈迹甚多自有別傳天監元年上始光有天下方留心禮樂未遑汾陽之寄法師以其年九月自持一麈尾扇及鐵錫杖奉上而口無所言上亦未取其意于今三十餘年矣其扇柄繫以小繩常所綰揳指迹之處宛然具存至是御乃鳴錫升堂執扇講説故知震大千而吼法者抑有冥符是時歲云芳春每夕雨注法鼓晨鳴輒便清朗時過兩旬日盈三七陽和協度雲景禎祥至解講之辰四衆雲集懺禮才畢而正殿十方大像忽放光明起自毫間遍於卍字左右靈相炳發金儀炫耀俄而左邊十方菩薩像續復放光起右腋下達于肩上聖御躬自虔禮大衆咸所觀矚故知現此面門證明義旨若夫多聞弟子內聖垂風右史記言實惟帝則乃命近臣纂録時事凡厥咨諏罔不備舉或通釋已遠而疑審方來或宗致未聞而啓請先至其追審者皆是本習所懷或隔日異辰義成先後或雖伸往復終是一問聖旨並隨方酬接如響應聲萬物為心事見乎此後之學者宜曉斯趣上弘法嵗久凡諸學僧遠近同集並會京師而僧家之學師習相守唯信口説專仗耳功鮮能尋究經文依求了義上每為之通解神彩意得已在言先裁引文句便至數十精詳朗贍莫能追領舊學諸僧黯如撤燭弛氣結舌無人不然萬衆仰觀一時心喜諸如此事非翰墨所能述又外國諸僧所論義者不必開所立之義直是素有心疑止來求決或發偈誦然後咨疑或請問既罷讚歎發願或語畢還坐衆俱不識或咨竟乃去莫知所在容服非常凡聖難測是講也東儲始啓止蒙七日諸僧鑽仰欲罷不能重復伸請更蒙二七而請益之衆顒顒不已上以國務久壅不允所祈將欲解座皇帝捨財遍施錢絹銀錫杖等物二百一種直一千九十六萬皇太子奉親玉經格七寶經函等仍供養經又施僧錢絹直三百四十三萬六宮所捨二百七十萬上親臨億兆躬自菲薄司服所職饔人所掌若非朝廷典章止是奉身之費則太官一日將十萬生衣嵗出千金上並不取別自營給服粗浣衣器同土簋日一蔬膳過中不餐寒暑被襲莫非大布所居便殿不能方丈昔之幄座今為下牀傍無侍衛顧無玩物左右唯經書卷軸所對但見香罏錫杖昧旦坐朝日旰乃息夜尋法寶明發不寐所利唯人所約唯己誠起居之恆事禁中之實録又宮人常格年給數千萬悉從停省無所為留雖漢文衣不至地光武穀數十斛方之蔑如矣所造寺塔及諸齋會不藉子來之民不同大酺之禮皆是採山澤之地利為如法之淨財量入為出資無外取一役之勞計限傭賚故能構製等於天宮設飯同於香積國朝大禮莫過三元三元所設衆止數萬隔嵗預營僅而後舉監督紛糾以為巨費至於此會出自淨財遠近百姓願為趨承欣欣請受爭取福分不待號令不須課率黍稷馨香如期即至數十萬衆饗之不盡所以知是皇上化力之所到百姓善根之有成至如軍國恆度府庫常畜固以天下為公器則秋毫無所侵也初上造十三種無盡藏有放生布施二科此藏利益已為無限而每月齋會復於諸寺施財施食又別敕至到張文休日往屠肆命切鼎俎即時救贖濟免億數以此為常文休者先為運吏輒散運米與貧民應入大辟上愍其仁心惻然不許非唯赦其重辜乃加以至到之目既非馮暖之市義又無汲黯之請罪人微宥重過於昔時文休既荷嘉貸未嘗暫怠日中或不得食而足不得息周遍京邑行步如飛擊鼓揚幡負擔馳逐家禽野獸殫四生之品無不放捨焉是時朝臣至於民庶並各隨喜又錢一千一百一十四萬上區其心迹列有十條或捨財同今法事者或捨財以供養者或捨財行慈悲者或捨財乞誦經者或捨財入節供者或捨財入放生者或捨財入布施者或捨身施大衆者或燒指供養三寶者或聞講啓求出家者昔如來化導獲悟不同故法眼無生根性非一上並與其人同發大願別見願文小臣陪侍講筵謹立今序並廣弘明集裴子野字幾原河東聞喜人厯鴻臚卿深信釋氏持其教戒南齊安樂寺律師智稱法師碑法師諱智稱河東聞喜人也俗姓裴氏挹汾澮之清源稟河山之秀質蓄靈因於上葉感慧性於閻浮直哉惟清爰初夙備溫良恭儉體以得之然而天韻真確含章隱曜沈漸人羣莫能測其遠邇蓋由徑寸之華韜光濬壑盈尺之寶未剖聯城鑒觀者罔識其巨麗逖聽者弗得其鴻名羈束戎旅俯起阡陌年登三十始覽衆經退而歎曰百年倐忽功名為重名不常居功難與畢且吉凶悔吝孔書已驗變化起伏厯聖未稱安知崢嶸之外寥廓之表籠括幽顯大援無邊者哉彼有師焉吾知歸矣遂乃長揖五忍斂衽四依挫鋭解紛於是乎盡宋大明中益部有印禪師者苦節洞觀鬱為帝師上人聞風自託一面盡禮印公言歸庸蜀乃擕手同舟以宋太始元年出家於玉壘誠感人天信貫金石直心般若高步道場既而敬業承師就賢辨志遨遊九部馳騁三乘摩羅之所宣譯龍王之所韜祕雖且受持諷誦然未取以為宗嘗謂攝心者迹迹密則心檢弘道者行行察則道存安上治人莫先乎禮間邪遷善莫尚乎律可以驅車火宅飛苦海瞻三途而勿踐厯萬劫而不衰者其毗尼之謂歟乃簡棄枝葉積思根本頓轡洗心以為己任於是曳錫踽步千里遊學擁經持鉢百舍不休西望荊山南過澧浦周流華夏博采奇聞土木形骸琬琰心識靡高不仰無堅不攻寢之所安席不及暖思之所至食不遑餐入道三年從師四講教逸功倍而業盛經明每稱道不墜地人各有美宣尼之學何詎常師于時具隱二上人先輩高流鳳鳴西楚多寶律師洽聞溫故翰起東都法師之在江陵也稟具隱為周旋爰及還京洛以公為益友皆權衡殿最言刈菁華捨稊稗而膳稻粱會鹽梅而成鼎飪其理練其旨深膚受末學莫能踵武以泰始六年初講十誦於震澤闡揚事相咫尺神道高談出雲漢精義入無間八萬威儀怡然理暢五部章句渙爾同波由是後進知宗先達改觀暉光令問於斯籍甚法師應不擇方行有餘力清言終日而事在其中立棲雲於具區營延祚於建業令不待嚴房櫳肅靜役不加迅棟宇駢羅自方等來儀變梵為漢鴻才巨學連軸比肩法華維摩之宗往往間出涅槃成實之唱處處聚徒而律藏憲章於時最寡振裘持領允屬當仁若夫淵源浩汗故老之所回惑峻阻隱復前修之所解駕皆剖析毫釐粉散膠結鉤深致遠獨悟胸懷故能使反戶之南彎弓之北尋聲赴響萬里而至門人嵗益經緯日新坐高堂而延四衆轉法輪而朝同業者二十有餘載君子謂此道於是乎中興絶慶弔屏流俗朱門華屋靡所經過齊竟陵文宣王顧輕千乘虛心八解嘗請法師講於邸寺既許以降德或謂宜修賓主法師笑而答曰我則未暇及正位函丈始交涼燠時法筵廣置髦士如林主譽既馳客容多猛發題命篇疑難鋒出法師應變如響若不留聽囿辨者土崩負強者折角莫不遷延徙靡亡本失支觀聽之流稱為盛集法師性本剛克而能悅以待問發言盈庭曾無忤色虛己博約咸竭厥才依止疏附訓之如一少壯居家孝于唯友脫屣四攝愛著兩忘親黨書介封而不發內恕哀蹙抑而不臨常曰道俗異故優陀親承音旨寧習其言而忽其教煩惱煦濡蕭然頓遣法師之於十誦也始自吳興迄于建業四十有餘講撰義記八篇約言示制學者傳述以為妙絶古今春秋七十有二齊永元三年遷神于建康縣之安樂寺僧尼殷赴若喪昆姊諒不言之信不召之感者云若夫居敬行簡喜慍不形於色知人善誘甄藻罔遺於時臨財廉取豫義明允方大處變不渝汪汪焉堂堂焉渤碣河華不能充其量蓋淨行之儀表息心之軌則歟弟子道進等感梁木之既摧慟德音之永閟俾陳信而有徵庶流芳而無愧廣弘明集欽定四庫全書
