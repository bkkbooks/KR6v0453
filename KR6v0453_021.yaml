body:
  text: 明梅鼎祚輯梁簡文帝諱網字世纘小字六通武帝第三子上大法頌表臣綱言臣聞至理隆而德音闡成功臻而頌聲作在乎奚斯考甫神雀嘉樹或止事乎區中慶昭乎一物猶且手舞足蹈傳式方來况乃道出百非義高三代而可閣筆韜詞詠歌不作者也伏惟陛下天上天下妙覺之理獨圓三千大千無緣之慈普被慧舟匪隔法力無垠躬紆尊極降宣至理澤雨無偏心田受潤是以九圍共溺並識歸涯萬國均夢一日俱曉佛法之勝事國家之至美稽之上古未有斯盛雅頌之作不可闕也謹上大法頌一首曹丕從征之賦劉坦遊侍之談曾無連類伏兼悚恧不勝喜悅之誠謹遣狀詔鍾超寶奉表獻頌以聞臣綱謹啓大法頌并序皇帝以湛然法身不捨本誓神力示現降應茲土龍顏日角參漏重瞳衡表連珠文為玉斗自納麓開基天地之德已布封唐啓跡日月之照先明百揆之序方舜九河之導均禹尚弘事殷之禮且屈在田之則自五昴朝飛告赤文之瑞其雨七日受緑色之符神器有歸鼎運斯集焦門猒棄德之君鮪水發白旄之陳然後受皇天之眷命當四海之樂推豈假祀尤於沛庭託河冰於王霸于時鳳鳳梵音裂序蒼蒼舛度乃選五石以補之坤軸傾斜積冰發坼乃緯九藪而正之隂兔兩重陽烏三足乃定王業以暉之攝提乖方孟陬失紀乃置清臺而辨之維冠冕於已頽綴珩珮於既毀自憑玉几握天鏡履璿璣而端拱居巖廊而淵默於今三十有二載也是以天德一於上地數二於下復朗參辰不易日月兩曜如合璧五精如連珠禋宗類昊虔丘禮澤敬行五祀功被百神川嶽呈祥風煙效祉青雲干呂黃氣出翼聽隃山之威鳳製大夏之貞筠陽管叶春雌鍾應律上林之課匪疏相府之占無謬奏六英於若水張咸池於洞庭秉翟動和天之樂建華宣易俗之奏協律有渢渢之序典樂致雍雍之節詩書乃陳緗縹斯備蒲輪受伏生之誦科斗薦魯宅之文蒸栗殺青玉牒石記填委廣內暉煥麒麟置台命袞法河依嶽建職樹司區雲祥火高山容與赤黻邐迤色麗文翬章研織鳥諫鼓高懸芻言不棄肺石通惋書謗橋板草名指便辟去朝獸稱觸罪姦回放黜是以龍翔鳳集河溓海夷露下若飴泉浮如醴桂薪不斧而丹甑自熟玉臯詎牽而銀甕斯滿河灮似樹彩成車氛氳四照暉麗五色神明磊落徵祥布濩金鱗鐵面貢碧砮之賝航海梯山奉白𤨔之使戴日戴斗靡不來王太平太蒙無思不服方叔邵虎之臣均鼙應鼓之將秉龍虎之祕韜握朱玄之異略受脤於廟堂之上揚威於關塞之下出玉門而直指度金城而奏策蕩雜種之殘妖匡中原之塗炭北臨地脉西出天渠昆夷罷患夙沙自服擭犬戎之鹿懸密須之鼓藁街有受纓之寇詔水觀受降之首四表無塵六合共貫皇德隆矣太平之風浹乎無外矣天子內韜無生之至慧外應體乾之弘跡將欲改權教示實道遣方便之說導化城之迷乃端扆神居吁而言曰若夫眇夢華胥怡然姑射服齊宮於玄扈想至治於汾陽輕九鼎於褰裳視萬乘如脫屣斯蓋示至公之要道未臻於出世也至於藏金玉於川岫棄琴瑟乎大壑卑宮菲食茨堂土階彤車非巧鹿裘靡飾斯蓋示物以儉亦未階於出世也解網放禽穿泉掩胔起泣辜之澤行扇暍之慈推溝之念有如不足納隍之心無忘宿寤蓋所以示物以為仁亦未階乎出世也紫府青丘陘山漳水敦河上之道文悅岐伯之章句甘泉啓太一之壇嵩山置奉高之邑碣石刻羡門之誓不期作交門之歌斯蓋止愛久齡事在諸己篤而為論彌有未弘雖獲巃嵸之禪終墮長生之難徒階三清之樂不祛八倒之境豈若燃智慧之炬照生死之暗出五隂之聚升六度之舟浮衆德之海踐不生之岸於是莊嚴國界建立道場廣行利益開闡佛事驅彼衆生同濟仁壽引茲具縛俱入大乘九有傾心十方草靡如憑津濟咸賴歸依曄乎若朝日之開衆華霈乎若農夫之遇膏雨功德之翼已圓智慧之門必備以為般若經者方等大法峻極靡際深邃無底籠萬善乎無相兆九垓而無邊譬猶支川派別入大海而同味衆芳雜彩到須彌而一色空空不著如如俱會不合不散無去無來種覺可生允茲佛母羣典弗逮是號經王乃欲震一音雨法雨示五眼引重昏昭暘紀歲玄枵次星夾鍾應乎仲春甲申在乎吉日將幸同泰大轉法輪茲寺者我皇之所建立改大理之署成伽藍之所化鐵繩為金沼變鐵網為香城照神光於熱沙起清涼於炎火千櫨嶻𡾤百栱穹隆紅壁玄梁華榱玉砌三階齊列四注周流上玉翼而捫天飛銀楹而蔽景虹拖蜿𡸁承甍繞𣠚蓮抽井倒冒宇臨窗彤彤寶塔既等法華之座峩峩長表更同意樂之國下鑿白銀之塹𠊓暉金薄之甎高門洞啓不因銅馬之飾寶殿霞開無假鳳凰之瑞金輪燭日妙臨淄之地下層臺纍駕邁宛委之空飛夏宇凝霜溫室含暖雕樓之內滴動而響生洞扉之裏鷦歸而氣激幢號摩尼幡懸金縷盤徑十丈鈴圍四斛舒七寶之交枝流八功之淨水地芝候月天華逆風法鼓夜鳴聲中聞法瓊枝旦動葉裏成音妙德陽之宮麗未央之閫故銅櫩三丈追嗤井幹玉樓十二遙耻神仙譬彼清涼之臺同符蘭臺之寺忉利照園之東帝釋天城之北故以辛壬癸甲綿蠻䨢䨴吁哉其不可狀鏘鏘旰旰瓌譎雜錯邈乎其不可名於是譬日揚精景雲麗色薰風徐動淵露微𡸁後距屯威前茆警列武校星連鴻鐘吐響運天宮之法駕啓天路之威神百靈扶持千乘雷動六虬齊軫七斗𡸁暉雲罕乘空勾陳翼駕超光躡景日被天回金蓋玉輿豹服鼉鼓𩦷驪沃若天馬半漢緑弓黃弩象飾魚文佽飛案節不勞斬蛟之劒虎賁韜羽豈假鳴烏之射湛湛奕奕轔轔赫赫出乎大通之門天子降雕輦之貴行接足之禮頂拜金山歸依月面如聞萬歲之聲若觀六變之動於是乃披如來之衣登師子之座均百慮之紛總愍三請之殷勤啓真慧之深宗明度彼之弘教二諦現空有之津二智包權實之底大乘豁其靡礙道心究其歸涯因果之攝不運而行真俗莫求弗動斯到不以二法會乎中道盡佛淵海入佛法藏極修妬之妙典研龍宮之祕法宣娑婆之奧㫖闡衆聖之言正水既沾邪難自息慧日普照毒霜並消除黑暗於四生遣無明於三界巍巍乎若彌樓之在巨海穆穆乎譬衆星之繞圓月于時天龍八部側塞空界積衣成座散華至膝三千化穢土之質火宅有離苦之期惡道蒙休泥犂普息詵詵學侶濟濟名僧皆樂說如辨才智慧如身子踰乎青目黑齒高彼廣膝赤髭咸符寫瓶之思並沾染㲲之施如金復冶似王更雕聞所未聞得未曾得鬱搖動色請益無倦百司具列簪履相趨豐豹焜煌華綬苒蒻謂舍衛之集大林之講無以過也將令一一佛性逢了因而俱出一一佛土咸遣二而除三比夫歌南風尚黃老臨辟雍講孔宅么麼安足而語哉距于三月甲辰法席圓滿如來放大光明現希有事雄雄吐色珠火非儔曈曈上映丹紫競發榮河耻其祥潤汾隂陋其暉影掩入殿之紫雲奪鴻門之妙氣昔法華初唱毫照普林般若聿宣通身盡笑王城之瑞千載更逢豈非聖主同諸佛身降茲妙相等諸佛力若符契焉猶秉淵默之謙虛弘懍焉之至誡為而不宰推而勿居以百姓之心為心非關諸己荷負無倦攝受四生皇太子臣綱視膳東廂親承大法以為西巡東狩讚頌以興柴山望祀詠歌斯作况頂開而受露鞠躬而聞道敢述盛德之形容以為頌曰玉牒悠敻青史綿長道沿五勝風殊百王商丘命瑱姬水開黃河澄待聖海謐期皇方天譬地功歸有梁𡸁拱南面克己巖廊權輿教義製造衣裳九韶革響六樂改張儀鳳婉婉擊石鏘鏘廣修璧水洞啓膠庠輕軺徵聘旌帛搜揚蘭臺且富廣內斯藏藝香馥蘭緑字摛章文功既被武跡斯彰題雕臆鏤舌紫支黃南街請質北闕來王飛旌集翰勒跡書狼銀車引附黑節招荒文同海截化普龍鄉西踰月窟東漸扶桑卑宮類禹解網如湯衢室納異明臺引良善旌弗卷諫鼓其鏜萬符集祉百神啓祥黑丹吐潤朱草舒芳珠懷鏡像星含喜灮液池下鶴高梧集凰赤羆旦繞素雉朝翔觀玉伯友訪道西王遊經建木巡指盛唐終非運出豈曰津梁我有無礙共向圓常玉鑾徐動金輪曉莊紫虬翼軑緑驥騰驤虎文駐蹕龍驂啓行闌干玉馬照曜天狼玄旄映日翠鳳晞陽前飛格澤後擁陸梁風移霆掃參差焜煌峩峩寶座郁郁名香法徒學侶塵沙堵牆慈雲吐澤法雨𡸁涼三密不限四辨難量猶茲海寶譬彼山王慧流總被藥木開芒佛日出世同遣惑霜帝釋歌詠幽祇讚揚空華競下天琴自張山含影色地入毫光非煙繞氣陸藕開房澤普三界恩均八方巍巍堂堂為舟為航伊臣稽首萬壽無疆揚灮重韻武帝敕答皇帝問太子省表并見所製大法頌詞義兼美覽以欣然上菩提樹頌啓并敕臣綱言臣聞擊轅小唱有慕風雅巴人淺曲實仰陽春是以葑葵細葉猶傾朝景爝火灮不能自息伏惟陛下至德欽明玄猷廣運乃神乃聖道跨軒媯正覺正真功符圓極常住為樂法喜為甘慈雨被於無垠睿化覃於幽顯故八風調四氣正天下定海外安弘龍窟之威紹鷲山之法無為不住實愍蒼生無相乃宣引歸真域製茲道樹顯比金容使誓願者結因頂禮者增福會途已一古今誰二伏以器表承露東阿薦銘瑞啓黃龍中山興頌臣雖不敏實有愚心謹上菩提樹頌一首學謝稽古思非沈鬱不足以灮揚盛德髣佛一隅顧恧芻言伏紙慙震謹啓菩提樹頌并序竊以因緣假有衆生之滯根法本不然至人之妙理是以三界六趣繞業障而自迷八解十智導歸宗而虛豁是以能仁大師隨緣布道愍焰宅之既焚傷欲流之永鶩託白淨之宮照黃金之色居茲三惑示畫篋之非真出彼四門驚浮雲之易滅於是佛日啓法雷震設漸教降權迹三寶現世一道知歸大接羣蒼救茲未度法雨法水之潤等世界於無邊智燈智炬之灮同虛空於莫限物因難量化緣將息林開白樹日映青枝悲哉六識沈淪八苦不有大聖誰拯慧橋皇帝體乾元之睿德含天地之純誠照玉鏡之神握太平之運吞虞孕夏罩漢籠周御六氣而子蒼生扇二儀而布亭毒緯樂經禮偃武修文秋荼不設廢九律之嚴科春雨愛生解三驅之密網固以咸池之靈自失汾水之德知慙少陽懋善於元真蕃臣燮和於槐袞八凱三座九𣗥四科之士內宣王事運策橫行專城推轂之將外守封疆一同文軌萬方共貫穿胸鏤臆之酋短身長臂之師南越鑠石北極天沙東邁日枝西踰月紀莫不梯峯挂迥越繩度之山航海跨深泛浮毛之浪奉方入貢進忠請職獻同心之鳥貢比肩之獸爾乃嘉祥競發寶瑞咸委靈芝潏露月萃郊園義鳳仁虎日聞郡國如珠如璧既照燭於中畿若雲非雲亦徘徊於宮雉於是驅黎民於仁壽濟動植於幽隍歲樂民殷家給戶足斑白不提挈童稚有謳歌從善如流應風猶草開農務本鑄刃銷鋒紅粒盈箱青蚨委貫上照天下漏泉天既成矣地既平矣天子乃均一子愍四先示正行之因標出要之路廣設道場大弘妙法涅槃寶棹接惑衆於背流慈悲明照羣迷於未曉法輪遍乎大千清涼被於小葉故天人舞鳳去照園而讚善菩薩飛象越香土而來儀五百寶蓋騰光自合十千纓絡懸空下墜龕室莊嚴國界殊特製三時之殿聳四柱之臺雖漢后望神之宮軒轅待仙之觀曾何足擬髣佛寶雲儀形等覺於是想成道之初建菩提之樹四海呈珍百工薦巧雕金鏤碧綴鏡懸珠製似雪山形同飛蓋四布垂隂五面益物名高滿月德踰普覆並豔千灮之樹連英五色之華璧日垂彩玉蒂生煙風徐動寶枝成樂儼然妙色䕃此曲枝顯若金山尊如聚月信女百味之初諸天四鉢之狀散漫祥草連翩青雀伏吐電之魔却擔山之鬼奇姿瓌質不可勝言此實生善之妙緣進行之深福當今盛美曩代未聞方應照德不窮懸諸日月巍巍永樂萬萬斯年敢作頌曰綿史載觀靈篇眇鏡寶冊葳蕤帝圖掩映鳥紀稱祥龍書表慶九州布德五絃作詠蒸哉至矣有梁啓聖功覆終古業高受命金輪降道玉衡齊政無思不服有德斯盛一乘運出五眼清淨稟識康歌昆蟲得性舜厨靈蓮堯庭神莢豈如道樹覆潤弘浹靡密𡸁灮芬芳委疊時動百華乍開千葉現彼法身圖茲瑞牒海度六舟城安四攝惠澤既播淳風普叶休明智境清朗法泉百神嗟仰千佛稱傳榮灮動照玉燭調年菩提永立波若長宣穆穆明后萬壽如天武帝手敕省啓覽所上菩提樹頌捃採致佳辭味清淨仰讚法王稱歎道樹意思口說乃至手書極得三業之善但所言國美皆非事實不無綺語過也越敕上皇太子玄圃講頌啓時為晉安王上昭明竊以舜韶始唱靈儀自舞陳律才暄風心競萼輕禽短葉尚識音灮沐善歡心寧忘撫抃伏惟殿下體高玄賾養道春禁牢籠文圃漁獵義河注意龍宮研心寶印雲聚生什之才並命應王之匹探機析理怡然不倦朱華景月詎此忘罷屬素藏晚節玄英初氣霜竹浮隂風梧散葉從容雅論實會神衷綱經生多幸屬此休世躊蹰奉渥得備磐藩而黏蠅未拔迷象不羈寶沒醉衣珠沈勇額得聞勝善寧忘歌詠謹上玄圃園講頌一首文慚綺發思闕雕英徒懷舞蹈之心終愧清風之藻冒昧呈聞追深赧汗謹啓玄圃園講頌并序竊以寶山峻極駘足未窺慧海遙波輕舟詎泛故以探沙亂妙類杵迷形百代同昏千年誰啓皇上託應金輪均符玉鏡低矜苦習續照慈燈鶴樹還春龍泉更曉玄水躍祥丹陵瀉電功韜火宅意覆雲衢智慧之猶初日照忍辱之力如明月珠天成地平遐肅邇睦澤漏無底化行靡外滄河鏡淥碧海調風停瑞氣於三辰泛祥煙於五節鱗羽被解羅之澤黎元沐仁壽之慈於是正化潛通法輪常轉類空境之傳虛猶懸河之寫潤儲君德彰妙象體睿春瓊視膳閒晨遊心法犍搦管摛章既㛹娟錦縟清談論辨亦參差玉照夏啓恧德周頌慙風乃於玄圃園栖聚息心之英並命陳徐之士摳談永日講道終朝從無聲芳香動氣七辨懸流雙因俱啓情遊彼岸理愜祇園靈塔將涌天華乍落于時藏秋仲節麗景妍晨氣冷金扉霜浮玉管茲園邃密獨華勝地朱堂玉砌碧水銀沙鳥鴶䲳於瓊音樹葳蕤於妙葉液水穿流蓬山寫狀風生月殿日照槐煙綱叨籍殊寵陪奉塵末預入寶樓竊窺妙簡鳬興藻抃獨瑩心靈敢作頌曰皇儀就日帝道昌雲化隆垂拱德曼鴻芬機乘八解道照三墳巍巍蕩蕩萬代一君其一重離照景玉潤舒華七淨標美三善稱嘉降茲法雨普洽生芽漣漪義水照曜文華其二芳園靉靆天宮類寶析論冥空玄機入道密宇浮清重閣相藻日映金雲風搖銀草其三肩隨接武握寶靈珠皆抽四照並掞九衢顧惟多缺徒奉瑛瑜終如燕石更似齊竽其四昭明太子答令得書并所製講頌首尾可觀殊成佳作辭典文豔既溫且雅豈直斐然有意可謂卓爾不羣覽以回𤨔良同愈疾至於雙因八辨彌有法席之致銀草金雲殊得物色之美吾在原之意甚用欣懌遲面乃悉此不盡言統報請武帝御講啓帝天監中注釋大品躬事講說中大通七年以皇太子奏請幸同泰寺發講摩訶般若經大同七年講金字般若波羅蜜三慧經於華林園之重雲殿詳見蕭子顯陸雲公序臣綱臣綸臣紀言臣聞紫宮麗天著明玄象軒臺在嶽逖聽良書是以道彌隆而禮愈縟德彌溥而事愈泰此蓋彰至治之尊牧生民之本也伏以大嚴殿侔神垂則沖天開宇功深大壯事協文明儀辰建極切靈啓構照燭三含超百堵咸謂心華所表復非良匠之力神通所現不藉子來而成實惟淨國固絶董落之禮高邁釋宮理無鹿鳴之宴竊惟妙勝之堂本師於茲佛吼摩尼之殿如來亦闡法音伏希躬降睟容施灑甘露油然慧雲霈然慈雨斯盛業𨗳彼蒼生履天居而說無相同真也建佛事而被率土化俗也同真化俗至矣哉一舉而三美顯豈不大乎與彼陘山之上𠎣巖之下西都鳳凰負陽鸑鷟安足同日而語哉敢露丹愚伏待矜遂輕干聽覽流汗戰懾謹啓武帝答敕省啓欲須吾講具汝等意書云一日二日惟日萬機令復過之年耆根熟氣力衰耗荷此黼扆有踰重負日中或得一食或不得食周旦吐握未足為勞楚君旰食方今非切未明求衣聿來弗休晝勞夜思精華已竭數術多事未獲垂拱兼國務靡寄豈得坐談須道行民安乃當議耳越敕重請御講啓臣綱臣綸臣紀言一日輕最上聞願垂法雨天鑒凝遠未蒙降遂預均藥木誠同器水徒美春華還憐秋藿伏惟陛下德冠受圖道隆言契四三六五不能喻十堯九舜無以方而秋風動條尚興未息之念一物失所猶起納隍之仁方留衢室之情未議石渠之講竊以神通所現一念萬機大權所行應時三密猶處禪寂影現十方一起道場已為八會豈與吹律之后均熊湘之勞鑄鼎之君切風雨之務伏願以平等慧行如來慈為度蒼生降希有事使朝滿一乘情皆十善智珠法炬人人並持四忍五明家家可望謹冒天威重以聞啓翹誠注仰伏希允遂使北冀無山豈自高於曩日南陽回景不獨隔於當今謹啓天中記引作昭明誤武帝重答敕省重啓猶欲須吾講說具汝等所懷亦不異前答緣邊未入國度多乏如是等事恆須經計其餘繁碎非可具言率土未寧菜食者衆兼款附相繼賞與未周怨望者多懷音者少漢世渾并賈誼亦且流慟魏室無虞楊阜猶云可悲况今爪牙腹心不二之臣又論道帷幄之士四聰不聞八達路擁王侯雖多維城靡寄晝厲夕惕如履霜刀以朽索馭六馬豈足為喻詩不云乎知我者謂我心憂不知我者謂我何求方今信非談日汝等必欲爾者自可令諸僧於重雲中講道義也越敕又請御講啓臣綱臣綸臣紀言敢藉寵靈頻干聽覽再降神旨未垂臨燭伏以皇政廣覃天覆悠遠海河夷晏日月貞明洛水有稱蕃之族街有歸命之徒春戈已戢秋塵不飛槐𣗥均多士之詩貂璫有得賢之頌聖德沖謙劬勞日昃猶以時多禹歎物未堯心百辟慚惶羣司聳蕩臣等或三善靡聞或一官不效嗜鮑逢宰相之請學儉得參軍之譏而自以結根天苑竊高前載是以匪懼塵黷復敢上聞伏願樂說大慈特垂矜許放光動地不以法妨俗隨機逗藥不以人廢言俾茲含生凡厥率土心花成樹共轉六塵鏡裏得珠俱開三障於其誠願孰不幸甚纍冒宸嚴倍增戰息謹啓武帝又答敕省汝等啓復具所懷汝等未達稼穡之艱難安知天下負重庸主少君所以繼踵顛覆皆由安不思危况復未安者耶殷鑒不遠在於前代吾今所行雖異曩日但知講說不憂國事則與彼人異術同亡易言其亡繫于苞桑斯則乾乾夕惕僅而後免汝等思之一二具如前敕越敕謝上降為開講啓臣綱啓舍人徐儼奉宣敕旨無礙大慈不違本誓來歲正月開說三慧經伏奉中詔身心喜躍饑蒙玉膳比此未踰貧獲寶珠方斯非譬伏以元正慶流大裘禮畢慧雲續潤法雨仍垂出世洪恩與陽春而布澤俾茲含生隨藥木而增長歡同萬國福浹九圍豈直愚臣得未曾有謹宣今敕馳報綸紀具爾相趣無辭上謝謹啓奉請上開講啓臣綱言竊以真如無說非筌不悟極果不應注仰斯通故器有水緣方見圓曦之影藥含長性得墜慧雲之慈伏惟陛下玉鏡宸居金輪馭世應跡有為俯存利物不違本誓開導愚蒙驅十方於大乘運萬國於仁壽豈止冶斤田粟功侔造化疏江決河削成天下智高九舜明出十堯頻徙鑾蹕降甘露雨天人舞蹈含生利益是以背流知反迷岸識歸臣自叨預趨聞渴仰無厭一日冒陳丹款伏希復轉法輪未回聽卑之思尚絶愚臣之願慺慺寸志重敢披祈伏願將降一音曲矜三請被微言於王舍集妙義於寶坊聖心等視蒼生猶如一子遂臣之請即是普被無邊如蒙允許衆望亦足兩肩荷負豈敢為喻不任下願謹啓事以聞謹啓武帝答敕省啓具汝所懷法事既善豈不欣然吾內外衆緣憂勞紛總食息無暇廢事論道是所未遑汝便為未體國也越敕重謝上降為開講啓臣綱啓丹願懇誠屢冒宸扆實希降甘露雨普被三千天聽孔邈未垂鑒遂旱苗傾潤豈比自憐暍鳥思林寧方渴仰近因大僧正慧令伏敢重祈降逮敕旨垂許來歲二月開金字波若經題殊特之恩曲應愚請稽拜恭聞不勝喜躍身心悅樂如觸慈光手足蹈舞義非餘習伏以香城妙說實仰神文潤方雲雨明踰日月能使迷途識正大夢均朝梵志懼來天魔遙禮提桓所聽而今得聞波崙所求希世復出其為利益深廣無邊九圍獲悟十方蒙曉雖復識起初流心窮後念方當共捐五蓋俱照一空巍巍蕩蕩難得為喻臣仍屈慧令續宣此典大乘普導實由聖慈伏筆罄言寧宣戴荷不任下情謹啓事謝聞謹啓上為開講日參承啓一作謝開講般若經啓臣綱言伏承輿駕臨同泰寺開金字般若波羅蜜經題照迷生之慧日導出世之長源百華同隂萬流歸海幽顯讚揚率土含潤臣身礙已來望舒盈闕甘露普被人天俱萃波若魔事獨在微躬馳係法輪私深尅責不任下情謹奉啓奉承謹啓武帝答敕省啓具之為汝講金字般若波羅蜜經發題始竟四衆雲合華夷畢集連雨纍日深慮廢事景物開明幽顯同慶實相之中本無去來身雖不到心靡不在善自調養慎勿牽勞尚有兩旬日數猶奢今雖不同後會未晚也吾始還臺不復多敕越敕謝敕參迎佛啓臣綱啓主書周昂奉宣敕旨曲賚恩參臣即爾到建元侍奉候法身金山戾止王人勞問榮恩頻疊啓謝無辭不任下情謹啓事謝聞謹啓答敕聽從舍利入殿禮拜啓臣綱啓舍人王景曜至奉宣敕旨曲垂逮問并聽臣隨從舍利入殿禮拜謹奉秋色照澄預表瑞臣比身心得無障惱明陪扈寶函謹鞠躬恭到但不生羽翼無假神通身升淨土高排閶闔足踐蓮華方茲非喻行躡寶梯比斯未重誘導殊恩實回始望顧茲塵縛喜戴不勝謹啓謝敕使入嚴殿禮拜啓臣綱啓舍人王景曜奉宣敕旨曲垂勞問并使明入嚴殿禮拜法身謹奉臣粗蒙恩造明守開恭到遂以勞屢升淨土風積水厚不足為喻微心悚躍上謝無辭不任下情謹啓事謝聞謹啓謝敕為建涅槃懺啓臣綱啓伏聞敕旨垂為臣於同泰寺瑞應殿建涅槃懺臣障雜多災身穢饒疾針艾湯液每黷天覽重蒙曲慈降斯大福冀慧雨微垂即滅身火梵風才起私得清涼無事非恩伏枕何答不任下情謹奉啓謝聞謹啓謝敕使監善覺寺起剎啓臣綱啓伏見敕旨使監作舍人王曇明材官將軍沈微御仗吳景等監看善覺寺起剎事爰奉聖恩曲降神力命斯執事修茲長表寶塔雲構無待喜園水精特進非差龍海大龜持泥未足為盛鶖鷺引繩方斯取埒仰瞻慈渥喜戴不勝俯循宿願私增涕噎不任銘荷謹奉啓謝聞謹啓謝御幸善覺寺看剎啓臣綱言即日輿駕幸善覺寺威神所被金表建立槩泰清而特起接庫樓而上征既等湛然長均淨土方為佛事永利天人頂荷之誠臣百恆品不任下情謹奉啓事謝聞謹啓武帝敕答汝所營建慈悲寶剎諸佛威神不營多功才欲運力即便竪立幽顯欣仰我亦隨喜不得與汝同共瞻拜此以為恨耳越敕並廣弘明集答同泰寺立剎啓竊以寶塔天飛神龕地踊豈惟昔代復見茲辰嘉彼百靈欣斯十善雖復紫煙旦聚比此未儔朱夜上方今知陋藝文類聚謝敕賚錢并白檀香充法會啓臣綱啓傳詔奉宣敕旨以臣明法會垂賚錢二十萬白檀薰𦸐𣝕香各十斤黃紙詔書先開泉府青雲好氣次集桂宮貨重文龜芳踰麗草散金廡下止及軍吏積穀充家才班親族未若資此良田方開五蓋入茲法度長出四流假詞敬祖尚慙難述借辨君卿猶知非謝不任荷戴謹啓事以聞謹啓謝敕賚苦行像并佛跡等啓臣綱啓舍人顧𢈻奉宣敕旨以金銅苦行佛并佛跡供養具等賚使供養伏以六年道樹超出四魔千輻足輪德圓萬善故能聞見悟解逢遇祛塵天聽恩隆曲垂獎被謹修飾櫩宇齊潔身心翹仰慈光伏待昭降千唱四辨尚不宣心輕毫弱簡豈能陳謝不任下情謹啓事謝聞謹啓謝敕賚銅供造善覺寺塔露盤啓臣綱啓主書陳僧聰奉宣敕旨垂賚銅一萬三千斤供造善覺寺塔靈槃是稱那陽之珍寶亦昆吾之珤燥濕無變九布見奇寒暑得宜六律成用况復神龍負子斯妙塔金鳥銜帶飾茲高表函谷恥其詠歌臨淄恧其祥應陽燧含景還譬日輪甘露入盤足稱天酒辭林本闕心辨又慙徒戴重恩終難陳謝不任銘荷之誠謹奉啓聞謹啓奉阿育王寺錢啓臣綱言臣聞八國同祈事高於法本七區皆蘊理備於湧泉故牙牀白繖無因不覩金瓶寶函有緣斯出伏惟陛下懸天鏡於域中運大權於宇內三有均夢則臨之以慧日百藥同枯則潤之以慈雨動寂非己行住因物無能名矣臣何得而稱焉故以照赤書則前史之為瑞珥芝景玉嗤往代之為珍難遇者乃如來真形舍利照景蜜瓶浮德水如觀鉤鎖似見龍珠自非聖德威神無以值斯希有天人頂戴遐邇歸心伏聞阿育王寺方須莊嚴施用萬金檀豐十藏寶陳河府泉出水衡比丘持土大廈方搆羅漢引繩高塔將表不勝喜抃謹上錢一百萬雖誠等散華心荷不盡而微均滴瀝鄙甚鄰空輕以塵聞伏啓悚汗謹啓並廣弘明集謝敕賜解講錢啓無勞磁石之大金貨猥臻非遊玉壘之川銅山可見舒王濟之埒猶覺有餘假劉實之繩穿而不盡慧輪究竟爰降曲私福田成滿仰由慈被榮獨照自均若木負恩知重竊譬蓬萊謝賜放生錢啓殊澤隆厚造次被蒙重彼八銖珍斯九法赤仄成采出自水衡之藏紺文委貫忽積銅扇之裏謹長充放生用濟含識發弘誓願等供無邊效彼薄拘均茲流水方使怖鴿獲安窮魚永樂並藝文類聚謝敕賚柏剎柱并銅萬斤啓臣綱啓傳詔呂文強奉宣敕旨賚臣柏剎柱一口銅一萬斤供起天中天寺九牧貢金千尋挺樹永曜梵輪方興寶塔夏羞神鼎晉恧相風使福被域中功禔無外臣以庸愚稟承勝善樂受遍心恩動色銘荷之誠無詞啓謝不任頂戴謹奉啓謝聞謹啓禔一作提誤謝敕賚納袈裟啓臣綱啓殿師吳苗奉宣敕旨垂賚鬱泥細納袈裟一緣分同妙葉界寫長塍拂石慙華裁金非重是曰新染厥惟田服方使幽貞芳杜恥緝芙蓉𠎣客排雲羞裳飛羽穢食凡軀無明暗識叨恩每重荷澤難勝不任銘戴之至謹奉啓事謝謹啓又臣綱啓蒙賚鬱泥納袈裟一緣荀針秦縷因製緝而成文魯縞齊紈藉馨漿而受彩初開篋笥便覩舍衛田疇不出戶庭坐視南山塍陌竊以三銖輕暖稱美服於淨居千金巨麗得受用於迦葉而湛恩特被萃此愚躬霜降授衣曲澤便及喜溢心涯如從空中所墜忽不自知更謂寶支所出采襮四色事非離世鉤蘭兩葉殊澤實隆不任荷戴之至謹啓事謝聞謹啓又臣綱啓宣傳左右俞景茂奉宣敕旨垂賚鬱泥真納九條袈裟一緣精同織縷巧均結毳邁彼良疇成斯妙服雖復貴比千金輕踰二兩無以匹此洪恩方斯殊賚臣臥疾纍旬未堪行踐不獲即被新染陪侍寶坊塵緣穢體愧荷相集不任慙悚之至謹啓事謝聞謹啓並廣弘明集又蒙賚鬱金泥細納袈裟一緣忍辱之鎧安施九種功德之衣慙愧八法北戶録注答湘東王書元帝暮春美景風雲韶麗蘭葉堪把沂川可浴弟召南寡訟時綴甘棠之隂冀州為政暫止褰襜之務唐景薦大言之賦安汰述連𤨔之辨盡游玩之美致足樂耶吾春初臥疾極成委弊雖西山白鹿懼不能愈子預赤九尚憂未振高臥六安每思扁鵲之問靜然四屋念絶修都之香豈望文殊之來獨思吳客之辨屬以皇上慈被率土甘露聿宣鳴銀鼓於寶坊轉金輪於香地法雷驚夢慧日暉朝道俗輻湊遠邇畢集聽衆白黑日可兩三萬獨以疾障致隔聞道豈止楊僕有關外之傷周南起留滯之恨第十三日始侍法筵所以君長近還未堪執筆敬祖前邁裁欲勝衣每自念此愍然失慮江之遠矣寤寐相思每得弟書輕痾遣疾尋別有信此無所伸又十八日晚於華林閣外省中得弟九月一日書甚慰懸想秋節淒清比如常也州事多少無足疲勞濠梁之氣不異恆日差盡怡悅時有樂事游士文比得談賞終宴追隨何如近日注漢功夫轉有次第思見此書有甚饑惄吾蒙受菩薩禁戒簉預大士此十二日便於東城私懺十七日旦蚤入寶雲壁門照日銅龍吐霧紅泉含影青蓮吐芳法侶成羣金山滿座身心快樂得未曾有昨旦平等寺法會中後無礙受持天儀臨席睟容親證拜伏雖多疲勞頓遣剃頂之時此心特至心口自謀併欲剪落無疑馬援遣蝨之談不辭應氏赤壺之諷僧璡典議不異昔日竟日問璡殊均子路探鉤取名名曰因理皇情印可今便奉行昨晡後方還所住徐摛𢈔吾羌恆日夕鏡遠在直時來左右但不得倜儻殊異盤下之時稍習節文欲避酒泉之職尹王相去既爾伸款對臨汝侯比多屬疾來宮小稀其間信使差得其簡曄兼詹事暕為洗馬時伸話言數語論辨句之侯東撫復成離闊衡山九嶷尋應引邁臨岐有歎望水興嗟但吾自至都已來意志忽恍雖開口而笑不得真樂不復飲酒垂二十旬次公醒狂自成無理知耆艾數信述吾經過適憶途遵江夏路出西浮日月易來已涉秋暮而韋述有長沮之弊必笑之菑術異葛仙形均荀序弟復資其糧餼特為經營轉禍為福事均北叟分別已來每增慨憶歎因月積想逐時旋每有西郵事同撫䏶相見之期未知何日瞻言玉嶺靜對金關懷勞之深未常彌歇善自保惜及此不多綱疏與廣信侯述聽講事書王白仰承比往開善聽講涅槃縱賞山中游心人外青松白露處處可悅奇峰怪石極目忘歸加以法水晨流天華夜落往而忘反有會昔言王牽物從務無由獨往仰此高蹤寸心如結謹白尺牘節入晉人誤與廣信侯重述內典書王白闊絶音旨每用延結風嚴寒徑願比怡和伏承淨名法席親承金口辭珍鹿苑理愜鷲山微密祕藏於斯既隆莊嚴道場自茲彌闡豈止心燈夜炳亦乃意蘂晨飛况兄慧思弘明本長內教今陪十善之車開八正之路流般若之水洗意識之塵以此春翹方為秋實王每憶華林勝集亦叨末位終朝竟夜沐浴妙言至於席罷日餘退休傍省攜手登臨兼展談笑仰望九層俯窺百尺金池動月玉樹含風當於此時足稱法樂今卷帷之部乘傳一隅聞慧雨滂流喜躍充遍徒挹懸河無伸承稟空無所有不瑩情靈緣癡有愛自嗟難拔兼下車已來義言蓋少舊憶已盡新解未餐既慙口誦復非心辨永謝瀉瓶終慙染㲲是則慈雲既擁智海亦深影末波餘希時灑拂但暌違轉積興言盈瞼願加敬納言不宣意謹白慧思一作思理挹作仰由作伸是則作况尺牘用闊絶音旨至怡和四語以每憶華林勝集接前為一書又以伏承淨名法席至足稱法樂為一書而中復有差互廣信侯答王心要書廣信縣開國侯蕭映惶恐死罪信至奉誨清言兼紙文彩巨麗慰喻綢繆比日寒霜慘切伏願興居和悆民富重殷無過仰損下官智昏識暗學淺人凡遂得擁卷琁階親奉教義耳餐甘露心承制說天恩淵深睿情廣奧三明一鑒釋滯義於久迷四辨既陳闡難思而頓解豈漢皇夢迹而梵響復弘雖晉帝留心而微言始見每至夕趨瓊筵晨登朱陛不曾不憶芳林勝集玄圃法座殿下曳舄寶雲或從容而問道拖裾博望乍折角而解頤于時謬齒末筵預聞清論親奉話言數陪顏色至於今者講席殿下限同分陜謬頒天獎猶及下官誰不欽仁寧無戀德傾心東注恆以係仰為先下官蒙蔽久已仰慕雖聞妙義愚心難啓方欲馳騖枌鄉訪疑下席忽逢令旨垂覔波餘尋讀戰皇俯仰慙恧庶為恩呼少泰下情正當慈雲智海以仰屬謝瓶慙㲲實歸庸菲下官惑緣既積塵纍未消近攝衛乖方遂中途感疾不得餐承究竟闢開末品徒自剋責終關緣運不審比日何以怡神披閲儒史無乃損悆下官每訪西郵備餐令德仰承觀矚於章華之上或聽訟於甘棠之下未嘗不文翰紛綸終朝不息清論玄談夜分乃寐春華之客登座右而升堂秋實之賓應虛左而入室文宗義府於焉總萃惟此最樂實驗茲辰下官昔游梁苑曲蒙眷顧今者獨隔清顏久暌接仰傾心已結興言涕欷惟冀音旨時錫沾及伏願珍重尋更下承曲奉恩誨用深銘荷映死罪死罪與慧琰法師書元帝金樓子云余於僧中重招提琰法師五翳消空韶灮表節百華異色結綵成春道體何如恆清宜也對玩清虛既在風雲之表游心入理羌多定慧之樂弟子俗務紛糾勞倦特深眷然北嶺欽賢已積會遇之期庶必可僝有緣之儔事等饑渴佇望來儀一日三歲想思弘利益理當無爽指遣此信無述寸襟綱和南又旦來雨氣殊有初寒攝衛已久轉得其力雖他方法界略息化緣祇洹之裏恆有晤對眷佇之深無時不積久因倩師頻述方寸不知巧笑之僧頗為津及不耳前昨已來徵事義聚龍象畢同應供皆集慧炬開心甘露入頂聞之善謔特盡歡怡想味之懷轉復無極昔幼年經聞制旨受道日淺北面未深雖異禪那事同華水今改西下特蓄本心訪理質疑屬在明德不謂般若留難現疾未瘳問津無地歎恨何已伏承輿駕尋幸伽藍冀於此時得一覯止辨論青豆之房遣惑赤花之舍追往年之宿眷述即日之寸心此事必期冀非爽指遣茲承問佇有還書綱和南弔道澄法師亡書省啓承尊師昨夜涅槃甚深悲怛法師志業淹明道風淳素戒珠瑩淨福翼該圓加以識見冥通心解遠察記落雨而必然稱黑牛而匪謬服膺者無遠近蒙益者兼道俗弟子自言旋京輦便伸結緣豈謂一息不追奄至乎此然勝業本深智刀久利必應游神實地騰跡淨天但語其乳池啓殯香棺入室不入空心于何不慟但如來降生之迹因此而入泥洹正當其生住滅靡有定相先聖後賢何其形響推校因緣未始有例上人等並在三歲積始終稟道宜應共相策勉弘遵舊業使道場無斷利益不墜所襚物輒如法供養奈何奈何為諸寺檀越願疏菩薩戒弟子蕭綱歸依十方盡虛空界一切諸佛歸依十方盡虛空界一切尊法歸依十方盡虛空界一切聖僧積習長夜輪轉覆灰末劫易危煩流難拯不樹兩門豈修二翼常恐虛蕉染惑永結駛河愛藤懸網長垂苦岸敢承三寶覺悟之力於幽顯前發宏誓願今願為武當山太平寺并此鎮望楚白塔同安習善延明頭陀上鳳林下鳳林廣嚴等寺皆盡形壽永為檀越雖七寶四事多謝往賢一念片言庶符般若方類不滅之燈終非起煙之蜜以此功德仰福皇帝春宮家國內外咸同此善乃至天龍八部六道四生普皆蒙福為人造丈八夾紵金薄像疏比丘某甲敬白竊以慧日潛影慈輪罷應業逐惱飄愛隨情熾徒愍衣珠抱名珍而弗悟眇歎葉金惑空言而啼止自非表茲勝業樹彼妙緣何以去此心堂移茲身窟故水精龍塔永愴恨於遺髭明鏡石龕獨徘徊於留影某甲久發誓願遍為六道四生造夾紵丈八佛像一軀年月已流因緣易奪常恐暫有之身忽隨畫水還無之報飇爾電灮今便建立誠心遂茲本誓使聚月見容金山表迹見形善發聞名惡捨拔六根之痛惱去五燒之焚灼但四寶屢空七財多匱仰雙蓮而獨慨覩萬字而無由儻能薄離五家微捐四事結此冥慈共成因果則素㲲之功非唯昔世散華之報方驗來緣語善無奢在言多恧謹言為人作造寺疏郢州某甲敬白竊以布金須達表精舍於給園影石仙人造伽藍於離越莫不事表區中心憑真外但四纏惑惱去善源而無滌五濁重繭非慧刃而安揮故以愍彼濕薪傷茲滴器今於郢州某山為十方僧建立招提寺縈負郊原面帶城雉枕倚巖壑吐納煙雲重門洞啓未創飛行之殿步櫩中霤猶寡密石之功嚴飾之理難階瓶鉢之資已罄道俗儻能微留善念薄獎勝緣則事等觀香義同錫乘昔人修檀手雨七寶前賢薄施掌出雙金福有冥移言無多遜謹疏與僧正教此州伽藍支提基𠛱雖多設莊嚴盛修供具觀其外迹必備華侈在乎意地實有未弘何者凡鑄金刻木鏤漆圖瓦蓋所以仰傳應身遠注靈覺羡龍瓶之始晨追鵠林之餘慕故祭神如在敬神之道既極去聖茲遠懷聖之理必深此土諸寺止乎應生之日則暫𠛱形像自斯已後封以篋笥乃至葉服離身尋炎去頂或十尊五聖共處一厨或大士如來俱藏一匱信可謂心與事背貌是情非增上意多精進心少昔塔裏紅函止傳舍利象頭白繖非謂全身夫以畫像追陳尚使吏民識敬鎔金圖範終令越主懷思匹以龍阿尚能躍鞘方之虎兕猶稱出柙况復最大圓慈無上善聚聞名去煩見形人道而可慢此雕香蘊斯木櫁緘匿玉毫封印金掌既殊羅閲久入四天又異祗洹掩戶三月寶殿空臨瓊階虛敞密帷不開非仲舒之曲學紅壁長掩似邠卿之避讎且廣廈雲垂崇甍鳥跂若施之玉座飾以金鈿必不塵靄日姿虧點月面琉璃密窗自可輕風難入龍鬚細網足使飛燕不過兼得虔敬之理必崇接足之心彌重可即宣勒永使准行並廣弘明集慈覺寺碑序竊以易表含貞記稱厚載龍星啓曜璧月儀天是以河外黃雲沙𠊓崩鹿故能發緯伊緒重闡劉系亦有觀津美於西漢扶風盛彼東京未若樊沔之邦宛葉之境休祥茂祉獨繁前跡莊姬流譽之所烈后業興之地南陽稱其何氏新野猶曰鄧家逖彼遐蹤復履今慶䝿嬪金聲早振淑範增徽才實母師行為女楷窮茲四德洞彼六經溫明內湛慈慧天發綱綴慶璇枝聯休紫漢幸得愆無負斧任重東藩實以契闊言提綢繆善誘事具從居義深則眄而叨恩作牧釁結幽祇一訣椒慈長違寶幄風枝弗靜陟屺何期祗奉儲訓謬茲刊撰道長業大遺範事隆嗟油素之可捐懼故老之難述天一作暉眄作川業興作興業蹤作宗從作徙神山寺碑序簡文又有秀林山銘一名神山唐類函作王屮神仙寺碑誤天地始終愆長不極劫數沙塵寂寥誰辨雖鐵界銅圍如影如幻補石擎金隨生焰滅獨有鷲嶽靈境淨土不燒螺髻金質聲聞難覩故髮塔喜園流名天上耆山鵠苑布跡人中自非莊嚴妙土吉祥福地何以標茲淨域置此伽藍皇太子殿下幾圓上聖智周物外澄明離日照影春星長歌安勝表察書之獨見馳道回車騖班輪而不絶湘宮寺碑銘自真人西滅洎羅漢東游五明盛士並宣北門之教四姓小臣稍罷南宮之學超洙泗之濟濟比舍衛之洋洋是以高簷三丈乃為祀神之舍連閣四周並非中官之宅雪山忍辱之草天宮陀樹之花四照芬吐五衢異色能令扶解說法果出妙衣鹿苑豈殊祗林何遠皇太子肅緯自昔藩邸便結善緣雖銀藏蓋寡金地多闕有慙四事久立五根泗川出鼎尚刻之之石岷峨作鎮猶銘劒壁之山矧伊福界寧無鐫刻銘曰洛陽白馬帝釋天冠開基紫陌峻極雲端實惟爽塏棲心之地譬若淨土長為佛事銀鋪曜色玉礎金塔如仙掌樓疑鳳凰珠生月魄鐘應秋霜鳥依交露幡承杏梁窗舒意藥室度心香天琴夜下紺馬朝翔生滅可度離苦獲常相續不盡歸乎道場善覺寺碑銘蓋聞在天成象倬彼雲漢在地成形嵩高惟嶽蒼蒼幹運靈槎猶且去來巖巖峻極巫咸可以升降穆䝿嬪宿植達因已於恆沙佛所經受記莂有緣娑婆降跡斯土行邁英皇德降華跗河南望浮雲之瑞新野表升天之祥灮前絶後建茲福地乃于建康之太清里建善覺寺焉大通元年龍集己酉有令使立碑文未獲搆撰居諸不息寒暑推移軒耀夙傾前星次掩歲在諏訾始得補綴何言之陋何事之隆竊等仲由空悲負粟之哽復異桓良終無維山之日永言纏纂獨咽丹心銘曰效彼毗城建斯福舍四柱浮懸九城靈架重欒交峙回廊遙迓掩映花臺崔嵬蘭榭陽燧暉朝青蓮開夜並藝文類聚秀林山銘神山本名秀林山或稱辰山在華亭西北二十餘里𠛱九峯第四僻左一方雖非巨麗未經標品而自古神仙往往託迹實震旦之靈阜也余以機暇結駕游衍覽茲佳勝眷焉有懷乃作銘曰閣號天井山稱地維碧雞金馬越瀆梁池懷靈蘊德孕寶含奇此亦仙岫英名遠摛昔有鷲窟不燒淨土邁彼高蹤搆茲法宇引葉成帷即樹為柱石砌危橫崖楷斜竪白巘途遠丹源路深長林萬頃偉木千尋竹裏看博松間聽琴捐氛蕩纍散賞娛襟梁大寶元年歲次庚午春三月十五日題寫大愛敬寺剎下銘夫波若真空導大生於假域涅槃有岸引未度於無邊應此十千現茲權實隨方攝受孰能弘濟皇帝照盡神源心凝寂境深慈降跡下答蚳蝝握鏡斷鼇經綸世阻故能天地貞觀日月重業曠四弘功侔十力惠雲旦聚浸澤灑於遐外法炬夜明揚灮燭於梵頂因心孝愛道契神明昭事誠享曰隆哀敬金車答瑞追德慶於虞年甘露登祠比嘉祥於漢日既而理局遙圖事稽終典思所以功超域外道邁寰中廣樹大緣增隆勝善事等淨名齊方便於圓極跡均妙掌襲兩寶於冥因乃於鍾山竹澗奉為皇考太祖文皇帝造大愛敬寺焉惟茲神嶽勢負龍形均太華之四成狀彭門之雙起曲澗推移激水精之浪清風窈蕩散雲母之行顯帶皇邑標地德之慶雲彌望帝躔矚神居之敞麗昔鴈泉之願真如所騭鷲形之嶽大聖攸居創此伽藍同符往跡以普通三年歲次壬寅二月癸亥朔八日庚午建七層靈塔百旬既聳千龕乃設漸山啓基踰於禁𥦝國土金剎長表邁於意樂世界珠幡轉曜寶鈴韻響聞聲者入道見形者除纍仙衣梵帶去鴈塔而來遊天香風笙辭鶴城而下集靈祗叶贊有識歸依四將五龍翹勤翼衛八臂三目頂戴護持雖復劫盡恆沙衣消巨石儼如常住妙相長存作銘曰朕哉睿聖至矣炎精功昭鳳紀德契雲名冥符七覺爰極四生儀形懋典道駿有聲皇心閔睇理篤天誠八萬神搆二四雲并懸梁浮柱沓起飛楹日輪下蓋承露上擎玉函蘊色珠髮韜明花窟炎聚石影灮輕天下欽仰幽願贊成法舟斯濟惠海方清淨界無毀金地永貞文苑英華大生一作羣生祠作祀願作顯吳郡石像銘蓋聞軒后之圖載浮河洛秦王之璧更湧滄溟昭覃之洲乘清源而西泛蓬萊之岫逐安流而南徙况夫道由慈善應起靈覺是以無方之迹隨機示現無緣之力因物成感晉建興元年癸酉之歲吳郡婁縣界淞江之下號曰滬瀆此處有居人以漁者為業挂此詹綸無甄小魪布斯九常待六鼇遙望海中若二人像朝視浮沉疑諸蜃氣夕復顯晦乍若潛火於是謂為海神即與巫祝同往祈候七盤圓鼓先奏盛唐之歌百味椒漿屢上東皇之曲遂乃風波駭吐灮景晦明咸起渡河之悲竊有覆舟之懼相顧失色於斯而返又有受持黃老好尚神仙職在三洞身帶八景更竭丹款復共奉迎尊像沉軀沒而不見經歷旬日遐邇俱聞吳縣華里朱膺清信士也獨謂大覺大慈將宏化迹乃沐浴清齊要請同志與東靈寺帛尼及胡伎數十人乘船至滬瀆口頂禮歸依歌唄贊德于時微風送棹淑景浮波雲舒蓋而未移浪開花而不噴雖舟子招招弗能遠騖而靈相峩峩漸來就浦仰覩神像嶷然雙泛非因鷁首詎假龍橋豈藉銀連寧須玉軸背各有題一名維衛一名迦葉於是時衆踴躍得未曾有復懼金仙之姿非凡所徙試就提捧豁爾勝舟指燕宮而西歸望葑門而一息道俗側塞人祗協慶膺家住近通玄寺乃孫權為乳母陳氏之所立也亦一邦之勝地胥山之神塔乃遷像於此寺武夫數百咸不能勝共怪曰朱膺帛泥二人之力而能捧持不覺為異今人工甚盛確乎不移此必精神弗能致也乃復竭心同時稽顙然後乃動至自舟中故知據并夜飛實無以異石不能重有覺憑焉後有外國沙門釋法開來稱彼國衆聖所記云東方有二石像及阿育王塔若能恭往禮覲滅無量罪免離三塗禮已而去中大通四年歲在壬子臨沙汝靈侯奉敕更造銅灮二枚其一高九尺其一高八尺五寸銅邁丹陽恥論劉向之術匠選攻金無俟嵇康之鍛既鐫既鎪是磨是銑曄如灮定湛似日輪亦當遠照三千普瞻色像遙覩十方俱聞說法豈止惜命小鳥欣入影中重罪衆生還逢愛日而已哉吳郡僧正慧法師深修五定淨持七支於三寶中盡力宏護立摩尼之勝殿製飛行之寶塔至於莊嚴妙色實有厥勞昔魯聖云亡尚追儀於有若楚臣殞世亦託似於優旃放勳之後更圖長樂之畫文命之君不闕稽命之或傳諸往牘或布在前言或贊述盈耳或壽宮虛置况遠追應身近規靈迹不銘不勒何以稱揚乃為銘曰巍巍天像堂堂最勝慧日獨圓無生永證愍此魚鈎傷茲螺孕乍動慈舟時延寶乘留住待緣獨有傳應傳應伊何寶茲靈像履冰晨遊凌濤夜上七衆有憑九垓咸仰照此真容開斯俗網千輪足起萬字胸書身橫五分衣刻三銖嗟爾末俗心王所驅顙浮水沫命役馳駒宜宏希響必盡勤劬覩相塵滅聞聲惑祛湛然神跡長處全吳蘇州府志釋迦文佛像銘至矣調御行備智周滿月為面青蓮在眸釋迦文佛像銘心珠可瑩智流方普永變身田長無沙鹵梁安寺釋迦文佛像銘帝為知仰皆規面象敬模螺髮式圖輪掌信根有五覺枝云七仰福靈祗上生兜率彌陀佛像銘玉蓮水開銀花樹落惟聖降神拯彼沈漠式佛像銘影生千葉花成四柱塔象單留龕童雙舞迦葉佛像銘慧雨自垂仁風永扇照曜白毫半容月面惡因有滅善燈無變維衛佛像銘灼灼金容巍巍滿月永被人天常留花窟同泰寺故功德正智寂師墓志銘峯頽木朽波逝江潭山川若此人何以堪亦生亦滅如壑如舟千齡俱盡萬古誰留惟茲大士才敏學優幼捐蹈火早去吞鈎法雷能響懸河必酬辨士可匹妙德難儔宋姬寺慧念法師墓志銘電逝生危舟沈道滅石拆亡儒星開殞哲是曰人龍亦號僧象慧氣素昭英賢夙上善渡愛河能褰欲網如彼高山法徒斯仰如彼澄波不測深廣甘露鼓山寺敬脫法師墓志銘岌岌緣假昏昏大夢六塵遠飛四流長控猗嗟大士慧舟法棟早擅人龍夙標威鳳善堂間構燈王布席辨河流水辭峯積石寂寥兩樹悠漫三泉神明何託暗石空傳湘宮寺智蒨法師墓志銘嗟爾名德超然有暉五塵夙離三修允依戒珠靡缺忍鎧無違智燈含景慧駕馳騑若韜山金如苞海寶德邁西河聲踰東道伊寺傾蓋于彼朱方不期而遇襄水之陽掩此方墳悠哉泉下鬱鬱翠微遼遼平野薪盡火滅歸真息假淨居寺法昂墓志銘篠簜含聳蘭蓀表質甘露已凝智泉斯溢頓轡中衢息棹修渚隟陋白駒藤緣黑鼠同志酸傷交朋哀楚錫杖銘妙飾嘉灮遊聖振灼排空霧轉騰雲鳳躍永異玉神長踰金錯並藝文類聚莊嚴旻法師成實論義疏序夫事秉文辭理通氣象涉之者尚迷求之者或躓是以問玄經於揚子且云不習奏古樂於文侯猶稱則睡厯校清臺壽王之課不密氣現斗牛南昌之地或爽况乎慧門深邃入之者固希法海波瀾泛之者未易自使河濟混淆魔塵紛紏皎皎毒霜童童苦樹善田之苗不吐意華之彩詎發無常之樓互起暗室之火無暉是以餐蜜挫糟俱珍異論持牛臥棘競起邪宗自佛日團空正流蕩垢手擎四鉢始乎鹿園之教身臥雙林終於象喻之說含生弗等開塞之義因機感受不同淺深之言或異處處散說本應根緣有不次第各隨羣品金棺已掩旃檀之炭無追乳池且涸白㲲之灰斯盡迦葉入定歡喜智滅末地之報已終優波之身且謝於是五部橫流八乾起執尋源既舛取著尤別四相乃無常之刀三聚為苦家之質習續不斷稱為集諦無有為體介然可求等智能斷羅漢猶退豈啻千里之舛義起毫釐三豕之書謬符晉史北轅趨郢木末搴蕖譬乎服子論丘利害不識膠柱鳴瑟燥濕無變自佛滅之後八百餘年中天竺國婆羅門子名訶梨跋摩梁云師子鎧四種圍陀在家必習三品慧藏入道彌通師事達磨沙門事均反啓於是歎微言之已絶傷頽風之不振抗言動論以朱紫為先發意吐詞必涇渭由己於是標撮領會商榷異端刪夷浮詭搜聚貞實造百有二品以為斯論成則據文實則明理舉成對壞稱實形虛欲令毗曇外道二途皆廢如來輪主兩理兼興若夫龍樹馬鳴止筌大教旃延法勝縈縛小乘兼而總之無踰此說故華氏之王於茲頂戴樓佉外道結舌無辭百流異出同歸一海萬義區分總乎成實豈止鼓腹涅槃旗靡轍亂雞鳴真諦喪精掩色多歷年所復寡英才粵我大梁炎圖啓運皇帝含天包地之德春生夏長之仁以本誓願率化斯土梵輪常轉三寶現前甘露聿宣四部無厭有莊嚴旻法師羽儀鸞鳳負揭灮景深以通志神以知來其跡同凡其源莫則故以心包四忍行合三空慧比文殊玄如善吉總持均阿難之德樂說有富樓之功思媚我皇起豫正法宣弘此論大盛乎京師負笈爭趨懷鉛來遠無勞冠軍之勢自傾衛客固有華隂之德人歸成市擬儀舍衛起邁泗洙西關自恥南宮不競湘宮寺智蒨筆札之功不殊法汰之報安石清辨之妙何止道林之折子猷凡如十卷勒成一部法師大漸深相付囑豈直田生之亡獨臥施讎之手馬公之學方由鄭氏而陳其義云八關齊制序夫五宅易昏四流不泊業動心風情漂愛焰自非識達真空照靈珠於難曉神緣妙境蓄慈根於未化無以却此四魔登茲十善今列筵肅靜高宇閒邃香吐六銖煙浮五色目對金容耳餐玉韻無容使情緣異染形不肅恭類倚於鴛宮同力於羊角宜制此心蛇祛此醉象立制如左咸勉聽思謹條八關齊制如左睡眠籌至不覺罰禮二十拜擎香爐聽經三契一出不請刺罰禮十拜二出過三契經不還罰禮十拜三鄰座睡眠維那至而不語者罰禮十拜四鄰座睡眠私相容隱不語維那者罰禮十拜五維那不勤聽察有犯制者不即糾舉為衆座所發覺者維那罰禮二十拜擎香罏聽經三契六白黑維那更相糾察若有阿隱罰禮二十拜七聽經契終有不唱讚者罰禮十拜八請刺無次第罰禮十拜九請刺白黑刺有誤者罰禮十拜十唱導文在藩作夫十惡緣巨易惑心途萬善力微難感靈性是以摩鉗赴火立志道場薩埵投身必之妙覺衆生積染流浪不歸苦海易沈慈波空蕩渴愛與生死共門無明與結網同路各趣百非纏茲四苦人思戮力昭彼三明是以如來因機致化如大醫王隨病施藥當今皇化之基格天網地扇仁風於萬古改世季於百王覆載蒼生慈育黎首天涯海外奉道餐風抱嗉吹脣含仁飲德民無賢肖愛均一子衆等宜各克己丹誠澄心慊到奉為至尊敬禮娑婆世界釋迦文佛歡喜世界旃檀德尊水精剎土月電如來寶明世界山海慧佛奉願聖御與天地比隆慈明與日月齊照九有被康哉之澤八方延仁壽之恩玉燭之美日著遐方擊壤之歌遍聞天下敬由心起五體所以外恭情發於中六識所以單到故一善染心萬劫不朽百燈曠照千里通明憑法致安積善延慶今日幸遇茲訓誘豈得不罄竭心途奉為皇太子敬禮東方寶海南方燈明西方無量壽北方相德奉願離明內映合璧外和玉震雲浮金聲海鏡日朝顏色四善流風既擅溫文之德實著監國之重蒼生飲德有識餐仁燮和內化事炳周經讚德含章訓高惇史故以配正奉天表七教於仁德宣風緝惠闡六服於溫慈各宜攝心奉為貴嬪歸命敬禮五十三佛三十五尊當來賢劫千見在百七十奉願月相與萬善同休金聲與四時並祐興七覺以炳照冏十智於常樂閨守奉仁宮儲欽德暉同疊璧煥若崑瓊蓋聞嵩高惟嶽作屏皇家宗子維城克固磐石所以戚均魯衛任等蕭曹三台正席坐而論道九𣗥勤王恪居連事宜各運心奉為臨川安城建安鄱陽始興豫章又南康廬陵湘東武陵諸王家國戚屬六司鼎貴歸命敬禮舍利形像菩提妙塔多寶踊現釋迦碎身奉願心鏡凝深身清嶽峙克隆帝祉永茂皇枝衆各一心歸命三寶三界異術五道分徑天人植業各歸一果鬼神牽報事炳冥途十善華果既乖正力五濁煩心彌多惱纍雖復聰明正直三牲之祀未虧隂陽不測六根之滯猶染衆等宜各露誠逮為天龍八部護塔善王乃至修羅八臂摩醯三目盡為敬禮尊經正典清淨波若究竟涅槃法華會一之文淨名不二之說願一切善神永斷無明長遵正本臥處寶宮坐甘香積帝釋淵廣泛般若之舟淨居深沈駕牛車之美澤及三界明照四天大悲拔苦事炳前經弘慈與樂義高名訓是以靈權降迹出沒不同菩薩位懷顯晦多術無邊劇惱扇八苦於修途有縛纏情繞六趣於危道金鎖玉牀猶念解脫雕珠飾綺不及塗中至如飄颻熱風滄浪冰水暗室千重黑城百仞鐵輪碎骨銅柱焦腸傷出刀峯橫抽劒鍔如斯衆苦尤為險脆一息不追則萬劫永別剎那暫斷則千代長離相與共託閻浮泡生幻處危脆之質有險蜉蝣風電之馳誠難可駐况復三相併蹙二鼠攢危毒箭惡蛇尤為可畏庶憑正法拔茲纍染長享百福永斷六塵對至無強唯佛可恃今為六道四生三途八難慈悲懇到一心遍禮十住菩薩三行聲聞禮救世觀音獻蓋寶積西方大勢東國妙音四辨淨名二土螺髻珠頂善宿彌勒文殊金剛藏解脫月棄隂蓋常舉手十大弟子五百羅漢願囹圄空虛疾惱消息城中百縣方外千城凡在幽執一同寬蕩人協覆蛇俗化匡蟻類服鴆之不死同拔劒之無傷舍生不縷轉死自溫渭橋日飽翳桑無餓打塞三塗填碎地獄破魔兵衆壞生死軍閻羅發十善之心牛傍啓五戒之業如魚少水若鴈窮林一聽法音即捨穢質人運五體歸命三寶千佛願文蓋聞九土區分四民殊俗昏波易染慧業難基故法身寂鏡有照斯感滌無明於欲海度蒼生於寶船或輕慈導捨薄笑牽悲曲豔口宣斜灮頂入自鹿樹表灮金河匿曜故像法衆生希向有形雖千聖異跡一智同塗弟子某甲久沒迷波長流苦沫不生意樹未啓心燈而蓋生一念敬造千佛雖復無上無為極相難辨非空非有妙智誰觀而紺髮日灮蓮眸月面庶可長表誠敬永寄心期四月八日度人出家願文弟子蕭綱以今日建齊設會功德因緣歸依十方盡虛空界一切諸佛歸依十方盡虛空界一切尊法歸依十方盡虛空界一切聖僧竊聞涅槃經言身如畫水隨畫隨合是身不淨九孔常流凡夫愚人常行味著愚癡羅剎止住其中又如瑞應經言沙門之為道也捨家妻子捐棄愛欲斷絶六情守戒無為其清淨得一心者則萬邪滅矣一心之道謂之羅漢聲色不能染榮位不能屈難動如地以免憂苦故知出恩愛獄薄俗為難善來比丘其福深重弟子以此因緣今日度人出家願一切六道四生常離愛欲永拔無明根削遣暗惑心修習般若慧足踐輕輪之光口說懸珠之辨被忍辱鎧秉智慧刀乘菩薩車坐如來座結纏披解頂相灮明戒因清白後報尊重所有果業皆悉勝出受持法藏為佛真子一切道行皆悉能行一切大誓不休不息仰願十方盡虛空界一切諸佛仰願十方盡虛空界一切尊法仰願十方盡虛空界一切聖僧咸加證明又仰願十方盡虛空界一切諸天仰願十方淨虛空界一切諸仙仰願十方盡虛空界一切聰明正直守護一切善神又願今日見前幽顯大衆咸加證明今日誓願使弟子蕭綱得如所願滿菩提願一切衆生皆悉隨從得如所願六根懺文今日此衆誠心懺悔六根障業眼識無明易傾朱紫一隨浮染則千紀莫歸雖復天肉異根法慧殊美故因見前境隨事起惡今願捨此肉眸俱瞬佛眼如抉目王見淨名方丈之室多寶踊塔之瑞牟尼鷲嶽之灮彌勒龍華之始常遊淨土永步天宮耳根暗鈍多種衆惡悅染𮈔歌聞勝法善音昏然欲睡聽鄭衛淫靡聳身側耳知勝善之事樂之者希淫靡之聲欣之者衆願捨此穢耳得彼天聰聞開塔關鑰之聲彈指謦咳之響諸佛所說悉皆總持香風淨土之聲寶樹鏗鏘之響於一念中恍然入悟鼻根過患彌復頑嚚耽染六蘭流連百和鬱金易著簷蔔難排雖復一薰一蕕叶性難遣空中海上彌不自覺至如雕罏在彼翠霧飛煙識染相牽彌生織纍所以蝍蛆甘帶自謂馨香烏鴉嗜鼠不疑穢惡今願捨此鼻根得彼天受振裳屣步跨栴檀之迥林提囊拭鈦捧香積之寶飯長離穢濁永保清升舌根障重染惡尤深毒刺爭興惡蛇競起既貪五黃六禽之旨又甘九鼎八珍之味所以焚山破卵涸水枯鱗黿臛不斟有染指之過羊羹不及致入陳之苦雖復𪀀䐿鹿胃猶不稱甘鳳肺龍胎更云不美雖羅鼎俎未必皆嘗在彼衆生於命己酷或復閒朋亂友破俗傷真變紫奪朱反白為黑所以讒言三至曾母投杼端木一說越霸吳亡故知三寸之舌未易可掉駟馬既出於事難追願斷煩惑入清淨境既同阿難乞乳之譏又等淨名寂默之致餐禪悅之六味服法喜之三德形恭心到永趣菩提身根頑觸唯貪細軟質體塵礙不重戈矛莫不愛我輕他陵人傲物縱此裸蟲不羈醉象六塵四倒自此而生五蓋十纏因斯而致所以象簟清潤遨遊於夏室重衾狐白溫煦於冬房結駟廣廈動靜必安鷁首翠樓去來有託所以三業之過出自機關四大假成豈有真我願捨此畫瓶得彼金色淨寶珠之法飾照琉璃之慧體長歸五分永等十身意識攀緣其罪山積險同夢幻譬若猴猿懸鏡高堂一念難靜走丸索上百慮先馳至如二十五有紛繞不息九十八使驚騖無已所以灰心滅智行拔於三乘風禪露飲道高於六度今願斷此意根祛纍斯盡心當恬怕洞照無生一切衆罪悉滅俗門三界異途歸之真域懺悔已竟誠心作禮悔高慢文弟子蕭綱又重至心歸依三寶竊聞禮稱弗慠表洙泗之遺文經云不慢驗踰闍之妙典故一遇恆神陵伽尚生餘習上天帝淮南猶有誤辭亦有才曰隱淪調唯高俗猶足坐痺晉君立前齊主况復道隆三學法兼五衆如過前殿似出北門而不密室致恭遺弓接足敢藉勝緣願起弘誓從今日始乃至菩提於諸出家悉表虔敬方欲削除七慢折制六根頭下步庶無厥咎耆達棄車方思景慕幽顯大衆咸為證明並廣弘明集欽定四庫全書
