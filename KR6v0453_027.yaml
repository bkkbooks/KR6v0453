body:
  text: 明梅鼎祚輯梁八劉孝綽字孝綽彭城人祕書監答雲法師書孝綽和南辱誨垂示敕旨所答劉太僕思效啓義窮深遠語兼巧便伏聞希有身心踴躍昔戈盾夾車備不虞於周后兵旗引駕防未然於漢君斯皆執心黃屋瑞無紺馬事極寰宇之中理隔天人之外皇上自兹善覺降迹閻浮以住地之心行則天之化故能慈導三有仁濟萬物猶以法藥未周寶船不倦解劒却蓋躬詣道場瑞花承足人觀雕輦之盛金輪啓路物覩重英之飾顯實開權事均祗鷲本無四畏寧慮五怨思效遂膚引梁丘隨劍之説日磾觸瑟之辭何異回龍象於兔徑注江海於牛迹聖旨殷勤曲相誘喻豈直淨一人之垢衣將以破羣生之暗室弟子世傳正見幼覩真言但惑網所縈塵勞自結微因宿植仰逢法教親陪寶座預餐香鉢復得俱聽一音共聞八解庶因小葉受潤大雲猥蒙開示深自慶幸不勝歡喜略附陳誠劉孝綽和南廣弘明集棲隱寺碑開方便門示真實相置甘露室遵甘露津苦語軟言隨方弘訓俯心降迹逐物重輕中枝小葉各隨業根愍其四流五結有來而不散八慢九邪一淪而莫曉如彼醫王等之藥樹去聖茲遠思聖茲深誠敬所先是歸龕象自妙法東注寶化西漸公卿貴仕賢哲偉人莫不嚴事招提歸仰慧覺欲使法燈永傳勝因長久銘曰給孤焚蕩善勝崩淪堂堂宗匠克紹慧因地雖舊域其宇維新召棠且思羊碑猶泣况我仁祠義踰生立遺愛伊何形于南邑亦有庶民經始攸急珠殿連雲金層輝景衢交達巷門臨樹屏五居推妙三空愧靜銘施柱側記法窟前孰云千載餘迹方傳敢宣衆説敬勒雕鐫芬域未滅斯文在旃藝文類聚劉孝儀字子儀綽弟豫章內史雍州金像寺無量壽佛像碑昔堯乃則天莫能名其聖孔才譬日無得稱其道况復欲宣五品將歎三法固使迦葉恥其無智龍樹羞其非辨猶聞獻蓋長者頌以七言無學比丘陳其百句至有九輩性生一身補處塵洗玉池神聞金葉樹聲繁會趙簡於是未聞地寶焜煌周穆之所不見昔者出城石轉還林現疾夢樹既沈梵花獨反猶有香杖疊衣紅爪紺髮可得崇以妙利顯用珍函彼彌陀感化殊攝日輪照曜月面從容毫散珠輝脣開異色似含微笑俱注目於瞻仰如出軟言咸傾耳於諦聽像復以其夕出住寺門始則映顯巖間猶對鷲山之禮末又徘徊閫外似救毗城之疾空中生樹豈曰難思火內披蓮未為多有銘曰奄有淨國寶應多祉葉産梵童花開釋子玉蓮交映銀荷遞起伊尹慙桑伯陽羞李平等剎下銘香薪已燎花疊盡然頻果絶其軟言綿毫收其廣照紺鉢遺采託慕所依紅爪餘暉申悲是寄因使金表爭構玉剎競修豈止天界飾其四園龍宮陳其七寶樹似菴林峯疑鷲色孕吐仙霧涌瀨靈泉燕室緣雲精廬切漢制兼祕殿采美御房義和假道於罘罳翔鸞回翼於飛棟建章厭勝未及雕礱甘泉避暑豈窮輪奐檻綴玫瑰階填粟玉絡以如意飾用沈檀火齊勝明燭銀揚采釋梵奪其身光日車貶其輪照辭曰惟茲寶塔妙迹可傳盤稱鄴境樓美涪川雙龍虛繞九鳳徒懸豈如神剎耿介凌煙珠含魄月幡垂淨天寶鐸夜響銀地朝鮮簷棲迥霧砌卷香蓮蠡下梵墜鶴歸仙恆沙擾擾世界綿綿踐茲勝影祛彼蓋纏劉孝威字孝威儀弟太子中庶子謝東宮賜聖僧餘饌啓北戶録注作謝賜聖僧餘福果食一頭齊桓柏寢之器周穆軒宮之寶乳糜香飯素奈糗漿五杏七桃靈瓜仙棗莫不氣馥上天薰流下界石崇芳果金谷僅於萬株陳湯木滋杜陵幾于千樹猶自高謝珍奇多慙品族謝東宮賜淨饌啓糜獻牛牧飯出龍宮千品甘露之食百花珍藥之果餅兼髓乳漿包蔗奈雕盤流其滋旨寶器委其包香足使五世長者羞彼識味一角仙人恥其呪術微物多幸叨奉曲恩性命可捐殊私難答為皇太子謝敕賚功德馬啓伏惟忘我徇物屈己濟民該天地而大捨總日月而為施既脫𨋗於金輪又解於紺馬出余吾之水服騊駼之廄名高夏后之龍價倍田方之贖謹當秣以柏葉飴以丹棗加之玉鞍飾之金絡並藝文類聚劉孝標本名峻字孝標平原人安成王護軍參軍與舉法師書釋智順傳法華惠舉為順墓志銘聞諸行李高談徽德逖聽風聲心飛魂竦無異蘄仙之望石髓太陰之思龍燭蒼星昏昃涼雲送秋道勝則肥固應攝衣裳虹霓帷幕霄露餌黃菊之落蘂酌清澗之毖流旦候歸鴈晨鳧暮聽羈雌獨鶴神彯彯爾蓋象蕭史之騎鳴鳳列子之御長風雖荊卿旁若無人孝然堅臥氷雪沈沈隱隱何以尚之哉至於馳騖經囿翱翔書圃極龍宮之妙典彈石室之鴻記道生伏其天真曼倩謝其辨物若乃習是童子措志雕蟲藻思內流英華外發葳蕤秋竹照曜春松爵頌息明珠之譽長門濫黃金之賞盛矣美矣煥其麗乎昔旅浙河嘗觀組繢不覺紙筆焚魂魄斯盡自茲厥後兩絶圭璧意眷眷於菁華腸回回於九逝夫日御停照不踰隙穴海若濆湧莫限隈嵎以玉抵鵲昔傳餘寶冀閲清徽用瘳眩疾然越民非鬻冠之所齊國豈奏韶之地望與其進無貽責焉廣弘明集劉之遴字思貞南陽涅陽人太常卿弔震法師亡書弟子劉之遴頓首和南泡電倐忽三相不停苦空無我五陰寧住尊師僧正捨壽閻浮遷神妙樂雖乘此宿殖必登善地人情怛化銜疚悲摧念在三之重追慕哀慟纏綿永往理不可任奈何奈何僧正精理特拔經論洽通蔬菲終身有為略盡枯稿當年儀形二衆豈直息心標領亦為人倫之傑弟子少長遊遇數紀迄茲平生敬仰善友斯寄衰疾待盡不獲臨泄鯁慟之懷二三增楚扶力修唁迷猥不次弟子劉之遴頓首和南與震法師兄李敬朏書生滅無常賢弟震法師奄同力士生處道識長往法言永絶惋怛抽摧不能已已年事未高德業方播疾恙甫爾謂無過憂遂至遷化道俗驚愕念孔懷之切天倫至慟永往之情不可居處奈何奈何法師義味該洽領袖黑衣識度愷悌籍甚當世昔在京師聖上眄接自還鄉國歷政禮重且講説利益既實弘多經始寺廟實廣福業襟抱豁然與物無忤所與遊欵皆是時賢白黑歸美近遠欽敬豈止息心殄瘁實亦人倫喪寶追懷歎愴何可弭歇并辱遺書及別物對增哽欷殿下自為作銘又教鮑記室為志序恐鮑相悉未能究盡己得面為鮑説諸事行及徽猷計必勒不朽事如今日志石為薦并呼師修之鐫刻亦當不久可就言增泫然投筆悽悶劉之遴頓首頓首弔僧正京法師亡書八月二十日之遴和南法界空虛山木隤壞尊師大正遷神淨土凡夫淺纍嬰滯哀樂承此凶訃五內抽摧哀慟深至不能自已念追慕永往纏綿斷絶情在難居奈何奈何大正德冠一時道蔭四部訓導學徒紹隆像法年居僧首行為人師公私瞻敬遐邇宗仰若乃五時九部流通解説匹之前輩聯類往賢雖什肇融恆林安生遠豈能相尚頓悟雖出自生公弘宣後代徽言不絶實賴夫子重以愛語利益窮四攝之弘致檀忍知慧備六度之該明白黑歸依含識知庇舟航愚冥棟梁寺塔日用不知至德潛運何道長而世短功被而身沒映乎大海永墜須彌照彼高山長收朗日往矣奈何當復奈何法師幼而北面生小服膺迄乎耆邁恆在左右在三之重一日傾殞哀慟之至當何可處弟子紈綺遊接五十餘年末隆知顧相期法侶至乎菩提不敢生慢未來難知現在長隔眷言生平永同萬古尋思惋愴倍不自勝末由唁執伸泄哀歎謹裁白書投筆哽猥弟子劉之遴頓首和南與印闍黎書裴子野撰南齊智稱法師碑云宋大明中益部有印禪師者苦節洞觀鬱為帝師未審此為何大喜稽首和南大喜精誠無感奄丁禍罰攀號永往五內屠鱠自咎自悼萬歿何補慈母臨終正念不亂繫想諸佛及本師至乎壽盡凡夫戀著母子恩深嬰此長別肝心破潰不能自任遺旨以三十兩上金奉別充道場功德九月二十八日奉營安厝終始永畢不可復希長號懊惱無心苟存伏度聞問理垂哀愍所希運心救拔必使亡靈遊於淨土不圖此啓臨紙崩絶大喜和南並廣弘明集王筠字元禮琅邪臨沂人太子詹事國師草堂寺智者約法師碑結宇山椒疏壤幽岫蓄雲泄雨靄映房攏浴日涵星光池沼震居暇豫留思幽微研精經藏探求法寶香城實相之談金河常樂之説究竟微妙洞遠幽玄掖庭為道心之宮華林構重雲之殿師子之座高廣於燈王聽法之筵衆多於方丈開寶函之奧典闡金字之微言顯證一乘宣揚三慧辨才無閡遊戲神通莫不皆悟無生咸知妄想隨類得解俱會真如銘曰形在江湖心超祗鷲思協風雲量包宇宙軒瞰蒼波窗承翠嶺須枕煙露攬持光景開善寺碑妙門關鍵闢之者既難法海波瀾遊之者未易是以軒稱俊聖堯曰欽明韶濩有美善之風文武致時雍之業地平天成惟事即世移風易俗匪止今生至如訪道洞山乘風獨遠凝神汾水窅然自喪或宗仰黃老之談景慕神仙之術斯皆不度羣生事局諸己篤而為論道有未弘熏風璚露散馥流甘璧月珠星聯花揚葉修幡繞於雲根和鈴響於天外玉池動而揚文寶樹搖而成樂銘曰亭亭切漢耿介凌煙層甍霞聳飛棟星懸並藝文類聚奉和皇太子懺悔應詔詩序奉和皇太子懺悔詩仍上皇宸極聖旨即疏降同所用十韻私心慶躍得未曾有捃採餘韻更題鄙拙與東陽盛法師書菩薩戒弟子王筠法名慧炬稽首和南問訊東陽盛法師弟子昔因多幸早蒙覲接歲月推流踰三十載欽慕風德獨盈懷抱間以山川無由禮敬司馬參軍仰述存春曲垂訪憶既荷録舊之情兼佩殷勤之旨歡欣頂戴難為譬説仰承垂和履福享年九十有四嗤絳人之未高同英宗之遐壽且耳長直已過頂齒剛曾不先落延華駐彩怡神輔性自非宿殖善因何以招斯勝果尊年尚齒之誠懷德敦舊之欵依風慕道之深欣羡景仰之至興居在念寤寐載懷弟子恨此樊籠迫茲纓鎖無由問道撫躬如失庶心期冥會咫尺江山道術相忘棄置形迹惟願敬勗保此期頤赤松朱髮復何足貴飛錫騰軀真在旦夕指陳丹欵殊未伸暢儻惠一言豈不幸甚弟子筠稽首和南與雲僧正書弟子孤子筠頓首稽首和南弟子釁結幽明備嬰荼蓼攀援崩踴肌髓糜潰尋繹煩冤肝腸寸斷號天叩地永隔精誠捨命捐軀終無補益思欲仰福廣為法事以伸罔極之痛少寄追慕之誠鑄像度僧仰遵法教建齋設會務依經典敷説大乘誘度羣生其福不淺仰惟大正法師道心純淑至德凝深智包空有照通真俗多聞不窮機辨無硋一代師匠四海推崇弟子宿值善因早蒙親眷情同骨肉義等金蘭外書所謂冥契神交內典則為善友知識敬藉微緣敢陳大願來歲夏中欲仰請講説弘法之情既無彼此眷愛之深特希降屈公私道俗要請既多故預咨聞必願允遂豈圖一旦忽有斯白臨紙崩衄厝言無次弟子孤子王筠頓首頓首稽首和南與長沙王別書筠頓首頓首高秋凄爽體中何如願比勝納承入東禮拜用深傾仰昔藩后遨遊不無是事或龍舟水嬉或臨川送遠摐金飛斾泛此安流猶復見重良書以為盛德未有選日簡辰歸誠繫念尋法城之遊逗祗園之聚翹心讚歎無以譬説僕夙疾增瘵蹇廢蓬門不獲執離彌深傾悶願敬勗白書不次王筠頓首頓首並廣弘明集與瑗律師書筠和南至節過念哀慕深至情不可任寒凝道體何如想比清豫弟子羸勞每惡惙弊何理眷請勤御比日來敘遣白王筠和南淳化帖劉協字彥和東莞莒人歷步兵校尉為文從于佛理就定林寺出家名慧地剡縣石城寺彌勒石像碑銘夫道源虛寂冥機通其感神理幽深玄德司其契是以四海將寧先入威鳳之寶九河方導已致應龍之書况種智圓照等覺遍知揚萬化於大千摛億形於法界其靈起攝誘之權影現戲遊之力可勝言者哉自優曇發華而金姿誕應娑羅變葉而塔像代興月喻論其迹隱鏡象譬其常照律師應法似流宣化如渴揚舲浙水馳錫禹山於是捫虛梯漢構立棧道狀奇肱之飛車類似叟之懸閣體高圖範冠采虹霓椎鑿響於霞上剖石灑於雲表信命世之壯觀曠代之鴻作也青雘與丹粟競采白金共紫銑爭輝梵王四鶴徘徊而不去帝釋千馬躑躅而忘歸藝文類聚滅惑論或造三破論者義證庸近辭體鄙拙雖至理定於深識而流言惑於淺情委巷陋説誠不足辨又恐野聽將謂信然聊擇其可採略標雅致三破論云道家之教妙在精思得一而無死入聖佛家之化妙在三昧神通無生可冀詺死為泥洹未見學死而不得死者也滅惑論曰二教真偽煥然易辨夫佛法練神道教練形形器必終礙於一垣之裏神識無窮再撫六合之外明者資於無窮教以勝慧暗者戀其必終誑以仙術術極於餌藥慧始於觀禪禪練真識故精妙而泥洹可冀藥駐偽器故精思而騰無期若乃棄妙寶藏遺智養身據理尋之其偽可知假使形無際神暗鳶飛戾天寧免為鳥夫泥洹妙果道惟常住學死之談豈析理哉三破論云若言太子是教主主不落髮而使人髠頭主不棄妻使人斷種實可笑哉玥知佛教是滅惡之術也伏聞君子之德身體髮膚受之父母不敢毀傷孝之始也滅惑論曰太子棄妻落髮事顯於經而反白為黑不亦罔乎夫佛家之孝所苞蓋遠理由乎心無繫於髮若愛髮棄心何取於孝昔泰伯虞仲斷髮文身夫子兩稱至德中權以俗內之賢宜修世禮斷髮讓國聖哲美談况般若之教業勝中權菩提之果理妙克讓者哉理妙克讓故捨髮取道業勝中權故棄迹求心準以兩賢無缺於孝鑒以聖境夫何怪乎第一破曰入國而破國者誑言説偽興造無費苦尅百姓使國空民窮不助國生人減損况人不蠶而衣不田而食國滅人絶由此為失日用損費無纖毫之益五災之害不復過此滅惑論曰大乘圓極窮理盡妙故明二諦以遣有辨三空以標無四等弘其勝心六度振其苦業誑言之訕一作詘豈傷日月夫塔寺之興闡揚靈教功立一時而道被千載昔禹會諸侯玉帛萬國至於戰伐存者七君更始政阜民戶殷盛赤眉兵亂千里無煙國滅人絶寧此之由京索之時石穀十萬景武之世積粟紅腐非秦末多沙門而漢初無佛法也驗古準今何損於政第二破曰入家而破家使父子殊事兄弟異法遺棄二親孝道頓絶憂娛各異歌哭不同骨血生讐服屬永棄悖化犯順無昊天之報五逆不孝不復過此滅惑論曰夫孝理至極道俗同貫雖內外迹殊而神明一揆若命綴俗因本修教於儒禮運稟道果固弘孝於梵業是以咨親出家法華明其義聽而後學維摩標其例豈忘本哉有由然也彼皆照悟神理而鑒燭人世過駟見於格言逝川傷於上哲故知瞬息盡養無濟幽靈學道拔親則冥苦永滅審妙感之無差辨勝果之可必所以輕重相推去彼取此若乃服制所施事由追遠禮雖因心抑亦沿世昔三皇至治堯舜所慕死則衣之以薪葬之中野封樹弗修苴斬無紀豈可謂三皇教民棄於孝乎爰及五帝服制煥然未聞堯舜執禮追責三皇三皇無責何獨疑佛佛之無服理由拔苦三皇廢喪事沿淳朴淳朴不疑而拔苦見尤所謂朝三暮四而喜怒交設者也明知聖人之教觸惑圓通三皇以淳朴無服五帝以沿情制喪釋迦拔苦故棄俗反真檢迹異路而玄化同歸第三破曰入身而破身人生之體一有毀傷之疾二有髠頭之苦三有不孝之逆四有絶種之罪五有亡體從誡唯學不孝何故言哉誡令不跪父母便競從之兒先作沙彌其母後作阿尼則跪其兒不禮之教中國絶之何可得從滅惑論曰夫棲形稟識理定前業入道居俗事繫因果是以釋迦出世化洽天人御國統家並證道迹未聞世界普同出家良由緣感不二故名教有二縉紳沙門所以殊也但始拔塵域理由戒定妻者愛纍髮者形飾愛纍傷神形飾乖道所以潛神滅愛修道棄飾理出常均教必俗若乃不跪父母道尊故也父母禮之尊道故也禮新冠見母其母拜之喜其備德故屈尊禮卑也介胄之士見君不拜重其秉武故尊不加也緇辨輕冠本無神道介胄凶器非有至德然事應加恭則以母拜子勢宜停敬則臣不跪君禮典世教周孔所制論其變通不由一軌故佛道之尊標出三界神教妙本羣致玄宗以此加人實尊冠胄冠胄及禮古今不疑佛道加敬將欲何怪三破論云佛舊經本云浮屠羅什改為佛徒知其源惡故也所以詺為浮屠西域凶惡故老子云化其始不欲傷其形故髠其頭名為浮屠况屠割也至僧禕後改為佛圖本舊經云喪門喪門猶死滅之門云其法無生之教名曰喪門至羅什又改為桑門僧禕又改為沙門沙門由沙汰之法不足可稱滅惑論曰漢明之世佛經始過故漢譯言音字未正浮音似佛桑音似沙聲之誤也以圖為屠字之誤也羅什語通華戎識兼音義改正三豕固其宜矣五經世典學不因譯而馬鄭注説音字互改是以昭穆不祀謬師資於周頌允塞晏安乖聖德於堯典至教之深寧在兩字得意忘言莊周所領以文害志孟軻所譏不原大理唯字是求宋人申束豈復過此三破論曰有此三破之法不施中國本正西域何言之哉西域無教剛強無禮不異禽獸不信虛無老子入關故作形像之教化之又云西域粗獷欲斷其惡種故令男不娶妻女不嫁夫一國伏法自然滅盡滅惑論曰雙樹晦迹形像代興固已理精無始而道被無窮者矣案李叟出關運當周季世閉賢隱故往而忘歸接輿避世猶滅其迹况適外域孰見其蹤於是姦猾祭酒造教化之經理拙辭鄙廝隸所傳尋西域怯弱北地繁熾若老子滅惡棄德用刑何愛強狄而反滅怯弱遂令強敵橫行邊烽不息豺狼當路而狐狸是誅淪湑為酷覆載無聞商鞅之法未至此虐伯陽之道豈其然哉且未服則設像無施信順則孥戮可息既佛教矣方加極刑一言失道衆偽可見東野之語其如理何三破論云蓋聞三皇五帝三王之徒何以學道並感應而未聞佛教為是九皇忽之為是佛教未出若是佛教未出則為邪偽不復云云滅惑論曰神化變通教體匪一靈應感會隱現無際若緣在妙化則菩薩弘其道化在粗緣則聖帝演其德夫聖帝菩薩隨感現應殊教合契未始非佛固知三皇已來感滅而名隱漢明之教緣應而像現矣若乃三皇德化五帝仁教此之謂道似非太上羲農敷治未聞奏章堯舜緝政寧肯書符湯武抒暴豈當餌丹五經典籍不齒天師而求援聖帝豈不悲哉三破論云道以氣為宗名為得一尋中原人士莫不奉道今中國有奉佛者必是羌戎之種若言非邪何以奉佛滅惑論曰至道宗極理歸乎一妙法真境本固無二佛之至也則空玄無形而萬象並應寂滅無心而玄智彌照幽數潛會莫見其極冥功日用靡識其然但言萬象既生假名遂立梵言菩提漢語曰道其顯迹也則金容以表聖應俗則王宮以現生拔愚以四禪為始進慧以十地為階總龍鬼而均誘涵蠢動而等慈權教無方不以道俗乖應妙化無外豈以華戎阻情是以一音演法殊譯共解一乘敷教異經同歸經典由權故孔釋教殊而道契解同由妙故梵漢語隔而化通但感有精粗故教分道俗地有東西故國限內外其彌綸神化陶鑄羣生無異也故能振拔六趣總攝大千道惟至極法惟最尊然至道雖一岐路生迷九十六種俱號為道聽名則邪正莫辨驗法則真偽自分案道家立法厥品有三上標老子次述神仙下襲張陵太上為宗尋柱史嘉遁實惟大賢著書論道貴在無為理歸靜一化本虛柔然而三世弗紀慧業靡聞斯乃導俗之良書非出世之妙經也若乃神仙小道名為五通福極生天體盡飛騰神通而未免有漏壽遠而不能無終功非餌藥德沿業修於是愚狡方士偽託遂滋張陵米賊述記升天葛玄野豎著傳仙公愚斯惑矣智可罔與今祖述李叟則教失如彼憲章神仙則體劣如此上中為妙猶不足算況效陵魯醮事章符設教五斗欲拯三界以蚊負山庸詎勝乎標名大道而教甚於俗舉號太上而法窮下愚何故知邪貪壽忌夭含識所同故肉芝石華譎以騰好色觸情世所莫異故黃書御女誑稱地仙肌革盈虛羣生共愛故寶惜洟唾以灌靈根避災苦病民之恆患故斬縛魑魅以快愚情憑威恃武俗之舊風故吏兵鉤騎以動淺心至於消災淫術厭勝姦方理穢辭辱非可筆傳事合氓庶故比屋歸宗是以張角李弘毒流漢季盧悚孫恩亂盈晉末餘波所被實蕃有徒爵非通侯而輕立民戶瑞無虎竹而濫求租稅糜費産業蠱惑士女運迍則蠍國世平則蠧民傷政萌亂豈與佛同且夫涅槃大品寧比玄妙上清金容妙相何羡鬼室空屋降伏天魔不慕幻邪之詐淨修戒行豈同畢券之醜積弘誓於方寸孰與藏宮將於丹田響洪鐘於梵音豈若鳴天鼓於脣齒校以形迹精粗已懸核以至理真偽豈隱若以粗笑精以偽謗真是瞽對離朱曰我明也弘明集張綰字孝卿范陽方城人尚書右僕射龍樓寺碑蓋聞井魚之不識巨海夏蟲之不見冬冰故知局於泥甃者未測滄溟之浩汗篤於一時者寧信寒暑之推移何異乎玩即世而弗悟於生死之流耽假樂而迷於真覺之觀銘曰識相裁萌無明重蔽五住次起四生無際苦海倒流業風橫厲彼岸何遠津航絶濟輕毛易轉花水難留實逢象正悟彼生修照曜真法逍遙寶舟占彼勝地胥宇攸安遙川縈帶峻矩盤桓霞生蓮堞風起長瀾冬室停燠夏臺增寒任孝恭字孝恭臨淮人中書通事舍人多寶寺碑銘寶傳茲日法象斯時瞻風候景石陛開基準繩秋子取則迦夷業隆千載道盛一期上當星紀下接蓮峯還瞻朱閣却背青松朝雲曖曖夕霧溶溶階通獸迹徑有禽蹤衣移峻嶽錫叩飛泉土木綈錦玉石雕鐫寶階雲構綺壁霞鮮蓮舒藻井芰繞蘭椽法堂每喧禪室恆靜藏韜仙説臺含佛影葉下秋林煙生春嶺並藝文類聚郭祖深襄陽人歷南津校尉加雲麾將軍上武帝封事南史武帝溺情內教朝政縱弛祖深軍行參軍輿櫬詣闕上封事雖不能用然嘉其正直擢為豫章鍾陵令廣弘明集據襄陽耆舊傳僅載數行南史亦云具略大梁應運功高百王慈悲既弘憲律如替愚輩罔識褫慢斯作各競奢侈貪穢遂生頗由陛下寵勳太過馭下太寬故廉潔者自進無途貪苛者取人多徑直弦者淪溺溝壑曲鉤者升進重沓飾口利辭競相推薦訥直守信坐見埋沒勞深勳厚祿賞未均無功側入反加寵擢昔宋人賣酒犬惡致酸陛下之犬其甚矣哉臣聞人為國本食為人命故禮曰國無六年之儲謂非其國也推此而言農為急務而郡縣苛暴不加勸獎本年豐歲稔猶人有飢色設遇水旱何以救之陛下昔歲尚學置立五館行吟坐詠誦聲溢境比來慕法普天信向家家齋戒人人懺禮不務農桑空談彼岸夫農桑者今日濟育功德者將來勝因豈可墮本勤末置邇效賒也今商旅轉繁遊食轉衆耕夫日少杼軸日空陛下若廣興屯田賤金貴粟勤農桑者擢以階級惰耕織者告以明刑如此數年則家給人足廉讓可生夫君子小人智計不同君子志於道小人謀於利志於道者安國濟人志於利者損物圖己道人者害國小人也忠良者捍國君子也臣見疾者詣道士則勸奏章僧尼則令齋講俗師則鬼禍須解醫診則湯尉散丸皆先自為也臣謂為國之本與療病相類療病當去巫鬼尋華扁為國當黜邪用管晏今之所任腹背之毛耳論外則有勉捨説內則有雲旻雲旻所議則傷俗盛法勉捨之志唯願安枕江東主慈臣恇息謀外甸使中國士女南望懷冤若賈𧨏重生豈不慟哭臣今直言犯顏罪或容宥而乖忤貴臣則禍在不測所以不憚鼎鑊區區必聞者正以社稷計重而螻蟻命輕使臣言入身滅臣何所恨夫謀臣良將何代無之貴在見知要在用耳陛下皇基兆運二十餘載臣子之節諫爭是誰執事皆同而不和答問唯唯而已入對則言聖旨神衷出論則云誰敢逆耳過實在下而謫見於上遂使聖皇降誠躬自引咎宰輔晏然曾無謙退且百僚卿士鮮有奉公尸祿競利不尚廉潔纍金積鏹侍列如仙不田不商何故而爾法者人之父母惠者人之仇讐法嚴則人思善惠多則物生惡惡不可長欲不可縱伏願去貪濁進廉平明法令嚴刑罰禁奢侈薄賦斂則天下幸甚謹上封事二十九條伏願抑獨斷之明少察愚瞽條上時帝天弘釋典將以易俗故祖深尤言其事此即前所云二十九條也都下佛寺五百餘所窮極宏麗僧尼十餘萬資産豐沃所在郡縣不可勝言道人又有白徒尼則皆畜養女皆不貫人籍天下戶口幾亡其半而僧尼多非法養女皆服羅紈其蠧俗傷法抑由於此請精加檢括若無道行四十已下皆使還俗附農罷白徒養女聽畜奴婢婢唯著青布衣僧尼皆令蔬食如此則法興俗盛國富人殷不然恐方來處處成寺家家剃落尺土一人非復國有朝廷擢用勳舊為三陲州郡不顧御人之道唯以貪殘為務迫脅良善害甚豺狼江湘人尤受其弊自三關以外是處遭毒而此勳人投化之始但有一身及被任用皆募部曲而揚徐之人逼以衆徒多投其募利其貨財皆虛名上簿止送出三津名在遠役身歸鄉里又懼本屬檢問於是逃亡他境僑戶之興良由此故又梁興以來發人征役號為三五及投募將客主將無恩存恤失理多有物故輒刺叛亡或有身殞戰場而名在叛目監符下討稱為逋叛録質家丁合家又叛則取同籍又叛則取比伍比伍又叛則望村而取一人有犯則合村皆空雖肆眚時降蕩滌惟始而監符猶下舊日限以嚴程上下任信下轉相督促臺使到州州又遣押使至郡競急切同趣下城令宰多庸才望風畏伏於是劒戶課薦其筐篚使人納重貨許立空文其百里微欲矯俗則嚴科立至自是所在恣意貪利以事上官又請斷界首將生口入北及關津廢替須加糾擲又言廬陵年少不宜鎮襄陽左僕射王暕在喪被起為吳郡曾無辭讓其言深刻又請復郊四星荀濟字子通潁川人家江左博涉衆書志調矯俗初與梁武帝知交及登位以其好亂仕不及之濟負氣曰會盾鼻上磨墨作檄耳帝深不平後奔魏謀匡靜帝為齊文襄燔殺上武帝詆釋書濟見帝信重釋門寺像崇盛遂上書論佛教貪妖妄又譏造同泰寺營費太甚必為災患帝怒將誅之奔魏濟北史有傳不載此書廣弘明集條引折難今僅條附六朝唐初人主大都信佛故下多顧忌凡詆釋者悉略也三墳五典帝皇之稱首四維六紀終古之規模及漢武祀金人莽新以建國桓靈祀浮圖閹竪以控權三國由茲鼎峙五胡仍其薦食衣冠奔於江東戎教興於中壤使父子之親隔君臣之義乖夫婦之和曠友朋之信絶海內殽亂三百年矣稽古之詔未聞崇邪之命重沓歲時禘夾未嘗親享竹脯牲欺誣宗廟違黃屋之尊就蒼頭之役朝夕敬妖怪之淫鬼曲躬供貪污之賊禿耽信邪教諂祭淫祀恐非聰明正直而可以福祐陛下者也臣請言得失推校是非案釋氏源流本中國所斥投之荒裔以御魑魅者也乃至舜時竄檮杌於三峗左傳允音捐姓之姦居于瓜州是也杜預以允姓隂戎之別祖與三苗俱放於三峗漢書西域傳塞種本允姓之戎世居燉煌為月氏迫逐遂住𦵇嶺南奔又謂懸度賢豆身毒天毒仍訛轉以塞種為釋種其實一也允姓與三苗比居教迹和洽其釋種不行忠孝仁義貪詐甚者號之為佛佛者戾也或名為勃勃者亂也而陛下以中華之盛胄方尊姚石羌戎之軌躅竊不取一也又按釋迦出戎剖脅而誕摩邪遂殂事符梟獍年長爭立內不自安背父叛君逆節彌甚達多投石難陀引弓變革常道自餓形骸安能濟物聚合凶徒易衣削髮設言虛誕不足承稟九十六道此道最貪叶彼愚衆多崇信至如琉璃誅釋瞿曇路左視之在生親尚不存既歿疏何能救斯即不行忠孝若天下習之陛下則無以自處不取者二也三闕僧出寒徵規免租役無期詣道志在貪竊盜華典傾奪朝權凡有十等一曰營繕廣廈僭擬皇居也二曰興建大室莊飾佛像僭比明堂宗祀也三曰廣譯妖言勸行流布轢帝王之詔敕也四曰交納泉布賣天堂五福之虛果奪大君之德賞也五曰豫徵收贖免地獄六極之謬殃奪人主之刑罰也六曰自稱三寶假託四依坐傲君王此取威之術也七曰多建寺像廣多僧尼此定霸之基也八曰三長六紀四大法集此別行正朔密行徵發也九曰設樂以誘愚小俳優以招遠會陳佛土安樂斥王化危苦此變俗移風徵租稅也十曰法席聚會邪謀變通稱意贈金毀破遭謗此呂尚之六韜祕策也凡此十事不容有一萌兆微露即合誅夷今乃恣意流行排我王化方又擊鴻鐘於高臺期闕庭之箭漏挂幡蓋於長剎放充庭之鹵簿徵玉食以齋會雜王公之享燕唱高越之贊唄象食舉之登歌歎功德則比陳詞之祝史受襯施則等束帛之等差設威儀則效旌旗之文物凡諸舉措竊擬朝儀云云陛下方更傾儲供寺萬乘擬附庸之儀肅拜僧尼三事執陪臣之禮寵既隆矣侮亦劇矣臣不取者四也陛下以因果有必定之期報應無遷延之業故崇重像法供施彌隆勞民伐木燒掘螻蟻損傷和氣豈顧大覺之慈悲乎妖鬼堪能致福可廢儒道釋禿足能除禍屏絶干戈今乃重關以備不虞擊柝以爭空地殺螻蟻而營功德既乖釋典崇妖邪而行諂祭又虧名教五尺牧豎猶知不疑四海之尊義無二三其德臣為陛下不取五也今僧尼不耕不偶俱斷生育傲君陵親違禮損化一不經也凡在生靈夫婦配合産育男女佛法反之多營泥木專求布施寧非巨戾二不經也姦僧矯詐自稱大覺而比丘徒黨行淫殺子僧尼悉然害螻蟻而起浮圖費財力而角堂宇若牟尼能照而故縱淫殺便是詐稱慈悲徒能照而不能救又是大覺於羣生無益而天下不覺三不經也佛法慳貪唯財是與直是行三毒而害萬方未見修六度而隆三寶四不經也佛家遺教不耕墾田不貯財穀乞食衲衣頭陀為務今則不然數十萬衆無心蘭若從教不耕者衆天下有飢乏之憂遺教設法不行何須此法進退未為盡理五不經也涅槃發問世尊滅後經教若為得與波旬經別觀此發問則瞿曇存日門徒不能分辨真偽況中華避役姦詐之侶焉不迷惑者自古帝師諸侯賓友千載一逢猶如旦暮賢明希世宇宙獨立今乃削髮千羣不臣萬衆稱為帝師未之可也姚石玉食三千佛寺瓊宮八百供敬厚矣終獲苗胤屠滅宋齊已降莫懲前失秦政受誑於三山漢武見欺於五利信順妖訛一至於此不察情偽豈懲前失宋齊兩代重佛敬僧國移廟改者但是佛妖僧偽姦詐為心墮胎殺子昏亂道故使宋齊磨滅今宋齊寺像見在陛下承事則宋齊之變不言而顯矣今僧尼坐夏不殺螻蟻者愛含生之命也而傲君父妄仁於昆蟲也墮胎殺子反養於蚊虻也夫易著君臣夫婦父子三綱六紀也今釋氏君不君乃至子不子綱紀紊亂矣廣弘明集欽定四庫全書
