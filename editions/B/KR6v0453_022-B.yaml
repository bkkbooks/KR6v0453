body:
  text: 明梅鼎祚輯梁三元帝詳繹字世誠小字法車武帝第七子謝勅送齊王瑞像還啟臣聞非晦非明法身凝寂有感有見渴仰赴幾伏惟陛下百姓為心宜觀眾覺十方皆見普照王畿將使化行南國乃睠西顧江水安流大川利涉鮮雲靉靆暫掩晨離甘雨霏微猶藏宿霧高明可仰與天花而俱落清梵騰空雜塤篪以相韻頂禮最勝敬謁法王瞻彼堵牆不足為喻立處鍼鋒弗云易擬臣身持淨戒心抃法流接足道周膜拜路左得未曾有喜躍充遍藝文類聚謝賜功德淨饌一頭啟瑤器自滿金鼎流味漿含都蔗味資石蜜又謝賚功德食一頭啟天厨淨饌菴羅法果並北戶錄注與蕭諮議等書盖聞圓七尺上映真珠之雲面門五色旁臨珊瑚之地化為金案奪麗水之珍變同珂雪高玄霜之彩豈不有機則感感而遂通有神則智智而必斷故碧玉之樓升堂未易紫紺之殿入室為難必須五根之信以信為首六度之檀以檀為上故能捨財從信去有即空率斯而談良可知矣竊以瑞像放灮倐將旬日蹈舞之深形於寤寐抃躍之誠結於興寢稍覺十字之蒸嗤何曾之饌五鼎之味笑主偃之辭黿羹麟脯空聞其說羊酪猩脣曷足云也困於酒食未若過中不餐螺蚳登俎豈及春蔬為淨欲吾子三日潔齊自寅至戌一中而已自有米如王銳鹽類虎形雲夢之芹遼東之藻十斤之梨千樹之橘青筍紫薑固栗霜棗適口𠑽腸無索弗獲八功德水並入法流四王俱至偕讓弘道同志為友豈不盛歟蕭繹疏與劉智藏書智藏見後菩薩蕭法車置郵大士劉智藏侍者自林宗遄反玄度言歸以結元禮之心彌益真長之歎故以臨風望美對月懷賢有勞寤寐無忘興寢方今玄冥在節歲聿云遒日似青緹雲浮紅蘂清臺炭重北宮井溢想禪說為娛稍符九次成誦之功轉探三密山間芳杜自有松竹之娛巖穴鳴琴非無薜蘿之致修德之暇差足樂也昔韓梅兩福求羊二仲鄭林騰名於馮翊周黨傳芳於太原或有百鎰可捐千金非貴松子為餐蒲根是服未有高蹈真如歸宗法海梵王四鶴集林籞而相鳴帝釋千馬經丘園而跼步有一於此猶或稱竒兼而總之何其盛也故知南臨之水已類呂梁之川北眺之山彌同武安之嶺豈復還思漵浦尚想彊臺睠彼漢池載懷荒谷以此相求心可知矣僕久厭塵邦本懷人外加以服膺常住諷味了因彌用思齊每增求友常欲登却月之嶺䕃偃盖之松挹璇玉之源解蓮華之劒藩維有限脫屣無由每坐向詡之牀恒思管寧之榻夢匡山而太息想桓亭而延佇白雲間之蒼江不極未因抵掌我勞如何想無金玉數在郵示弱水難航猶致書於青鳥流川弗遠佇芳音於赤玉鶴望還信以代萱蘓得志忘言此寧多述法車叩頭叩頭並廣弘明集荊州長沙寺阿育王像碑盖聞璇璣玉衡穹昊所以紀物金版玉文淳精所以播氣何則咸秩社首義盡於寰中鑄鼎馮翊未窮於系表况復道冠萬靈理超千聖智周十地行圓四等變海成蘇移山入芥針鋒廣說藕絲見道惠音八種面門五色組鉢生華入青樓而吐曜金牀照采出紫殿而相輝纔度蓮河即處天冠之寺始遊羅衛便居堅固之林斯盖俯應閻浮未臻常樂降情誘接豈窮妄相若乃境無引汲智生淺深明同一體惑起十重七地初刃方稱變易三達後心因窮智種然俱冥四德脫屣雙林示表金棺現焚檀槨浩浩焉不可知已却望五津距青蓮之洞傍臨三峽帶明月之流善覺寺碑金盤上疏非求承露玉𥖽前臨寧資潤礎飛軒絳屏若丹氣之為霞綺井綠泉如青雲之入呂寶繩交映無慙紫紺之宮花臺照日有跡白林之地銘曰聿遵勝業代彼天工四園枝翠八水池紅花疑鳳翼殿若龍宮銀城映沼金鈴響風露臺含月珠幡拂空𥖽金陵梵剎志作舄鍾山飛流寺碑清梵夜聞風傳百常之觀寶鈴朝響聲揚千秋之宮同符上隴望長安之城闕有類偃師瞻洛陽之臺殿瞰連甍而如綺雜卉木而成帷銘曰雲聚峯高風清鐘徹月如秋扇花疑春雪極目千里平原𨔴𨘬曠野寺碑雲楣膠葛桂棟隂崇刻虬龍如洞房倒蓮花於綺井月殿朗而相暉雪宮穆以華壯䡾䡾璇題虹梁生於暮雨嶫嶫銀牓飛觀入乎雲中銘曰圓璫旦暉方諸夜朗金盤曜色寶鈴成響崇藝文作峯郢州晉安寺碑鳳凰之嶺芊綿映色蓮花之洞照曜增輝山云黃鶴疑聞天之夜響城稱却月似輕雲之霄蔽銘曰虹梁紫柱螭桷丹墻綺井飛棟華榱璧璫應龍若動威鳳疑翔玉舄霄潤金池夕朱城却梲紫陌潛通壍柳朝綠江暉暝紅落霞將暮鮮雲夕布峯下陽烏林生隂兔分珮隔浦皇檣隱霧俱聽法鐘同觀寶聚揚州梁安寺碑竊以陽之有宗者莫擬於靈烏夜之有者孰踰於隂兔故以日門見羲和之色月殿望奔娥之象而合璧𨔴𨘬丈尺猶且莫量朗鏡悠遠積空之所不算復有紫川青龍之水却月朝霞之山白珪玄璧餞瑤池之上銀闕金宮出瀛洲之下空臺四柱隨仙衣而俱颺寶壍三重映瑞園而涵影旃檀散馥無復圓覺之風地涌神龕皆成多寶之塔攝山棲霞寺碑金池無底已通寶壍之側玉樹生風傍臨綵船之上七重欄楯七寶蓮花通風承露含香映日銘曰苔衣翠屋樹隱丹楹澗浮山影山傳澗聲風來露歇日度霞輕三災不毀得一而貞歸來寺碑幡影颺於絳臺梵聲依於應塔三相不留蕭蠶終壞八苦遐長燈蛾未已銘曰鈴隨風振盤依露泫丹桂無枝朱揚自翦九苑萌枯三昧葉卷疏樹搖落流清淺荊州放生亭碑魚從流水本在桃花之源龍處大林恒捻浮雲之路豈謂陵陽垂釣失雲失水莊子懸竿吞鉤吞餌雖復玄夜夢終見取於宋王朱鷺晨飛尚張羅於漢后譬如黃雀伺蟬不知隨彈應至青鸇逐免詎識扛鼎方前北海之餐鸚鵡未始非人西王之使傳信誰云賤鳥故知魚鳥一觀俱在好生欲使金牀之鴈更及衡陽之侶雪山之鹿不充食苹之宴莊嚴寺僧旻法師碑夫宏才妙物雲液之所降生獨振孤標倫類之所遠絕是故隨燭魏非折水之恒珍和璧入秦豈潤山之常寶僧旻法師盖天地之淳精宇宙之瓌器本姓孫氏有吳開國大皇帝其先也法師道藹二儀德充四海含春夏之長生抱日月之貞明辭旨清新置言閒遠千門萬戶必臻其奧九部五時若指諸掌坦然夷易豁爾洞開故緇素結轍華戎延道晨風之鬱北林龍魚之趣深澤哲人云逝指南誰屬銘曰永離百非聞之寂滅苟云未樹共歸今轍方墳結構伽藍罷設朱火一潛青松長列宅寺大僧正法師碑昂昂千里孰辨麒麟之蹤汪汪萬頃誰測波瀾之際望之若披雲霧覩之如觀日月至乃耆年宿望蓄思搆疑懸鍾無盡短兵有倦猶若分旦望景履氷待日莫不傾河注燭虛往實歸皇帝革命受圖補天紉地轉金輪於忍土策紺馬於閻浮逸翮方超圖南輟軌豈直盡茲相府署彼義年方當高步仙階永編金牒繁霜凝而旦委松風淒而暮來悲馬鳴之不反望龍樹而心哀銘曰澄月夜虧清氛旦卷曾巒遠岸蒼江傍緬梁安寺剎下銘阿閣峞𡿏洞房䆗窱似靈之金扇類景福之銀鋪垂琬琰之文璫飾琅玕之仙寶神童戾止亟連翩於威風薩埵來遊屢徘徊於紺馬有識之所虔仰無著之所招提觀慧樓而下拜望天街而興善辭曰塵沙無始造色無先飛蛾不息縈蠶自纏篋蛇未斷藤鼠方緣苦流長汎愛火恒然髻珠孰曉懷寶詎宣挺茲靈覺時惟天仙真籍表聖化乳稱權寶剎千道高旛四懸鳳樓含日龍臺吐煙紫山翠羽紅水青蓮雪官月殿晨暉夜圓宵長梵響風遠鐘傳仙衣有拂靈剎無邊香罏銘蘇合氤氳非煙似雲時穠更薄乍聚還分火微難盡風長易聞孰云道力慈悲所薰並藝文類聚內典碑銘集林序夫法性空寂心行處斷感而遂通隨方引接故鵲園善誘馬苑弘宣白林將謝青樹已列是宣金牒方寄銀身自像教東流化行南國吳主至誠歷七霄而曜晉王畫像經五帝而彌新次道孝伯嘉賓玄度斯數子者亦一代名人或修理止於伽藍或歸心盡於談論銘頌所稱興公而已夫披文相質博約溫潤吾聞斯語未見其人班固碩學尚云讚頌相似陸機鉤深猶聞碑賦如一唯伯喈作銘林宗無愧德祖能誦元常善書一時之盛莫得係踵况般若玄淵真如妙密觸言成累係境非真金石何書銘頌誰闡然建塔紀功招提立寺或興造有由或誓願所記故鐫之玄石傳諸不朽亦有息心應供是曰桑門或謂智囊或稱印手高座擅名預師尹之席道林見重陪飛龍之座峩眉廬阜之賢鄴中宛鄧之哲昭哉史冊可得而詳故碑文之興斯焉尚矣夫世道亟改論文之理非一時事推移屬詞之體或異但繁則傷弱率則恨省存華則失體從實則無味或引事雖博其意猶同或新意雖奇無所倚約或首尾倫帖事似牽課或復博涉體製不工能使豔而不華質而不野博而不繁省而不率文而有質約而能潤事隨意轉理逐言深所謂箐華無以間也予幼好雕蟲長而彌篤遊心釋典寓目詞林頃常搜聚有懷著述譬諸法海無讓波瀾亦等須彌歸同一色故不擇高卑唯能是與儻未詳悉隨而足之名為內典碑銘集林合三十卷庶將來君子或裨觀見焉簡文帝法寶聯璧序竊以觀乎天文日月所以貞麗觀乎人文藻火所以昭發况復玉毫朗照出天人之表金牒空解生文章之外雖境智冥焉言語斯絕詠歌作焉可略談矣粵乃書稱湯誥篇陳夢說昔則王畿居毫今則帝業維揚功施天下我之自出豈與姚墟石紐譙城溫縣御龍居夏唐杜入周而已哉皇帝垂衣負扆辨方正位車書之所會同南暨交阯風雲之所沾被西漸流沙武實止戈秉宜生之劒樂彰治定減庖犧之瑟相兼二八知微知彰將稱四七如𤠞如虎寧俟容成翠屋之遊廣成石室之會故以宗心者忘相歸憑者常樂昔轉輪護法南宮有金龍之瑞梵天請道東朝開寶盖之祥盡善盡美獨高皇代古者所以出師入保冬羽秋籥實以周頌幼冲用資端士漢盈末學取憑通議大傳之論孟侯小戴之談司業山川珍異俟郊迎而可知帷幄後言籍懇田而求驗以今方昔事則不然我副君業邁宣尼道高啟筮之作聲超姬發寧假卞蘭之頌譬衡華之峻極如渤澥之波瀾顯忠立孝行修言道博施尚仁動微成務智察舞雞爻分封蟻爰初登仕明試以功德加三輔威行九流董師虎據操鈹蟬冕津鄉濟沈物仰平分之恩沂岱邛岷民思後來之政陳蒼反裘之化淮海高墨幘之聲威漸黃支化行赤谷南通舜玉北平堯柳朝鮮航海夜郎款塞然後體道方震雨施雲行漢用戊申晉維庚午增暉前曜獨擅元貞恩若春風惠如冬日履道為輿䇿賢成駟降意韋編神緗帙許商算術王圍射譜南龜異說東馳雜賦任良奕棊羨門式法箴興琴劒銘自盤盂無不若指諸掌尋涇辨渭重以鳳艷風飛鸞文飇竪纖者入無倫大者含元氣韻調律呂藻震玄黃豈俟取讚彥先詢聞雅主至於鹿園深義龍宮奧說遠命學徒親登講肆詞為憲章言成楷式徃復王粲事軼魏儲酬答蔡謨道高晉兩似懸鐘之應響猶衢罇之待酌率爾者踵武逖聽者風聲是使金堅祕法寶冥夕夢無懷不滅華胥夜感自非建慧橋明智劒薰戒香沐定水何以空積忽歷賢刼而終現黍累迴斡蘊珠藏而方傳加以大秦之籍非符八體康居之篆有異六爻二乘始闢譬馬傳兔一體同歸棄犀崇象潤業滋多見思平積本有凝邈了正相因雖談假績不攝單影即此後心還蹤初熖俱宗出倒蓮華起乎淤泥並會集藏明珠曜於貧女性相常空般若無五時之說不生煩惱涅槃為萬德之宗無不酌其菁華撮其旨要採彼玳鱗拾茲翠羽潤珠隋水抵玉崑山每至鶴關旦啟黃綺之儔朝集魚燈夕朗陳吳之徒晚侍皆仰稟神規躬承睿旨爰賜嘉名謂之聯璧聯含珠而可擬璧與日而方升以今歲次攝提星在監德百法明門於茲總備千金不刊獨高斯典合二百二十卷號法寶聯璧雖玉杯繁露若倚蒹葭金臺鑿楹似吞雲夢繹自伏櫪西河攝官南國十迴鳳琯一奉龍筆削未勤徒榮卜商之序稽古盛則文慙安國之製謹抄纂爵位陳諸左方使持節平西將軍荊州刺史湘東王繹年二十七字世誠侍中國子祭酒南蘭陵蕭子顯年四十八字景暢散騎常侍御史中丞彭城劉溉年五十八字茂灌散騎常侍步兵校尉東官侍南琅邪王修年四十二字彥遠吳郡太守前中庶子南瑯邪王規年四十三字威明都官尚書領右軍將軍彭城劉孺年五十五字孝穉太府卿步兵校尉河南褚球年六十三字仲寶中軍長史前中庶子陳郡謝僑年四十五字國美中庶子彭城劉遵年四十七字孝陵中庶子南瑯邪王穉年四十五字孺通宣城王友前僕東海徐喈年四十二字彥邕前御史中丞河南褚澐年六十字士洋北中郎長史南蘭陵太守陳郡袁君正年四十六字世忠中散大夫金華宮家令吳郡陸襄年五十四字師卿中散大夫瑯邪王藉年五十五字文海新安太守前家令東海徐摛年六十四字士繢前尚書左丞沛國劉顯年五十三字嗣芳中書侍郎南蘭陵蕭幾年四十四字德玄雲麾長史尋陽太守前僕京兆韋稜年五十五字威直前國子博士范陽張綰年四十三字孝卿輕車長史南蘭陵蕭子範年四十九字景則庶子吳郡陸罩年四十八字洞元庶子南蘭陵蕭瑱年四十字文容祕書丞前中舍人南瑯邪王許年二十五字幼仁宣城王文學南瑯邪王訓年二十五字懷範洗馬權兼太府卿彭城劉孝儀年四十九字子儀洗馬陳郡謝禧年二十六字休度中軍錄前洗馬彭城劉蘊年三十三字懷芬前洗馬吳郡張孝總年四十二字孝總南徐州治中南蘭陵蕭子開年四十四字景發平西中錄事㕘軍典書通事舍人南郡庾肩吾年四十八字子慎北中記室㕘軍潁川庾仲容年五十七字仲容宣惠記室㕘軍南蘭陵蕭滂年三十二字希舍人南蘭陵蕭清年二十七字元專宣惠主簿前舍人陳郡謝嘏年二十五字茂範尚書都官郎陳郡殷勸年三十字弘善安北外兵㕘軍彭城劉孝威年三十九字孝威前尚書殿中郎南蘭陵蕭愷年二十九字元才並廣弘明集昭明太子蕭統字德施小字維摩武帝長子答雲法師請開講書太子情內典選十僧入玄圃雲為上首既雲請開講令旨解二諦法身義統覽近示知欲見令道義夫釋教凝深至理淵粹一相之道杳然難測不二之門寂焉無響自非深達玄宗精解妙義若斯之處豈易輕辨至於宣揚正教在乎利物耳弟子之於內義誠自好之樂之然鉤深致遠多所未悉為利之理盖何足論諸僧並入法門游道日廣至於法師彌不俟說云欲見餐稟良所未喻想得此意不復多云統和南法雲重請昭明太子開講啟釋法雲啟殿下以生知上識精義入神自然勝辨妙譚出俗每一徃復闔筵心醉真令諸天讚善實使釋梵雨華貧道雖幼知向方而長無成業簉之濫吹聖明而識慙無𨓆者豈不願餐幽致敢祈仰者誠在希聞妙說今猥蒙啟旨未許羣情𨓆思輕脫用深悚懼渴仰有實饑虛非假循思檢願重以祈聞惟希甘露當開用得永祛鄙吝伏願四弘本誓曲允三請慇懃謹啟重答雲法師書重覽來示知猶欲令述義不辨為利具如前言甘露之開彌慙來說若止是略標義宗無為不爾但愧以魚目擬法師之夜耳統和南謝勅賚看講啟臣統啟主書管萬安奉宣勅旨以臣今講竟曲垂勞問伏以正言深奧總一羣經均斗杓以命四時等太陽而照萬國臣不涯庸淺輕敢奉宣莫測天文徒觀玉府慙悚交并寢興無寘仰降中使俯賚灮臨榮荷殊慈靡知啟處不任下情謹附啟事謝聞謹啟謝勅參解講啟臣統啟主書周昂奉宣勅旨𡸁㕘臣今解講伏以至理希夷微言淵奧非所能鑽仰遂以無庸叨茲宣釋將應讓齒反降教胄之恩允宜尚學荷說經之詔竊以挾八威之策則神物莫干服九丹之華則仙徒可役臣仰承皇威訓茲學侶奉揚聖旨洞曉羣儒鼓冶異師陶鈞久滯方使惠施恧其短長公孫罷其堅白王生挫辯既盡神氣法開受屈永隱東峯中使曲臨彌函席仰戴殊恩不知啟處不任下情謹奉啟事謝聞謹啟謝勅賚制旨大涅盤經講疏啟臣統啟後閣應勅木佛子奉宣勅旨垂賚制旨大般涅槃經講疏一部十袠合目百一卷寒鄉覩日未足稱奇採藥逢仙曾何譬喜臣伏以六爻所明至邃窮於幾象四書所總施命止於域中豈有牢籠因果辨斯寶城之教網羅真俗開茲月滿之文方當道洽大千化均百億雲彌識種雨遍身田豈復論唐帝龜書周王策府何待刊寢孟津屏黜丘索甘露妙典先降殊恩揣己循愚不勝慶荷不任頂戴之至謹奉啟謝勅賚制旨大集經講疏啟臣統啟宣詔王慧寶奉宣勅旨垂賚制旨大集經講疏二袠十六卷甘露入頂慧水灌心似闇遇明如饑獲飽伏以非色非欲二界同坊匪文匪理三詮雲集四辯言而未極八聲闡而莫窮俯應天機垂茲聖作同真如而無盡與日月而俱懸但觀寶春山獲珠大海臣實何能恒蒙誘被張奏谷筆豈足陳心抗袖長言未伸歌舞不任喜荷之至謹奉啟謝聞謹啟謝勅賚水犀如意啟藝文作簡文誤臣統啟應勅左右伯佛掌奉宣勅旨垂賚水犀如意一柄式是道義所須白玉照彩方斯非貴珊瑚挺質匹此未珍雕剞既成先被庸薄如蒙漢帝之簪似獲趙堯之印謹仰承威神陳諸講席方使歡喜羅漢懷棄鉢之嗟王式碩儒忻驪駒之辯熊飾寶刀子桓恧其大賚犛牛輕拂張敞慙其舊儀殊恩特降伏深荷躍不任下情謹啟事以聞謹啟並廣弘明集碩藝文作儒東宮上掘得慈覺寺鐘啟一作簡文竊以白亭舊室絕顯禎祥之氣闕里故堂暫聞鐘石之響猶復存諸良史汗彼篆素豈如杏梁遺飾迴成紺殿椒墀昔處仍構寶階啟鐘於殊里記靈文於福地雖魏廟出璽魯祠現璧固以推茲孝感恧此禎契將郭令鄙其開金羊田陋其產玉豈直季武庭樹愧韓起之譽蜀相宅基慙孝安之碣伏惟覽啟增思撫瑞深悲慟切視奩哀喻封篋藝文類聚令旨解二諦義并問答二諦理實深玄自非虛懷無以通其弘遠明道之方其由非一舉要論之不出境智或時以境明義或時以智顯行至於二諦即是就境明義若迷其方三有不絕若達其致萬累斯遣所言二諦者一是真諦一名俗諦真諦亦名第一義諦俗諦亦名世諦真諦俗諦以定體立名第一義諦世諦以褒貶立目若以次第言說應云一真諦二俗諦一與二合數則為三非直數過於二亦名有前後於義非便真既不因俗而有俗亦不由真而生正可得言一真一俗真者是實義即是平等更無異法能為雜間俗者即是集義此法得生浮偽起作第一義者就無生境中別立美名言此法最勝最妙無能及者世者以隔別為義生滅流動無有住相涅槃經言出世人所知名第一義諦世人所知名為世諦此即文證褒貶之理二諦立名差別不同真俗世等以一義說第一義諦以二義說正言此理德既第一義亦第一世既浮偽更無有義所以但立世名諦者以審實為義真諦審實是真俗諦審實是俗真諦離有離無俗諦即有即無即有即無斯是假名離有離無此為中道真是中道以不生為體俗既假名以生法為體南澗寺慧超諮曰浮偽起作名之為俗離於有無名之為真未審浮偽為當與真一體為當有異令旨答曰世人所知生法為體出世人所知不生為體依人作論應如是說若論真即有是空俗指空為有依此義明不得別異又諮真俗既云一體未審真諦亦有起動為當起動自動不關真諦令旨又答真諦寂然無起動相凡夫惑識自橫見起動諦一作理又諮未審有起動而凡夫橫見無起動而凡夫橫見令旨又答若有起動則不名橫見以無動而見動所以是橫又諮若法無起動則唯應一諦令旨又答此理常寂此自一諦橫見起動復是一諦唯應有兩不得言一又諮為有橫見為無橫見令旨又答依人為語有此橫見又諮若依人語故有橫見依法為談不應見動令旨又答法乃無動不妨橫者自見其動丹陽尹晉安王蕭綱諮曰解旨依人為辯有生不生未審浮虛之與不生只是一體為當有異令旨答曰凡情所見見其起動聖人所見見其不生依人為論乃是異體若語相即則不成異具如向釋不復多論又諮若真不異俗俗不異真豈得俗人所見生法為體聖人所見不生為體令旨答即俗知真即真見俗就此為談自成無異約人人辨見自有生不生殊殊下舊有辯字當衍又諮未審俗諦之體既云浮幻何得於真實之中見此浮幻令旨答真實之體自無浮幼惑者橫構謂之為有無傷真實體自玄虗又諮聖人所見見不流動凡夫所見自見流動既流不流異愚謂不得為一令旨答不謂流不流各是一體正言凡夫於不流之中橫見此流以是為論可得成一又諮真寂之體本自不流凡夫見流不離真體然則但有一真不成二諦令旨答體恒相即理不得異但凡見浮虛聖覩真寂約彼凡聖可得立二諦名招提寺慧琰諮曰凡夫見俗以生法為體聖人見真以不生為體未審生與不生但見其異復依何義而得辨一令旨答曰凡夫於無稱有聖人即有辨無有無相即此談一體稱一作構又諮未審此得談一一何所名令旨答曰正以有不異無無不異有故名為一更無異名又諮若無不異有有不異無但見其一云何為二令旨答凡夫見有聖人見無兩見既分所以成二又諮聖人見無無可稱諦凡夫見有何得稱諦得一作能令旨答聖人見無在聖為諦凡夫審謂為有故於凡為諦棲玄寺曇宗諮曰聖人為見世諦為不見世諦令旨答曰聖知凡人見有世諦若論聖人不復見此又諮聖人既不見世諦云何以世諦教化眾生令旨答聖人無惑自不見世諦無妨聖人知凡夫所見故曲隨物情說有二諦又諮聖人知凡見世諦即此凡夫不令旨答此凡即是世諦聖人亦不見此凡又諮聖既不見凡焉知凡見世諦令旨答聖雖自無凡亦能知有凡自謂為有故曲赴其情為說世諦司徒從事中郎王規諮曰未審真俗既不同豈得相即之義令旨答聖人所得自見其無凡人所得自見其有見自不同無妨俗不出真外又諮未審既無異質而有二義為當義離於體為當即義即體令旨答更不相出名為一體愚聖見殊自成異義又諮凡夫為但見俗亦得見真不令旨答止得見俗不得見真又諮體既相即寧不覩真令旨答凡若見真不應覩俗覩俗既妄焉得見真靈根寺僧遷諮曰若第一以無過為義此是讚歎之名真離於俗亦應是讚歎之名令旨答曰即此體真不得言歎第一義諦既更立美名所以是歎又諮無勝我者既得稱讚歎我體即真何故非歎令旨答無勝我者所以得稱讚歎我體即真亦是我真故非讚歎又諮我無過者所以得稱讚歎我是不偽何得非讚令旨答不偽直是當體之名如人體義謂之解義正足稽其實體豈成讚歎稽一作稱又諮此法無能出者焉能即是讚歎焉能一作焉得令旨既云無出非讚如何羅平侯蕭正立諮曰未審俗諦是生法以不令旨答曰俗諦之體正是生法又諮俗既橫見何得有生令旨答橫見為有所以有生又諮橫見為有實自無法實既無法說何為生令旨答即此生法名為橫見亦即此橫見名為生法又諮若是橫見不應有生若必有生何名橫見不應有生一作實自無生令旨答既云橫見實自無生但橫見為有有此橫生實自無生一作不應有生衡山侯蕭恭諮曰未審第一義諦既有義目何故世諦獨無義名令旨答曰世既浮俗無義可辨又諮若無義可辨何以稱諦令旨答凡俗審見故立諦名又諮若凡俗見有得受諦名亦應凡俗見有得安義字令旨答凡俗審見故諦名可立浮俗無義何得強字為義又諮浮俗雖無實義不無浮俗之義既有此浮俗何得不受義名令旨答正以浮俗故無義可辨若有義可辨何名浮俗中興寺僧懷諮曰令旨解言真不離俗俗不離真未審真是無相俗是有相有無相殊何得同體令旨答曰相與無相此處不同但凡所見有即是聖所見無以此為論可得無別又諮既是一法云何得見為兩見既有兩豈是一法令旨答理乃不兩隨物所見故得有兩又諮見既有兩豈不相違令旨答法若實兩可得相違法實不兩人見自兩就此作論焉得相乖又諮人見有兩可說兩人理既是一豈得有兩令旨答理雖不兩而約人成兩約一作令始興王第四男蕭映諮曰第一義諦其義第一德亦第一不令旨答曰義既第一德亦第一又諮直言第一已包德義何得復加義字以致繁複令旨答直言第一在義猶昧第一見義可得盡美又諮若加以義字可得盡美何不加以德字可得盡美令旨答第一是德豈待復加但加義字則德義雙美又諮直稱第一足見其美偏加義字似有所局令旨答第一表德復加義字二美俱陳豈有所局吳平世子蕭勵諮曰通旨云第一義諦世諦褒貶立名真俗二諦定體立名尋真諦之理既妙絕言慮未審云何有定體之旨令旨答曰談其無相無真不真寄名相說以真定體又諮若真無諦無體今寄言辨體未審真諦無相何不寄言辨相令旨答寄言辨體猶恐貶德若復寄言辨相則有累虛玄又諮真諦玄虛離於言說今既稱有真豈非寄言辨相令旨答寄有此名名自是相無傷此理無相虛寂又諮未審此寄言辯體為是當理為不當理令旨答無名而說名不合當理又諮若寄言辨名名不當理未審此寄將何所說一作將作何說令旨答雖不當理為接引眾生須名相說宋熙寺慧令諮曰真諦以不生為體俗諦以生法為體而言不生即生生即不生為當體中相即為當義中相即令旨答云體中相即義不相即又諮義既不即體云何即令旨答凡見其有聖覩其無約見成異就體恒即又諮體既無兩何事須即令旨答若無體無別兩緣見有兩見既兩異須明體即又諮若如解旨果是就人明即令旨答約人見為二二諦所以名生就人見明即此亦何妨始興王第五男蕭曄諮曰真諦稱真是實真不令旨答曰得是實真又諮菩薩會真之時為忘俗忘真不令旨答忘俗忘真故說會真又諮若忘俗忘真故說會真忘俗忘真何謂實真令旨答若存俗存真何謂實真正由兩遣故謂實真又諮若忘俗忘真而是實真亦應忘真忘俗而是實俗令旨答忘俗忘真所以見真忘真忘俗彌見非俗又諮菩薩會真既忘俗忘真今呼實真便成乖理令旨答假呼實真終自忘真兩忘稱實何謂乖理興皇寺法宣諮曰義旨云俗諦是有是無故以生法為體未審有法有體可得稱生既是無法而云何得有生義既一作無令旨答俗諦有無相待而立既是相待故並得稱生又諮若有無兩法並稱為生生義既一則有無無異令旨答俱是凡夫所見故生義得同是有是無焉得不異又諮若有無果別應有生不生令旨答既相待立名故同一生義程鄉侯蕭祗諮曰未審第一之名是形待以不令旨答正是形待又諮第一無相有何形待令旨答既云第一豈得非待又諮第一是待既稱第一世諦待於第一何不名為第二若俗諦是待而不稱第二亦應真諦是待不名第一令旨答若稱第一是待於義已足無假說俗第二方成相待又諮若世諦之名不稱第二則第一之稱無所形待令旨答第一褒真既云相待世名是待直置可知灮宅寺法雲諮曰聖人所知之境此是真諦未審能知之智為是真諦為是俗諦令旨答曰能知是智所知是境智來冥境得言即真又諮有智之人為是真諦為是俗諦令旨答若呼有智之人即是俗諦又諮未審俗諦之人何得有真諦之智令旨答聖人能忘於俗所以得有真智又諮此人既冥無生亦應不得稱人令旨答冥於無生不得言人寄名相說常自有人靈根寺慧令諮曰為於真諦中見有為俗諦中見有令旨答曰於真諦中橫見有有又諮俗諦之有為實為虛令旨答是虛妄之有又諮為當見妄為當見有令旨答見於妄有又諮無名相中何得見有名相令旨答於無名相見有名相所以妄有又諮於無名相妄見為有譬如火熱惑者言冷得就熱中有冷相不若於無相而有名相亦於火中應有此冷令旨答火自常熱妄見有冷此自惑冷熱未嘗異湘宮寺慧興諮曰凡夫之惑為當但於真有迷於俗亦迷令旨答曰於真見有此是迷真既見有俗不成迷俗又諮若使解俗便成解真若不解真豈得解俗令旨答真理虛寂惑心不解雖不解真何妨解俗又諮此心不解真於真可是惑此心既解俗於惑應非惑令旨答實而為語通自是惑辨俗森羅於俗中各解莊嚴寺僧旻諮曰世俗心中所得空解為是真解為是俗解令旨答可名相似解又諮未審相似為真為俗令旨答習觀無生不名俗解未見無生不名真解又諮若能照之智非真非俗亦應所照之境非真非俗若是非真非俗則有三諦令旨答所照之境既即無生無生是真豈有三諦又諮若境即真境何不智即真智令旨答未見無生故非真智何妨此智未真而習觀真境豈得以智未真智而使境非真境宣武寺法寵諮曰真諦不生不滅俗諦有生有滅真俗兩義得言有異談其法體只得是一未審體從於義亦得有二不令旨答曰體亦不得合從於義又諮未審就凡聖兩見得言兩義亦就凡聖兩見得言兩體令旨答理不相異所以云一就凡聖兩見得有二體之殊又諮若使凡者見有聖人見無便應凡夫但見世諦有聖人應見太虛無令旨答太虛亦非聖人所見太虛得名由於相待既由待生並凡所見又諮凡夫所見空有得言是一不令旨答就凡為語有實異無約聖作談無不異有建業寺僧愍諮曰俗人解俗為當解俗參差而言解俗為當見俗虛假而言解俗令旨答只是見俗參差而言解俗又諮俗諦不但參差亦是虛妄何故解參差而不解虛妄令旨答若使凡夫解虛妄即是解真不解虛妄所以名為解俗宅寺敬脫諮曰未審聖人見真為當漸見為當頓見令旨答漸見又諮無相虛懷一見此理萬相並寂未審何故見真得有由漸令旨答自凡之聖解有淺深真自虛寂不妨見有由漸又諮未審一得無相並忘萬有為不悉忘令旨答一得無相萬有悉忘又諮一得無相忘萬有者亦可一得虛懷窮彼真境不應漸見令旨答如來會寂自是窮真淺行聖人恒自漸見又諮若見真有漸不可頓會亦應漸忘萬有不可頓忘令旨答解有優劣故有漸見忘懷無偏故萬有並寂令旨解法身義并問答法身虛寂遠離有無之境獨脫因果之外不可以知知不可以識識豈是稱謂所能論辨將欲顯理不容嘿然故隨從言說致有法身之稱天竺云達磨舍利此土謂之法身若以當體則是自性之目若以言說則是相待立名法者軌則為旨身者有體之義軌則之體故曰法身略就言說粗陳其體是常住身是金剛身重加研覈其則不爾若定是金剛即為名相定是常住便成方所所謂常住本是寄名稱名金剛本是譬說及談實體則性同無生故云佛身無為不墮諸法故涅槃經說如來之身非身是身無量無邊無有足跡無知無形畢竟清淨無知清靜而不可為無稱曰妙有而復非有離無離有所謂法身稱名一作稱曰招提寺慧琰諮曰未審法身無相不應有體何得用體以釋身義令旨答曰無名無相乃無體可論寄以名相不無妙體妙一作妨又諮若寄以名相不無妙體則寄以名相不成無相令旨答既云寄以名相足明理實無相又諮若寄以名相而理實無相理既無相云何有體令旨答寄言軌物何得無體又諮亦應寄言軌物非復無相令旨答軌物義邊理非無相所言無相本談妙體又諮真實本來無相正應以此軌物何得隱斯真實強生言相令旨答真實無相非近學所窺是故接諸庸淺必須寄以言相宅寺法雲諮曰未審法身常住是萬行得不令旨答曰名相道中萬行所得又諮既為萬行所得豈是無相若必無相豈為萬行所得令旨答無名無相何曾有得寄以名相假言有得又諮寔有萬行實得佛果安可以無相全無所得令旨答問者住心謂實有萬行今謂萬行自空豈有實果可得又諮見有眾生修習萬行未審何故全謂為無令旨答凡俗所見謂之為有理而檢之實無萬行又諮經說常住以為妙有如其假說何謂妙有令旨答寄以名相故說妙有理絕名相何妙何有莊嚴寺僧旻諮曰未審法身絕相智不能知絕相絕知何得猶有身稱令旨答曰無名無相曾有何身假名相說故曰法身又諮亦應假名相說是智所照何得不可以知知不可以識識令旨答亦得寄名相慧眼所見又諮若慧眼能見則可以知知若智不能知則慧眼無見令旨答慧眼無見亦無法可見又諮若云無見有何法身令旨答理絕聞見實無法身又諮若無法身則無正覺正覺既有法身豈無令旨答恒是寄言故有正覺正覺既在寄言法身何得定有宣武寺法寵諮曰未審法身之稱為正在妙體金姿丈六亦是法身體一作本令旨答曰通而為論本跡皆是別而為語止在常住又諮若止在常住不應有身若通取丈六丈六何謂法身令旨答常住既有妙體何得無身丈六亦能軌物故可通稱法身又諮若常住無累方稱法身丈六有累何謂法身令旨答眾生注仰妄見丈六丈六非有有何實累又諮若丈六非有指何為身令旨答隨物見有謂有應身又諮既曰應身何謂法身令旨答通相為辨故兼本跡覈求實義不在金姿靈根寺慧令諮曰未審為以極智名曰法身為以全相故曰法身全一作絕令旨答無名無相是集藏法身圓極智慧是實智法身又諮無名無相則無身不身既有法身何謂無相令旨答正以無相故曰法身又諮若以無相故曰法身則智慧名相非復法身令旨答既是無相智慧豈非法身又諮如其有身何名無相若是無相何得有身令旨答於無名相假說法身又諮若假說法身正存名相云何直指無相而謂法身令旨答既於無相假立名相豈得異此無相而說法身靈味寺靜安諮曰未審法身乘應以不令旨答法身無應又諮本以應化故稱法身若無應化何謂法身令旨答本以軌則之體名為法身應化之談非今所軌又諮若無應化云何可軌既為物軌豈無應化令旨答眾生注仰蒙益故云能為物軌化緣已畢何所應化又諮若能益眾生便成應化若無應化何以益物令旨答能生注仰軌則自成何勞至人俯應塵俗又諮既生注仰豈無應化若無應化注仰何益令旨答正由世尊至極神妙特深但令注仰自然蒙祐若應而後益何謂至神不應而益故成窮美若必令實應與菩薩豈殊並廣弘明集昭明集㕘校同泰僧正講詩序大正以貞俗兼解鬱為善歌璡師以行有餘力緣情繼響余自法席既闌便思和寂杼軸二年濡翰兩器大正今春復為同泰建講法輪將半此作方成所以物色不同序事或異昭明集祭達磨大師文達磨以梁大通二年終于元魏以其喪告梁武帝即賵寶玉詔以祭禮供養太子為文其略曰洪惟聖胄大師荷十力之智印乘六通而泛海運悲智於梵方拯顛危於華土佛法正宗記邵陵王蕭綸字世調武帝第六子答皇太子示大法頌啟簡文慈鋒鬱壯妙辯縱橫慧捨兩闕智包三藏故五時之說既陳七處之禮斯聚㭊般若之妙源顯無生之真諦心注八流意舍五忍能使六地震動四花普雨折木盖鱗開羅散翮香烏步花訓遊於雲圃瑞雀飛𤨔翔舞於風前高門洞啟不同銅馬之飾寶殿霞開寧假鳳凰之瑞雖復長卿壯辭曾何足數子雲妙句比此蔑如揚州僧正智寂法師墓誌銘緣城虛假欲海漂深三相難久八風易侵寔惟上德為龍為灮凝情內瑩被采外揚微言折角精義解頤有同商生譬彼名醫妙法方永慧水停滋五通軫慕四眾增悲並藝文類聚設無礙福會教僚紀大士廣濟義非為己導弘羣生種種方便所以虛己樂靜表之內經確乎難拔著自外典又加獨徃斯意足論隱不隔真乃為菩薩廬山東林寺禪房智表法師德稱僧傑實號人龍懷道守素多歷年所不為事屈不為時伸上下無常一相無相遂能捨彼耆闍來遊垢濁興言一面定交杵臼余以薄德謬臨大邦教義未聞貴賢總至昔綺季之出漢年巢許之興唐日茲迺聖主流慈天澤滂被異人間出復在此辰不勝舞蹈帝之恩普也剋今月十日於栖賢寺設無礙會并致敬開士躬諮勝福下筵餐道凡厥民隸爰及庶士罔不率從咸皆請業上答乾慈永同彼岸外依事宣行廣弘明集欽定四庫全書
