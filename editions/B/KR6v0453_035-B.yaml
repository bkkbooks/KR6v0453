body:
  text: 明梅鼎祚輯後周文帝姓宇文氏諱㕘字黑獺代郡武川人仕魏大家宰子間帝纂魏追尊僧實為昭玄三藏詔實姓程咸陽靈武人周太祖以魏大統中下詔發談奏議事無不行按此周太祖尚未踐阼詔追稱也師目麗重瞳偏同虞舜背隆傴僂分似周公德宇純懿軌量難模可昭玄三藏續高僧傳明帝諱毓字統萬突文帝子修起寺詔制詔孝感通神瞻天罔極莫不布金而構祗園流銀而成寶殿方知鹿苑可期鶴林無遠敢緣雅頌仰藉莊嚴欲使功侔天地興歌不日可令太師晉國公總監大陟岵大陟屺二寺營造廣弘明集武帝諱邕字禰羅突文帝子弒明帝篡立二教鐘銘并序天和五年歲次攝提五月丙寅造鐘一口冶昆吾之石練若溪之銅郢匠鴻化茲神器雖時屬蕤賓而調諧夷則故春秋外傳曰所以詠歌九則平民無二弘宣兩教同歸一揆金石冥符天人咸契九宮九地遙徹洞玄三千大千遠聞邊際銀閣應供延法侶而尋聲金闕降真候仙冠而聽響式傳萬古迺勒銘云實際遐曠通玄洞微化緣得業造理因機靈圖降彩慧日垂暉金河霧集銀澗雲飛其一九霄仙籙五嶽真文智烟遐照禪林遠熏金皷入夢瓊鐘徹雲音調冬立響召秋分其二二教並興雙鑾同振遠赴天霜遙虧地鎮陜河浮影漢溪傳韻聽響弘法聞聲起信其三般若無底重玄有門長開久暗永拔沉昬不求正覺莫會天尊唯全智海先度黎元其四廣弘明集曇崇為周國三藏詔崇姓孟咸陽人聲馳隴塞周武特所欽承下勑崇禪師德行無玷精悟獨絕所預學徒未聞有犯當是導以德義故則眾絕形清可為周國三藏並任陟岵寺主續高僧傳敘廢立義命章周承二年平齊便行廢教勑前修大德並赴殿集武帝自昇高座敘廢立義命章淨影寺釋慧遠答詔抗論不從朕受天命寧一區宇世弘三教其風逾遠考定至理多愆陶化今並廢之然其六經儒教之弘政術禮義忠孝於世有宜故須存立且自真佛無像遙敬表心佛經廣嘆崇建圖塔壯麗修造致福極多此實無情何能恩惠愚人嚮信傾竭珍財徒為引費故須除蕩故凡是經像皆毀滅之父母恩重沙門不敬悖逆之甚國法不容並退還家用崇孝始朕意如此諸大德謂理何如廣弘明集宣帝諱贇字乾伯武帝子沙門安置行道詔大成元年詳任道林下弘建玄風三寶尊重特宜修敬法化弘廣理可歸崇其舊沙門中德行清高者七人在正武殿西安置行道又勑大象元年二月佛法弘大千古共崇豈有沉隱捨而不行自今已後王公已下并及黎庶並宜修事知朕意焉陟岵寺行道詔大象元年四月佛義幽深神奇弘大必廣開化儀通其修行崇奉之徒依經自檢遵道之人勿須剪髮毀形以乖大道宜可存鬚髮嚴服以進高趣今選舊沙門中懿德貞潔學業沖博名實灼然聲望可嘉者一百二十人在陟岵寺為國行道擬欲供給資需四事無乏其民間禪誦一無有礙並佛道論衡法藏為陟岵寺主勑法藏姓荀潁川人周武廢法先期入紫葢山至大象元年下山謁帝下勑朕欲為菩薩治化此僧既從紫葢山來正合朕意宜令長髮著菩薩衣冠為陟岵寺主續高僧傳宇文護字薩保文帝兄子封晉國公位大冢宰遺僧亡名書亡名俗姓宋南郡人本名闕殆長富才華事梁元帝梁亡出家及歸周為夏州三藏朝省以名器宇有經國之量或以恩威加之或以情異轉之曾無易節護遺書名答之護體其難拔乃與書迎還咸陽不知所終言念欽屬未敘企積道體休愈無虧慮耶葢能仁處世志存匡救非先輪迴獨尚茲善既道亞生知才高七步豈虛緇染沈流當途但靈廓妙理三業同臻冀思莫二皁白非感耳悕解偏執讚我時朝匪惟貞俗俱抽亦是彼我一貫故令往白念報雅懷亡名答宇文護書辱告深具懷抱寒暑異域苦樂殊心輒畧常談且陳事實貧道稟質醜陋恒嬰疾惱因傴成恭惟道是務不曾妻息五十二年自捨俗緣十有五載萬人歸國皆停都邑羸病一僧獨流荒裔無罪可罰無能可使百慮九思是所未喻文多不載又𠛱六不可十歎息援據事敘綸貫始終書畧結云沙門持戒心口相應所𠛱六條若有一誑生則蒼天厭之死則鐵鉗拔之洋銅灌之仰戴三光行年六十不欺闇室況乃明世且鄉國殄喪宗戚衰亡貧道何人獨堪長久誠得𭣣迹巖中攝心塵外支養殘命敦修慧業此本志也寄骸精舍乞食王城任力行道隨緣化物斯次願也如其不爾獨處丘壑安能憒憒久住閻浮地乎大唐內典厭之下有云靈神殛之洋作融再與亡名書法師秉心彌固栖游世表玄圭啟運不屈伯夷之節蒼精御歷豈損嘉遁之志今遣往迎並續高僧傳庾信字子山南陽新野人仕梁散騎常侍入周進開府陝州弘農郡五張寺經藏碑葢聞如來說法萬萬恒沙菩薩轉輪生生世界豈直優波提舍祇夜修多而已哉是以熙連禪河質多羅樹七處八會三清四說皮紙骨筆木葉山花象負之所未勝龍藏之所不盡雖復銀函東度金㲲南翻秦景遙傳竺蘭私記譬猶得海水之一珠不下崑山之片玉若夫法雲深藏師子雷音梵志往生聲聞說戒雪山羅漢之論鷲嶺菩提之法本無極際何可勝言弘農五張寺者南陽張元高寓居此地昔者千金之族見徙五陵大姓之民移家六郡葢其流也元高五子負荷遺訓離經辨志並是成名入室生光咸能顯德加以尊承慧業敬受法門兄弟同居共捨為寺伽藍肇建即以五張為名是知城居趙信仍名趙信之城殿入蕭何即號蕭何之殿加以象馬無恡衣裘是捨春園柳路變入禪林蠶月桑津迴成定水平輿雖盛豈可獨擅二龍扶風最良不得專稱五馬寺主三藏大法師法映邑主洛州刺史張隆等財行法檀身心罄竭兼化鄉邑道俗數千敬造一切德輪見成三百餘部琅笈雲書金繩玉檢削蒸栗之簡裝酸棗之珠並入香城咸封禪閣坐堂伏檻羌非湘水之神緣房紫菂足擬恭王之殿高掌西望長河北臨鼎氣常浮爐烟咸起戶牖寥廓吹萬龍門之風梁棟崢嶸落實河源之樹僧徒雲集不遠燉煌之城學侶相奔更合華隂之市兩陜昔分實基王化二陵今阻翻馳羽檄虞公屈產交亂風塵召伯甘棠凋零霜露雖復兼能共治未遣渡河之獸烽柝是警實擾移關之民是以法王御世天人論道汲引四流周圓五怖故能調伏怨憎消除結縛法水津梁得無砥柱之難香山轍迹非復終南之險天子命我試守此邦墨突未黔孔席無暖纔臨都尉之境即有樓船之役既而南風不競北道言旋幕府既開邦君且止鄉俗耆老依然此別屬茲法事須余制文聊以課虛為銘云爾舍衛之國祇樹之園三明極地八會窮源連河競說勝辨爭論波提東度秪夜南翻非空即色離相無言達人止是獨悟重昬身雖繫馬心避騰猿禪棲却月義殿翔鵾迴風香葢反露珠幡西臨砥柱東背轘轅河鳴陽硤山響蘇門翔禽歌囀流澗絃喧度河餘獸移關舊村昔為畿服今成塞垣城疑廣武地似樓煩爟烽並照象馬單奔無鍾襲莒有雨圍原不資十方誰釋三怨風傾地柱火及天元銀鈎永固金牒長存封君馬首方事南蕃言從楊僕請謝劉昆劉昆用後漢劉昆虎渡河事英華改劉琨誤秦州天水郡麥積崖佛龕銘並序崖一作山麥積崖者乃隴底之名山河西之靈岳高峯尋雲深谷無景方之鷲島迹遁三禪譬彼鶴鳴虛飛六甲鳥道乍窮羊腸或斷雲如鵬翼忽已垂天樹若桂華翻能拂日是以飛錫遙來度杯遠至疏山鑿洞鬱為淨土拜燈王於石室乃假馭風禮花首於山龕方資控鶴大都督李允信者藉於宿植深悟法門乃於壁之南崖梯雲鑿道奉為亡父造七佛龕似刻浮檀如攻水玉從容滿月照曜青蓮影現須彌香聞忉利如斯塵野還開說法之堂猶彼香山更對安居之剎昔者如來追福有報恩之經菩薩去家有思親之供敢緣斯義乃作銘曰鎮地鬱盤基乾峻極石關十上銅梁九息百仞崖橫千尋松直隂免假道陽烏飛翼載疏山穿龕架嶺糺紛星漢迴旋光景壁累經文龕重佛影彫輪月殿刻鏡花堂橫鑴石壁闇鑿山梁雷乘法鼓樹積天香潄泉珉谷吹塵石牀集靈真館藏仙丹府芝洞秋房檀林春乳氷谷銀沙山樓石柱異嶺共雲同峯別雨冀城餘俗河西舊風水聲幽咽山勢崆峒法雲常在慧日無窮方域芥盡不變天宮並文苑英華王褒字子淵琅邪臨沂人仕梁左僕射入周終宜州刺史京師突厥寺碑夫六合之內存乎方冊四天之下聞諸象教百億閻浮塵沙算而不盡三千日月世界數而無邊至於周星夕隕漢宮宵夢身高梵世力減須彌應現十方分身百佛上極天中下窮地際轉法輪於稔國留妙象於罽賓至於善見神通瓶沙瑞相波斯鑄金優填雕木莫不歸依等覺迴向佛乘棄形骸而入道捨國城而離俗突厥大伊尼溫本汗夏后餘基惟天所置威加窮髮兵歷無革小大當戶左右賢王麟膠角觸之弓鷲羽射雕之箭跨蔥嶺之酋豪靡不從化踰天山之君長咸皆屬人敦信契國寶親鄰太祖文皇帝道被寰中化覃無外提羣品於萬福濟蒼生於六道大冢宰晉國公功高寅亮位隆輔命司空而度地監匠人而置臬帶一條之逸陌面九市之通圖本緹錦雕楹礱密香隨微雨自灑風塵幡雜天花常調𮈔竹四禪大患淨界無毀六殊芬盡法身常住銘曰七華妙覺三空勝境意樹已雕心猿斯靜靈城偃色空衣滅影索隱窮源振衣提領善行寺碑葢聞在天成象羣星仰於北辰在地成形百川趨於東海是知璿璣盈縮並運天樞江漢朝宗爭𤨔地軸塵沙日月同渤澥之輪廻百億鐵圍等閻浮之數量章亥步驟豈盡世界之邊隸首忽微寧窮刧海之算象牛桷力方十行之堦梯免馬渡河譬三乘之等級定水壞須彌之山智炬燃金剛之剎敬表六和現沙門之進止永乘四教示聲聞之律儀至於千疊火然鵠林變色四禪災起鴿影傳輝羽林出使漢開濯龍之祀桑門傳譯晉虔洛陽之拜並藝文類聚周經藏願文年月日某和南云云葢聞九河疏迹策蘊靈丘四徹中繩書藏羣玉亦有青丘紫府三皇刻石之文綠檢黃繩六甲靈飛之字豈若如來秘藏譬彼明珠諸佛所師同夫淨鏡鹿苑四諦之法尼園八犍之文香山巨力豈云能負以歲在昭陽龍集天井奉為云云奉造一切經藏始乎生滅之教訖於泥洹之說論議希有短偈長行青首銀函玄文玉匣陵陽餌藥止觀仙字關尹望氣裁受玄言未有龍樹利根看題不徧斯陀淺行同座未聞盡天竺之音窮貝多之葉灰分八國文徙罽石盡六銖書還大海仰願過去神靈乘茲道力得無生忍具足威儀又願國祚遐長臣民休慶四方內附萬福現前六趣怨親同登正覺廣弘明集戴逵廣弘明作晉戴逵誤續高僧傳云時以逵即晉譙國戴逵非也晉太元十二年徵逵不久卒梁大通三年命公方生經一百四十三載又非濟北明矣貽仙城慧命禪師書慧命姓郭太原晉陽人深味禪心慧聲遐被居河陽仙城山善光寺有菩薩戒弟子濟北戴逵名高諸國乃貽書於命命答之鼎按書有云渚宮淪廢將歷二紀又云及乎從仕留連文翰則逵本仕梁元帝時梁亡歸周藝文有隋戴逵太子箴是復入隋或為東宮官也菩薩戒弟子戴逵貽書仙城命師座下竊以渭清涇濁共混朝宗之源松長箭短同秉堅貞之質幸賴含靈五常理宜範圍三教是以闕里儒童闡理經於洙濟苦縣迦葉遷妙道於流沙雖牢籠二儀葢限兹一世豈如興正法於鹿苑蕩妄想於鷲山半滿既陳權實斯顯誠教有淺深人無內外禪師德聲遠震行高物表攝受四依因牧羊而成誦負笈千里歷龍宮而包括故能內貫九部總雪山之秘藏外該七畧備璧水之典墳支遁天台之銘竺真羅浮之記曇賦七嶺汰詠三河寶師妙析莊生璩公著論爰集若吞雲夢如指諸掌加以妙持淨戒如護明珠善執律儀譬臨懸鏡稟羅云之密行踵賔頭之福田撫挹定水便登覺觀高䕃禪枝將逾喜捨是以不遠瀟湘來儀沔陸植杖龍泉仍為精舍迴車馬谷即創伽藍鑿嶺安龕詎假聚沙成塔因山搆苑無勞布金買地開士雲會袂似華隂法侶朋衝眾齊稷下禪室晨興時芳杜若支提暮啟暫入桃源香山梵響將阮嘯而相發日殿妙音與孫琴而齊韻紫葢貞松仍麾上辨洪崖神井即瑩高心故以才堪買山德邁同輦崇峯景行牆仞懸絕弟子業風鼓慮欲海沈形洎渚宮淪覆將歷二紀晝倦坐馳夜悲愕夢未能忘懷彼我歸軫一乘遣蕩胸襟朗開三達既念鼠藤彌傷鳥繫昔在志學家傳賜書五禮優柔三玄饜飫頗絕韋編構述餘緒爰登弱冠捃摭百家及乎從仕留連文翰雖未能探龍門而梯會稽賦鷦鷯而詠鸚鵡若求其一介亦髣髴古人但深悟聚泡情悲交臂常欲蟬蛻俗解貪味真如一日鄖城訊修隗館屈膝情欣繫韈遇同進履未盡開襟遽嗟飄忽尋望拂衣世網脫屣牽絲滄浪濯纓漢隂抱甕行餐九轉用遣幽憂漸悟三空將登苦忍仙梁觀玉不廢從師深澗折桃無妨請益所希彌天勝氣乍酬鑿齒雁門高論時答嘉賓冬煖如春願珍清軌室邇人遐彌軫襟帶餘辭殘簡望回金玉正法續高僧傳作法輪馬谷作駕首瑩作鎣邁作望釋慧命酬戴先生書幽林沙門釋慧命酬書濟北戴先生夫一真常湛徼妙於是同玄萬聖乘機違順以之殊迹是以西關明道東野談仁雕樸改工有無異軫今若括此二門原茲兩教豈不歸宗三轉會入五乘藉淺之深資權顯實斯若池分四水始則殊名海控八河終無別味檀越幼挺奇才夙懷茂緒華辭卓世雅至參玄智涉五明學兼三教益矣能忘蹈顏生之逸軌損之為道慕李氏之玄蹤雖復六經該廣百家繁富聖賢異派儒墨分流或事曠而文殷或言高而旨遠莫不納如瓶受說似河傾明鏡匪疲洪鐘任扣子建挹以奇文長𡖖恧其高趣故雖秦楚分墟周梁改俗白眉青葢龜玉之價弗踰栖鳳臥龍魚水之交莫異加以識鑒苦空志排塵俗形雖廊廟器乃江湖是以屬歎牽絲興言世網辭同應陸調合張嚴嗟朱火之遽傳愍清波之速逝方應濯足從道洗耳辭榮九轉充虛四禪排疾然後尋八正以味一真解十纏而遣三患斯之德也寧不至哉貧道識鏡難清心塵易壅定慙華水戒非草繫才侔撤燭學謝傳燈內有愧於德充外無狎於人世是以淹滯一丘寓形蓬柳端居千仞託志筠松測四序於風霜候三旬於朓魄至乃夜聞山鳥仍代九成晝視遊魚聊追二子蓽戶敝衿既在原非病朱門結駟亦於我如雲所歎藤鼠易侵樹猿難靜勞想鷲頭倦思雞足至於林彫秋葉曾無獨覺之明谷響春鶯終切寡聞之歎忽承來問曲見光譽幽氣若蘭清音如玉誠復溢目致歡而實撫膺多愧雖識謝天池未辨北溟之說而事同泥井慙聞東海之談所冀伊人於焉加我黃石匪遙結期明旦白駒可縶用永終朝善敬清猷時因素札言不洗意報此何伸並廣弘明集臥續高僧傳作虬誤加作好終作今甄鸞笑道論并啟武帝天和四年廣集道俗親量三教優劣廢立勑司隸大夫甄鸞詳佛道二教鸞啟上笑道論三卷三十六條文極詳據事多激揚帝以為傷蠧道士於殿庭焚之臣鸞啟奉𢽟令詳佛道二教定其先後淺深同異臣不揆疎短謹具錄以聞臣竊以佛之與道教跡不同出沒隱顯變通亦異幽微妙密未易詳度且一往相對佛者以因緣為宗道者以自然為義自然者無為而成因緣者積行乃證守本則事靜而理均違宗則意悖而教偽理均則始終若一教偽則無所不為案老子五千文辭義俱偉諒可貴矣立身治國君民之道富焉所以道有符書厭詛之方佛禁怪力背哀之術彼此相形致使世人疑其邪正此豈大道自然虗寂無為之意哉將以後人背本妄生穿鑿故也又道家方術以昇仙為神因而誑惑偷潤目下昔徐福欺妄分國於夷丹文成五利妖偽於漢世三張詭惑於西梁孫恩搔擾於東越此之巨蠧自古稱誣以之匡政政多邪僻以之導民民多詭惑騐其書典卷卷自違論其理義首尾無取昔行父之為人也見有禮於其君者敬之如孝子之養父母見無禮於其君者惡之如鷹鸇之逐鳥雀宣尼云君子之事上也進思盡忠退思補過將順其美匡救其惡故上下能相親也春秋傳曰君所謂可而有否焉臣獻其可以去其否臣亦何人奉敕降問敢不實答其道德二卷可為儒林之宗所疑紕繆者去其兩端請量刪定案五千文曰上士聞道勤而行之中士聞道若存若亡下士聞道大笑之不笑不名為道臣輒率下士之見為笑道論三卷合三十六條三卷者笑其三洞之名三十六條者笑其經有三十六部戰汗上呈心魂失守周天和五年二月十五日前司隸母極縣開國伯臣甄鸞啟造立天地一太上老君造立天地初記稱老子以周幽王德衰欲西度關與尹喜期三年後於長安市青羊肝中相見老子乃生皇后腹中至期喜見有賣青羊肝者因訪見老子從母懷中起頭鬢皓首身長丈六戴天冠捉金杖將尹喜化胡隱首陽山紫雲覆之胡王疑妖鑊煑而不熱老君大瞋考殺胡王七子及國人一分並死胡王方伏令國人受化髠頭不妻受二百五十戒作吾形像香火禮拜老子遂變形左目為日右目為月頭為崑崙山髮為星宿骨為龍肉為獸腸為虵腹為海指為五嶽毛為草木心為華葢乃至兩腎合為真要父母臣鸞笑曰漢書云長安本名咸陽漢祖定天下將都雒邑因婁敬之諫乃歎曰朕當長安於此因爾名之周幽王未有何得老子預知長安與尹喜期乎又案三天正法混沌經云混沌之始清氣為天濁氣為地便有七曜萬像之形其來久矣豈有化胡之後老子方變為日月山川之類乎若爾者是則幽王之前天地未生萬物云何道經有三皇五帝三王乎然則天地起自幽王矣又造天地記云崑崙山高四千八百里上有玉京山大羅山各高四千八百里三山合則高一萬四千四百里又廣說品云天地相去萬萬五千里計紫微宮在五億重天之上是則高於崑崙山數百萬里而老君以心為華葢肝為青帝宮脾為紫微宮頭為崑崙山不知老君何罪倒豎於地頭在下肝在上以顛倒故見亦倒乎以長安為度關之年幽王為開闢之歲將以化物詎可承乎年號差舛二道德經序云老子以上皇元年丁卯下為周師無極元年癸丑去周度關臣笑曰古先帝王立年無號至漢武帝創起建元後王因之遂至今日上皇孟浪可笑之深又文始傳云老子從三皇已來代代為國師化胡又云湯時為錫壽子周初為郭叔子既為國師應傳典籍何為不述但列伊尹傳說呂望康邵之人乎而傳說者唯注老子為柱下史道家注為周師便是俗官如何史傳不說又上皇元年歲在丁卯計姬王一代七百餘年未聞上皇之號檢諸史傳皆云老子以景王時度關魯哀公十六年孔丘卒即周敬王時敬王即景王之子景王即幽王之後一十餘世此則孔老同時而化胡經乃云幽王之日度關不聞更返何得與孔子相見乎化胡又云為周柱史七百年計周初至幽王止有三百餘年何得妄作然上皇之年道門詭號故靈寶云我於上皇元年半劫度人其時人壽萬八千歲如何超取半劫前號將來近世用乎一何可笑且上皇無極並是無識穿鑿作者欲神其術仍以年號加日冀有信者從之又云代代為國師葛洪神仙序中具說前聖人既出匡救為先而夏桀陵虐塗炭生民成湯武丁思賢若渴老子何以賢君不輔虐政不革修身養性自守而已期頤將及自知死至潛行西度獨為尹說直令讀誦不勸授人身死關中墳隴見在秦佚弔之三號而出究前傳經後人妄論雖曰尊崇翻成辱道氣為天人三太上三元品云上元一品天宮元氣始凝三光開明青黃之氣置上元三宮第一宮名玄都元陽七寶紫微宮明則有青元始陽之氣總主上真自然王宮靈寶上皇諸天帝王上聖大神其宮皆五億五萬五千五百五十五億萬重青陽之氣其中神仙官僚人眾各有五億五萬乃至如上萬重皆結自然清元之氣而為人也其九宮重數官僚人眾皆同紫微臣笑曰三天正法經云天光未朗蔚積未澄七千餘劫玄景始分九氣存焉一氣相去九萬九千九百九十里青氣高澄濁混下降而九天真王元始天王生於九氣之中氣結而形焉便有九真之帝皆九天清氣凝成九字之位三元天人從氣而生在洞房宮玉童玉女各三千而侍以天為父以氣為母生於三元之君又案靈寶罪報品云太上道君禮元始天尊問十善等法於是天尊命召神仙各說因緣恒沙得道已成如來其未成者亦如恒沙又文始傳云天堂對地獄善者升天惡者入地若如此說理則不然何者元始天王及太上道君諸天神人皆結自然清元之氣而化為之本非修戒而成者也彼本不因持戒而成者何得令我獨行善法而望得之乎又案度人本行經云太上道君言我無量劫度人無數元始天尊以我因緣之勳賜我太上之號推此有疑如有無生成品云空為萬物母道為萬物父此則先有於道乃有眾生然此為道之父非眾生所作道既如此眾生何用修善而作乎又道生萬物生物之初是則始也我既始生未有染習何得有六道四生苦樂之別乎又不可也又云眾生神識本來自有非道生者道既能生萬物神識豈非物乎又不可也結土為人四三天正法經云九氣既分九真天王乃至三元夫人三元之君太上道君於是而形逮至皇帝始立生民結土為像於曠野三年能言各在一方故有傖秦夷羌五情合德五法自然承上真之氣而得為人也臣笑曰三元品善惡業對皆由一身又文始傳云若婬盜不孝死入地獄受五苦八難後生六畜邊夷之中推此而言乖違太甚且皇帝土像之日經於三年上真氣入乃能言語此上清之氣與太上同源論先未有惡善何為入土像中即墮八難為蠻夷乎此土為像先亦無因云何造作之後乃有中邊之別乎又上真之氣為癡為黠若其癡也不應入土能言如其黠也應識五苦八難如何不樂善樂而貪為苦難乎推此諸條可笑之深也五佛竝出五文始傳云老子以上皇元年下為周師無極元年乘青牛薄板車度關為尹喜說五千文曰吾遊天地之間汝未得道不可相隨當誦五千文萬遍耳當洞聽目當洞視身能飛行六通四達期於成都喜依言獲之既訪相見至罽賓檀特山中乃至王以水火燒沈老子乃坐蓮華中誦經如故王求哀悔過老子推尹喜為師語王曰吾師號佛佛事無上道王從受化男女髠髮不娶於妻是無上道承佛威神委尹喜為罽賓國佛號明光儒童臣笑曰廣說品云始者國王聞天尊說法與妻子俱得須陀洹果清和國王聞之與羣臣造天尊所皆白日升天王為梵天之首號玄中法師其妻聞法同飛為妙梵天王後生罽賓號憤陀力王殺害無道玄中法師須化度之乃化生李氏女之胎八十二年剖左腋生而白首經三月乘白鹿與尹喜西遊隱檀特三年憤陀力王獵見便燒沈老子不死王伏便剃髮改衣姓釋名法號沙門成果為釋迦牟尼佛至漢世法流東秦又文始傳老子化胡推尹喜為師而化胡消冰經云尹喜推老子為師文始傳云吾師號佛佛事無上道又云無上道承佛威神委喜為佛推此眾途師弟亂矣何名教之存乎又化胡消冰經皆言老子化罽賓身自為佛廣說品憤陀力王老之妻也得道號釋迦牟尼佛即秦漢所流者玄妙篇云老子入關至天竺維衛國入於夫人清妙口中至後年四月八日剖左腋而生舉手曰天上天下唯我為尊三界皆苦何可樂者尋罽賓一國乃有五佛俱出一是尹喜號儒童者二是老子化罽賓者三老子之妻憤陀王號釋迦者四老子在維衛作佛亦號釋迦五白淨王子悉達作佛復號釋迦案文始傳云五百年一賢千年一聖今五佛竝出不覺煩乎若言聖人能分身化物說經亦必多方何為老化則多經唯二卷不變至於儒童尹喜憤陀佛經無聞於今但是白淨王子所說以此推之老喜為佛虛妄可笑且老經秘說不許人聞前後相番誠有遠意然老子能作佛止是一人道士不知奉佛惑之甚矣如父為道人子為道士豈以道人故而不認其父乎五練生尸六五練經云滅度者用色繒天子一匹公王一丈庶民五尺上金五兩而作一龍庶民用鐵五色石五枚以書玉文通夜露埋深三尺女青文曰九祖幽魂即出長夜入光明天供其厨飯三十二年還其故形而更生矣臣笑曰三元品中天地水三宮九府九宮一百二十曹罪福功行考官書之無有差錯善者益壽惡者奪算豈有不因業行直用五色繒而令九祖幽魂入光明天三十二年還故形耶不然之談於斯可見計五練之文出天地未分之前至今亦應用者則三十二年後穿冢而出耳目所知何為羲皇已來不聞道士死屍九祖從地出者不然之狀又可笑也今郊野古冢亦有穴開焉非道士祖父更生之處乎亦可啟齒觀音侍老七有道士造老像二菩薩侍之一曰金剛藏二曰觀世音又道士服黃巾帔或以服帊通身被之偷佛僧袈裟法服之相其服黃帔乃是古賢之衣橫披加前兩帶者今悉削除學僧服像臣笑曰案諸天內音八字文曰梵形落空九靈推前天真皇人解曰梵形者元始天尊於龍漢之世號也至赤明年號觀音矣又案蜀記云張陵避瘧丘社中得呪鬼之術自造符書以誑百姓為大蛇所吞弟子恥之云白日昇天陵子衡為係師衡子魯為嗣師以祖妖法惑亂天下漢書云劉焉以魯為督義司馬遂殺漢中太守蘇固便得漢中鬼道化人時傳黃衣當王魯遂令其部眾改著黃衣巾帔代漢之徵自爾至今黃服不絕像服沙門良可悲也且立身之本忠孝為先子像父侍天地不立觀音極位大士老子不及大賢而令祖父立侍子孫是不孝也又襲張魯逆人之服是不忠也既挾不忠不孝何足踵焉佛生西陰八老子序云隂陽之道化成萬物道生於東為木陽也佛生於西為金隂也道父佛母道天佛地道生佛死道因佛緣並一隂一陽不相離也佛者道之所生大乘守善道者自然無所從生佛會大坐法地方也道會小坐法天圓也道人不兵者乃是隂氣女人像也故不加兵役道作兵者可知道人見天子王侯不拜像女人深宮不干政也道士見天子守令拜者以干政為臣僚也道會飲酒者無過也佛會不飲以女人飲酒犯七出也道會不齋以主生生須食也佛會持齋以主死死不食又以女人節食也道人獨臥以女人等守一也道士聚宿故無制也臣笑曰文始傳云道生東木男也佛生西金女也今以五行推之則金能刻木木以金為官鬼金以木為妻財推此則佛是道之官鬼道是佛之妻財也又云道生佛者理則不然隂陽五行豈有生金之木故知道不生佛道人大坐以是道之官府道士小坐以上逼於官也道人不兵租者以本王種故免也道士庶賤兵租是常道經若此若免兵租便違道教又靈寶大誡云道士不飲酒不干貴如何故違犯大誡乎後之紜紜全無指的又云道士以齋為死法故不齋者何不飽食終日養此形骸而興絕粒服氣以求長生之術乎卒不見之終為捕影之論矣又云道人獨臥道士聚宿據此合氣黃書不亦妄乎日徑不同九文始傳云天去地四十萬九千里日月直度各三千里周迴六千里天地午子相去九千萬萬里夘酉西隅亦令轉形濟苦經云崑崙山高一萬五千里臣笑曰依濟苦經云天地相去萬萬五千里與前文始全所不同文始傳云日月周圍六千里徑三千里據法則圍九千里如何但止六千耶又天圓地方道家恒述今四隅與方等量則天地俱圓矣化胡云佛法上限止極三十三天不及道之八十一天上也又云崑崙山九重重相去九千里山有四面面有一天故四九三十六天第一重帝釋居之今計崑崙山高一萬五千里而有九重重高九千則高八萬一千而言萬五千者何太乖角大可笑也崑崙飛浮十文始傳云萬萬億萬萬歲一大水崑崙飛浮爾時飛仙迎取天王及善民安之山上復萬萬億萬萬歲大火起爾時聖人飛迎天王及人安於山上臣笑曰濟苦經云天地劫燒洞然空蕩清氣為天濁氣為地乃使巨靈胡亥造立山川日月如前崑崙山飛浮容可迎人安山之上若天地洞然山為火焚義不獨立如何迎取王人安山上乎又度人妙經云五億重天之上大羅之天有玉京山菑所不及計太上慈愍何不迎之以在玉京乎若看死不迎是不慈也若不能迎是欺詐也又度人本行經云道言我隨劫生死然太上道君居大羅之上菑火不及猶云隨劫生死自餘飛仙如何迎取天王善人安於山上令免死者深大愚駭又可笑也法道立官十一五符經云中黃道君曰天生萬物人為貴也人身包含天地無所不法立天子置三公九卿二十七大夫八十一元士九州百二十郡千二百縣也膽為天子大道君脾為皇后心為太尉左腎為司徒右腎為司空封八神及臍為九卿珠樓神十二胃神十二三焦神三合為二十七大夫四肢神為八十一元士合之百二十以法郡數也又肺為尚書府肝為蘭臺府臣笑曰檢道經州縣之名文似近代所出古縣大而郡小見於春秋及周書洛誥今反以郡大於縣是則非春秋已前道經乎誣罔迷謬不可觀而可笑也稱南無佛十二化胡經云老子化胡王不受其教老子曰王若不信吾南入天竺教化諸國其道大興自此已南無尊於佛者胡王猶不信受曰若南化天竺吾當稽首稱南無佛又流沙塞有加夷國常為劫盜胡王患之使男子守塞常憂因號男為優婆塞女子又畏加夷所掠兼憂其夫為夷所困乃因號優婆夷臣笑曰梵言南無此言歸命亦云救我梵言優婆塞此言善信男也優婆夷者云善信女也若以老子言佛出於南便云南無佛者若出於西方可云西無佛乎若言男子守塞可名憂塞女子憂夫恐夷可名為憂夷未知婆者復可憂其祖母乎如此依字釋詁醜拙困辱大可笑鳥跡前文十三洞神三皇經稱西域仙人曰皇文者乃是三皇已前鳥跡之始文章也又云三皇者則三洞之尊神大有之祖氣天皇主氣地皇主神人皇主生三合成德萬物化生臣笑曰南極真人問事品稱靈寶真文三十六卷在玉京山玄臺玉室真文大字滿中天地淪沒萬成萬壞真文獨明此之真文即三洞文也三皇即三洞之尊神必不在三洞之後爾時未有鳥獸何得云三皇已前鳥跡之始文也若以伏𦏁為三皇者案淮南子云黃帝使倉頡覩鳥跡造文字此則止在黃帝之時何得云三皇已前鳥文之始乎張騫取經十四化胡經曰迦葉菩薩云如來滅後五百歲吾來東遊以道授韓平子白日升天又二百年以道授張陵又二百年以道授建平子又二百年以道授千室爾後漢末陵遲不奉吾道至漢明永平七年甲子歲星晝現西方夜明帝夢神人長丈六尺項有日光旦問羣臣傅毅曰西方胡王太子成道佛號明帝即遣張騫等窮河源經三十六國至舍衛佛已涅槃寫經六十萬五千言至永平十八年乃還臣笑曰漢書云張陵者後漢順帝時人客學於蜀入鶴鳴山為蛇所吞計順帝乃明帝七世孫理不在明帝之前百餘年也又云明帝遣張騫尋河源者此亦妄作按漢書張騫為前漢武帝尋河源云何後漢明帝復遣尋耶不知騫是何長壽仙乎代代受使一何苦哉可笑其妄引也日月普集十五諸天內音第三宗飄天八字文曰澤落覺菩臺緣大羅千天真皇人解曰澤者天中山名眾龍所窟落覺者道君之內名菩臺者真人之隱號玉臺處澤山之陽三萬日月明其左右羅漢月夫人大劫既交諸天日月會玉臺之下大千世界之分天下改易大千洞然臣笑曰濟苦經云乾坤洞然之後乃使巨靈胡亥造山川玄中造日月昆山南三十兆里復有昆山如是次第有千昆山名小千界復有千小千名中千界復有千中千名一大千世界計大千世界中有百億日月又經云大劫既交天地改易日月星辰無有存者若其普集則百億俱來何為但三萬而至若餘不集者為是菑所不及為是本界闕少若必少者地上凡人尚蒙日月之照天上福勝如何獨無照乎又日月之下乃是欲界下人不名大羅上界菑所不及今所不來者理在然乎將知造此經者唯聞大千之名迷於日月之數故其然哉太上尊貴十六文始傳稱老子與尹喜遊天上入九重白門天帝見老便拜老命喜與天帝相禮老子曰太上尊貴尅日引見太上在玉京山七寶宮出諸天上寂寂冥冥清遠矣臣笑曰神仙傳云吳郡沈羲白日登仙四百年後還家說云初上天時欲見天帝天帝尊貴不可見遂先見太上在正殿坐男女侍立數百人如此狀明則知太上劣於天帝矣言太上尊貴治在眾天之上者妄也今據九天生神章太上住在玄都宮也其玉清宮在玄都之上何重宮復在玉清之上便高玄都兩重矣而老子云太上治在眾天之上者何謬如斯五穀命鑿十七化胡經云三皇修道人皆不死上古之時天生甘露地生醴泉食飲長生中古世來天生五氣地出五味食之延年下古世薄天生風雨地養百獸人捕食之吾傷此際故嘗百穀以食兆民於是三皇各奉粟五斗為信求世世子孫不絕五穀生神州臣笑曰五符經云三仙王告皇帝曰人所以壽老者不食五穀故也大有經曰五穀刳命鑿臭五藏命促縮此糧入腹無希久壽汝欲不死腸中無屎五府經云黃精者三陽之氣上入太清之宮食之甘美又長生也未解老子何不嘗此而嘗五穀腐人之腸乎又三皇者皆神人也何以不令子孫王於長生之國而以五斗之穀請子孫王於神州求刳命腐腸之短壽乎又可笑也老子作佛十八玄妙內篇云老子入關往維衛國入清妙夫人口中後剖左腋生行七步曰天上天下唯我為尊於是乃有佛法臣笑曰化胡經云老子化罽賓一切奉佛老曰却後百年兜率天上更有真佛託生舍衛白淨王宮吾於爾時亦遣尹喜下生從佛號曰阿難造十二部經老子去後百年舍衛國王果生太子六年苦行成道號佛字釋迦文四十九年欲入涅槃老子復見於世號迦葉在雙樹間為諸大眾啟請如來三十六問訖佛便涅槃迦葉菩薩焚燒佛屍收取舍利分國造塔阿育王又起八萬四千塔即以事推老子本不作佛若作佛者豈可老還自燒老屍而起塔耶且可一笑且老子諸經多云作佛或作國師豈可天下國師與佛必待伯陽乎度人化俗要須李耳耶若云佛不能作要須道者從始氣已來獨一老子不許餘人悟大道而為國師耶是則老為自伐惟我能也然佛經人人修行皆得佛果道經不述唯一老君如何佛教如此之弘道經如斯之隘乎且妄言虛述首尾無據蜀記張陵被蛇噉而注白日升天漢書劉安伏鉞乃言長生不死道家誣老子作佛詎可怪哉又造天地經云西化胡王老子變形而去左目為日右目為月案玄妙經云老子乘日精入清妙口中是則老子乘一目之精而入口也計大道洞神何所不在乃要憑一精而入胎乎若必藉精精依於首若乘頭入者兩眼俱來今乃乘一眼而入便成偏見之大道乎亦可笑也敕使瞿曇十九老子化胡歌曰我在舍衛時約敕瞿曇身汝共摩訶薩齎經來東秦歷洛神州界迫至東海間廣宣世尊法教授聾俗人與子威神法化道滿千年年滿時當還慎莫戀東秦無令天帝怒太上蹋地瞋臣笑曰案瞿曇者即釋迦也化胡經云周莊本初三年太歲丙辰白淨王子既得正覺號佛釋迦老子見其去世恐人懈怠復下多羅聚落號曰迦葉親近於佛焚屍取骨起塔分布若如上文釋迦未生不得預遣瞿曇往東土也如其已生成佛者中間無容得受迦葉之約敕充千年之使乎豈有菩薩親侍於佛而敕佛為使乎又周莊踐位止有一十五年元年乙酉全無丙辰本初之號何謬如斯足令掩耳亦使太上蹋地而瞋乎事邪求道二十度人妙經稱三界魔王各有歌辭誦之百遍名度南宮千遍魔王保迎萬遍飛升天空過三界登仙公又玄中精經道士受戒符籙置五嶽位設酒再拜臣笑曰觀身大戒云道學不得祠祀鬼神及向禮拜既是欲界魔王未度諸有焉能誦通百遍度南宮耶又案三張之法春秋二分祭祀祠竈冬夏兩至同俗祠祀兵符社契軍將吏兵都無誡勸之文此之神社為神為道若是神者道士不拜如其道也不設酒脯豈有口誦魔言身行禮祭求出三界諒可悲夫佛邪亂政二十一化胡經云佛興胡域西方金氣剛而無禮神州之士效其儀法起立浮圖處處專尚佛經背本趣末言辭迂蕩不合妙法飾彫金像以誑王臣致天下水旱兵革相伐不過十年菑變普出五星失度山河崩竭王化不平皆由佛亂帝主不事宗廟庶人不享其先所以神祇道氣不可復理臣笑曰智慧罪根品云元始天尊曰我於上皇元年半劫度人延命萬八千年我去後人心頹壞淫祀邪神殺生禱祈更相殘害自取夭傷壽無定年以此推之淫祀邪神萬神歡喜氣與道合應獲福利云何命促壽無定年又漢明已前佛法未行道氣隆盛何乃兵戈屢作水旱相尋雨血山崩饑荒薦集更有桀紂炮烙生靈自明帝後佛法行來五百餘年寧有妖菑虐政甚於前者以今驗古誰有誑欺事彰竹帛不可掩也鸞乃庸疎頗尋兩教道法謙退行偽以顯佛真佛法澄正存理而開物性若不如此通道則可笑殺人戒木枯死二十二老子百八十戒重律云吾戒大重向樹說之則枯向畜說之則死又靈寶經云玄素之道古人修之延年益壽今人修之消年損命又道士受三五將軍禁厭之法有怨憎者癲狂損命又度國王品東方開明招真神身著黑衣有赤文足廣百步頭拄天上食邪魔口容山朝食五百暮噉三千十十五五合衣吞臣笑曰三元大戒云天尊說十戒十善等法無量人得道戒云不得懷惡心聞戒不信生謗生謗皆得罪今樹木無情不慮獲罪起謗何須戒之令枯若必枯死此則有知若有知者聞法應悟然無此理何用斯言公知今人修則損命菑毒已行大道寬容檢而不檢致令殃延後代而不收錄之耶又案三張之術畏鬼科曰左佩太極章右佩昆吾鐵指日則停空擬鬼千里血又造黃神越章殺鬼朱章殺人或為塗炭齋者黃土泥面驢輾泥中懸頭著柱打拍使熟自晉義熙中道士王公期除打拍法而陸修靜猶以黃土泥額反縛懸頭如此淫祀眾望同笑又案漢婕妤帝疑其詛對曰若鬼神有知不受無理之詛如其無知請之何益故不為此以事推測常人之智尚識達之況鬼有靈聰明正直而受愚厭者未之有也今觀其文詞義無取有同俗巫解奏之曲何期大道若此容而不非乎將不耽嗜糟汁湎淫終歲以理推誠豈得爾耶北方禮始二十三依十戒十四持身經云北方禮一拜北方為始東向而周十方想見太上真形臣笑曰文始傳云老子與尹喜遊天上喜欲見太上老曰太上在大羅天玉京山極幽遠可遙禮闕遂不見而還以此推之玄都玉京太上所住今在上方何不以上為首而浪禮北方耶然道生東陽也何不從東方為始佛生西隂也北亦隂也前已鄙之今復尊重而前禮乎又罪根品云太上道君同陽館中稽首禮元始天尊問十善等法此戒乃天尊所說何以不禮天尊而想見太上乎捨本逐末誰之咎也害親求道二十四老子消冰經云老子語尹喜曰若求學道先去五情一父母二妻子三情色四財寶五官爵若除者與吾西行喜精銳因斷七人首持來老笑曰吾試子心不可為事所殺非親乃禽獸耳伏視七頭為七寶七尸為七禽喜疑反家七親皆存又造立天地記云老子化胡胡王不伏老子打殺胡王七子國人一分臣笑曰三元誡云道學不得懷挾惡心不孝父母不愛妻子計喜所殺父母如知是幻何得懷疑反視如其實心依誡懷惡已犯重罪何況斬二親之首乎又胡王不伏殺其七子亦以甚矣又殺國人一分何斯不仁之深乎若作法於後代則令求道者皆殺二親妻子矣又不可以一王不伏而濫誅半國之人乎進退二三可笑怪也延生年符二十五三元品云紫微宮有延生符爪書八方則八氣應之便成人毀符以燒者人隨烟化為氣其文四萬劫一出臣笑曰文始傳云萬萬億億歲一大水崑崙飛浮有仙飛迎天王善人安之山上乃至前萬萬歲天地混沌如雞子黃名曰一劫按大水之日天人不死不應迎之山上又濟苦經云乾坤洞然之後潰然空蕩計一劫之時人物不存其延生符四萬劫乃出豈可四萬劫中絕無天人幽幽冥冥何其遠也又萬萬止是一億億止是一兆止言一億兆年而云萬萬億億者葢新學造經不知數之大小耳椿與劫齊二十六洞玄東方青帝頌曰九五不常居天地有傾危大劫終一椿百六乘運迴臣笑曰大水既漂崑崙飛浮後有大火金鐵融地無草乃至萬萬億歲天地如雞子黃總名一劫然椿是世木以世火燒之則灰值劫火便絕而言大劫齊椿者一何謬歟亦可笑矣隨劫生死二十七如度命妙經云大劫交周天崩地淪欲界滅無太平道經佛法華大小品周遊上下十八天中在色界內至大劫交其文乃沒其玉清上道三洞神經真文玉字出於元始在二十八天無色界上大羅玉京山玄臺菑所不及故自然之文與運同生同滅能奉之七祖生天轉輪聖王代代不絕臣笑曰度人本行經云道言自元始開光已來赤明元年經九千餘億劫度一恒沙眾生爾後至上皇元年度人無量我隨劫生死世世不絕恒與靈寶同出經九劫終九氣改運託胎洪氏積三千餘年至赤明開通歲在甲子誕於扶力葢天復與靈寶同出度人元始天尊以我因緣賜我太上之號在玄都玉京以此推之真文在玉京之山菑所不及而云自然之文與運同生同滅同生同滅豈非菑也又云我與靈寶同時出沒又云我隨劫生死計靈寶運滅太上隨亡而云長生不死此為妄也又玉京在眾天之上菑所不及理合可疑一切形色無有存者玉京玉臺斯為色界色界非常玉京豈存又赤明甲子之號殊同河漢之實矣服丹金色二十八神仙金液經云金液還丹太上所服而神今燒水銀還復為丹服之得仙白日升天求仙不得此道徒自苦耳燒丹成水銀燒水銀成丹故曰還丹昔韓終服之面作金色又佛身黃金色者葢道法驗也令身內外剛堅如金故號佛金剛身也臣笑曰文始傳云太上老子太一元君此三聖亦可為一身金液經云太一者唯有中黃丈夫及太一君此二仙人主也飲金液升天為天神調陰陽矣尋韓終未服金液止是常人既服升天即老君是也而老君為太上萬真之主何所不能而乃須服金液後調隂陽乎又太一大神成者多少調陰陽者復須幾人若言服者皆得何其多耶又丹與水銀遍地皆有火燒成丹作之不難何為道士不服白日升天為天仙之主而辛苦叩齒虛過一生良可哀哉若不服者明知為丹所悞故捕影之談耳又云佛身金色由丹所成此乃不須行因一任丹得邪見之重可為悲矣改佛為道二十九妙真偈云假使聲聞眾其數如恒沙盡思共度量不能測道智臣笑曰此乃改法華佛智為道智耳自餘並同諸文非一昔有問道士顧歡歡答靈寶妙經天文大字出於自然本非法華乃是羅什妄與僧肇改我道經為法華也且靈寶偷於法華可誑東夏法華之異靈寶不殊西域今譯人所出不爽經文以此推之故知偷改為靈寶且佛經博約詞義宏深千卷百部無重文者不同老經自無別計倚傍佛經開張卷部且五千之文全無及佛佛之八藏亦不論道自餘後作皆竊佛經後自明之不廣其類是以古來賢達諷誦佛經至今流傳代代不絕道法必勝何不誦持舉國統括誦道誰是是故知非可為準的偷佛因果三十度王品云天尊告純陀王曰得道聖眾至恒沙如來者莫不從凡積行而得也十仙者無數亦有一興而致一仙位復有積劫而登由功高則一舉功卑則十昇有十階級從歡喜至法雲相好具足於是諸王聞說即得四果又度身品尼𠃵子於天尊所聞法獲須陀洹果又文始傳老子在罽賓彈指諸天王羅漢五通飛天俱至遣尹喜為師得道菩薩為老子作頌臣笑曰佛之與道教迹不同變通有異道以自然為宗佛以因緣為義自然者無為而成因緣者積行乃證是以小乘列四果之梯大乘有十等之位從凡入聖具有經論未知道家所引四果十仙名與佛同修行因緣未見其說然道家所修吸氣沖天飲水證道聞法飛空餌草尸解行業既殊證果理異但說天有五重或三千六千或八十一天或六十大梵或三十六天或三十三天或五億五萬餘天或九真天王九氣天君四方氣君三元三天九宮天曹玉清太有玄都紫微三皇太極諸如此類理有所緣豈有虛張自取矯異請說此天為重為橫為虛為實服何丹草而獲此天脫所未詳則徒為虛指更來可笑矣道經未出言出三十一案玄都道士所上經目取宋人陸修靜所撰者目云上清經一百八十六卷一百二十七卷已行始清已下四十部五十九卷未行於世檢今經目並云見存乃至洞玄經一十五卷猶隱天宮今檢其目並注見在臣笑曰修靜宋明帝時人太始七年因敕而上經目既云隱在天宮爾來一百餘年不聞天人下降不見道士上昇不知此經從何至此昔文成書以飯牛詐言王母之命而黃庭元陽以道換佛張陵創造靈寶吳赤烏時始出上清起於葛玄宋齊之間乃行鮑靚造三皇事露而被誅文成書飯牛致戮於漢世今之學者又踵其術又可悲乎漢書張魯祖父陵桓帝時造符書以惑眾受道者出米五斗俗謂米賊陵傳子衡衡傳子魯號曰三師三人之妻為三夫人皆云白日昇天初受道名鬼卒後號祭酒妖鄙之甚穿鑿濫行皆此例矣五億重天三十二文始傳云天有五億五萬五千五百五十五重地亦如之厚一萬里四角有金柱金軸方圓三千六百里神風持之以四海為地脈天地山川河漢通氣風雲皆從山出臣笑曰三天正法經云天光未明七千餘劫玄景始分九氣存焉九真天王元始天王稟自然之𦙍置九天之號上中下真真為一元元有三天上元宮即太上大道君所治計一天相去九萬九千九百九十里則九天相去七十九萬九千九百二十里一里有三百步一步有六尺則有一十四億三千九百八十五萬六千尺以五億重天分之則天天相去二尺豈有厚萬里之地上載二尺之天乎文始傳云老子引四天王大眾皆身長丈六短者丈二計人大而天小何以自容常臥不起愕然大怪出入威儀三十三玄中經說道士執簡者用金玉廣一寸長五寸五分執之為況中古王執朝君師下古金玉隱執雜木長九寸名為手簡執以去慢誡於道士若入王宮聚落人室在舍外十步著巾帔執簡而入勿有側背出舍外脫巾帔著素服行勿自顯損道法若入俗家整威儀執簡坐勿使俗怪道士行百里外執杖巾帔香罏銅鑵鉢盂出家之具自隨威儀具足得十種功德臣笑曰自然經云道士巾褐帔法褐長三丈六尺三百六十寸法年三十六旬年有三百六十日一身兩角角各有六條兩袖袖各六條合二十四條法二十四氣二帶法隂陽中兩角法兩儀乃至冠法蓮華巾也自然經既有科律何以不依乃法張魯黃巾之服違律而無識也道士奉佛三十四化胡經云願採優曇華願燒栴檀香供養千佛身稽首禮定光又云佛生何以晚泥洹何以早不見釋迦文心中大懊惱又大戒云道學當念遊大梵流景宮禮佛臣笑曰敷齋經天尊令右玄真人曰釋迦文以轉輪生死法化世使天老右玄真人以仙度之道不死之大法又老子序云道主生佛主死道忌穢佛不忌道屬陽生忌穢佛則反之據此清濁天分死生大判何為不念清虛大道而願生死穢惡佛乎故昔殷太宰問孔子聖人孔答三皇五帝三王及某俱不聖也西方之人有聖者焉故知孔子以佛為聖不以道為聖也化胡經云天下大術佛術第一昇玄云吾師化遊天竺符子曰老氏之師名釋迦文此道齊經又云稱仙梵天稱佛隱文外國讀經多是梵天道士所好梵即佛也此即學佛久矣由稱梵也又靈寶三十二天大梵隱語天各八字誦之萬遍即飛行七祖同昇南宮此又道士學佛之證也然道士止知學梵亦不知梵是何佛愚而信之亦應有福不知可笑以不道士合氣三十五真人內朝律云真人日禮男女至朔望日先齋三日入私房詣師所立功德隂陽並進日夜六時此諸猥雜不可聞說又道律云行氣以次不得任意排醜近好抄截越次又玄子曰不鬲戾得度世不嫉妬世可度隂陽合乘龍去云云臣笑曰臣年二十之時好道術就觀學先教臣黃書合氣三五七九男女交接之道四目兩舌正對行道在於丹田有行者度厄延年教夫易婦唯色為初父兄立前不知羞恥自稱中氣真術今道士常行此法以之求道有所未詳一作諍誤諸子道書三十六玄都經目云道經傳記符圖論六千三百六十三卷二千四十卷有本須紙四萬五十四張其一千一百餘卷經傳符圖其八百八十四卷諸子論其四千三百二十三卷陸修靜錄有其數目及本並未得臣笑曰道士所上經目陸修靜目中見有經書藥方符圖止有一千二百二十八卷本無雜書諸子之名而道士今列二千餘卷者乃取漢藝文志目八百八十四卷為道之經論據如此狀理有可疑何者至如韓子孟子淮南之徒並不言道事又有八老黃白之方陶朱變化之術翻天倒地之符辟兵殺鬼之法及藥方呪厭得為道書者可須引來未知連山歸藏易林太玄黃帝金匱太公六韜何以不在道書之例乎修靜目中本無諸子今乃乘安不知何據且去年七月中道士所上經目止注諸子三百五十卷為道經今云八百餘卷何以前後不同又人之有惡唯恐人知己之有善慮人不見故道士自書云不受道戒者不得讀道經即如此狀恐人知其醜乎若以諸子為道書者人中諸子悉須追取何得遺之且道士引例我老子道德本是諸子今尊為經流例相附有何過歟若爾則知老子黃子諸子之流如何得與儒流七經而相抗乎班固先六經後二篇序道為中上賢類斯實錄矣又陶朱者即范蠡也既事越王勾踐君臣因吳石室嘗屎飲尿亦以甚矣今尊崇其術不亦昧乎又蠡子被戮於齊何為不行父術變化而自免乎又造天地經老子託幽王皇后腹即幽王之子也身為柱史即幽王之臣也化胡經云老子在漢為東方朔若審爾者幽王為犬戎所殺豈可不授君父與神符令不死乎又漢武窮兵疲役中國天下戶口至減太半老子為方朔者何忍不與辟兵辟穀之符厭人咒鬼之方以護漢國乎眼看流弊若此無心取救將非欺誑之謬乎又統收道經目錄乃有六千餘卷覈論見本止有二千四十卷餘者虛指未出將非鉛墨未備致經本未成乎自餘孟浪紛綸無足更廣廣弘明集欽定四庫全書
