body:
  text: 明梅鼎祚輯梁六沈約字休文吳興武康人歷尚書今領太子少傅內典序奉齊司徒竟陵王教尚矣哉羣生之始也義隱三藏之外事非二乘所窺自並識同奔隨緣受業人天異軌翾動殊貫苦樂回愚智相襲莫不宅火輪騖擬焰飆遷以寸隂之短晷馳永劫之遙路精靈起伏萬緒千名如來發源恆品蓋亦含生之一至於並首爭馳斯固未或異也至於覆簣無始之初成功斷籌之末塗遙業遠妙軫遐長纍明積慧靈覺獨曉巨相四八照曜於大千尊法二九包籠乎無外六度之業既深十力之功自遠濟物以權降魔匪力妙法輪轉甘露啓霏舟輿六趣津梁五道登四衢之長陌遊一乘之廣路斯既已事盈方等義滿神宣逮于大權協化對揚宗極徇物兆於慈悲亡身著乎非已行符四等道升十地若乃靈性特達得自懷抱神功妙力無待學成孤策獨騖莫知所限結習紛綸一隨理悟又有捐情屏慮身心靡欲厭生死之長勤眷寂滅而投軫遙然自得漏纍煙銷且津心適道功非一業雖會理共源而萌情或異是故高心邈行分路同趨忘懷屏欲殊塗一致或草礫身體投骸林澤內亡形相外馴兕虎或坐臥行立迹不違衆禪業定門造次無爽安忍與金石同固戒行與寶珠等色雖秋禽年至春鮪時登而耿介長蔬忡怛在念妙迹匪遐神塗密迹有悟必通由之斯至故能藉智探虛乘心照理區區懷抱融然靡執俱處三界獨與神遊包括四天卷舒萬劫聞片義而陟道場受一言而升彼岸長夜未開心關自曉淹回聖迹寢息神光既負橐以從師亦栖林以綜業足蹈慧門學通龍藏妙吼遐徹鸞音自遠若夫義跪運心期誠匪迹而導達神功照啓未悟唱説之美義兼在斯暨九土殊風八方舛俗遊化所包事出弘獎皆足以遷光淨域登儀寶地並黜萃翦飾破愛辭親鼓枻無生之流方軌俗表之路固已千佛摩頂七住齊功至夫清信士女植緣曠劫雖復容服未改而戒德內弘瞻毗耶而聳轡望波斯而回軫駕四禪之眇眇泛八解之悠悠若乃十號尊崇三達靡礙雖法身非有而常住在躬能仁權迹四門既非悟道之始假滅雙樹寧有薪盡之窮而天人瞻慕髣佛興情雕金範玉圖容寫狀靈儀炫日寶剎臨雲或役鬼神之功或資髓腦之力製非人匠寶以合成莫不龍章八彩瓊華九色至乃齒髮傳靈衣履遺證聖迹彪炳日煥於閻浮神光陸離星繁於淨剎若乃乘此直心推誠暗往則半息可追一念斯至感降參差雲霏霧委此又昭被象譯輝映縑圖夫秉牘書事其流已遠蓋所以彪著往迹煥述遐聲雖篆籕異文中外舛則至於叶暢心靈抑揚訓義固亦彼此同規人神一揆墳典丘索域中之史策本起下生方外之紀傳統而為言未始或異也而經記繁廣條流舛散一事始末帙理卷分或詞義離斷或文字互出甫涉後條已昧前覽尋源討流未知攸適雖精理瑩心止乎句偈而初悟始學致惑者多且中外羣聖咸載訓典雖教有殊門而理無異趣故真俗兩書遞相扶獎孔發其端釋窮其致撤網去綱仁惠斯在變民遷俗宜以漸至精粗抑引各有由然是故曲辨情靈栖心妙典伏膺空有之説博綜兼忘之書該括羣流集成茲典事以例分義隨理合功約悟廣莫尚於斯可以理求證成妙果若乃載司南之車猶稱靡惑服四照之草得用不迷況乎六馬同鑣萬流共貫日月經天方斯未已河海帶地夫豈足云蓋入道之筌蹄羣生有悟於此也擬焰藝文作人壽雕金範玉作範金琢玉靈儀作靈姿臨雲作凌雲初悟始學致惑者多作觸物未悟學致迷惑佛記序并敕啓三首武帝敕敕云去歲令虞闡等撰佛記并令作序序體不稱頻治改猶未盡致尋佛教因三假以寄法藉二諦以明理達相求宗不著會道論其指歸似未至極乃不應以此相煩亦是一途善事可得為厝筆不以故指敕闡等結序末體又似小異上佛記序啓臣約言佛記序今謹以上呈詞義無取伏懷自恧謹啓武帝敕答敕云記序始得看今敕繕寫流布序曰含靈萬品既非記諜所窮物物稟生豈伊積塵能計莫不起乎無理而至乎無生者也雖要終有地而原始莫聞自非靈照特達宗極斯在則理閉機初鑽叩事絶非唯四果不議固亦十地罔窺邈乎悠敻有之而莫知所從者也如來覆簣爰始言登永路起滅回還馳驟不息去來五道大千比之毫端往復三界祗劫未足稱遠積明纍照念念不休離此生滅證成妙果固已空有兼謝豈徒齊遷魯變而已哉旻昊區區猶秉何言之稱至人無己寧以詞義為珍蓋由萬惑相扇昧明代起業假緣開事須曉達一音所吐無思不服義在徇物動非為己法吼震灑於無外甘露炳煥於龍宮開宗闡教致之有漸標四諦於鹿園辨百非於雙樹廓不二之法門廣一乘之長陌行迷復路弱喪知歸而因應回舛厥塗不一白毫所照遍剎土於恆沙七步降踐壅龍堆而攸被推極神道原本心靈感之所召跨無邊而咫尺緣之所乖靣法城而不覩及像教云末經紀東流熱坂艱長寒山峻阻橫書左字纍萬方通翦葉成文重譯未曉自此迄今千祀過半靈迹稍啓名僧間出律藏方等行來漸至蘊乎西國未至者多雖法身常住之奧遠二諦三假之淵曠悟道求宗於斯可足而能仁體茲大聖實為本師悠悠羣品精靈所係迄于前因往業多所昧略然神化應感參差互見又世胄名氏本國俗緣散析衆部卒難討究神功妙力同出異名降胎求道寧止一相託生迦維本由權迹出自北門非悟法之始遍照東方豈通化之極適道已來四十九載妙應事多宜加總緝共成區畛至於經像舊録境剎遺記開勸之功於斯自遠大權弘曠亡身以濟物應真耿介標心非為己分蹤或異適未必同神塗詭互難以臆辨靈怪倜儻言語斯絶圖澄之龍見趙魏羅什之鳳集關輔犍陀近遊京洛單開遠適羅浮雖迹與俗同而意無可察塗出玉門法座不遠七處九會峨然在目靈應肸蠁遍富延澤以西光景葳蕤多見天山之表有志奇僧每經遊歷神迹昭然咸有文注繁蕪舛雜實須裁整分五道於人天設重牢於厚地各隨業力的焉不差此皆卷舒真俗終始名相其玄塗幽遠大則直至道場其徵證切近小則開勸晚學斯實兼濟之方舟大悲之廣路雖復智昏視肉形窮尺捶緣動必應又况進於此者乎是以至聖殷勤每存汲引垂文見意貽厥將來皇帝行成無始道承曠劫十號在躬三達靡礙屈茲妙有同此轉輪傷昏愍惑久迷正路悱發之徒空懷鑽仰條流緬曠事難總一志淺業勞迄用無就非所以闢彼四衢出之火宅者也乃詔中書侍郎虞闡太子洗馬到溉後軍記室周捨博尋經藏搜採注説條別流分各以類附日少功多可用譬此名曰佛記凡三十篇其有感應之流事類相似止取其一餘悉不書或後死而更生陳説經見事涉杳冥取驗無所亦皆靡載同之闕疑或憑人以言託想成夢尤難信曉一無所録若夫欲遐適者必遠記所從欲悟道者必妙識所宗然後能允得其門親承音旨未有不知厥路莫辨伊人膠目暗踐自與理合所以引彼衆流歸之一源可令莘莘含識望塗知往案砥矢而言歸不回遑於岐路俾厥清信之士亦有取於此云佛知不異衆生知義佛者覺也覺者知也凡夫之與佛地立善知惡未始不同也但佛地所知者得善之正路凡夫所知者失善之邪路凡夫得正路之知與佛之知不異也正謂以所善非善故失正路耳故知凡夫之知與佛之知不異由於所知之事異知不異也凡夫之所知不謂所知非善在於求善而至於不善若積此求善之心會得歸善之路或得路則至於佛也此衆生之為佛性實在其知性常傳也六道相續作佛義一切衆智與五道六趣衆生共有受知之分無分異也問曰受知非知耶答曰非也問此以何為體答曰相續不滅是也相續不滅所以能受知若今生陶練之功漸積則來果所識之理轉精轉精之知來應以至於佛而不斷不絶也若今生無明則來果所識轉暗轉暗之知亦來應以至於六趣也受知之具隨緣受知知之美惡不關此受知之具也問曰知非知既聞命矣受知受知自是相續不滅知自然因緣中來與此受知之具從理而相關答曰有此相續不滅自然因果中來有因有果何得無美無惡乎因緣義凡含靈之性莫不樂生求生之路參差不一一爾流遷塗徑各異一念之間衆緣互起一因一果內有差忒好生之性萬品斯同自然所稟非由緣立固知樂生非因緣因緣非樂生也雖然復俱宅形骸而各是一物一念既召衆緣衆緣各隨念起善惡二念誠有不同俱資外助事由一揆譬諸非水非土穀芽不生因緣性識其本既異因果不惑雖則必然善惡獨起亦有受礙雖云獨起起便成因內因外緣實由乎此均聖論自天地權輿民生攸始遐哉眇邈無得而言焉無得而言因有可言之象至於太虛之空曠無始之杳茫豈唯言象莫窺良以心慮事絶及天地蕞爾來宅其中毫端之泛巨海方斯非譬然則有此天地已來猶一念也我之所久莫過軒犧而天地之在彼太虛猶軒犧之在彼天地齷齪之徒唯謂赫胥為遠何其瑣瑣為念之局邪世之有佛莫知其始前佛後佛其道不異法身湛然各有應感感之所召跨大千而咫尺緣苟未應雖踐迹而弗覩娑婆南界是曰閻浮蔥嶺以西經塗密邇緣運未開自與理隔何以言之夏殷以前書傳簡寡周室受命經典備存象寄狄鞮隨方受職重譯入貢總括要荒而八蠻五狄莫不愚鄙文字靡識訓義不通咸納贄王府登樂清廟西國密塗厥路非遠雖葉書橫字華梵不同而深義妙理於焉自出唐虞三代不容未有事獨西限道未東流豈非區區中國緣應未啓求其會歸尋其旨要寧與四裔之樂同日而語乎非為姬公所遺蓋由斯法宜隱故也炎昊之世未火未粒肉食皮衣仁惻之事弗萌懷抱非肉非皮死亡立至雖復大聖殷勤思存救免而身命是資理難頓奪實宜導之以漸稍啓其源故燧人火化變腥為熟腥熟既變蓋佛教之萌兆也何者變腥為熟其事漸難積此漸難可以成著迄乎神農復垂汲引嘉穀肇播民用粒食歉腹充虛非肉可飽則全命減殺於事彌多自此已降矜護日廣春搜免其懷孕夏苗取其害穀秋獮冬狩所害誠多頓去之難已備前説周孔二聖宗條稍廣見其生不忍其死聞其聲不食其肉草木斬伐有時麛卵不得妄犯漁不竭澤畋不燎原釣而不綱弋不射宿肉食蠶衣皆須耆齒牛羊犬豕無故不殺此則戒有五支又開其一也逮于酣醟于酒淫迷乎色詭妄於人攘濫自已外典所禁無待釋教四者犯人人為含靈之首一者害獸獸為生品之末上聖開宗宜有次第亦由佛戒殺人為業最重也內聖外聖義均理一而蔽理之徒封著外教以為烹羊豢豕理固宜然惑者又云若如釋氏之書咸有緣報之業則禹湯文武並受刲刳周公孔子俱入鼎鑊是何迷於見道若斯之篤耶試尋斯證可以有悟矣陶隱居難均聖論弘景見後山民陶隱居仰咨論云前佛後佛其道不異周室受命象寄狄鞮隨方受職西國密塗厥路非遠唐虞三代不容未有事獨西限道未東流非為姬公所遺蓋由斯法宜隱燧人火粒變生為熟蓋佛教之萌兆周孔二聖宗條稍廣見生不忍其死聞聲不食其肉草木斬伐有時麛卵不得妄犯又戒有五支四者犯人人為含靈之首一者害獸獸為生品之末內聖外聖義均理一咨曰謹案佛經一佛之興動踰纍劫未審前佛後佛相去宜幾釋迦之現近在莊王唐虞夏殷何必已有周公不言恐由未出非關宜隱育王造塔始敬王之世既閻浮有四則東國不容都寡夫子自以華禮興教何宜乃説外法故歎中國失禮求之四裔亦良有別意且四裔之樂裁出要荒之際投諸四裔亦密邇危羽之野禹迹所至不及河源越裳白雉尚稱重譯則天竺罽賔久與上國殊絶衰周已後時或有聞故鄒子以為赤縣於宇內止是九州中之一耳漢初長安乃有浮圖而經像眇昧張騫雖將命大夏甘英遠屆安息猶弗能宣譯風教闡揚斯法必其發夢帝庭乃稍就興顯此則似如時致通閡非關運有起伏也若必以緣應有會則昔之淳厚羣生何辜今之澆薄羣生何幸假使斯法本以救濟者夫為罪莫過於殺肉食之時殺孰甚焉而方俟火粒甫為教萌於大慈神力不有所躓乎若粳糧未播殺事難以息未審前時過去諸佛復以何法為教此教之萌起在何佛兼四戒犯人為報乍輕一殺害獸受對更重首輕末重亦為未達夫立人之道曰仁與義周孔所云聞聲不食斬伐有時者蓋欲大明仁義之道於鳥獸草木尚曰其然況在乎人而可悖虐非謂內惕寡方意在緣報覩迹或似論情顧乖不審於內外兩聖其事可得是均以不此中參差難用頓悟謹備以咨洗願具啓諸蔽答陶華陽難云釋迦之現近在莊王唐虞夏殷何必已有周公不言恐由未出非關宜隱育王造塔始敬王之世閻浮有四則東國不容都無答曰釋迦出世年月不可得知佛經既無年歷注記此法又未東流何以得知是周莊之時不過以春秋魯莊七年四月辛卯恆星不見為據三代年既不同不知外國用何歷法何因知魯莊之四月是外國之四月乎若外國用周正耶則四月辛卯長歷推是五日了非八日若用殷正耶周之四月殷之三月用夏正耶周之四月夏之二月都不與佛家四月八日同也若以魯之四月為證則日月參差不可為定若不以此為證則佛生年月無證可尋且釋迦初誕唯空中自明不云星辰不見也瑞相又有日月星辰停住不行又云明星出時墮地行七步初無星辰不現之語與春秋恆星不現意趣永乖若育王造塔是敬王之世閻浮有四此道已流東國者敬王已來至於六國記注繁密曾無一槩育王立塔非敬王之時又分明也以此而推則釋迦之興不容在近周世公旦之情何得未有難云夫子自以華禮興教何宜乃説外法故歎中國失禮求之四裔亦良有別意答曰弘教次第前論已詳不復重辨難云四裔之樂裁出要荒之際投諸四裔亦密邇危羽之野禹迹所至不及河源越裳白雉尚稱重譯則天竺罽賔久與上國殊絶衰周已後時或有聞故鄒子以為赤縣於宇內止是九州中之一耳漢初長安乃有浮圖而經像眇昧張騫雖將命大夏甘英遠屆安息弗能宣譯風教必其發夢帝庭乃稍興顯此則似時有通礙非關運有起伏也答曰本以西域路近而大法不被此蓋由緣應未發非謂其途為遠也其路既近而此法永不東流若非緣應未至何以致此及後東被皆由緣應宜發通礙各有其時前論已盡也難曰若必以緣應有會則昔之淳厚羣生何辜今之澆薄羣生何幸假使斯法本以救澆者夫為罪莫過於殺肉食之時殺孰甚焉而方俟火粒甫為教萌於大慈神力不有所躓乎若粳糧未播殺事難息未審前時過去諸佛復以何法為教此教之萌起在何佛兼四戒犯人為報乍輕一殺害獸受對更重首輕末重亦為未達夫立人之道曰仁與義周孔所云聞聲不食斬伐以時者蓋欲大明仁義之道于鳥獸草木尚曰其然況在乎人而可悖虐非謂內惕寡方意在緣報覩迹或似論情顧乖不審於內外兩聖其事可得是均以不此中參差難用頓悟謹備以咨洗願具啓諸蔽答曰民資肉食而火粒未啓便令不肉教豈得行前論言之已具不復重釋衆生緣果所遭各有期會當昔佛教未被是其惡業盛時後之聞法是其善業萌時善惡各有其時何關淳厚之與澆薄五支之戒各有輕重非殺戒偏重四支並輕且五業雖異而互相發起犯人之戒人重故先出犯獸之戒獸輕故後被訓戒之道次第宜然周公孔子漸弘仁惻前論已詳請息重辨若必以釋教乖方域之理外此自一家之學所不敢言形神論凡人一念之時七尺不復關所念之地凡人一念聖人則無念不盡聖人無己七尺本自若空以若空之七尺總無不盡之萬念故能與凡夫異也凡人一念忘彼七尺之時則目廢於視足廢於踐當其忘目忘足與夫無目無足亦何異哉凡人之暫無本實有無未轉瞬有已隨之念與形乖則暫忘念與心謝則復合念在七尺之一處則他處與異人同則與非我不異但凡人之暫無其無其無甚促聖人長無其無其無甚遠凡之與聖其路本同一念而暫忘則是凡品萬念而都忘則是大聖以此為言則形神幾乎惑人疑因果相主毫分不爽美惡之來皆有定業而六度所修咸資力致若修此力致復有前因因熟果成自相感召則力致之功不復得立六度所修幾於廢矣釋迦邁九劫勇猛所成勇猛之因定於無始本不資九安得稱劫余以為因果情照本是二物先有情照却有因果情照既動而因果隨之未有情照因果何託因識二塗用合本異其本既異厥體不同情照別起於理非礙六度九劫差不足疑也神不滅論含生之類識鑒相懸等級參差千纍萬沓昆蟲則不逮飛禽飛禽則不逮犬馬昺明昭著不得謂之不然人品以上賢愚殊性不相窺涉不相曉解燕北越南未足云匹其愚者則不辨菽麥悖者則不知愛敬自斯已上性識漸弘班固九品曾未槩其萬一何者賢之與愚蓋由知與不知也愚者所知則少賢者所知則多而萬物交加羣方緬曠情性曉昧理趣深玄由其塗求其理既有曉昧之異遂成高下之差自此相傾品級彌峻窮其原本盡其宗極互相推仰應有所窮其路既窮無微不盡又不得謂不然也且五情各有分域耳目各有司存心運則形忘目用則耳廢何則情靈淺弱心慮雜擾一念而兼無由可至既不能兼紛糾遞襲一念未成他端互起互起衆端復同前矣不相兼之由由於淺惑惑淺為病病於滯有不淺不惑出於兼忘以此兼忘得此兼照始自凡夫至于正覺始惑於不惑不兼至能兼又謂不然也又昆蟲夭促含靈靡二或朝生夕殞或不識春秋自斯而進修短不一既有其短豈得無長虛用損年善攝增壽善而又善焉得無之又不得謂之不然也生既可夭則壽可無夭既無矣則生不可極形神之別斯既然矣形既可養神寧獨異神妙形粗較然有辨養形可至不朽養神安得有窮養神不窮不生不滅始末相校豈無其人自凡及聖含靈義等但事有精粗故人有凡聖聖既長存在凡獨滅本同末異義不經通大聖貽訓豈欺我哉述僧中食論人所以不得道者由於心神昏惑心神所以昏惑由於外物擾之擾之大者其事有三一則勢利榮名二則妖妍靡曼三則甘旨肥濃榮名雖日用於心要無晷刻之纍妖妍靡曼方之已深甘旨肥濃為纍甚切萬事云云皆三者之枝葉耳聖人知不斷此三事求道無從可得不得不為之立法使簡而易從也若直云三事惑本並宜禁絶而此三事是人情所甚惑念慮所難遣雖有禁約之旨事難卒從譬於方舟濟河豈不欲直至彼岸河流既急會無直濟之理不得不從流邪靡久而獲至非不願速事難故也禁此三事宜有其端何則食之於人不可頓息其於情性所纍莫甚故推此晚食併置中前自中之後清虛無事因此無事念慮得簡在始未專在久自習於是束以八支紆以禁戒靡曼之欲無由得前榮名衆纍稍隨事遣故云往古諸佛過中不餐此蓋是遣纍之筌蹄適道之捷徑而或咸謂止於不食此乃迷於向方不知厥路者也述僧設會論夫修營法事必有其理今世召請衆僧止設一會當由佛在世時常受人請以此擬像故也而佛昔在世佛與衆僧僧伽藍內本不自營其食具也至時持鉢往福衆生今之僧衆非唯持中者少乃有腆恣甘腴厨膳豐豪者今有加請召並不得已而後來以滋腴之口進蔬蔌之具延頸蹙頞固不能甘既非樂受不容設福非若在昔不得自營非資四輩身口無託者也此以求福不其反乎篤而論之其義不爾何者出家之人本資行乞戒律昺然無許自立廚帳并畜淨人者也今既取足寺內行乞事斷或有持鉢到門便呼為僧徒鄙事下劣既是衆所鄙恥莫復行乞悠悠後進求理者寡便謂乞食之業不可復行白淨王子轉輪之貴持鉢行詣以福施者豈不及千載之外凡庸沙門躬命僕豎自營口腹者乎今之請僧一會既可髣像行乞行乞受請二事不殊若以今不復行乞又不請召則行乞求法於此永冥此法既冥則僧非佛種佛種既離則三寶墜于地矣今之為會者宜追想在昔四十九年佛率比丘入城乞食威儀舉止動目應心以此求道道其焉適若以此運心則為會可矣究竟慈悲論釋氏之教義本慈悲慈悲之要全生為重恕己因心以身觀物欲使抱識懷知之類愛生忌死之羣各遂厥宜得無遺失而俗迷日久淪惑難變革之一朝則疑怪莫啓設教立方每由漸致又以情嗜所深甘腴為甚嗜深於情尤難頓革是故開設三淨用伸權道及涅槃後説立言將謝則大明隱惻貽厥將來夫肉食蠶衣為方未異害命天生事均理一瀹繭爛蛾非可忍之痛懸庖登俎豈偏重之業而去取異情開抑殊典尋波討源良有未達漁人獻鮪肉食同有其緣枲妾登絲蠶衣共頒其分假手之義未殊通閉之詳莫辨訪理求宗未知所適外典云五畝之宅樹之以桑則六十者可以衣帛矣雞豚犬勿失其時則七十者可以食肉矣然則五十九年已前所衣宜布矣六十九年已前所食宜蔬矣輕暖於身事既難遣甘滋於口又非易忘對而為言非有優劣宜枲麻果菜事等義同攘寒實腹曾無一異偏通繒纊當有別途請試言之夫聖道隆深非思不洽仁被羣生理無偏漏拯粗去甚教義斯急繒衣肉食非已則通及晚説大典弘宣妙訓禁肉之旨載現于言黜繒之義斷可知矣而禁淨之始猶通蠶革蓋是敷説之儀各有次第亦猶闡提二義俱在一經兩説參差各隨教立若執前迷後則闡提無入善之途禁淨通蠶則含生無頓免之望難者又以闡提入道聞之後説蠶革宜禁曾無槩理大聖弘旨義豈徒然夫常住密奧傳譯遐阻泥洹始度咸謂已窮中出河西方知未盡關中晚説厥義彌暢仰尋條流理非備足又案涅槃初説阿闍世王大迦葉阿難三部徒衆獨不來至既而二人並來唯無迦葉迦葉佛大弟子不容不至而經無至文理非備盡昔涅槃未啓十數年間廬阜名僧已有蔬食者矣豈非乘心暗踐自與理合者哉且一朝裂帛可以終年烹牢待膳亘時引日然則一嵗八蠶已驚其驟終朝未肉盡室驚嗟拯危濟苦先其所急敷説次序義實在斯外聖又云一人不耕必有受其飢者故一人躬稼亦有受其飽焉桑野漁川事雖非已炮肉裂繒咸受其分自涅槃東度三肉罷緣服膺至訓操槩彌遠促命有殫長蔬靡惓秋禽夏卵比之如浮雲山毛海錯事同於腐鼠而繭衣纊服曾不懷疑此蓋慮窮於文字思迷於弘旨通方深信之客庶有鑒於斯理斯理一悟行迷克反斷蠶肉之因固蔬枲之業然則含生之類幾於免矣南齊禪林寺尼淨秀行狀寶唱比丘尼淨秀傳上天性後上並作秀比丘尼釋淨秀本姓梁氏安定烏氏人也其先出自少昊至伯翳佐禹治水賜姓嬴氏周孝王時封其十六世孫非子於秦其曾孫秦仲為宣王侯伯平王東遷封秦仲少子於梁是為梁伯漢景帝世梁林為太原太守徙居北地烏氏遂為郡人焉自時厥後昌胤阜世名德交暉蟬冕疊映漢元嘉元年梁景為尚書令少習韓詩為世通儒魏時梁爽為司徒左長史祕書監博極羣書善談玄理晉太始中梁闡為涼雍二州刺史即尼之乃祖也闡孫撝晉范陽王虓驃騎參軍事漁陽太守遭永嘉蕩析淪於偽趙為祕書監征南長史後得還晉為散騎侍郎子疇字道度征虜司馬子粲之仕宋征虜府參軍事封龍川縣都亭侯尼即都亭侯之第四女也挺慧悟於曠劫體妙解於當年而性調和綽不與凡孩孺同數弱齡便神情峻徹非常童稚之伍行仁尚道洗志法門至年十嵗慈念彌篤絶粉黛之容棄錦綺之玩誦經行道長齋蔬食年十二便求出家家人苦相禁抑皆莫之許於是心祈冥感專精一念乃屢獲昭祥亟降瑞相第四叔超獨為先覺開譬內外故雅操獲遂上天性聰睿幼而超羣年至七嵗自然持齋家中請僧行道聞讀大涅槃經不聽食肉於是即長蔬不噉二親覺知若得魚肉輒便棄去昔有外國普練道人出於京師往來梁舍便受五戒勤翹奉持未嘗違犯日夜恆以禮拜讀誦為業更無餘務及手能書常自寫經所有財物唯充功德之用不營俗好少欲入道父母為障遂推流嵗月至年二十九方獲所志落髮青園服膺寺主上事師虔孝先意承旨盡身竭力猶懼弗及躬修三業夙夜匪懈僧使衆役每居其首精進劬勤觸事關涉有開士馬先生者於青園見上即便記云此尼當生兜率天也又親於佛殿內坐禪同集三人忽聞空中有聲狀如牛吼二尼驚怖迷悶戰栗上淡然自若徐起下牀歸房執燭檢聲所在旋至構欄二尼便聞殿上有人相語云各自避路某甲師還後又於禪房中坐伴類數人一尼鼾眠此尼於睡中見有一人頭屆于屋語云勿驚某甲師也此尼於是不敢復坐又以一時坐禪同伴一尼有小緣事暫欲下牀見有一人抵掌止之曰莫撓某甲師於是閉氣徐出歎未曾有如此之事比類甚繁既不即記悉多漏忘不得具載性愛戒律進止俯仰必欲遵承於是現請曜律師講內自思惟但有直一千心中憂慮事不辦夜即夢見鴉鵲鴝鵒雀子各乘車車並安軒車之大小還稱可鳥形同聲唱言我助某甲尼講去既寤歡喜知事當成及至就講乃得七十檀越設供果食皆精後復又請頴律師開律即發講日清淨罌水自然香如水園香氣深以為欣既而坐禪得定至於中夜方起更無餘伴便自念言將不犯獨即咨律師律師答云無所犯也意中猶豫恐違失且見諸寺尼僧多有不如法乃喟然歎曰嗚呼鴻徽未遠靈緒稍隤自非引咎責躬豈能導物即自懺悔行摩那埵於是京師二部莫不咨嗟云如斯之人律行明白規矩應法尚爾思愆何况我等動靜多過而不慚愧者哉遂相率普懺無有孑遺又於南園就穎律師受戒即受戒日淨罌水香還復如前青園諸尼及以餘寺無不更受戒者律師於是亦次第詣寺敷弘戒品闡揚大教故憲軌遐流迄屆于今穎律師又令上約語諸寺尼有高牀俗服者一切改易上奉旨制勒無不祗承律藏之興自茲更始後又就三藏法師受戒清淨水香復如前不異青園徒衆既廣所見不同師已遷背更無覲侍於是思別立住處可得外嚴聖則內窮宴默者以宋大明七年八月故黃修儀及南昌公主深崇三寶敬仰德行初置精舍上麻衣弗溫藿食忘飢躬執泥瓦盡勤夙夜以宋泰始三年明帝賜號曰禪林蓋性好間靜冥感有徵矣而制龕造像無不畢備又寫集衆經皆令具足裝潢染成悉自然有娑羅伽龍王兄弟二人現迹彌日不滅知識往來並親瞻覩招納同住十有餘人訓化奬率皆令禪誦每至奉請聖僧果食之上必有異迹又於一時虔請聖衆七日供養禮懺始訖攝心運想即見兩外國道人舉手共語一云呿羅一云毗呿羅所著袈裟色如桑椹之熟因即取泥以壞衣色如所見倣於是遠近尼僧並相倣斆改服間色故得絶於五大之過道俗有分者也此後又請阿耨達池五百羅漢日日凡聖無遮大會已近二旬供設既豐復更請罽賔國五百羅漢足上為千及請凡僧還如前法始過一日見有一外國道人衆僧悉皆不識於是試相借問自云從罽賔國來又問來此幾時答云來此一年也衆僧覺異令人守門觀其動靜而食畢乃於宋林門出使人逐視見從宋林門去行十餘步奄便失之又嘗請聖僧浴器盛香湯及以雜物因而禮拜內外寂默即聞器桸杓作聲如用水法意謂或是有人出便共往看但見水杓自然搖動故知神異又曾夜中忽見滿屋光明正言已曉自起開戶見外猶暗即便閉戶還牀復寢久久方乃明也又經違和極篤忽自見大光明遍於世界山河樹木浩然無礙欣爾獨笑傍人怪問具陳所見即能起行禮拜讀誦如常無異又於一時復違和亦甚危困忽舉兩手狀如捧物語傍人不解問言為何所捧答云見寶塔從地出意欲接之幡花伎樂無非所有於是疾恙豁然而除都無復患又復違和數日中亦殊綿惙恆多東向視合掌向空於一時中急索香火移時合掌即自説云見彌勒佛及與舍利弗目連等諸聖人亦自見諸弟子數甚無量滿虛空中須臾見彌勒下生翅頭末城云有人持幡華伎樂及三臺來迎於此上幡華伎樂非世間比半天而住一臺已在半路一臺未至半路一臺未見但聞有而已爾時已作兩臺為此兆故即更作一臺也又云有兩樹寶華在邊人來近牀語莫壞我華自此之後病即除損前後遇疾恆有瑞相或得涼風或得妙藥或聞異香病便即愈疾瘥之為理都以漸豁然而去如此其數不能備記又天監三年一夏違和於晝日眠中見虛空藏菩薩即自圍繞誦唄唄聲徹外眠覺所患即除又白日臥開眼見佛入房幡蓋滿屋語傍人令燒香了自不見上以天監五年六月十七日得病苦心悶不下飲彭城寺令法師以六月十九日夜得夢見一處謂是兜率天上住止嚴麗非世間比言此是上住處即見上在中於是法師有語上上得生好處當見將接上是法師小品檀越勿見遺棄上即答云法師丈夫又弘通經教自應居勝地某甲是女人何能益法師又云不如此也雖為丈夫不能精進持戒不及上時體已轉惡與令法師素疏不堪相見病既稍增飲粥日少為治無益漸就綿惙至七月十二日爾時天雨清涼悶勢如小退自云夢見迎來至佛殿西頭人人捉幡竿猶車在地幡之為理不異世間隊擔鼓旗幡也至二十日便絶不復進飲粥至二十二日令請相識衆僧設會意似分別至二十五日云見十方諸佛遍滿空中至二十七日中後泯然而臥作兩炊久方復動轉自云上兜率天見彌勒及諸菩薩皆黃金色上手中自有一琉璃清淨罌可高三尺許以上彌勒即放光明照于上身至兜率天亦不見飲食自然飽滿故不復須人間食也但聞人間食皆臭是以不肯食於彼天上得波利將還意欲與令法師有人問何意將去答云欲與令法師是人言令法師是人中果報那得食天上食不聽將去既而欲見令法師間居上為迎法師來相見語法師可作好菜食以餉山中坐禪道人若修三業方得生兜率天耳法師不坐禪所以令作食餉山上道人者欲使與坐禪人作因緣也自入八月體中亦轉惡不復説餘事但云有三十二童子一名功德天二名善女天是迦毗羅所領恆來在左右與我驅使或言得人餉飲食令衆中行之復云空中晝夜作伎樂閙人耳也並廣弘明集比丘尼僧敬法師碑銘立言道往標情妙覺置想依空練心成學縕日悠長疏年緬邈風遷電改斯理莫違神有殊適形無異歸臨泉結慟有愴徂暉松飇轉蓋山雨披衣載刊貞軌永播餘徽法王寺碑昔周師集於孟津漢兵至於垓下翦商肇乎兹地殪楚由乎斯域慧雲匪由觸石法雨起乎悲心驅之仁壽度之彼𡶨濟方割於有頃撲既燎於無邊陸旗風靡水陳雲披縈山為堞失其九天之險負壑為隍曾無一葦之閡昏師反接偽牧泥首掬指則河舟尚虛委甲則熊嶺非峻乃按兵江漢誓衆商郊因斯而運斗摳自茲而廓天步業隆放夏功高伐殷濟橫流而臣九服握乾綱而子萬姓眷言四海莫不來王此惟余宅寧止西顧臨朝夕之濬池帶長洲之茂苑藉離宮於漢舊因林光於秦餘回廊敞匝復殿重起連房極睇周堵如雲銘曰往劫將謝災難孔多炎炎烈火渺渺洪波聚為丘嶽散成江河俗緣浮詭真諦遐長匪因希尚曷寄舟梁標功顯德事歸道場祁祁法衆同茲無我振錫經行祗林宴坐或思寂滅或念薪火惆悵三明徘徊四果並藝文類聚南齊僕射王奐枳園寺剎下石記佛教東流適來尤著始自洛京盛於江左晉故車騎將軍琅邪王劭玄悟獨曉信解淵微於太祖文獻公清廟之北造枳園精舍其始則芳枳樹籬故名因事立雖房殿嚴整而瓊剎未樹劭玄孫尚書僕射南徐州大中正奐深達法相洞了宗極勤誠外著仁隱內弘食不過中者一十一載雖翼務朝端而事鄰奈圃日者作翰湘州樹麾蠡服位與年升秩隨歲厚顧惟恩隆主眄寵結皇情任處東方寄深外屏徒欲盡能竭慮知無不為下被民和上宣聖澤而自以力弱途遠終慙短效且義止今生報褰來果非所以酬鴻貺於冥津暢丹誠於遐劫自乘傳衡臯辭簪派渚誓於舊寺光樹五層捐割籓俸十遺其一凡厥所收三十有六萬齊之永明六年六月三日蓋木運將啓之令辰上帝步天之嘉日乃抗崇表於蒼雲植重扃於玄壤仰願宸居納祐福履攸歸八神擎室萬祇翼體寶祚隆邈比固須彌靈算遐永齊軌常住諸聖延祥挹天和於少極藩王碩茂播宗英於梁楚羣后流克讓之風庶民垂可封之德含生愷樂物不夭性嘉穀年登餘糧栖畝外蕃內附邊城解柝家備十善人懷六度魔衆稽顙外道屈膝抽薪止火折劒摧鋒拯幽酸於無擇陟神化於有頂三界五道咸同斯願刊石重壤式昭厥心千佛頌道有偕適理無二歸照寂同是形相俱非千覺俯應遞叩冥機七尊緬矣感謝先違既過已滅未來無像一剎靡停三念齊往不常不住非今非曩賢劫雖遼倏焉如響栖林藉樹背室違家前佛後佛迹罔隆窊或遊堅固或蔭龍華能達斯旨可類恆沙甡甡羣有均此妙極先晚參差各願隨力密迹弘道數終乃陟誓覩來運永傳今識白帖住作想迹罔隆窊作迹同轉車甡甡羣有作莘莘羣聖晚作後今作令瑞石像銘并序夫靈應微遠無迹可追心路照通有感斯順我皇體神御極挹睿臨乾幽顯咸帙無思不服若夫二儀叶德五精翼化下洞淵泉上達蒼昊天無息瑞地不降祥十住髣佛於林衡應真肸蠁於清夜素毫月舉騰光於梵室妙趾神行布武於椒殿至於事符緗牒既表禎圖無不雲霏霧委盈簡被策莫黑三距眇千齡而再現皓露淳腴望鳳蓋而沾陛此皆舜日未書堯年罕降豈直朱烏動色玄秬相趣而已哉嘉玉遠自北戎梁弱水而委質潤徹瓌奇曠世之所不覩白金近發東山剖幽巖而啓瑞傍被崖巘鴻靈之所未刊雖復素環之絶貺銀燭之瑤寶方斯蔑如也若夫金石具剛非遊泳之質自非霈德潛衍感極回靈豈變堅沈之體顯輕浮之相維永明七年某月爰有祥石眇發天津浮海因潮流迥至表異浙河獻奇禁圃瓊瑜等潤精金比色帝上眷幽關之易啓咨玄應之無方雖拊事寂寥而因心咫尺愛其貞恆之性嘉其可久之姿莫若圖妙像於檀香寫遺影於祇樹乃詔名工是鐫是琢靈相瑞華煥同神造至於雕削之餘遺刊委斫方圓小大觸水斯沈駐罕停蹕親加臨試良由法身是託不溺沈弱之淵剖析既離方須浮金之水至矣哉禎符若斯之妙也敢銘寶貺永福天人其詞曰遙哉上覺曠矣神功四禪無像三達皆空表靈降世演露開蒙惟聖仁宇寶化潛融道非迹應事以感通沈精浮質遠自河𦵇悠悠亘水眇眇因風泛彼遼碣瑞我國東有符皇德乃眷宸衷永言鷲室棲誠梵宮載雕載範寫好摛工藉茲妙力祚闡業隆冕旒南靣比壽華嵩釋迦文佛像銘積智成朗積因成業能仁爽感將吼妙法駐景上天降生右脅始出四門終超九劫眇求靈性曠追玄軫道雖有門迹無可朕物我兼謝心行同泯一去後心百非寧盡感資理悟悟以言陳言不自叩出之者身有來必應如泥在鈞形酬響答且物且人應我以形而余矇瞽守茲大夜焉拔斯苦仰尋靈相法言攸吐不有尊儀薆焉誰覩尊儀沈集作儀刑白帖朗作明爽作奚形酬二句衍文尊儀作形形彌陀佛銘法身無象常住非形理空反應智滅為靈窮寂震響大夜開冥眇哉遐壽非歲非齡物愛雕彩人榮寶飾事儉欲興情充纍息至矣淵聖流仁動惻順彼世心成茲願力於惟淨土既麗且莊琪路異色林沼焜煌靡胎靡娠化自餘方託生在焉紫帶青房眷言安養興言遐適報路雖長由心咫尺幽誠曷寄刊靈表迹髣佛尊儀圖金寫石瀢沱玉沙乍來乍往玲瓏寶樹因風韻響願遊彼國晨翹暮想七珍非羡三達斯仰光宅寺剎下銘并序光宅寺蓋上帝之故居行宮之舊兆揚州丹陽郡秣陵縣某鄉某里之地自去茲邠亳來儀京輔拓宇東第咫武城闉聖心留愛間素遷負南郭義等去酆事均徙鎬及克濟橫流膺斯寶運命帝閽以廣闢即太微而為宇既等漢高流連於豐沛亦同光武眷戀於南陽思所以永留聖迹垂之不朽令事與須彌等固理與天地無窮莫若光建寶塔式傳于後乃以大梁之天監六年歲次星紀月旅黃鍾閏十月二十三日戊寅仲冬之節也乃樹剎玄壤表峻蒼雲下洞淵泉仰迫星漢方當銷巨石於賢劫拯未來於忍土若夫朱光所耀彤雲所臨非止天眷兼因地德皇帝乃啓扉閶闔造舟淮涘接神飈而動驂越浮梁而徑度芝蓋容與翠華葳蕤下輦停蹕躬展誠敬廣集四部揆景同蔬弘此廣因被之無外同由厥路俱至道場乃作銘曰八維悠闊九服荒茫靈聖底止咸表厥祥壽丘靉靉電繞樞光周原膴膴五緯入房自茲遐敻在處弗亡安知若水寧辨窮桑自天攸縱於惟我皇即基昔兆為世舟航重簷纍構迥剎高驤土為淨國地即金牀因斯太極溥被翱翔豈徒三界寧止十方濡足萬古援手百王一念斯答萬壽無疆如日之久如天之長在處弗亡藝文作名在處亡金牀作金剛栖禪精舍銘此寺征西蔡公所立昔廁番麾預班經創之始今重遊踐鑒舊興懷故為此銘以傳芳迹在郢州永徽三年歲次某時某月某朔某日子巖靈旅逸地遠栖禪蘭房葺蕙嶠甍架煙南瞻巫野北望淮天遙哉林澤曠矣江田空心觀寂慧相淳筌眷惟斯踐愴屬遐年遊仁廁遠宅賞憑旃頒創神苑陪構靈椽瞻禁拓圃望鷲疏山製石調響栖理凝玄曠移羽斾眇別松泉委組東國化景西蓮巒隰夷改蓬蘀粗遷重依漢遠復逐旗懸往辭妙幄今承梵筵八海鶴九噪巖蟬珮華長掩懋迹空傳式籍雲拱敢告祥緣繡像題讚并序維齊永明四年歲次丙寅秋八月己未朔二日庚申第三皇孫所生陳夫人含微宅理炳慧臨空結言寶位騰心淨覺敬因樂林寺主比丘尼釋寶願造繡無量壽尊像一軀乃為讚曰表相異儀傳形匪一鏤玉圖光雕金寫質亦有淑人含芳上律絢發綺情幽摛寶術縟文內炳靈姿外溢水耀金沙樹羅瓊實現符淨果來膺妙秩育藻震閨騰華梵室有億斯年於萬茲日彌勒讚皇太子造石彌勒太官令作讚乘教本一法門不二業基纍明功由積地眇眇長津遙遙遐轡道有常尊神無恆器脫屣王家來承寶位慧日晨開香雨霄墜藉感必從憑緣斯至曰我聖儲儀天作二尚想龍柯瞻言思媚鐫石圖徽雕金寫祕望極齊工舉光等邃超矣福臻融然理備敬勒玄蹤式傳遐懿草堂寺千僧會願文弟子沈約上白十方諸佛十方諸大聖今日見前衆僧三界非有五隂皆無四倒十纏共相和合一切如電揮萬劫於俄頃丘井易淪終漂沈於若岸迷塗邃遠弱喪忘歸區區七尺莫知其假耳目之外謂為空談靡依靡歸不信不受生靈一謝再得無期約所以撫心自惻臨踐非譬者也至聖凝寂無迹可尋緣應所感事惟拯物持鉢安行出彼祇樹不逾停午以福衆生芳塵餘法峩然未改約以往夏遘罹痾疾聖上哀矜深垂愍慮以月次徂暑日在丙寅仰會千僧於其私宅隆茲重施弗知所限既已奉祇洪德又思自罄家財一舉盈千力難私辦稍而後滿事或易充草堂約法師於所住山寺為營八集其一仰憑上定林寺祐法主今月二十九日第十會集百僧於所創田廬福不唐捐聞之經訓心路皎然又過於此凡有涓毫應證來業無巨無細咸歸聖主仰願十方共明此誓豈足少酬天眷蓋以微寄誠心云爾懺悔文弟子沈約稽首上白諸佛衆聖約自今生已前至于無始罪業參差固非詞象所𮅕識昧往緣莫由證舉爰始成童有心嗜欲不識慈悲莫辨罪報以為毛羣魪品事允庖廚無對之緣非惻隱所及晨銼暮爚亘月隨年嗛腹填虛非斯莫可兼曩昔蒙稚精靈靡達遨戲之間恣行夭暴蠢動飛沈罔非登俎儻相逢值橫加剿撲却數追念種彚實蕃遠憶想間難或詳盡又暑月寢臥蚊虻噆膚忿之于心應之于手嵗所殲殞略盈萬計手因怒運命因手傾為殺之道事無不足迄至于今猶未頓免又嘗竭水而漁躬事網牽驅士卒歡娛賞會若斯等輩衆夥非一黨𨽾賔遊愆眚交互或盜人園實或偷人芻豢弱性蒙心隨喜讚悅受分吞贓皎然不昧性愛墳典苟得忘廉取非其有卷將二百又綺語者衆源條繁廣假妄之愆雖免大過微觸細犯亦難備陳又追尋少年血氣方壯習纍所纏事難排豁淇水上宮誠無云幾分桃斷袖亦足稱多此實生死牢穽未易洗拔灌志慘舒性所同稟遷怒過嗔有時或然厲色嚴聲無日可免又言謔行止曾不尋研觸過斯發動淪無紀終朝紛擾薄暮不休來果昏頑將由此作前念甫謝後念復興尺波不息寸隂驟往愧悔攢心罔知云厝今於十方三世諸佛前見在衆僧大衆前誓心克己追自悔責收遜前愆洗濯今慮校身諸失歸命天尊又尋七尺所本八微是構析而離之莫知其主雖造業者身身隨念滅而念念相生離續無已往所行惡造既由心行惡之時其心既染既染之心雖與念滅往之所染即成後緣若不本諸真諦以空滅有則染心之纍不卒可磨今者興此愧悔磨昔所染所染得除即空成性其性既空庶罪無所託布髮頂禮幽顯證成此念一成相續不斷日磨嵗瑩生生不休迄至道場無復退轉又彼惡加我皆由我昔加人若不滅此重緣則來惡彌遘當今斷絶永息來緣道無不在有來斯應庶達今誠要之咸達齊竟陵王題佛光文一首夫理貫空寂雖鎔範不能傳業動因應非形相無以感是故日華月彩照曜天外方區散景咫尺塵方太祖皇帝濯襟慧水凝神淨域厭世珍升遷靈寶地竟陵王諱泣明臺之下臨慟高山之方遠慕戀瓶王情殷雙樹永惟可以炳發神功崇高妙業莫若式金寫好資巧匠傳儀以皇齊之四年日子敬制釋迦像一軀尊麗自天工非世造色符留影妙越檀香俾穀林之思永旌於萬劫用刊徽迹式垂不朽云爾南齊皇太子解講疏皇太子以建元四年四月十五日集大乘望僧於玄圃園安居寶地禁苑皆充供具珍臺綺榭施佛及僧震玄音於六宵暢微言於永劫三達宣其妙果十住讚其祥緣踐二氣而業升離九旬而功就暨七月既望乃敬捨寶軀爰及輿冕自纓已降凡九十九物願以此力普被幽明帝室有嵩華之固蒼黔饗仁壽之福若有淪形苦海得隨理悟墜體翱塗不遠斯復十方三世咸證伊言兹誓或騫無取正覺南齊竟陵王發講疏并頌大矣哉妙覺之為妙也無相非色空不可極而立言垂訓以汲引為方慈波慧水雖可溉而莫知其源者也靈篇寶籍遠探龍藏蓋無得而言焉至于義指天山之表文隱交河之外又非斷籌所能算也逮于祇樹菴園之妙吼四諦一乘之正説重譯而通中土莫不恆沙之一焉而詞源海廣理塗靈奧雖字流附響萬軫同起分條散葉離文析句未或暨其萬一也竟陵王殿下神超上地道冠生知樹寶業於冥津凝正解於沖念若夫方等之靈邃甘露之深玄莫有不遊其塗而啓其室也祕藏之被東國者靡不畢集皆繕以寶縑文以麗篆凝光瓊笥炫彩瑤縢思欲敷震微言昭感未悟乃以永明元年二月八日置講席於上邸集名僧於帝畿皆深辨真俗洞測名相分微靡滯臨疑若曉同集於邸內之法雲精廬演玄音於六宵啓法門于千載濟濟乎實曠代之盛事也自法王以降暨于聽僧條載如左以記其事焉乃作頌曰十號神寂三達空玄迹由聖隱教以慈宣氤氳緒法昭晣𨘤筌標聲妙住騰華寶蓮文摛龍藏義溢中天惟王稟照道冠增璿星羅寶幄雲開梵筵思馳春馬理析秋蟬靈場絢彩正水興蓮乘茲上界永導芳緣南齊竟陵王解講疏二首夫憑形輝化必由委氣之塗因方導理必同肖天之質是以表靈邃瑞誕聖王宮駐彩辰緯停華日月故能積慈成聖纍妙成空坦照路於道場拔迷根於苦岸弟子蕭子良滌盥煩襟栖情正業肅萃僧英敬敷慧典密藏奧文雲開雨散今魄首丹逵日弦上朔止步凝想空明屬念雖神迹稍緬而遺塵在茲乃飾筵藻殿張帳盛邸潔誠祇事建斯寶集蘭泉波湧芳藹雲回祕理探微玄況悠邈宗條既舉窮功允就論堂卷座義鼓停音乘此芳緣將升上住十方三世有證無爽又夫妙極衆象湛思必通理冠羣方有感斯應自鸞音輟唱圓光寢輝委華之相不傳涌地之符已遠行言入道事難於造次一悟階空效隔於俄頃若非積毫成仞纍爝為明無以方軌慧門維舟法岸弟子是用夕惕載懷惟日不足者也故敬集名僧演敷奧籍震微起滯輪動雲回月殿含呂魄弦上日甘露既窮輟言寶座卷文罷席衣屣相趨仰惟先后稟靈娥德叶景軒度道載華嶽化洽汾隂早棄蘭宮夙違椒掖千乘不追萬鍾靡及終天之慕不續於短年欷報之誠思隆於永劫敬捨軀服以充供施藉此幽通控情妙覺仰願聖靈速登寶位越四天之表記十號之尊惟茲三世咸證於此敢誓丹衷庶符皎日南齊皇太子禮佛願疏維年月朔日皇太子某稽首和南十方諸佛一切賢聖夫至理可祈必憑誠於正覺極妙有感乃歸仰於真如然後取證現前獲驗兹日去歲皇帝暫虧御膳小廢乾行四海震惶百司戰悚諱歷劫多幸夙世善緣忝生王家叨守儲嗣臣子心地倍用焦迫禁門旦啓欣問豎之安寢扉早闢訪膳夫之宰祇樹獨園伏膺下拜伽藍精舍繞足頂禮百神警衛萬福具臻曾不信宿聖躬和愈豈非三寶之弘慈十號之法力既而天從心欲誠願克果今於崇正殿奉還法會千僧仍留百僧八關行道又度二士同日出家惟願藉此功德奉資皇帝陛下壽與南山共久年將北極俱長道懋農軒德高堯舜上界八萬之劫可期下方七百之祚未擬元良之位長守膝下之歡上嗣之所永保懷袖之愛以茲法田奉中宮皇后殿下福履攸善無思不屆天母之德厚載不能加任姒之盛坤儀寧足匹末及諸王妃主宮掖嬪房未來因緣過去眷屬並同茲辰預此慈善又普為積苦餓鬼受罪畜生三途八難六道十惡水陸蠢動山藪翾飛濕生化生有想無想皆藉今日慈悲咸簉浣濯人天攝受幽顯證明庶憑衆力共相津濟謹疏朔日下集有子字某作諱南齊南郡王捨身疏弟子蕭王上白諸佛世尊道德僧衆夫色固無象觸必歸空三世若假八微終散雖復回天震地之威窮於寂滅齊冠楚組之麗靡救埃壤而嗜欲易繁每疚心術捨施難弘用迷假照弟子樹因曠劫嚮報茲生託景中璇聯華日彩玉組夙紆蕃麾早建蘭池紫燕之乘擾於外間黼帳翠帷之飾光於中寢徒以心源尚滯情路未昭識謝兼忘理慚獨悟不能叶調五氣綏御六神霜暑或褰風露時舛是以敷襟上寶栖誠妙覺敬捨肌膚之外凡百一十八種當令經衛夙理府絡時順萬祉雲翔百妖窮滌望北極而有恆瞻南山而同永又願宸居納祐則天均慶少陽介福儷日承休儲妃闡膺祥之符皇枝廣惟祺之祚敬飾崇甍嚴置寶幄仰延息心旁旅清信勗茲弘誓證其幽疑庶可以感降禎和招對靈應玄塗匪昧要之無爽捨身願疏優婆塞沈君敬白十方三世諸佛本師釋迦如來安養阿彌陀世尊云云一切衆聖今日道俗諸大賢德夫形非定質衆緣所聚四微不同風火亦異析而離之本非一物燕肝越膽未足為譬靜念求我無時可得而積此淪昏生生不已一念儻值曾未移時障習相蕩旋迷厥路橫指空呼名之為有豐己傷物日夜靡休蓄身外之財以充其欲攘非己之分用成其侈豈直溫肌啖腹若此而已哉至於積篋盈藏未嘗登體溢俎充庖既飫斯棄曾不知粟帛所從事非因己悠悠黔首同有其分離多共寡猶或未均我若有餘物何由足仁者之懷不應若此侵他之財世稱為盜盜之甚者孰過於斯幽顯推求無一或可君仰藉時來久乘休運玉粒晨炊華燭夜炳自此迄今歷年三十遂乃服冕榮國裂土承家潤盈身已慶流僕妾家非懸磬俸有兼金救寒止於重裘而笥委餘襲冬夜既蒙纍繭而櫝有贏衾自斯已上侈長非一雖等彼豪家其陋已甚方諸窶室所邁實多悟此非常事由諸佛有懷捨散宜先道場飢寒困苦為患乃切布滿州縣難悉經緣其當稱力因事一旦隨年頭目髓腦誠難輕慕虧己贍物未易頓行誓欲廣念深恩積微成著施路檀門冀或能踐以大梁天監之八年年次玄枵日殷鳥度夾鍾紀月十八在於新所創蔣陵皇宅請佛及僧髣佛祇樹息心上士凡一百人雖果謝菴園飰非香國而野粒山蔬可同屬饜兼捨身資服用百有一十七種微自損撤以奉現前衆僧夫室家患苦刀俎非切制除蕭散形質超然蠢彼羣生咸有佛性不因翦削此路莫由緣業舛互世諦煩記變形改飾即事為難故關以八支導彼清信一日一夜同佛出家本弘外教事非僧法而世情乖舛同迷斯路招屈名僧置之虛室主人高臥取逸間堂呼為八關去之實遠雖有供施之緣而非斷漏之業約今謹自即朝至于明旦排遣俗纍一同善來分留上德勗成微志藉此輕因庶證來果功德之言非所敢及與草堂寺約法師書周中書風趣高奇志託夷遠真情素韻水桂齊質自接彩同棲年逾一紀朝夕聯事靡日暫違每受沐言休逍遙寡務何嘗不北茨遊覽南居宴宿春朝聽鳥秋夜臨風匪設空言皆為實事音容滿目言笑在耳宿草既陳楸檟將合眷往懷人情不勝慟此生篤信精深甘此藿食至於歲時包篚每見請求凡厥菜品必令以薦弟子輒靳而後與用為歡謔其事未遠其人已謝昔之諧調倐成悲緒去冬今歲人鬼見分石耳紫菜愴焉興想淚下不禁指遣恭送以充蔬僧一飯法師與周情期契闊非止恆交覽物存舊彌當楚切痛矣如何往矣奈何弟子沈約和南並廣弘明集周謂周顒謝齊竟陵王示華嚴瓔珞啓竊以六詩雨散百氏雲興或事止褒刺或義單小辨莫不雕風煙之氣狀流日月之英華明公該玄體妙凝神宙表廕法雲於六合揚慧日於九天因果悟其初心菩提證其後業陟無生之遠岸泛正水之安流受三遠十號之尊崇建四辨八聲之妙極法身與金剛齊固常住與至理俱存受三遠二句集作爰建三遠云云上錢隨喜光宅寺啓伏惟中陽故里舂陵舊居夷漫滌蕩曾無遺築若使大教早流法遵二代開塔白水樹剎枌榆可以傳美垂迹迄今不朽樹集作建送育王像并上錢燭等啓竊以無名無色理絶應感不身即身猶觀願力惟願燈明道成長為八喜之侶菩提無上永廁千子之蹤並藝文類聚謝賜法音寺甘露啓約言左右徐儼宣敕垂賜法音寺松葉上甘露臣往年經見不過霑條而已時或凝結才若輕霧未有玉聚珠聯光粲若是實由積仁上通冥德下降故能委華霄極氛被後雕慈旨曲洽頒此祥賚不任欣荷謹以啓事謝以聞初學記臨終勸加篤信表藝文作啓臣約言臣抱疾彌留迄今即化形神欲離月已十數窮楚極毒無言以喻平日健時不言若此舉刀坐劒比此為輕仰惟深入法門厲茲若節內矜外恕實本人情伏願聖心重加推廣微臣臨途無復遺恨雖慙也善庶等鳴哀謹啓廣弘明集欽定四庫全書
