body:
  text: 明梅鼎祚輯無名氏一此下序記並未詳作者經及論律第以世代為次後漢吳東晉符秦姚秦宋後魏隋四十二章經序後漢昔漢孝明皇帝夜夢見神人身體有金色項有日光飛在殿前意中欣然甚悅之明日問羣臣此為何人也有通人傅毅曰臣聞天竺有得道者號曰佛輕舉能飛殆將其神也於是上悟即遣使者張騫羽林中郎將秦景博士弟子王遵等十二人至大月支國寫取佛經四十二章在十四石函中登起立塔寺於是道法流布處處修立佛寺遠人伏化願為臣妾者不可稱數國內清寧含識之類蒙恩受賴于今不絶也出三藏記集佛説興起行經序一名嚴成宿緣經後漢外國三藏康孟詳譯所謂崑崙山者則閻浮利地之中心也山皆寶石周匝有五百窟窟皆黃金常五百羅漢居之阿耨大泉外周圍山山內平地泉處其中泉岸皆黃金以四獸頭出水其口各繞一匝已還復其方出投四海象口所出者則黃河是也其泉方各二十五由延深三厥劣一厥劣者七里也泉中有金臺方一由延臺上有金蓮華以七寶為莖如來將五百羅漢常以月十五日於中説戒因舍利弗問佛十事宿緣後以十五日時將本弟子説訖乃止如是至九往所以十問而九答者以木鏘之對人間償之欲示人宿緣不可逃避故也又阿耨泉中非有漏礙形所可周遊雖有阿難為如來所接也所以殷勤告舍利弗者欲化諸龍故也大藏與字函法句經序吳曇鉢偈者衆經之要義曇之言法鉢者句也而法句經別有數部有九百偈或七百偈及五百偈偈者結語猶詩頌也見佛見事而作非一時言各有本末布在衆經佛一切智厥性大仁愍傷天下出興于世開現道義所以解人凡十二部經總括其要別為四部四部阿含佛去世後阿難所傳卷無大小皆稱聞如是處佛所究暢其説是後五部沙門各自鈔衆經中四句六句之偈比次其義條別為品於十二部經靡不斟酌無所適名故曰法句夫諸經為法言法句者猶法言也近世葛氏傳七百偈偈義致深譯人出之頗使其渾漫唯佛難值其文難聞又諸佛興皆在天竺天竺言語與漢異音云其書為天書語為天語名物不同傳實不易唯昔藍調安侯世高都尉弗調譯梵為漢審得其體斯以難繼後之傳者雖不能密猶尚貴其實粗得大趣始者維祇難出自天竺以黃武三年來適武昌僕從受此五百偈本請其同道竺將炎為譯將炎雖善天竺語未備曉漢其所傳言或得梵語或以義出音近於質直僕初嫌其為辭不雅維祗難曰佛言依其義不用飾取其法不以嚴其傳經者當令易曉勿失厥義是則為善座中或曰老氏稱美言不信信言不美仲尼亦云書不盡言言不盡意明聖人意深邃無極今傳梵義實宜徑達是以自竭受譯人口因循本旨不加文飾譯所不解則闕不傳故有脫失多不出者然此雖辭朴而旨深文約而義博事均衆經章有本故句有義説其在天竺始進業者不學法句謂之越敘此乃始進者之鴻漸深入者之奧藏也可以啓蒙辨惑誘人自立學之功而所包者廣實可謂妙要者哉昔傳此時有所不出會將炎來更從咨問受此偈等復得十三品并校往古有所增定苐其品目合為一部三十九篇大凡偈七百五十二章都凡一萬四千五百八十字庶有補益共廣聞焉大藏所字函出三藏別有四部無下四部二字衆經作采經或曰作咸曰復得作重得往古作往故首楞嚴三昧經注序東晉首楞嚴三昧者晉曰勇猛伏定意也謂十住之人志當而功顯不為而務成蓋勇猛伏之名生於希尚者耳雖功高天下豈係其名哉直以忘業宗而稱立遺稱故名遺訓三千敷典誥羣生瞻之而弗及鑽之而莫喻自非奇致超玄梵可以應乎聖録所謂勇猛者誠哉難階也定意者謂迹絶仁智有無兼忘雖復寂以應感惠澤者蒼生何嘗不通惠以仁智照以玄宗所以寂者未可得而分也故其篇云悉遍諸國亦無所分於法身不壞也謂雖從感若流身充宇宙豈有為之者哉謂化者以不化為宗作者以不作為主為主其自忘焉像可分哉若至理之可分斯非至極也可分則有虧斯成則有散所謂為法身者絶成虧遺合散靈鑒與玄風齊蹤員神與太陽俱暢其明不分萬類殊觀法身全濟非亦宜乎故曰不分無所壞也首楞嚴者沖風冠乎知喪洪緒在於忘言微旨盡於七住外迹顯乎三權洞重玄之極奧耀八特之化筌插高木之玄標建十準以伺能玩妙旨以調習既習釋而知玄遺慈故慈洽棄照而照宏也故有陶化育物紹以經綸自非領略玄宗深達奇趣豈云究之哉沙門支道林者道心冥乎上世神悟發於天然俊朗明徹玄映色空啓于往數位敘三乘余時復疇咨豫聞其一敢以不敏係于句末想望來賢助刪定焉漸備經十住梵名并書序波牟提陀晉曰一住維摩羅晉曰二住波披迦羅晉曰三住阿至摸晉曰四住頭都耶晉曰五住阿比目佉晉曰六住頭羅迦摩晉曰七住阿遮羅晉曰八住抄頭摩提晉曰九住曇摩彌迦晉曰十住漸備經晉曰十住名第一住名悅豫第二住名離垢第四住名興光第四住名輝耀第五住名難勝第六住名目前第七住名玄妙第八住名不動第九住名善哉意第十住名法雨漸備經十住行第一住今亡第二住説戒行事第三住説十二門五通事第四住説三十七品事第五住説四諦事第六住説十二因緣事第七住説權智事第八住説神足變化事第九住説神足教化事第十住亦説神足教化事漸備經護公以元康七年出之其經有五卷五萬餘言第一卷説一住事今無此一卷今現有二住以下至十住為十品漸備經十住與本業大品異説事委悉於本業大品不知何以曀於涼州昔涼州諸道士釋教道竺法彥義斯二道士並皆博學以經法為意不知何以不集此經亦不聞其有所説始知博聞之難其人興顯經且亦是大經説事廣大義理幽深乃是衆經之美望辭敘茂贍真有奇聞而帛法巨亦是博學道士昔鄴中亦與周旋不知何以復不集此經又不聞其言博聞強記信難有護公出須賴經雖不見恆聞彥説之張天錫更出首楞嚴故當應委於先者元康七年十一月二十一日沙門法護在長安市西寺中出漸備經手執梵本譯為晉言護公菩薩人也尋其餘音遺迹使人仰之彌遠夫諸方等無生諸三昧經類多此公所出真衆生之冥梯大品出來雖數十年先出諸公略不綜習不解諸公何以爾諸公才明過人當能心思研心以為至業者故當極有所得先出諸公故恨太簡於文句殊多可恨大品頃來東西諸講習無不以為業於文句猶不同覺其轉深但才分有限思尋有極幽旨作非短思所盡然文句故可力為方欲研之窮此一生冀有微補漸備經恨不得上一卷冀因緣冥中之助忽復得之漸備所説十住位分衆行各有階級目下殊異於衆經方欲根悉研尋之如令茫茫猶涉大海不知第一住中何説彼或有因緣信使君不可不持作意盡尋求之理大品上兩卷若有可尋之階亦勤以為意護公出光讚計在放光前九年不九年當八年不知何以遂逸在涼州不行於世尋出經時乃在長安出之而都不流行乃不知其故吾往在河北唯見一卷經後記云十七章年號日月亦與此記同但不記處所所以為異然出經時人云聶承遠筆受帛元信沙門法度此人皆長安人也以此推之略當必在長安出此經梵本亦言于闐沙門祗多羅所賫來也此同如慧常等涼州來疏正似涼州出未詳其故或乃護公在長安時經未流宣唯持至涼州未能乃詳審泰元元年歲在丙子五月二十四日此經達襄陽釋惠常以酉年因此經寄牙市人康兒展轉至長安長安安法華遣人送至牙市牙市人送達襄陽付沙門釋道安襄陽時齊僧有三百人使釋僧顯寫送與揚州道人竺法汰漸備經以泰元元年十月三十達襄陽亦是慧常等所送與光讚俱來頃南鄉間人留寫故不與光讚俱至耳首楞嚴須賴並皆與漸備俱至涼州道人釋慧常歲在壬申於內苑寺中寫此經以酉年因寄至子年四月二十三日達襄陽首楞嚴經事事多于先者非第一第二第九此章最多近三四百言許於文句極有所益須羅經亦復小多能有住處云有五百戒不知何以不至此乃最急四部不具於大化有所闕般若經乃以善男子善女人為教首而戒立行之本百行之始猶樹之有根常以為深恨若有緣便盡訪求之理先梵本有至信因之勿零落此文多有脫誤阿毗曇心序釋和尚昔在關中令鳩摩羅跋提出此經其人不間晉語以偈本難譯遂隱而不傳至於斷章直云修妬路及見提婆乃知有此偈以偈檢前所出又多首尾隱沒互相涉入譯人所不能傳者彬彬然是以勸令更出以晉泰元十六年歲在單閼貞于重光其年冬於潯陽南山精舍提婆自執梵經先誦本文然後乃譯為晉語比丘道慈筆受至來年秋復重與提婆校正以為定本時衆僧上座竺僧根支僧純等八十人地主江州刺史王凝之優婆塞西陽太守任固之為檀越並共勸佐而興立焉並出三藏經集法顯傳自記遊天竺事後序是歲甲寅晉義熙十二年歲在壽星夏安居末迎法顯道人既至留共冬齋因講集之際重問遊歷其人恭順言輒依實由是先所略者勸令詳載顯復具敘始末自云顧尋所經不覺心動汗流所以乘危履嶮不惜此形者蓋是志有所存專其愚直故投命於不必全之地以達萬一之冀於是感歎斯人以為古今罕有自大教東流未有忘身求法如顯之比然後知誠之所感無窮否而不通志之所獎無功業而不成成夫功業者豈不由忘失所重重失所忘者哉大藏兵字函沙彌十戒并威儀序失譯人名今附東晉録夫乾坤覆載以人為貴立身處世以禮儀為本君臣父子非禮不立防邪止姧非禮不禁和國崇婚非禮不定遜悌鄉邑非禮不通師徒朋友非禮不敬吊喪問疾非禮不行昔先賢垂範永以為軌則喪祭之儀世務之急是以信行之機旦夕之要今世浮遊或輕或重或深或淺不諧法則以致譏論大藏叔字函戒因緣經鼻奈耶序苻秦案歲壬午秦主苻堅建元十三年阿難出經面承聖旨五百應真更互定察分為十二部於四十九年之誨無片言遺失又抄十二部為四阿含阿毗曇鼻奈耶三藏備也天竺學士罔弗尊焉諷之詠之未墜於地也其大高座沙門則兼該三藏中下高座則通一通二而已耳經流秦土有自來矣隨天竺沙門所持來經遇而便出於十二部毗曰羅部最多以斯邦人莊老教行與方等經兼忘相似故因風易行也道安常恨三藏不具以為闕然歲在壬午鳩摩羅佛提賚阿毗曇抄四阿含抄來至長安渴仰情久即於其夏出阿毗曇抄四卷其冬出四阿含抄四卷又其伴罽賓鼻奈厥名耶舍諷鼻奈經甚利即令出之佛提梵書佛念為譯曇景筆受自正月十二日出至三月二十五日乃了凡為四卷與往年曇摩侍出戒典相似如合符焉於二百六十事疑礙之滯都謏然焉上聞異要煥乎可觀焉二年之中於此秦邦三藏具焉然世尊制戒必有所因六羣比丘生於貴族攀龍附鳳雖貪出家而豪心不盡鄙悖之行以成斯戒二人得道二人生天二人墮龍一入無擇明恃貴不節自遺伊戚向使中開家子遇佛出學雖不能一坐成道何由如此之困乎然此經是佛未制戒時其人所犯穢漏行多既制之後改之可貴天竺持律不都通視唯諸十二法人堅明之士乃開緘縢而共相授耶舍見囑見誨諄諄人可使由之不可使知其言切至乃自是也而今以後秦土有此一部律矣唯願同我之人尤慎所授焉未滿五歲非持律人幸勿與之也大藏凡字函四阿含暮抄序阿含暮者秦言趣無也阿難既出十二部經又採撮其要徑至道法為四阿含暮與阿毗曇及律並為三藏焉身毒學士以為至德未墜於地也有阿羅漢名婆素跋陀抄其膏腴以為一部九品四十六葉斥重去復文約義豐真可謂經之瓔鬘也百行美妙辨是與非莫不悉載也幽奧深富缺一字行之能事畢矣有外國沙門字因提麗先賫詣前部國祕之佩身不以示人其王彌第求得諷之遂得布此余以壬午之歲八月東省先師寺廟於鄴寺令鳩摩羅佛提執梵文佛念佛護為譯僧導曇究僧睿筆受至冬十一月乃訖此歲夏出阿毗曇冬出此經一年之中具二藏也深以自幸但恨八九之年始遇斯經恐韋編未絶不終其業耳若加數年將無大過也近勑譯人直令轉梵為秦解方言而已經之文質所不敢易也又有懸數懸事皆訪其人為注其下時復以意消息者為其章注修妬路者其人注解別經本也其有直言修妬路者引經證非注解也大藏藉字函章注出三藏作章章注僧伽羅剎所集佛行經序僧伽羅剎者須賴國人也佛去世後七百年生此國出家學道遊教諸邦至揵陀越土甄陀罽二王師焉高明絶世多所述作此土修行道地經其所集也又著此經憲章世尊自始成道迄于淪虛行無巨細必因事而演遊化夏坐莫不曲備雖普耀本行度世諸經載佛起居至謂為密今攬斯經所悟復多矣傳其將終我若立根得力大士誠不虛者立斯樹下手援其葉而棄此身使那羅延力大象之勢無能移余如毛髮也正使就耶維者當不燋此葉言然之後便即立終罽二王自臨而不能動遂以巨絙象挽未始能搖即就耶維炎葉不傷尋升兜術與彌勒大士高談彼宮將補佛處賢劫第八以建元二十年罽賓沙門僧伽跋澄賫此經本來詣長安武威太守趙文業請令出焉佛念為譯慧嵩筆受正直慕容作難於近郊然譯出不衰余與法和對檢定之十一月三十日乃了也此年出中阿含六十卷增一阿含四十六卷伐鼓擊柝之中而出斯一百五卷窮通不改其恬詎非先師之故迹乎大藏宜字函尊婆須蜜菩薩所集論序婆須蜜菩薩大士次繼彌勒作佛名師子如來也從釋迦文降生鞞提國為大婆羅門梵摩渝子厥名鬱多羅父命觀佛尋侍四月具覩相表威變容止還白所見父得不還已出家學改字婆須蜜佛般涅槃後遊教周妬國槃奈園高才蓋世奔逸絶塵撰集斯經焉別七品為一犍度盡十三犍度其所集也後四品一犍度訓釋佛偈也凡十一品十四犍度也該羅深廣與阿毗曇並興外國傍通大乘特明盡漏博涉十法百行之能事畢矣尋之漭然猶滄海之無涯可不謂之廣乎陟之瞪爾猶崑嶽之無頂可不謂之高乎寶渚極目猒夜光之珍巖岫舉睫猒天智之玉懿乎富也何過此經外國升高座者未墜於地也集斯經已入三昧定如彈指頃神升兜術彌妬路刀利及僧伽羅剎適彼天宮斯二三君子皆次補處人也彌妬路刀利者光炎如來也僧伽羅剎者柔仁佛也茲四大士集乎一堂對揚權智賢聖默然洋洋盈耳不亦樂乎罽賓沙門僧伽跋澄以秦建元二十年傳此經一部來詣長安武威太守趙政文業者學不猒士也求令出之佛念譯傳跋澄難陀禘婆三人執梵本慧嵩筆受以三月五日出至七月十三日乃訖梵本十二千首盧也余與法和對校修飾武威少多潤色此經説三乘為九品特善修行以止觀徑十六最悉每尋上人之高韻未嘗不忘意味也恨窺數仞之門晚懼失其宗廟之美百官之富矣大藏集字函出三藏經集富矣作富也達摩多羅禪經序姚秦夫三業之興以禪智為宗雖精粗異分而階籍有方是故發軫分逵途無亂轍革俗成務功不待積靜復所由則幽詣告微淵博難究然理不云昧庶智統可尋試略而言禪非智無以窮其寂智非禪無以深其照然則禪智之要照寂之謂其相濟也照不離寂寂不離照感則俱遊應必同趣功玄於在用交養於萬法其妙物也運羣動以至一而不有廓大象於未形而不無無思無為而無不為是故洗心靜亂者以之研慮悟徹入微者以之窮神也若乃將入其門機在攝會理玄數廣道隱於文則是阿難曲承音詔遇非其人必藏之靈府何者心無常規其變多方數無定象待感而應是故化行天竺緘之有象幽關莫闢罕窺其庭從此而觀理有行藏道不虛授良有以矣如來泥曰未久阿難傳其共行弟子末田地末田地傳舍那婆斯此三應真咸乘至願冥契于昔功在言外經所不辨必暗軌元匠孱焉無差其後有優波崛弱而超悟智絶世表才高應寡觸理從簡八萬法藏所存惟要五部之分始自於此因斯而推固知形運以系廢興自兆神用則幽步無迹妙動難尋涉粗生異可不慎乎可不察乎自此以來感於事變懷其舊典者五部之學並有其人咸懼大法將頽理深其慨遂各述讚禪經以隆盛業其為教也無數方便以求寂然寂乎惟寂其揆一耳而尋條求根者衆統本運末者寡或將暨而不至或守方而未變是故經稱滿願之德高普事之風原夫聖旨非徒令其長亦所以救其短若然五部殊業存乎其人人不經世道或隆替廢興有時則互相升降小大之目其可定乎又達節善變出處無際晦名寄迹無聞無示若斯人者復不可以名部分既非名部之所分亦不出于其外別有宗明矣每慨大教東流禪數尤寡三業無統斯道殆廢頃鳩摩耆婆宣馬鳴所述乃有此業雖其道未融蓋是為山於一簣欣時來之有遇感奇趣於若人捨夫制勝之論而順不言之辨遂誓被僧那至寂為己任懷德未忘故遺訓在茲其為要也圖大成於未象開微言而崇體悟惑色之悖德社六門以寢患達忿競之傷性齊彼我以宅心於是異族同氣幻形告疏入深緣起見生死際爾乃闢九關於龍津超三忍以登位垢習凝於無生形纍畢於神化故曰無所從生靡所不生於諸所生而無所生今之所譯出自達摩多羅與佛大先其人西域之俊禪訓之宗搜集經要勸發大乘宏教不同故有詳略之異達摩多羅闔衆篇於同道開一色為恆沙其為觀也明起不以缺一字生滅不以盡雖往復無際而未始出於如故曰色不離如如不離色色不離如色則是如如不離色如則是色佛大先以為澄源引流固宜有漸是以始自二道開甘露門釋四義以反迷啓歸途以領會分別陰界導以止觀暢散緣起使優劣自辨然後令原始反終妙尋其極其極非盡亦非所盡乃曰無盡入于如來無盡法門非夫道冠三乘智通十地孰能洞玄根於法身歸宗一於無相靜無遺照動不離寂者哉庾伽遮羅浮迷譯言修行道地大藏榮字函雜阿毗曇心序宋如來泥洹數百年後有尊者法勝於佛所説經藏之中抄集事要為二百五十偈號阿毗曇心其後復有尊者達摩多羅覽其所製以為文體不足理有所遺乃更搜採衆經復為三百五十偈補其所闕號曰雜心新舊偈本凡有六百篇第之數則有十一品篇號仍舊為稱唯有擇品一品全異於先尊者多羅復即廣引諸論敷演其義事無不列列無不辨微言玄旨於是昭著自茲之後道隆於世涉學之士莫不寶之以為美悅於宋元嘉三年徐州刺史太原王仲德請外國沙門伊葉波羅於彭城出之擇品之半及論品一品有緣事起不得出竟至元嘉八年復有天竺法師名求那跋摩得斯陀含道善練茲經來遊揚都更從校定咨詳大義余不以暗短廁在二集之末輒記所聞以訓章句庶於覽者有過半之益耳出三藏經集正法念處經序後魏魏婆羅門瞿曇般若流支譯夫域中之名四等道之所生萬殊名蓋衆名之假生非有生之實然則修促共盡小大同期而金字緑編緗文素篆分途列道門張戶設既昧斷惑之境未接息言之路詎能探神測妙苞總無邊有聖將應靈因曠遠志遺髮膚施單城國及繁星駐綵夕馬騰空出四門以結念屬三疚而圓果十力在己八解俱照智兼一切慈洽萬方既而法吼傍震甘露降灑鷲山祗樹之下鹿苑連河之地衆出恆沙徒繁林竹反窮迷於升極啓重昏於燈炬雖鵠林興慕檀薪已燃教義不忘風聲逾被壽陵仰丹素之工清臺寫金玉之質水骨流輝園閭加等遺契餘旨薄傳前載幽宗絶唱方備茲辰使持節大將軍領中書監攝吏部尚書京畿大都督渤海王世子高公遒風虛邁神襟峻遠負日月於中衢擊雷霆於上路德表生民作舟梁於夷夏器含羣物制天淵於廟堂殊流共委酌而不竭異軫同鶩仰以知歸黃扉南闢鈴閣東啓則有高士通才幽人偉器懱其漢爵之重鄙其南嶽之遊曳裾高步自得門下俱申前趣之禮並應却行之眷蓋以書奏多方術呈異等或披卷而止或一貫獨得每留神釋典洞叩玄門以夫照壁瀉瓶遺文必舉非徒九部寧止十二遏矣西方路超百宿精力苦心不憚重趼故能法藏流行異文俱湊爰有舍城妙説時將感通法螺良藥響授斯在從善業之本極身念之際標品有七明義者五至如違俗絶世託想菩提眷彼天人深嗟鬼畜鑒茲因果冥心是緣篤誠修行又悟前旨載懷依仰形殊理一大覺下臨昭然獨曉四攝六通網羅羣智贊揚妙德事屬斯文直以風殊俗舛詞翰乖絶傾耳注目隔若山河將恐靈教有虧玄旨多墜有婆羅門人瞿曇流支比丘曇林僧昉等並鈎深索隱言通理接延居第館四事無違乃譯明茲典名正法念處起自興和歲陽玄黓終於武定淵獻之年條流積廣合七十卷微言不昧宏之在我大崇覺典克宣靈迹此乃濟四部於法橋涮六塵於定水心殷業重無德而言雖龍樹不追馬鳴日遠申法尊道夫豈異昔所以緇素擊節雅俗傾首義有存焉永法三界云爾大藏非字函大乘唯識論序一名破色心論天親造魏國沙門統菩提流支譯唯識論者乃是諸佛甚深境界非是凡夫二乘所知然此論始末明三種空何者為三一者人無我空二者因緣法體空三者真歸佛性空我空者我本自無但凡夫之人愚癡顛倒於五陰中妄計為有何以知無凡夫依心識妄想分別於五陰因緣法中見我為有然此我想於五陰中實不可得若爾般若觀此五陰中一二離二實體不可得猶如兔角若有此我於一中住者應於一中見應於異中見應於和合中見云何一中無我者以有常無常過故若有我與五陰一者五陰無常我亦應無常復有我欲與陰一者我是常故陰亦應常我若與陰二者一邊即同前無常一邊即同前常若離二邊者此亦不然離於二邊別相不可得是故實無人我如是知者名入人無我空因緣法體空者謂諸色等因緣法以隨俗因緣起云何隨俗因緣起世人見牛起於牛想不起馬想見馬起於馬想不起牛想色等法中亦復如是見柱起柱想不起色想見色起色想不起柱想如薪火相待無實薪以離於薪更無實火以離於火更無實薪於薪更無實火以離於火更無實薪於薪更無實火能作薪因以離於火更無實薪能作火因而見火説假名薪見薪説假名火以相待成故如是能成所成而不離能成因而有所成不離所成因而有能成如彼薪火能成所成亦實無是名因緣法體空真如法空者所謂佛性清淨之體古今一定故經云佛性者名為第一義空所言空者體無萬相故言其空無萬相者無有世間色等有為法故無萬相非是同於無性法以其真如法體是故經云去八解脫者名不空空是故不同無法空也若如是觀是名解真如法空唯識論言唯識者明但有內心無色香等外諸境界何以得知如人目有膚翳妄見毛輪揵闥婆城等種種諸色裏無前境界但虛妄見有如是諸衆生等外諸境界故言唯識若爾但應言破色不應言破心此亦有義心有二種一者相應心二者不相應心相應心者謂無常妄識虛妄分別與煩惱結使相應名相應心不相應心者所謂常住第一義諦古今一相自性清淨心今言破心者唯破妄識煩惱相應心不破佛性清淨心故得言破心也大藏都字函合部金光明經序金光明經者教窮滿字金鼓擊於夢中理極真空寶塔涌於地上三身果備酬昔報之無虧十地因圓顯曩修之具足所以經王之號得稱於斯將知能宏贊人其位難量者也大興善寺沙門釋寶貴者即近周世道安神足伏膺明匠實曰良才玩閲羣經未嘗釋手可謂瞿曇身子孔氏顏淵者焉然貴覩昔晉朝沙門支敏度合兩支兩竺一百五家首楞嚴五本為一部作八卷又合一支兩竺三家維摩三本為一部作五卷今沙門僧就各合二讖羅什耶舍四家大集四本為一部作六十卷非止收涓添海亦是聚芥培山諸此合經文義宛具斯既先哲遺蹤貴遂依承以為規矩而金光明見有三本初在涼世有曇無讖譯為四卷止十八品其次周世耶舍崛多譯為五卷成二十品後逮梁世真諦三藏於建康譯三身分別業障滅陀羅尼最淨地依空滿願等四品足前出沒為二十二品其序略云曇無讖法師稱金光明經篇品闕漏每尋文揣義謂此説有徵而讐校無指永懷寤寐寶貴每歎此經祕奧後分云何竟無囑纍舊雖三譯本疑未周長想梵文願言逢遇大隋馭宇新經即來帝勑所司相續譯至開皇十七年法席小間因勸請北天竺犍陀羅國三藏法師暗那崛多此云志德重尋後本果有囑纍品後得銀主陀羅尼品故知法典源散派別條分承注末流理難全具賴三藏法師慧性沖明學業優遠內外經論多所博通在京大興善寺即為譯并前先出合二十四品寫為八卷學士成都費長房筆受通梵沙門日嚴寺釋彥琮校練寶珠既足欣躍載深願此法燈傳之永劫大藏食字函妙法蓮華經添品序妙法蓮華經者破二明一之指歸也降神五濁宏道三乘權智不思大悲難極先設化成之迹後示髻珠之本車雖有異雨實無差記以正覺之名許以真子之位同入法性歸之於此昔燉煌沙門竺法護於晉武之世譯正法華後秦姚興更請羅什譯妙法蓮華考詳二譯定非一本護似多羅之葉什似龜茲之文余撿經藏備見二本多羅則與正法符會龜茲則共妙法允同護葉尚有所遺什文寧無其漏而護所闕者普門品偈也什所闕者藥草喻品之半富樓那及法師等二品之初提婆達多品普門品偈也什又移囑纍在藥王之前二本陀羅尼並置普門之後其間異同言不能極竊見提婆達多及普門品偈先賢續出補闕流行余景仰遺風憲章成範大隋仁壽元年辛酉之歲因普曜寺沙門上行所請遂共正藏崛多笈多二法師於大興善寺重勘天竺多羅葉本富樓那及法師等二品之初勘本猶闕藥草喻品更益其半提婆達多通入塔品陀羅尼次神力之後囑纍還結其終字句差殊頗以改正儻有披尋幸勿疑惑雖千萬億偈妙義難盡而二十七品本文且具所願四辨梵詞遍神州之域一乘祕教悟像運之機聊記譯序之云爾開元釋教録大藏蓋字函緣生經并論序大藏華字函亦載云緣生論序原是一心積為三界癡流漫遠苦樹鬱高欲討其際難測其本理極實相之門筌窮假名之域五因七果十有二分緣生之法總備於此凡則迷而起妄聖則悟以通靈下似兔浮上如象度大哉妙覺淵乎洞盡十地與雙林俱暢聞城共稻芉咸敷至若此經獨苞彼例彼所未説此乃具演攀緣為首對治為末總則一十一門別則百二十問其旨微而密其詞約而隱經之綱目攝在茲焉并有聖者鬱楞迦附此經旨作論顯發其論也遍取三乘之意不執一部之筌先立偈章後興論釋偈有三十故亦名三十論也大業二年十月南賢豆國舊名天竺者訛也三藏法師達摩笈多與故翻經法師彥琮在東都上林園依林邑所獲賢豆梵本譯為隋言三年九月其功乃竟經二卷論一卷三藏師究論間明義解沈密琮法師博通經論兼善梵文共對葉本更相扣擊一言靡違三覆逾審辭頗簡質意存允正比之昔人差無尤失真曰法燈足稱智藏願窮後際常益世間云爾大藏敢字函違華字函作遺藥師如來本願功德經序藥師如來本願經者致福消災之要法也曼殊以慈悲之力請説尊號如來以利物之心盛陳功業十二大願彰因行之宏遠七寶莊嚴顯果德之純淨憶念稱名則衆苦咸脫祈請供養則諸願皆滿至於病士求救應死更生王者攘災轉禍為福信是消百怪之神符除九橫之妙術矣昔宋孝武之世鹿野寺沙門慧簡已曾譯出傳世流行但以梵宋不融文辭雜糅致令轉讀之輩多生疑惑矩早學梵書恆披葉典思遇此經驗其紕繆開皇十七年初獲一本猶恐脫誤未敢即至大業十一年復得二本更相讐比方為楷定遂與三藏法師達摩笈多并大隋翻經沙門法行明則長順海馭等於東都洛水南上林園翻經館重譯此本深鑑前非方懲後失故一言出口必三覆乃書傳度幽旨差無大過其年十二月八日勘方了仍為一卷所願此經深義人人共解彼佛名號處處遍聞十二夜叉念佛恩而護國七千眷屬承經力以利民帝祚遐永羣生安樂式貽來世序之云爾大藏惟字函欽定四庫全書
