body:
  text: 明梅鼎祚輯西土迦葉佛見在賢劫第三尊種婆羅門姓迦葉父梵德母財主居波羅奈城坐尼拘律𣗳下說法一會遺釋迦牟尼佛書賢劫第四尊姓剎利名悉達多父淨飯天母大清淨妙以周昭王二十四年四月八日生年十九為太子出家初于檀特山中修道六年人至象頭山經于六年於二月八日明星出時成佛號天人師時年三十說法住世四十九年至拘尸那城告諸大衆入涅槃周穆王五十二年二月十五日也佛告文殊師利汝以神力往祇洹中堂西寶樓上取我珠玉函將示大衆我初踰城離父王宮四十里到彼叢林身小疲怠權時止息時彼樹神現身告我言汝今修道定得金色身為三界大師迦葉佛涅槃時付囑我珠函并絹僧伽梨令我轉付囑汝我語神言汝絹僧伽梨非我所用我聞先老所言諸佛出世不著蠶衣我今修道如何害生以付我著汝今是魔故來相惱樹神告言汝大智人何輒粗言諸佛慈悲實不著蠶衣此絲化出非是害生汝今受此珠函開中有字我即開函具見諸奇特事有大毗尼及修多羅藏迦葉佛遺教並在此中并見僧伽梨彼佛手迹遺書付囑樹神令付與我迦葉佛書云云既讀書已地即六種震動珠函自開又放大灮樹神又告我言可將此衣函置汝左肩上常起恭敬珠函在肩能摧諸魔及伏外道令速成佛我初成道時大梵天王施我彼絲是化出非是繅繭梵天王施經絲堅牢地神王施緯絲由彼二施主共成一法衣由是義故今持施我我自成道已來常披此衣未曾損失今付悉達若得成佛取我僧伽梨安置祇洹中若轉毗尼時當為我著今留此衣汝涅槃後一百年初有無智比丘分毗尼藏遂為五部從百年後分汝修多羅當為無量部諍論由興令法速滅由彼愚僧不間三藏聞開著繒衣即謂殺繭汝若成道後彼絲自出諸國非是殺蠶故我將付𣗳神今轉付汝此函中竝是我遺教亦將付汝住持遺法法苑珠林勝軍王奉世尊父淨飯王書世尊於舍衛國化利畢已思欲往彼迦毗羅城時勝軍王承佛化導心堅歸向遂發使奉書上淨飯王淨飯王親手修書遣大臣烏那曳曩迎請世尊却後七日往赴父王之請王及眷屬倍生信仰世尊種種方便化其父王令無我心及除分別即為廣說苦集滅道四聖諦法汝皇太子悉達多證得無上甘露法味於世出世間咸蒙濟度淨飯王致世尊書汝一切義成是我親子既厭煩惱棄國出家為求無上正等正覺已聞成道教化衆生思念之心日時相續令他人得樂惟我苦惱譬如大樹因地而生既有根苗終望果實汝心已遂宜憶往願昔者所言若不證無上菩提寂靜之道誓不再入迦毗羅城大行已成宜應愍我及眷屬等佛說衆許摩訶帝經舍衛國賈人與佛書波羅奈國王夫人生一女身黃金色頭髮紺青時年十六父母欲為求壻女言若欲為我求壻者當令身黃金色頭髮紺青如是可爾父母便為求不能得佛時在舍衛國有人賈作到波羅奈國國王相見問訊以女示之言我為是女求壻天下寧有好人賈人答言我國中有人復勝是女王聞歡喜令賈人迎取佛賈人便作書與佛佛在祇洹中為諸比丘數千人說經持書人直前至佛所佛預知所說得便裂壞作書報黃金色女女得書思惟即得五通達一者眼能徹視二者耳能徹聽三者知他人心念四者知所從生五者能飛行便與父母辭訣飛到佛前佛即微笑復言迦葉佛時是金色女為貧家婦受佛經法壽終生天來生世為國王女是女端正甚好無比欲為佛娶之佛報波羅奈國金色女書人苦皆從恩愛生生當復老老當復病從病致死從死致憂哭天下苦者皆從恩愛生金色女經梁釋寶唱經律異相阿育王妾詐王與太子法慧書昔菩薩為王太子名曰法慧顏貌端正生有色相內清外淨時朝覲王王之幸妾出援太子太子力爭獲免妾反譖於王謂太子有欲於妾王拜太子為邊王去國八千里遠民歸化王妾懷怨謀除太子以蠟作印詐為王書太子曰愛身違親謂之大逆即為出眼付使者以琴樂索食王見問知收妾以棘笞之煬膠滴其瘡中熇即裂之為坑生埋佛告比丘太子宿命為童子賣白珠彼妾時為富姓女持珠不買淫視言調童子恚曰吾鑿汝目女曰棘笞膠滴裂肉生埋汝菩薩執志度無極行持戒如是爾有慢上之罪不忍面誅書到疾脫眼瞳子付使還國六度集經王子法益壞目因緣經事同四姓敕冶師書昔菩薩生於貧家貧家不育夜置四衢有四姓富而無嗣取育數月婦妊産男貧家兒稟性仁孝言輒導化父以己既産男便生凶念書敕冶師命兒到冶師所諦計錢寶兒行於城門內覩弟與輩彈胡掉戲奪書之冶師所冶師承書投弟於火父又生毒念有邸閣去國千里仍遣斯兒與邸閣書囊藏蠟封兒進半道有梵志與父遙相問遺其女賢明深知占候兒過覲梵志女竊觀男見其佩囊封書解取省讀裂書更之邸閣得書具禮詣梵志家遂以女妻兒馳啓四姓四姓聞之內塞而殞佛告比丘貧家兒者吾身是妻者裘夷是四姓者調達是菩薩法忍度無極行忍辱如是昔育此子于入吾門疾疫相仍財耗當死太卜占云兒致此菑書到極懾投之火中又與邸閣書此兒到疾以石縛腰沈之深淵梵志女改四姓與兒書吾年西重疾日困彼梵志吾之親友也厥女既賢且明今可任為兒匹極其寶帛聘禮預好小禮大聘納妻之日按斯敕矣六度集經勒那跋彌王告梨師跋陀國王敕令勒那跋彌王生太子名迦良那伽梨第二子名波婆伽梨太子請用王藏自恣布施因欲入海求索珍寶給充衆生波婆伽梨與兄共往太子叩七寶城得天女所獻如意珠紺色名旃陀麾尼于時波婆伽梨與五百賈人船滿沈海太子力挽得出波婆伽梨乘太子眠重起取樹刺刺眼盜珠而去太子匍匐到梨師跋陀國值牧牛人即為拔刺與梨師跋王守園王女願為其婦婦自立誓一心尊奉無有他意今太子一目平復太子亦誓於彼波婆伽梨無有微恨當令一目復得平復誓訖眼悉明淨勒那王知太子存敕令告下梨師跋王梨師跋王即還報使因表事情太子歸國問波婆伽梨如意寶珠答言來時藏道邊往覓才得太子即共到彼見之手捉其珠一切諸藏皆還滿復佛告阿難彼太子者今我身是勒那跋彌我父淨飯王是爾時婦者今瞿夷是波婆伽梨者今提婆達多是也太子辛苦在於汝國云何默住不來表示書到其時象馬侍送事若有違吾當自往佛報恩經波羅捺王名摩訶羅闍生第一太子善友第二太子惡友事與此類遣使往告利師跋王汝今云何擁遮太子令我憂苦梨師跋陀國王上勒那跋彌王送太子表太子在此實所不知辛酸諸事伏想委曲太子今者已還得眼即聘鄙女為太子妻比嚴辦具臣自衛送賢愚因緣經葉波國濕波王與太子須大拏書太子思惟欲行檀波羅蜜事請王中藏置四城門外及著市中以用布施有敵國遣道士乞葉波王行蓮華上白象名須檀延者太子即牽與之此象多力健鬪與諸國攻伐常勝王聞徙太子檀特山中至十一年王遣使促迎還國太子答言年滿當歸王復作手書與太子太子還國恣意布施自致得佛佛告阿難我宿命所行布施如是太子須大拏者我身是汝是智慧之人去者亦當忍來者亦當忍云何恚不還須汝飲食耳太子須大拏經王舍國瓶沙王五願經作湋比沙王與德差伊羅國弗迦沙王書一作佛迦沙王瓶沙王與弗迦沙王生未相見常通書記弗迦沙王國中生一蓮華而有千葉皆作金色遣遺瓶沙王瓶沙王見華歡喜作書與弗迦沙王弗迦沙王聞稱佛聲踊躍書與瓶沙王欲詣佛所道逢瓶沙王書又疏十二因緣送與弗迦沙王弗迦沙王竊作沙門得阿那含生十六天上得阿羅漢我國中有金銀珍寶甚多我不用為寶今我國中生一人華字佛紫磨金色身有三十二相弗迦沙王與瓶沙王書願具聞神佛所施行教戒當所奉行願具答意瓶沙王又報弗迦沙王佛教人棄家捐妻子斷愛欲當除鬚髮著法衣作沙門所以者何人愚癡故不當為者而為之便為癡從癡為行從行為識從識為名色從名色為六入何等為六入一者眼二者耳三者鼻四者口五者身六者心是為六此六事皆外向眼向色耳向聲鼻向香口向味身向細耎心向欲是為六向從六向為合從合為痛樂從痛樂為愛從愛為受從受為有從有為生從生為老死憂悲苦不如意惱如是合大苦隂隨習凡合此勤苦合名人智者自去愚癡愚癡盡衆惡消除惡消除便行盡行盡識盡識盡名色盡名色盡六入盡六入盡合盡合盡痛樂盡痛樂盡愛盡愛盡受盡受盡有盡有盡生盡生盡老死盡老死盡已憂悲苦不如意惱如是合大苦隂隨習為盡便不復生不生即得泥洹道無為弗迦沙王因緣經洴沙王五願經瓶沙王案此與前疑即一事紀載各異報弗加沙王書佛在世時弗加沙王與瓶沙王親友弗加沙王未知佛道作七寶華以遺瓶沙瓶沙轉奉上佛白佛言願令彼王見佛聞法當以何物以報所遺佛告寫十二因緣經與之瓶沙王即寫經卷別書文云弗加沙王得經信解付國太子便作沙門法服持鉢將至佛所佛知王明日命終不得見佛又不聞經甚可憐愍於是化作沙門為說專念三尊布施戒德能知無常見佛無異弗加沙王思惟意定即得阿那含道卿以寶華見遺今以法華相上詳思其義果報深美到便誦習以同道味法句譬喻經加赦國波羅奈城諸族豪䝿與梵摩達哆王書拘娑羅國王名曰長壽加赦國王名梵摩達哆常共戰諍拘婆羅國為加赦國所破長壽將妻共乘一車至波羅奈往村邑受學博聞即轉名長壽博士又往都邑街巷以歡悅顏色作妙香妓因依梵志國師家住妻懷憂戚令四種軍陳列雨簿我欲遍觀亦復得磨刀水飲梵志問師為設言于王長壽妻憂戚即除尋生德生為字長生童子猛毅聰明及梵摩達哆聞拘娑羅國王轉名長壽博士在波羅奈城中即收長壽反縛兩手出南城門坐高標下是時長生童子白父天王我即於此必能拔濟長壽告曰童子可忍但當行慈長生勸波羅奈諸貴豪族作書與梵摩達哆走往村邑受學博聞亦復以歡悅顏色作妙音妓梵摩達哆見極歡喜令依彼往爾時與長生出獵梵摩達哆疲乏遂臥長生即拔利刃著頸欲行報怨復憶父昔標下臨終戒語舉刀還鞘以實白之梵摩達哆謂長生惠與我命以女妻之還其本國佛告比丘汝等莫共鬬諍若以諍止諍至竟不見止唯忍能止諍是法可尊賢長生童子彼作是語汝不畏後為子孫作患耶中阿含經長壽王品某許國王報某國王書昔有人獨與母居未被教敕嗜酒傳戲高抗華飾母欲令改心行因以慈意演出妙訓子如法進常行柔和大得供遺財寶無量國主召為大臣復告曰某許國王本與吾親有博口者鬬令相失欲卿躬往和使如故其人因取家財供作美饌又齎寶物往詣彼國陳謝彼王欣然亦返責己便手執筆作書報之剋期會曰快其相娛惟別歷載不得言面每思舊好何日捨懷中間隔絶不及所致不見忽捐復遺賢臣美供綺璝以相謝矣剋抱來意終始不忘願一同會及散久迥今寄琦珍是身所有貴致微心言面乃敘佛說生經內佛說誨子經僧大與兄佛大書舍衛國人名厲生男曰佛大僧大僧大仁愛清淨奉佛法戒厲臥疾呼長子涕泣誡言僧大尚小方以纍汝後僧大聘妻字快見灮華煒煒端正少雙既便入山為沙門佛大心悅快見起從快見取琴彈之歌作姿彈之歌淫泆之曲快見覺兄為亂便以歌曲答拒佛大瞋恚即募賊入山殺弟僧天得應真道不畏生死乃剝樹皮取枝為筆自刺身血書樹皮與兄賊前斷頭以書見兄辭喻悽惻快見呼曰子竟坐我欽見殘賊血從口出奄忽而逝諸天咨嗟迎其魂靈處忉利天大兄起居隨時安善二親在時以吾纍兄兄不承之違廢親教以女色故骨肉相殘違親慈教為不孝也殘殺人命為不仁也殺一畜生其罪不小況殺應真吾不中止兄自招之今吾有形可得相殺善遊寂寞徒復相害長別努力願崇真道佛說佛大僧大經經律異相引載未云從此長別努力努力勝灮王白僧衆書佛在室羅筏城逝多林給孤獨園持憍薩羅國邊隅叛逆大臣白王給孤獨長者有大福力彼若來者或可歸降時勝王即便以書白諸僧衆使往衆內宣王敕書彼有六衆即赴王軍為王說法咸皆欣慶因詣路所逢王所整象馬車步四兵並見陵辱王使往語世尊制其學處勿復更令久住軍內世尊以此因緣告諸苾芻往軍中過二夜而止宿者得波逸底迦今有少緣欲見聖衆根本說一切有部毗奈耶勝音城仙道王與影勝王書贍部洲內有勝音城王名仙道聞東方摩羯陀國王舍大城王名影勝彼國豐樂生愛念心便簡妙寶并書送往摩羯影勝王即以所出上㲲報仙道王并致書仙道王問使者報言影勝王其形長大性行雄猛造送五德上甲并裁敕書影勝王以我國內有佛乃是人中妙寶遂於㲲上畫世尊像下書三歸依次書五學處次書十二緣生流轉還滅復於像上邊書二頌馳送并作書報仙道王仙道王盛陳供養即裁書報影勝王影勝王白世尊命聖者迦多演那往勝音城并報仙道王敕書仙道王如言嚴設道場迦多演那隨彼機緣為設法要宮內女人又欲聞法王復書報影勝王影勝王白世尊復命世羅苾芻尼往與仙道王書仙道王夫人月灮從世羅受圖具命終生四大王衆天王傳國太子詣王舍城於世尊所出家修苾芻行敬覽來信并受國珍未面相親深慙遠意彼有須者我當為辦送影勝王寶甲書今贈寶甲五德圓備若念我者幸當自著希招遠意勿惠餘人五德者一盛熱之時著便涼冷二刀砍不入三箭射不穿四善辟諸毒五能發明摩羯陀國影勝王報仙道王世尊像書雖未相見使至覽書蒙贈寶甲世所希有今畫世尊形像三界最尊令使持將冀申供養既至彼已可去王城有兩驛半平治道路嚴飾城隍躬領四兵幢幡華蓋於廣博處張設尊儀殷勤供養獲大福德仙道王又報影勝王請苾芻書我賴仁恩知有三寶悟緣生理得見真諦苦海淪溺彼岸可期拔足淤泥歡慶何極然我欲得親見苾芻為作方便令來至此又報仙道王書承悟緣生得預流果復於苾芻樂欲相見佛令五百苾芻遠赴祈請仁可殷勤同大師想去城兩驛半許修治道路嚴設香華治整四兵自來迎接又於城內閒寂之處造一大寺營五百房牀榻臥具無令闕乏飲食所須皆預辦若作如是供養事者獲福無量仙道王報影勝王請苾芻尼書宮內女人樂欲聞法頗有方便得令苾芻尼來不並根本說一切有部毗奈耶憍閃毗國說憂事人詐白塢陀延王書無憂婆羅門將無比女往憍閃毗聘與塢陀延王為夫人無憂為輔國大臣王又有夫人名紺容無比懷妬時王邊境反叛領兵自往遂敕無憂留守無比每勸其父令害紺容紺容夜讀佛經復須樺皮燈明大臣於樺皮內密安火炭夜風火發紺容與五百綵女同時殞命惟曲脊侍女從水竇出得免先嘗有二人來至王所樂為奉事一人能說喜事一人能說憂事爾時說憂事人共大臣等議畫一幀作紺容夫人所為因緣投火死狀并與象馬各數滿五百真金一億別嚴四兵詣王營所持書白王王啓封讀書問言曾見有被死將去求索得耶答曰若被死將去求索不得者可開此幀因言紺容已死恐王憂惱設此權謀王即敕殺無憂以無比置地牢內因往問世尊何因緣故佛言乃往昔婆羅痆斯國王梵摩達多大夫人曾於五百綵女遊觀華園時寒求火有獨覺聖者造一草菴在中夫人命一使女燒彼草菴女見不忍夫人自往放火諸女悉共歡笑彼夫人者即紺容是彼侍女者即五百內人是彼使女者即曲脊女是我是某國大王惟有一子被殺將去我今求死來至此國欲以象馬乃至金寶將贖子命若允者善若不得者我當共戰願王助我根本說一切有部毗奈耶嗢逝尼城猛灮王與頻婆娑羅王書猛光王有警覺病不得睡治宜酥而王性憎酥唯愛酒有人于王前言酥即斬其首聞王舍城有頻婆娑羅王子名侍縛迦為太醫王齎書往迎侍縛迦行次曲女城得一醫童同往以蘇合膏合成如酒令醫童指授王服遂睡噫氣聞酥大瞋侍縛迦已乘象先走王命飛鳥追及侍縛迦以藥藏菴摩羅果食飛鳥初飛鳥患癩疾食藥亦瘳因遠奏王應合賞賜即為王作敕書報醫王侍縛迦復報書王多財貨賞醫童以大㲲賜衣王奉佛作三衣奈女耆域因緣經一事與此大同白影勝王可令侍縛迦大醫暫來相見欲有所療幸不見違若不來者當須多貯草穀兵衆相迎飛烏報醫王侍縛迦書仁是醫王合得重賞何故逃走信至可來受王賞賜侍縛迦報飛烏書我藉皇恩珍財靡闕王若與我生歡喜者諸所賜物竝回與彼侍醫童子根本說一切有部毗奈耶雜事嗢逝尼城長者與妻書猛灮王住嗢逝尼城此有長者娶妻未久與易他方王於宅邊見生染意步入其舍歡悅既暢即便有娠彼夫耆來告妻王與彼夫信令向某處遠求如是之物妻誕一男以箱內兒置王門所時有衆牛行至箱所圍繞不進王取養為子是名牛護北方得義尸羅國王名圓勝聞嗢逝尼國豐樂即整四兵親至彼城猛灮王亦出拒戰兵衆分離單馬遂逃耕人名曰增長將歸供給于時圓勝王有餘小國名渴沙來相抄掠諸大臣作書告王書未為頌曰如王於他國勤勞降伏彼於己之國土亦當勤守護圓勝王念宜和好令信入報猛灮王城內諸臣共議若報王無彼定欺我宜設方便裁書報之即令牛護出見圓勝遂解兵圍猛還國迎立增養為國大相汝可安隱我望不久當至本鄉得叉尸羅國圓勝王與嗢逝尼國猛灮王書知識事已去者更不可追宜暫出來希欲相見自餘勝負並不須論望得促膝交襟共申莫逆事同平昔我方歸故猛王報圓勝王書知識既解來封篤好情深事雖實然能無猶豫兩國同聚各致狐疑雖逆來心我無遑出然此太子名曰牛護是我所生令出相見共申歡意隨情去留根本說一切有部毗奈耶雜事鞞提醯國大臣大藥與毗舍佉書鞞提醯國王多足食號曰重與年幼為王諸臣見慢時有天神空中告王國中滿財城內有人名曰圓滿子號大藥與王共理無遠不伏王果覓得大藥拜為大臣廣設智謨乃以女聘于大藥為女所𧮂臨刑得釋遂以女還王請自訪德義聰慧女人作婆羅門像行麥田中見有少女名毗舍佉至妙花城即以為定大藥還向鞞醯城於中路栽書與一婆羅門并附金錢四百與毗舍佉婆羅門授所持書及金錢三百毗舍佉得書次領金錢惟得三百遂械使者曰彼寄四百汝偷百文使者念曰二俱有智便以百錢依數重興王念大藥得如是智慧之妻求婚半遮羅國王女妙藥半遮羅國許諾令重興王就彼廣設珍饌所有飲食皆和毒藥時大藥有鸚鵡名曰具相善識人情使往彼城觀已還報大藥復往半遮羅國強入宮中將妙藥及諸珍寶總率兵衆別路而歸策為夫人半遮王齎書與女妙藥女察知是大藥鸚鵡使籠鸚鵡寄父王付屠者鸚鵡願依祖父死法麻纏其尾灌以膏油爇火令著任其自死屠者如言鸚鵡飛上虛空奮迅毛羽火延王室燒盡無遺遂入池中洗浴而去還鞞提醯半遮羅王更與女書復送鸚鵡王令煮以沸湯屠者去毛棄之簷外飛鵄下撮到一神祠小穴中因假神言受其供養毛羽漸成搏霄復去至大藥所重興王報言大藥汝真有福所得眷屬皆悉聰明毗舍佉神智過人鸚鵡鳥世所難及半遮羅國王妙藥女與大藥本一事藏分兩函今為統序四橛可成衣少一不能織如其杙有闕械足可令輸半遮羅國王與女妙藥書我懷憂悶汝豈不知可細尋求誰傳此事食和毒藥欲害彼王復報妙藥書通此消息皆由鸚鵡察知事已往還相報遂致紛披喪亂家國彼之鸚鵡可附將來又與妙藥書由此鸚鵡燒我宮室必須牢縛急送將來根本說一切有部毗奈耶雜事健陀羅國藥叉半遮羅與王舍城娑多藥叉書王舍城內於一山邊有藥叉神而為居止名娑多時北方健陀羅國復有藥叉名半遮羅約作指腹之親娑多生女名曰歡喜半遮羅使送嚴身瓔珞衣服持書致慶未久半遮羅生男號半支迦娑多栽書寄送衣瓔及歡喜長成報其弟我今欲得王舍城所生男女悉皆取食弟力不能遮其惡念宜可作婚姻事即栽書與半遮羅藥叉娶歸與其夫情義相得次第生男五百最小者名曰愛兒母恃豪強便於王舍城所生男女次第食之因此喚為訶梨底藥叉女皆往佛所白言為作調伏佛即往藥叉女處以鉢覆愛兒藥叉女大驚觸處尋覓悲踊號哭佛為授戒衆得安樂佛告苾芻此乃往過去王舍城中牧牛人妻懷娠時有獨覺遊行為大設會五百人咸持飲食音樂路逢牧牛妻共為舞蹈疲頓墯胎便買五百菴沒羅果奉施獨覺牧牛妻發願我當來生王舍城於此城中男女我皆取食彼牧牛女即訶梨底藥叉是由彼往昔施五百菴沒羅果發惡願故聞君生女情甚歡悅今送衣服願垂納受娑多與半遮羅書聞君誕子慶喜交懷聊寄衣瓔用申欣賀幸當為受冀表不空半遮羅報婆多書許作交親今皆遂願各待成立共作婚姻按此部第六門第六子攝云婆羅痆斯有一長者名瞿答摩持貨往得叉城興易時彼主人長者號曰名稱共為交密約作指腹之親得叉長者生男名曰游方于時瞿答摩令使送嚴身瓔珞衣服并持書曰聞君生男情甚歡悅今送衣服願垂納受得又長者還以書答瞿答摩未久生女雖容貌端正而瘦減常人號曰瘦瞿答彌得叉寄送衣纓栽書曰聞君誕女慶喜交懷聊寄衣纓用申欣荷幸當為受冀表不空瞿對摩復書報曰許作交親今皆遂願各待成立共媾婚姻後瘦瞿答彌夫𧉮蜇而死一子野干所害一子溺水父母親知咸遭霹靂佛告苾芻當知此等由先作業果報熟時皆須自受歡喜弟與半遮羅書我姊歡喜年既長成宜可為親當速來此根本說一切有部毗奈耶雜事舍衛國大臣報寶德長者書國內瞻波城長者寶德多饒財寶受用豐足生一男號曰女星日用五百金錢造食五百種味與男時世尊於頻毗娑羅王索粥欲食被阿闍世王打破粥鐺因遣大目揵連往寶德長者子邊乞粥長者子聞稱佛名所有造得食飲一時受奉置於鉢中佛所聞食香氣普遍佛為王言彼長者子是大福德之人常喫如斯上味王欲往見長者子大臣初作書大王即來王子亦來更作書報長者憂懼王欲科罰我等作此書來瞻波城諸人聚集共作一書馳報宰相于是長者遣子往王舍城王作好供養迎長者子令詣佛所問法出家受持戒行證阿羅漢果佛告苾芻乃九十一劫中有一童子家貧隨力收辦鋪以熊皮如來踏行造五百味飲食供養如來發願常生豪姓富貴家爾時貧童子者即寶德長者子是王及王子二俱不來汝等須作計議擁塞弶伽令水卻流無令一滴順河而過瞻波城諸人報舍衛國宰相書王頻附書敕云王來復言子來復令擁塞弶伽却流讀此書已又得報云王與王子俱亦不來王欲見寶德之子汝等速當遣來是要根本說一切有部毗奈耶破僧事秣菟羅國王中印度秣菟羅國靈書秣菟羅國謂為福地先志曰昔五印度國二王分治境壤相侵欲決兵戰衆莫從命王以為神可動物時有梵志高才令齎束帛造作靈書藏諸巖穴歲月既久𣗳皆合拱王托夢天賜靈書下令營求得諸山林之下於是人皆兵戰視死如歸夫生死無涯流轉無極含靈淪溺莫由自濟我以奇謀令離諸苦今此王城周二百里古先帝世福利之地歲月極遠銘記湮滅生靈不悟遂沈苦海溺而不救夫何謂歟汝諸含識臨敵兵死得生人中多殺無辜受天福樂順孫孝子扶侍親老經游此地獲福無窮功少福多如何失利一喪人身三途冥漠是故含生各務修業迦濕彌羅國衆賢論師謝世親書衆賢論師迦濕彌羅國人也持深研究說一切有部毗婆沙論時有世親菩薩求解求外破毗婆沙師所執作阿里達磨俱舍論辭義善巧衆賢積十有二歲作俱舍雹論窮幽洞微逐斥世親世親時在磔迦國奢羯羅城聞即治行往中印度衆賢追從至秣底補羅國大伽羅藍自覺氣衰裁書謝咎世親以垂終之託遂改題為順正理論如來寂滅弟子部執傳其宗學各擅專門黨同道疾異部愚以寡昧猥承傳習覽所製阿毗達磨俱舍論破毗婆沙師大義輒不量力沈究彌年作為此論扶正宗學智小謀大死其將至菩薩宣暢微言抑揚至理不毀所執得存遺文斯為幸矣死何悔哉毗末羅蜜多羅論師唐言無垢友臨終裁書無垢友迦濕彌羅國人也游五印度國學三藏玄文將歸本國途次衆賢諸師窣堵波也拊歎衆賢謂當制論令諸學人絶大乘稱滅世親名語已心亂血流知命必終裁書自悔夫大乘教者佛法之中究竟說也名味泯絶理致幽玄輕以愚昧駮斥先進業報皎然滅身宜矣敢告學人厥鑒斯在各慎爾志無得懷疑南印度德慧菩薩與摩揭陀國摩沓婆書摩揭陀國山西北有伽藍負嶺疏崖僧徒並習大乘瞿那木底唐言德慧菩薩伏外道之處初此山中有外道摩沓婆者祖僧佉之法而習道焉名重當時時南印度德慧菩薩學通三藏理窮四諦聞摩沓婆論極幽微有懷挫鋭裁書纍報摩沓婆懷懼誡諸邑戶不得居止沙門異道時德慧杖錫而來莫肯相舍有淨行者引至王宮王聞命使臣摩沓婆所宣旨曰有異沙門來求談論今已瑩灑論場宣告遠近佇望來儀願垂降趾摩沓婆問王使曰豈非南印度德慧論師乎遂至論場德慧先立崇義洎乎纍落摩沓婆辭以請歸靜思方酬來難至第六日歐血死敬問摩沓婆善安樂也宜忘勞弊積習舊學三年之後摧汝嘉聲重裁書年期已極學業何如吾今至矣汝宜知之摩揭陀國無憂王石柱記摩揭陀國佛迹精舍側有大石柱書記殘缺其大略云無憂王信根貞固三以贍部洲施佛法僧三以諸珍寶重自酬贖僧伽羅國王摩訶菩提僧伽藍銅記摩揭陀國菩提樹北門外摩訶菩提僧伽藍其先僧伽羅國王之所建也刻銅為記云夫周闕私諸佛至教惠濟有緣先聖明訓今我小子丕承王業式建伽藍用旌聖迹福資祖考惠被黎元唯我國僧而得自在及有國人亦同僧例傳之後嗣永永無窮伐羅剎令僧伽羅國佛法所記曰昔此寶洲大鐵城五百羅剎女之所居也伺商人至變為美女誘入鐵城置鐵籠中取食時贍部洲有大商主子僧伽羅獲乘天馬越海僅免後立為王下令討羅剎敗之吾先商侶在羅剎國死生莫測善惡不分今將救難宜整兵甲拯危恤患國之福也收珍藏寶國之利也瞿薩旦那國大臣唐言地乳舊曰于闐龍鼓函書國城東南百餘里有大河利以溉田其後斷流僧羅漢謂龍所為因祠祭龍忽一女淩波至願於國內選一貴臣為夫河流如昔有一大臣請行乃衣素服乘白馬入河頃之白馬浮出負一栴檀大鼓封一函書其大略曰大王不遺細微謬參神選願多營福益國滋臣以此大鼓懸城東南若有寇至鼓先聲震河水遂流並唐釋玄奘大唐西域記此記唐撰事出西土先志印度千歲和尚釋氏通鑑云唐高宗顯慶二年千歲寶掌和尚晚居浦江寶巖與即禪師友善師以白犬馳書朗以青猿回使是年正旦自塑像竟即澡衣趺坐說偈而化師自稱生於周威烈王十二年自魏晉間抵此土計之一千七十二年與行僧三峨高出五嶽秀甲九州震旦國第一山也維摩詰經香積佛品云維摩詰居衆會前化作菩薩像分明而告之曰汝行從此佛土度如四十二江河沙世界到衆香剎香積佛所住必見食則禮佛足如我辭曰維摩詰言願得世尊所食之餘欲於忍界施作佛事令此懈廢之人得弘大意亦使如來名聲普聞即化菩薩到衆香界禮彼佛足言維摩詰菩薩稽首世尊足下敬聞無量興居輕利游步康強少承福慶願得世尊所食之餘欲於忍界施作佛事令此懈廢之人得弘大意亦使如來名聲普聞按此蓋禮足面佛親訊之語諸經並多有之本非書屬尺牘清裁以維摩詰稽首而下作維摩詰與世尊書誤欽定四庫全書
