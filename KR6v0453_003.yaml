body:
  text: 明梅鼎祚輯晉穆帝姓司馬氏諱䏥字彭子河內溫人康帝子永興山陰二寺詔建康實録云許詢捨永興山隂二宅為寺家財珍異悉皆是給既成啓奏孝宗詔曰山隂舊為祇洹寺永興居為崇化寺造四層塔物産既罄猶缺露槃相輪一朝風雨相輪等自備時所訪問乃是剡縣飛來孝武帝諱曜字昌明簡文帝子賻送道潛法師詔潛寧康二年卒于剡之𡵙山見後潛法師理悟虛遠風鑒清貞棄宰相之榮襲染衣之素山居人外篤勤匪懈方賴宣道以濟蒼生奄然遷化用痛于懷可賻錢十萬星馳驛送道安法師俸給詔安見後安法師器識倫通風韻摽朗居道訓俗徽績兼著豈直規濟當今方乃陶津來世俸給一同王公物出所在竺法汰喪事詔汰見後汰法師道播八方澤流後𧜟奄爾喪逝痛貫于懷可賻錢十萬喪事所須隨由備辦並梁釋慧皎高僧傳太元起居注與朗法師書皇帝敬問太山朗和尚承睿德光時飛聲東嶽靈海廣淹有生蒙潤大人起世善翼匡時輒伸經略懸稟妙算昔劉曜創荒石勒繼業元皇龍飛遂息江表舊京淪沒神州傾蕩蒼生荼蓼寄在左袵每一念至嗟悼朕心長驅魏趙掃平燕代今龍旗方興剋復伊洛思與和尚同養羣生至人通微想明朕意今遣使者送五色珠像一軀明光錦五十匹象牙簟五領金鉢五枚到願納受釋僧朗答晉主書竺僧朗京兆人少而游方問道長安還關中專當講席移卜太山僧朗頓首頓首夫至人無隱德生為聖非德非聖何敢有喻忝曰出家栖息塵表慕靜山林心悕玄寂靈迹難逮形纍而已奉被詔命慰及應否大晉重基先承孝治惠同天地覆養無邊願開大乘申揚道味僧朗頓首頓首唐釋道宣廣弘明集康獻褚皇后諱蒜子河內陽瞿人康帝后于法開收付廷尉令法開不知何許人祖述耆婆妙通醫法升平五年孝宗有疾開視脉知不復起不肯復入康獻后令俄而帝崩獲免帝小不佳昨呼于公視脉但到門不前種種辭憚宜收付廷尉高僧傳何充等充字次道廬江灊人録尚書事加侍中奏沙門不應盡敬表晉咸康六年成帝幼沖庾氷輔政謂沙門應盡敬王者尚書令何充等議不應敬下禮官詳議博士議與充同門下承氷旨為駮充及僕射褚翊諸葛恢尚書馮懷謝廣等重奏于時氷議竟不施敬尚書令冠軍撫軍都鄉侯臣充散騎常侍左僕射長平伯臣翊散騎常侍右僕射建安伯臣恢尚書關中侯臣懷守尚書昌安子臣廣等言世祖武皇帝以盛明革命肅祖明皇帝聰聖玄覽豈于時沙門不易屈膝顧以不變其修善之法所以通天下之志也愚謂宜遵承先帝故事於義為長庾冰代成帝沙門不應盡敬詔氷字季堅潁川塢陵人車騎將軍領江州夫萬方殊俗神道難辨有自來矣達觀𠊓通誠當無怪況跪拜之禮何必尚然當復原先王所以尚之之意豈直好此屈折而坐遘槃辟哉固不然矣因父子之敬建君臣之序制法度崇禮秩豈徒然哉良有以矣既其有以將何以易之然則名禮之設其無情乎且今果有佛邪將無佛邪有佛邪其道固弘無佛邪義將何取繼其信然將是方外之事方外之事豈方內所以體而當矯形骸違常務易禮典棄名教是吾所甚疑也名教有由來百代所不廢昧旦丕顯後世猶殆殆之為弊其故難尋而今當遠慕芒昧依稀未分棄禮於一朝廢教於當世使夫凡流慠逸憲度又是吾之所甚疑也縱其信然縱其有之吾將通之於神明得之於胸懷耳軌憲宏模固不可廢之於正朝矣凡此等類皆晉民也論其才智又常人也而當因所說之難辨假服飾以陵度抗殊俗之慠禮直形骸於萬乘又是吾所弗取也諸君並國器也悟言則當測幽微論治則當重國典苟其不然吾將何述焉沙門不應盡敬表尚書令冠軍撫軍都鄉侯臣充散騎常侍左僕射長平伯臣翊散騎常侍右僕射建安伯臣尚書關中侯臣懷守尚書昌安子臣廣等言詔書如右臣等暗短不足以讚揚聖旨宣暢大義伏省明詔震懼屏營輒共尋詳有佛無佛固非臣等所能定也然尋其遺文鑽其要旨五戒之禁實助王化賤昭昭之名行䝿冥冥之潛操行德在於忘身抱一心之清妙且興自漢世迄于今日雖法有隆衰而弊無妖妄神道經久未有其比也夫詛有損也祝必有益臣之愚誠實願塵露之微增潤嵩岱區區之況上俾皇極今一令其拜遂壞其法令修善之俗廢於聖世習俗生常必致愁懼隱之臣心竊所未安臣雖曚蔽豈敢以偏見疑誤聖聽直謂世經三代人更明聖今不為之制無虧王法而幽冥之格可無壅滯是以復陳愚誠乞省察謹啓庾冰重代成帝沙門不應盡敬詔省所陳具情旨幽昧之事誠非寓言所盡然其較略及夫人神之常度粗復有分例耳大都百王制法雖質文隨時然未有以殊俗參治怪誕雜化者也豈曩聖之不達而來聖之宏通哉且五戒之才善粗擬似人倫而更於世主略其禮敬邪禮重矣敬大矣為治之綱盡於此矣萬乘之君非好尊也區域之民非好卑也而卑尊不陳王教不得不一二之則亂斯曩聖所以憲章體國所宜不惑也通才博采往往備其事修之家可以修之國及朝則不可斯豈不遠也省所陳果亦未能了有之與無矣縱其了猶謂不可以參治而況都無而當以兩行邪傳釋彥倧集沙門不應拜俗事云通才博采往在備修之修之身修之家可矣修之國及朝則不可來聖作末聖重奏沙門不應盡敬表臣等雖誠暗蔽不通遠旨至於乾乾夙夜思循王度寧苟執偏管而亂大倫直以漢魏逮晉不聞異議尊卑憲章無或暫虧也今沙門之慎戒專專然及為其禮一而已矣至於守戒之篤者己身不吝何敢以形骸而慢禮敬哉每見燒香呪願必先國家欲福祐之隆情無極已奉上崇順出於自然禮儀之簡蓋是專一守法是以先聖御世因而弗革也天綱恢恢疏而不失臣等慺慺以為不令致拜於法無虧因其所利而惠之使賢愚莫敢不用情則上有天覆地載之施下有守一修善之人謹復陳其愚淺願蒙省察謹啓弘明集蔡謨字道明陳留考城人司徒左光祿大夫佛像頌議成帝時彭城王紘上言樂賢堂有明帝手畫佛像經厯寇難此堂猶存宜敕作頌以謨議寢佛者異域之俗非經典之制先帝量同天地多才多藝聊因臨時而畫此像至於雅好佛道所未承聞也盜賊奔突王都隳敗而此堂塊然獨存斯誠神靈保祚之徵然未是大晉盛德之形容歌頌之所先也人臣覩物興義私作賦頌可也今欲發王命敕史官上稱先帝好佛之志下為異教作一象之頌於義有疑焉晉書廣弘明集首數句與此文微異謝安字安石陳郡陽夏人厯太保贈太傅與支遁書遁還吳立支山寺欲入剡安為吳興守與遁書遁見後思君日積計辰傾遲知欲還剡自治甚以悵然人生如寄耳頃風流得意之事殆為都盡終日戚戚觸事惆悵惟遲君來以晤言消之一日當千載耳此多山縣閒靜差可養疾事不異剡而醫藥不同必思此緣副其積想也高僧傳王坦之字文度太原人厯北中郎將徐兖二州刺史沙門不得為高士論王北中郎不為林公所知乃著此論大略云高士必在於縱心調暢沙門雖云俗外反更束於教非情性自得之謂也宋劉義慶世說新語郗超字嘉賔高平金鄉人司徒左長史與親友論支道林書遁善談名理謝安王洽劉恢殷浩許詢及超等皆著塵外之狎超與親友書道林法師神理所通玄拔獨悟數百年來紹明大法令真理不絶者一人而已高僧傳隋費長房歷代三寶紀參校奉法要三自歸者歸佛歸十二部經歸比丘僧過去現在當來三世十方佛三世十方經法三世十方僧每禮拜懺悔皆當至心歸命并慈念一切衆生願令悉得度脫外國音稱南無漢曰歸命佛者漢音曰覺僧者漢音曰衆五戒一者不殺不得教人殺常當堅持盡形壽二者不盜不得教人盜常當堅持盡形壽三者不不得教人淫常當堅持盡形壽四者不欺不得教人欺常當堅持盡形壽五者不飲酒不得以酒為惠施常當堅持盡形壽若以酒為藥當推其輕重要於不可致醉醉有三十六失經教以為深戒不殺則長壽不盜則常泰不淫則清淨不欺則人常敬信不醉則神理明治已行五戒便修歲三月六齊歲三齊者正月一日至十五日五月一日至十五日九月一日至十五日月六齊者月八日十四日十五日二十三日二十九日三十日凡齊日皆當魚肉不御迎中而食既中之後甘香美味一不得嘗洗心念道歸命三尊悔過自責行四等心遠離房室不著六欲不得鞭撾罵詈乘駕牛馬帶持兵仗婦人則兼去香花脂粉之飾端心正意務存柔順齊者普為先亡見在知識親屬并及一切衆生皆當因此至誠玄想感發心既感發則終免罪苦是以忠孝之士務加勉勵良以兼拯之功非徒在己故也齊日唯得專惟玄觀講誦法言若不能行空當習六思念六思念者念佛念經念僧念施念戒念天何謂念天十善四等為應天行又要當稱力所及勉濟衆生十善者身不犯殺盜淫意不嫉恚癡口不妄言綺語兩舌惡口何謂不殺常當矜愍一切蠕動之類雖在困急終不害彼利己凡衆生危難皆當盡心營救隨其水陸各令得所疑有為己殺者皆不當受何謂為盜凡取非己有不問小大及蒞官不清皆謂之盜何謂為淫一切諸著普謂之淫施之色欲非正匹偶皆不得犯又私竊不公亦兼盜罪所謂嫉者謂妬忌也見人之善見人有德皆當代之歡喜不得有爭競憎嫉之心所謂恚者心懷忿恨藏結於內所謂癡者不信大法疑昧經道何謂妄言以無為有虛造無端何謂綺語文飾巧言華而不實何謂兩舌背向異辭對此說彼何謂惡口謂罵詈也或云口說不善之事令人承以為罪亦謂惡口凡此十事皆不得暫起心念是為十善亦謂十戒五戒檢形十善防心事有疏密故報有輕重凡在有方之境總謂三界三界之內凡有五道一曰天二曰人三曰畜生四曰餓鬼五曰地獄全五戒則人相備具十善則生天堂全一戒者則亦得為人人有高卑或壽夭不同皆由戒有多少反十善者謂之十惡十惡畢犯則入地獄抵揬強梁不受忠諫及毒心內盛狥私欺紿則或墯畜生或生蛇虺慳貪專利常苦不足則墯餓鬼其罪差輕少而多陰私情不公亮皆墮鬼神雖受微福不免苦痛此謂三塗亦謂三惡道色痛癢思想生死識謂之五陰凡一切外物有形可見者為色失之則憂惱為痛得之則歡喜為癢未至逆念為思過去追憶為想心念始起為生想過意識滅為死曾關於心戢而不忘為識識者經歷纍劫猶萌之於懷雖昧其所由而滯於根潛結始自毫釐終成淵嶽是以學者務慎所習五蓋一曰貪淫二曰瞋恚三曰愚癡四曰邪見五曰調戲別而言之求欲為貪耽著為淫外發為瞋內結為恚繫於縛著觸理倒惑為愚癡生𣦸因緣癡為本一切諸著皆始於癡地獄苦酷多由於恚經云卒鬬殺人其罪尚輕懷毒陰謀則纍劫彌結無解脫之期六情一名六衰亦曰六欲謂目受色耳受聲鼻受香舌受味身受細滑心受識識者即上所謂識陰者也五陰六欲蓋生死之原本罪苦之所由消禦之方皆具載衆經經云心作天心作人心作地獄心作畜生乃至得道者也亦心也凡慮發乎心皆念念受報雖事未及形而幽對冥構夫情念圓速倐忽無間機動毫端遂充宇宙罪福形道靡不由之吉凶悔吝定於俄頃是以行道之人每慎獨於心防微慮始以至理為城池常領本以御末不以事形未著而輕起心念豈唯言出乎室千里應之莫見乎隱所慎在形哉異出十二門經云人有善恆當掩之有惡宜令彰露夫君子之心無適無莫過而無悔當不自得宜其任行藏於所遇豈有心於隱顯然則教之所施其在常近乎原夫天理之於罪福外泄則愈輕內結則彌重既跡著於人事必有損於冥應且伐善施勞有生之大情匿非文過品物之所同善著則跡彰跡彰則譽集苟情係沮勸而譽集於外藏吝之心必盈乎內且人之君子猶天之小人況乎仁德未至而名浮於實獲戾幽冥固必然矣夫苟非備德安有不周坦而公之則與事而散若乃負理之心銘之懷抱而外修情懇以免人尤收集俗譽大誣天理自然之舋得不愈重乎是以莊生亦云為不善於幽昧之中鬼神得而誅之且人之情也不愧於理而愧乎物愆著則毀至毀至而恥生情存近復則弊不至積恃其不彰則終莫悛革加以天舋內充而懼其外顯則幽慮萬端巧防彌密窮年所存唯此之務天殃物纍終必頓集蓋由不防萌謀始而匿非揚善故也正齊經云但得說人百善不得說人一惡說人之善善心便生說人之惡便起忿意意始雖微漸相資積是以一善生巨億萬善一惡生巨億萬惡古人云兵家之興不過三世陳平亦云我多陰謀子孫不昌引以為教誠足以有弘然齊楚享遺嗣於纍葉顏冉靡顯報於後昆既已著之於事驗不俟推理而後明也且鯀殛禹興魣鮒異形四罪不及百代通典哲王御世猶無淫濫況乎自然玄應不以情者而令罪福錯受善惡無章其誣理也固亦深矣且秦制收帑之刑猶以犯者為主主嬰其罰然後責及其餘若舋不當身而殃延親屬以茲制法豈唯聖典之所不容固亦申韓之所必去矣是以泥洹經云父作不善子不代受子作不善父亦不受善自獲福惡自受殃至矣哉斯言允心應理然原夫世教之興豈不以情受所存不止乎己所及彌廣則誡懼愈深是以韜理實於韞櫝每申近以斂粗進無虧於懲勸而有適於物宜有懷之流宜略其事而喻深領幽旨若乃守文而不通其變狥教而不達教情以之處心循理不亦外乎夫罪福之於逆順固必應而無差者也苟昧斯道則邪正無位寄心無準矣至於考之當年信漫而少徵理無愆違而事不恆著豈得不歸諸宿緣推之來世邪是以有心於理者審影響之難誣廢事證而冥寄達天網之宏疏故期之於靡漏悟運往之無間混萬劫於一朝括三世而玄同要終歸於必至豈以顯昧改心淹遠革慮哉此最始信之根主而業心所深期也十二門經云有時自計我端正好便當自念身中無所有但有肝腸脾肺骨血屎溺有何等好復觀他人身中惡露皆如是若慳貪意起當念財物珍寶生不持來死不俱去而流遷變化朝夕難保身不久存物無常主宜及當年施恩行惠贍之以財救疾以藥終日欣欣務存營濟若瞋恚意起當深生平等兼護十戒差摩竭云菩薩所行忍辱為大若罵詈者默而不報若撾捶者受而不校若瞋怒者慈心向之若謗毀者不念其惡法句又云受辱心如地行忍如門閫地及門閫蓋取其藏垢納汙終日受踐也成具經曰彼以四過加己則覺知口之失也報以善言和語至誠不飾四過者上之所謂兩舌惡口妄言綺語也夫彼以惡來我以善應苟心非木石理無不感但患處之不恆弘之不積耳苟能每事思忍則悔吝消於現世福報顯於將來賢者德經云心所不安未常加物即近而言則忠恕之道推而極之四等之義四等者何慈悲喜護也何謂為慈愍傷衆生等一物我推己恕彼願令普安愛及昆蟲情無同異何謂為悲博愛兼拯雨淚惻心要令實功潛著不直有心而已何謂為喜歡悅柔軟施而無悔何謂為愛護隨其方便觸類善救津梁會通務存弘濟能行四等三界極尊但未能冥心無兆則有數必終是以本起經云諸天雖樂福盡亦喪貴極而無道與地獄對門成具又云福者有苦有盡有煩勞有往還泥洹經曰五道無安唯無為快經稱行道者先當捨世八事利衰毀譽稱譏苦樂聞善不喜聞惡不懼信心天固沮勸無以動其志理根於中外物不能干其慮且當年所遇必由宿緣宿緣玄運信同四時其來不可禦其去不能止固當順而安之悅而畢之精勤增道習期諸妄心形報既廢乃獲大安耳夫理本於心而報彰於事猶形正則影直聲和而響順此自然玄應孰有為之者哉然則契心神道固宜期之通理務存遠大虛中正己而無希外助不可接以卑瀆要以情求此乃厝懷之關鍵學者所宜思也或謂心念必報理同影響但當求己而已固無事於幽冥原經教之設蓋所以悟夫求己然求己之方非教莫悟悟因乎教則功由神道欣感發中必形於事亦由詠歌不足係以手舞然則奉而尊之蓋理所不必須而情所不能廢宜縱己深體教旨忘懷欣想將以己引物自周乎衆所以固新涉之志而令寄懷有擬經云生苦老苦病苦死苦怨憎會苦恩愛別離苦所求不得苦遇此諸苦則宜深惟緣對兼覺魔僞開以達觀弘以等心且區區一生有同過隙所遇雖殊終歸枯朽得失少多固不足計該以數塗則此心自息又苟未入道則休戚迭用聚散去來賢愚同致是以經云安則有危得則有喪合會有離生則有死蓋自然之常勢必至之定期推而安之則無往不夷維摩詰云一切諸法從意生形然則兆動於始事應乎末念起而有慮息則無意之所安則觸遇而夷情之所閡則無往不滯因此而言通滯之所由在我而不在物也若乃懼生於心則舋乘於外外舋既乘內懼愈結苟患失之無所不至矣是以經稱丈夫畏時非人得其便誠能住心以理天關內固則人鬼罔間緣對自息萬有無以纓衆邪不能襲四非常一曰無常二曰苦三曰空四曰非身少長殊形陵谷易處謂之無常盛衰相襲欣極必悲謂之為苦一切萬有終歸於無謂之為空神無常宅遷化靡停謂之非身經稱處惑樂之地覺必苦之對蓋推代謝於往復審樂往則哀來故居安慮危夕惕榮觀若夫深於苦者謂之見諦達有心則有滯有滯則苦存雖貴極人天地兼崇高所乘愈重矜著彌深情之所樂於理愈苦故經云三界皆苦無可樂者又云五道衆生共在一大獄中苟心係乎有則罪福同貫故總謂三界為一大獄佛問諸弟子何謂無常一人曰一日不可保是為無常佛言非佛弟子一人曰食頃不可保是為無常佛言非佛弟子一人曰出息不報便就後世是為無常佛言真佛弟子夫無常顯證日陳於前而萬代同歸終莫之悟無瞬息之安保永世之計懼不在交則每事殆懈以之進德則功無覆簣以之治心則墮其所習是以有道之士指寸陰而惜逝恆自強於鞭後業與時競惟日不足則亂念無因而生緣對靡由而起六度一曰施二曰戒三曰忍辱四曰精進五曰一心六曰智慧積而能散潤濟衆生施也謹守十善間邪以誠戒也犯而不校常善下人忍辱也勤行所習夙夜匪懈精進也專心守意以約斂衆一心也凡此五事行以有心謂之俗度領以兼忘謂之道慧本起經云九十六種道術各信所事皆樂生安孰知其惑夫欣得惡失樂存哀亡蓋弱喪之常滯有生所感同然冥力潛謝非矜戀所留對至而應豈智用所制是以學者必歸心化本領觀玄宗玩之珍之則衆念自廢廢則有忘有忘則緣絶緣報既絶然後入於無生既不受生故能不死是以暜耀經云無所從生靡所不生於諸所生而無所生泥洹經云心識靜休則不死不生心為種本行為其地報為結實猶如種殖各以其類時至而生弗可遏也種十善戒善則受生之報具於上章加種禪等四空則䝿極天道四空及禪數經具載其義從第一天至二十八天隨其事行福轉倍增種非常禪諦背有著無則得羅漢泥洹不忌有為不係空觀遇理而冥無執無寄為無所種既無所種故不受報廓然玄廢則佛之泥洹泥洹者漢曰無為亦曰滅度維摩詰曰彼六師者說倚為道從是師者為住諸見為墯邊際為歸八難不得離生死道也雖玄心屢習而介然微動猶均被六師同滯一有況貪生倚想執我捍化雖復福踰山河貴極三界倚伏旋還終墜罪苦豈獲寧神大造泊然玄夷哉夫生必有情天勢率至不宅於善必在於惡是以始行道者要必有寄寄之所因必因乎有有之所資必資乎煩是以經云欲於空中造立宮室終不能成取佛國者非於空也然則五度四等未始可廢但當即其事用而去其忮心歸佛則解佛無歸於戒則無功於戒則禪諦與五陰俱冥末用與本觀同盡雖復衆行兼陳固是空中行空耳或以為空則無行行則非空既已有行無乃失空乎夫空者忘懷之稱非府宅之謂也無誠無矣存無則滯封有誠有矣兩忘則玄解然則有無由乎方寸而無係於外物器象雖陳於事用感絶則理冥豈滅有而後無階損以至盡哉由此言之有固非滯滯有則背宗反流歸根任本則自暢是以開士深行統以一貫達萬像之常冥乘所寓而玄領知來理之先空恆得之於同致悟四色之無朕順本際而偕廢審衆觀之自然故雖行而靡跡方等深經每泯一三世而未嘗謂見在為有則空中行空旨斯見矣弘明集謝敷字慶緒會稽人隱居若邪臺徵不就安般守意經序夫意也者衆苦之萌基背正之元本荒迷放蕩浪逸無涯若狂夫之無所麗愛惡充心耽昏無節若弱喪之不知歸微矣哉即之無像尋之無朕則毫末不足以喻其細迅矣哉僨蹻惚恍昫匝宇宙則奔電不足以比其速是以彈指之間九百六十轉一日一夕十三億想念必響報成生死栽一身所種滋蔓彌劫凡在三界倒見之徒溺喪淵流莫能自反正覺慈愍開示慧路防其終凶之源漸塞忿欲之微兆為啓安般之要徑泯生滅以冥寂伸道品以養恬建十慧以入微縶九神之逸足防七識之洪流故曰守意也若乃制伏粗垢拂剗漏結者亦有望見貿樂之士閉色聲於視聽遏塵想以禪寂乘靜泊之禎祥納色天之嘉祚然正志荒於華樂昔習沒於交逸福田矜執而日零毒根迭興而罪襲是以輪回五趣億劫難拔嬰羅欲網有劇湥牢由於無慧樂定不惟道門使其然也至於乘慧入禪亦有三輩或畏苦滅色樂宿泥洹志存自濟不務兼利者為無著乘或仰希妙相仍有遣無不建大悲練盡緣縛者則號緣覺菩薩者深達有本暢因緣無達本者有有自空暢無者因緣常寂自空故不出有以入無常寂故不盡緣以歸空住理而有非所縛非縛故無無所脫苟厝心領要觸有悟理者則不假外以靜內不因禪而成慧故曰阿惟越致不隨四禪也若欲塵翳心慧不常立者乃假以安般息其馳想猶農夫之淨地明鏡之瑩剗矣然則耘耨不以為地地淨而種滋瑩剗非以為鏡鏡淨而照明故開士行禪非為守寂在遊心於玄冥矣肇自發心悲盟弘暜秉權積德忘期安衆衆雖濟而莫脫將廢知而去筌矣是謂菩薩不滅想取證也此三乘雖同假禪靜至於建志厥初各有攸歸故學者宜恢心宏模植栽於始也漢之季世有捨家開士安清字世高安息國王之太子也審榮辱之浮寄齊死生乎一貫遂脫屣於萬乘抱玄德而遊化演道教以發朦表神變以源之于時俊乂歸宗釋華崇實者若禽獸之從麟鳳鱗介之赴虬蔡矣又博綜殊俗善衆國音傳授斯經變為晉文其所譯出百餘萬言探暢幽賾淵玄難測此安般典其文雖約義關衆經自淺至精衆行具舉學之先要孰踰者乎行者欲凝神反朴道濟無外而不循斯法者何異刖夫之陟太山無翅而圖升虛乎釋迦如來妙慧足於曩劫歷無數以潛化至于衆生運會圓滿告成而猶現行六年以為教端者誠以鎮一紛邪莫尚茲也由是而觀可不務歟敷染習沈冥積罪歷劫生與佛乖弗覩神化雖以微祚得稟遺典而情想繁蕪道根未固仰欣聖軌未一暫履夕惕戰懼惄焉如搗是以誠心諷誦以鍾識習每遭明睿輒咨凝滯然冥宗已遠義訓小殊乃採集英彥戢而載焉雖粗聞大要未悟者衆於是復率愚思推檢諸數尋求明證遂相繼續撰為注義并抄撮大安般修行諸經事相應者引而合之或以隱顯相從差簡搜尋之煩經道弘深既非愚淺所能裁衷又辭意鄙拙萬不暢一祗增理穢敢云足以闡融妙旨乎實欲私記所識以備遺忘而已耳儻有覽者願亮不逮正其愚謬焉出三藏記集卻敬輿與謝慶緒論三幡義書近論三幡諸人猶多欲既觀色空別更觀識同在一有而重假二觀孫綽天台賦消一無於三幡李善注三幡色一也色空二也觀三也引書云云然敬輿之意以色空及觀為三幡識空及觀亦為三幡謝敷答卻敬輿書至理深玄非言象所喻也選注王洽字敬和琅邪臨沂人中書令領軍將軍與林法師書洽稽首和南夫教之所由必暢物之所未悟物之所以通亦得之於師資雖玄宗沖緬妙旨幽深然所以會之者固亦簡而易矣是以致雖遠必假近言以明之理雖昧必借朗喻以徵之故夫殆墜之旨可得之於千載將絶之趣可悟之於一朝今本無之談旨略例坦然每經明之可謂衆矣然造精之言誠難為允理詣其極通之未易豈可以通之不易因廣異同之說遂令空有之談紛然大殊後學遲疑莫知所擬今道行指歸通敘色空甚有清致然未詳經文為有明旨耶或得之於象外觸類而長之乎今衆經甚多或取譬不遠豈無一言昭然易喻古人有云聖人之言可能使人信之不可能是以徵之於文未知所釋今故咨其數事思聞嘉誨以啓其疑洽稽首和南廣弘明集王珉字季琰洽子中書令論高座序帛尸梨蜜多羅此云吉友時人呼為高座西域國王之子過江名顯珉師事之及卒為之序春秋吳楚稱子傳者以為先中國後四夷豈不以三代之𦙍行乎殊俗之禮以其貪婪無仁讓之性乎然而卓世之秀時生於彼逸羣之才或侔乎茲故知天授英偉豈限於中外自此以來唯漢世有金日磾然日磾之賢盡於仁孝忠誠德信純至非為明達足論高座心造峯極交㒞以神風領朗越過之遠矣高僧傳王珣字元琳洽子歷衛將軍加散騎常侍與豫章太守范寧論釋慧持書持適廬山隨兄遠共止有姑為尼名道儀自江夏送姑至都止東安寺珣深相器重為珣詳定中阿含經後還山寧請持講法華毗曇四方雲集珣書與寧寧答之珣重與寧書持見後遠公持公孰愈范寧答書誠為賢兄賢弟也重與寧書但令如兄誠未易有況弟復賢耶高僧傳林法師墓下詩序余以寧康二年命駕之剡石城山即法師之丘也高墳鬱為荒楚丘隴化為宿莽遺跡未滅而其人已遠感想平昔觸物悽懷劉孝標世說注王恭字孝伯太原晉陽人歷徐兖二州刺史致沙門僧檢書遠持兄弟至德何如僧檢答書遠持兄弟也綽綽焉信有道風矣高僧傳習鑿齒字彥威襄陽人滎陽太守與釋道安書道安游學至鄴師佛圖澄後避地南投襄陽時鑿齒鋒辨天逸籠罩當世其先藉安高名致書通好及聞安至即往修造稱言四海習鑿齒安曰彌天釋道安時人以為名答苻堅破襄陽安與鑿齒俱歸泰別記云河北別有竺道安與釋道安齊名謂習鑿齒致書竺道安道安本隨師姓竺後改為釋世因謂兩人謬矣安見後興寧三年四月五日鑿齒稽首和南承應真履正明白內融慈訓兼照道俗齊蔭宗虛者悟無常之旨存有者達外身之權清風藻於中夏鸞響厲乎八冥玄味遠猷何榮如之弟子聞夫不終朝而雨六合者彌天之雲也弘淵源以潤八極者四海之流也彼直無為降而萬物賴其澤此本無心行而高下蒙其潤況哀世降步愍時而生資始繫於度物明道存乎練俗乘不疾之輿以涉無遠之道命外身之駕以應十方之求而可得玉潤於一山冰結於一谷望閬風而不回儀措此世而不誨度者哉且夫自大教東流四百餘年矣雖蕃王居士時有奉者而真丹宿訓先行上世道運時遷俗未僉悟藻悅濤波下士而已惟肅祖明皇帝實天降德始欽斯道手畫如來之容口味三昧之旨戒行峻於巖隱玄祖暢乎無生大塊既唱萬竅俱怒賢人君子靡不歸宗日月雖遠光景彌暉道業之隆莫盛於今豈所謂月光道寂將生真土靈鉢東遷忽驗于茲乎又聞三千得道俱見南陽明學開士陶演真言上考聖達之誨下測道行之驗深經普往非斯而誰懷道邁訓舍茲孰降是以此方諸僧咸有傾想目欣金色之瑞耳遲無上之針老幼等願道俗同懷繫詠之情非常言也若慶雲東徂摩尼回曜一躡七寶之座暫現明哲之燈雨甘露於豐草植栴檀於江湄則如來之教復崇於今日玄波逸響重蕩濯於一代矣不勝延豫裁書致心意之蘊積曷云能暢弟子襄陽習鑿齒稽首和南弘明集怒乎法苑珠林作怒呼慶雲作塵靈逸響作溢漾一代作末代庾闡樂賢堂頌序亦云肅祖明皇帝雅好佛道手摹靈像同前高僧傳承應真履正明白內融慈訓所兼照道俗齊蔭自大教東流四百餘年雖蕃王居士時有奉者而真丹宿訓先行上世道運時遷俗未僉悟自𭎸道業之隆咸無以匹所謂月光將出靈鉢應隆法師任當洪範化洽深幽此方諸僧咸有思慕各願慶雲東徂摩尼回曜一躡七寶之座暫現明哲之燈雨甘露於豐草植栴檀於江湄則如來之教復崇於今日玄波溢漾重蕩於一代矣與謝安論釋道安書來此見釋道安故是遠勝非常道士師徒數百齊講不倦無變化技術可以感常人之耳目無重威大勢可以整羣小之參差而師徒肅肅自相尊敬洋洋濟濟乃是吾由來所未見其人理懷簡衷多所博涉內外羣書略皆遍觀陰陽算數亦皆能通佛經妙義故所游刃作義乃似法蘭法祖輩統以大無不肯稍齊物等智在方中馳騁也恨不使足下見之其亦每言思得一見足下出三藏記集高僧傳參校感傳作惑觀作覩佛經二句集云佛經故最是所長作義下傳云作義乃似法簡法道恨足下不同日而見其亦每言思得一敘欽定四庫全書
