body:
  text: 明梅鼎祚輯梁十大士傅弘一名翕致武帝書弘義烏縣雙林鄉人體權應道躡嗣維摩依止雙林大通六年遣弟子傅暀致書武帝帝詔迎講金剛經後捨宅為雙林寺雙林樹下當來解脫善慧大士白國主救世菩薩今欲修上中下善希能受持其上善略以虛懷為本不著為宗亡相為因涅槃為果其中善略以治身為本治國為宗天上人間果報安樂其下善略以護養衆生勝殘去殺普令百姓俱稟六齊今聞皇帝崇法欲伸論義未遂襟懷故遣弟子傅暀馳書告白景德傳燈録治身續高僧傳作持身武帝詔答大士為度衆生欲來隨意心王銘元釋念常佛祖歷代通載云昭明太子問大士何不論義答曰菩薩所説非長非短非廣非狹非有邊非無邊如如正理復有何言嘗著心王銘一篇觀心空王玄妙難測無名無相大有神力能滅千災成就萬德體性雖空能施法則觀之無形呼之有聲為大法將心戒傳經水中鹽味色裏膠青決定是有不見其形心王亦爾身內居停面門出入應物隨情自在無礙所作皆成了本識心識心見佛是心是佛是佛是心念念佛心佛心念佛欲得早成戒心自律淨律淨心心即是佛除此心王更無別佛欲求成佛莫染一物心性雖空貪瞋體實入此法門端坐成佛到彼岸已得波羅蜜慕道真士自觀自心知佛在內不向外尋即心即佛即佛即心心明識佛曉了識心離心非佛離佛非心非佛莫測無所堪任執空滯寂於此漂沈諸佛菩薩非此安心明心大士悟此玄音身心性妙用無能改是故智者放心自在莫言心王空無體性能使色身作邪作正非有非無隱顯不定心性雖空能凡能聖是故相勸好自防慎剎那造作還復漂沈清淨心智如世黃金般若法藏盡在身心無為泫寶皆淺非深諸佛菩薩了此本心有緣遇者非去來今釋智藏啓辭武帝智藏姓顧本名淨藏吳人天監末捨身大讖一無遺餘還居鍾山開善寺因不履世上啓辭帝手敕諭之夙昔顧省心或不調欲依佛一語於空間自制而從緣流二十餘載在乎少壯故可推斥今既老病身心俱減若復退一毫便不堪自課故願言靜處少自榮衛非敢傲世求名非欲從間自誕特是常人近情懼前途之已迫耳武帝敕諭智藏求空自間依空入慧高𮛫養神實是勝樂不違三乘亦以隨喜惟別之際能無悢然岐路贈言古人所重猶勸法師行無礙心大悲為首方便利益隨時用舍不宜頓杜以隔礙心行菩薩道無有是處續高僧傳釋保志一作寶志姓朱金城人修習禪業齊梁間時著異迹天監中卒請雨啓天監五年旱上啓上使沙門法雲講勝鬘夜便大雪志云須水一盆加刀其上俄而大雨志病不差就官乞活若不啓白官應得鞭杖願於華殿講勝鬘請雨高僧傳都講法彪發般若經題論義案此當是中大通七年同泰寺之講也廣弘明集云餘有問答一十二卷訪本未獲故其文蓋闕都講枳園寺法彪唱曰摩訶般若波羅蜜經制曰曼倩云談何容易在乎至理彌不可説雖兩端終慙四答夫實智不動至理無言湛然莫測超爾獨遠照盡空界不運其明用窮有境不施其功無住住以之住無得得以之得百福殊相同入無生萬善異流俱會平等故能導羣盲而並驅方六舟而俱濟成菩提之妙果入涅槃之玄門三明不能窺其機七辨不能宣其實大聖世尊不違本誓以方便力接引衆生於無名相寄名相説使訪道者識塗令問津者知歸所以於王舍城大師子吼説摩訶般若波羅蜜經此經亦名為大品經古舊相傳有五時般若窮檢經論未見其説唯有仁王般若題列卷後具有其文第一佛在王舍城説大品般若第二佛在舍衛國祗洹林中説金剛般若第三佛在舍衛國祗洹林説天王般若第四佛在王舍城説光讚般若第五佛在王舍城説仁王般若其云金剛般若有八卷淮南唯有校量功德一品即其本名金剛般若卷後題云佛五時説般若此是初時説此土未有第二時説兩記相反難得承用大智論言般若部黨有多有少止云光讚放光道行舉此三經不列五時此土有光讚放光道行三經放光即是大品光讚道行與放光無殊正以詳略為異光讚起序品至散華品凡二十七品大本至散華有二十九品光讚闕無二品道行初起三𫨻盡後囑纍凡有三十品依大本除前六品猶應有八十四品道行闕無五十四品光讚道行與大品事義無異為是出經者辭有文質是為在天竺時已分為三部前注大品亦開為五別隨文析理非為異處僧睿小品序云斯經正文凡有四種是佛異時適化廣略之説其文多者十萬偈少者六百偈此之大品乃是天竺中品但言四種不説五時前謂僧睿小品序即是七卷般若隨從舊聞致成差漏不遠而復庶無祗悔僧睿所言小品即是道行般若何以知然以三事驗故知其然一道行般若尾末亦自題為小品二七卷有二十九品道行文有三十品僧睿序三十品者不序二十九品者三僧睿序止讚道行二字其文言云章雖三十冠之者道言雖十萬倍之者行行凝然後無生道足然後補處以是義故知道行經即是小品大品之名是道安法師出經後事道安云昔在漢隂十有五載講放光經歲常再過爾時猶未名為大品前來小品後至小品有三十章大品有九十章多少不同以相形待小大之名所以得生復有人言佛説五時教第一時在鹿野苑轉四諦法輪乃至第五時於雙樹間轉大般涅槃云大品經是第二時教淨名思益是第三時教法華經是第四時教是義不然釋論言須菩提聞法華經中説聲聞人皆當作佛是故今問為畢定不畢定是則聞法華在前説大品在後以是因緣不得言大品經是第二時説又如二夜經中説佛從得道夜至涅槃夜是兩中間所説經教一切皆實不顛倒以是義知從尼連禪河邊初得道日乃至娑羅林中入涅槃夜常説般若波羅蜜中本起經云如來始成道優陀耶還淨飯王問今者獨處思憶何事優陀耶答云世尊唯空苦樂非真淨飯王言災矣悉達一切皆有如何言無反矣悉達與人為讐此是始成道時説般若波羅蜜高貴德王經言菩薩修行方等大般涅槃不聞布施不見布施乃至不聞大涅槃不見大涅槃知見法界解了實相空無所有第九功德經言菩薩修大涅槃於一切法悉無所見若有見者不見佛性不能修習般若波羅蜜不得入於大般涅槃乃至廣説以如是因緣故當知初成道日乃至涅槃夜常説般若波羅蜜經般若波羅蜜是諸佛母三世如來皆由是生無相大法非可戲論豈得限以次第局以五時根性不同宜聞非一亦復不但止有五時往年令莊嚴僧旻法師與諸學士共相研核檢其根性應所宜聞凡有三百八十人是則時教甚為衆多一人出世多人得利益豈容止為一根性人次第五時轉大法輪所言摩訶般若波羅蜜經者經題立名凡有三意一以人二以法三人法雙舉辨意思益是以人名經法華涅槃是以法名經淨名勝鬘是人法雙舉此經立名以法名經離法無人離人無法云何得言此經以法為名般若是實法人是假名此是人家之法非法家之人猶如道諦是法寶攝是故此經得受法名摩訶般若波羅蜜此是天竺音經是此土語外國名為修多羅此言法本具含五義一出生二涌泉三顯示四繩墨五結鬘訓釋經字亦有三義一久二通三由久者名不變滅是名為久三世不遷即是常義通者理無壅滯是名為通一切無礙即是道義由者出生衆善是名為由萬行軌轍即是法義以經字代修多羅者修多羅名通經名別修多羅名所以通者凡聖共有所以為通經名別者此土聖人所説名之為經所以為別以經字代修多羅欲令聞者即得信解摩訶此言大般若此言智慧波羅此言彼岸蜜此言度又云到具語譯云大智慧度言彼岸度者蓋是國語不同此以為非彼以為是此以為是彼以為非隨俗之説更無異義此中有四意一稱德二出體三辨用四明宗大是稱德智慧是出體度是辨用彼岸是明宗此中復有二意一者法説二者譬説大者是法説彼岸是譬説即以彼岸譬於涅槃云何是大義空是大義涅槃十八空云言大空者謂般若波羅蜜空此經言色大故般若大不待小空名為大空大若定大不名為大無得而稱是為大義云何智慧義能知諸法實相是智義能照諸法無生是慧義若有照有得不名智慧無照無得而本圓寂是智慧義云何為度義生死是此岸涅槃是彼岸煩惱為中流以第一度濟於四流以是因緣名之為度度若定度不名為度無去無來是名度義又云到者以無生慧能證涅槃未到云到是體性能到故名為到不見因有能到不見果有所到是名到義云何是彼岸義生死是此岸涅槃是彼岸生死不異涅槃涅槃不異生死不行二法是彼此岸義所以須菩提白佛言世尊菩薩摩訶薩修般若波羅蜜當得薩婆若不佛言不世尊不修般若波羅蜜當得薩婆若不佛言不世尊修不修當得薩婆若不佛言不世尊非修非不修當得薩婆若不佛言不世尊若不爾云何當得薩婆若佛言菩薩摩訶薩得薩婆若如相須菩提又問言世尊菩薩不以二法不以不二法云何當得一切種智佛言無所得即是得以是得得無所得又佛言色即薩婆若乃至一切種智即薩婆若色如相乃至一切種智如相皆是一相無二無別以是義故名般若波羅蜜若能離著取緣忘懷求理如響受聲如幻聽法斯真可謂般若波羅蜜矣止誦初章更無異識義乖傳燈心非受水豈能宣金口於慧殿散甘露於香城潤良田之種子發菩提之萌芽譬坳塘之水隨百川而入巨海猶蟭螟之目因千日而窺大明豈知其涯岸之所止泊寧見照燭之所近遠憑藉大衆宿植德本仰承如來慈善根力儻有疑難冀能酬答釋惠津與瑗律師書此與瑗答書皆梁末侯景亂後也惠津和南竊聞尋師萬日以禮見知而津伏奉未淹過蒙優接昔鄒陽上書乃可引為上客宋玉陳賦則一賜以良田且復康會來吳才堪師表摩騰入漢行合律儀者哉故知道寄人弘德不孤立儔今訪古並非其例豈可虛佩寵靈坐安隆渥便是名踰分外譽起身表但法輪初啓請業者如雲非直四海同風天下慕義遂令負笈之徒排肩自遠歸仁之士繼踵來儀華隂成市曾何足云舉袂如帷豈得獨高前代況乃闡禪定之初門開智慧之燈炬信實傾河倒海宣説不窮先進者陷於金城後生者摧其利齒可號熏修戒善能令十地瓔珞守持身行則使八正莊嚴允穆聖凡協和幽顯加有懷鉛握錐之好聚螢流麥之勤或剖蚌求珠開河出寶而惠津一介無取內外靡聞學謝懸鍾言慙散粉同斯曲木空廁直蘭類此蒹葭謬參玉樹乃知滄溟汪濊不待毫滴之珠華嶽穹崇寧俟遊塵之壤譬茲秋鳳如彼春林墜獨葉不預百枝落一毛何關六翮正言身名仰委觸途憑纍區區寸誠喻如皎日不意三邊有務四郊多壘致使虧贊講筵請益成廢言及悲鯁寧可具披所冀難靜障除更敦咨受不任戀結行遣祗承惠津和南釋曇瑗未詳氏族金陵人以戒律處世答津律師書信來枉告良用憮然余學慙技癢人非準的中間雖曾講授不異管內窺天豈足作範後昆踵武前哲蓋身疾弗瘳門人引去一師盛業廢而莫傳五十之年忽焉將至長夜永懷惆悵何已每有好事者日相請逼遂以罷老復成自勵如法師數子本出名家洛下竒才當今利齒必欲探核論部任持律藏方為美器日見絶塵復有海表竒僧聚中開士皆學無常師不遠而至訪道質疑足稱一時之樂不意蕃兵犯蹕敵馬飲江塔廟焚如義徒道殣即日京華故老倚席不談乃復爰訪幽阿令其訓導久廢無次何以誨人故乃荊棘生乎口中雌黃謬於舌杪矣煎水求冰未足為喻佇能近顧方陳寸𣢾瑗白與梁朝士書光宅寺曇瑗白竊惟至人誨各赴機權故外設約事三千內陳律儀八萬誠復楷訓義門無非懲惡孔定刑辟以詰姦宄釋敷羯磨用擯違法二聖分教別有司存頃見僧尼有事每越訟公府且內外殊揆科例不同或內律為輕外制成重或內法為重外網更輕凡情僶俯肆其阿便若苟欲利己則捨內重而附外輕若在陷他則棄內輕而依外重非惟穢黷時宰便為頓乖理制幸屬明令公匡弼社稷和燮隂陽舟楫大乘柱石三寶遐邇向風白黑兼慶貧道居僧列頗曾採習毗尼纍獲僧曹送事訪律詳決尋佛具切戒國有憲章絓僧家諍執未審依何折斷謹致往牒佇奉還旨庶成約法永用遵模釋曇瑗呈並廣弘明集釋玄光辨惑論并序弘明集玄光此論在宋釋僧愍戎華論後梁劉協滅惑論前論中引宋武帝齊陸修靜則當時在齊梁間夫大千遐邈萬化無際塵遊夢境染惑聲華緣想增靄奚識明政由淳風漓薄使衆魔紛競矣若矯詐謀宋必行五逆威強導蒙必施六極蟲氣霾滿致患非一念東吳遭水仙之厄西夷載鬼卒之名閩藪留種民之穢漢葉感思子之歌忠賢撫歎民治凌歇攬地沙草寧數其罪涓流末學莫知宗本世教訛辭詭蔽三寶老鬼民等詠嗟盈路皆是炎山之煨燼河雒之渣糝淪湑險難余甚悼焉聊詮往迹庶鏡未然照迷童於互鄉顯妙趣於塵外休風冥被彼我情判豈是言聲所能攄寫禁經上價一逆夫言籍雲舒貫空有之美聖賢功績何莫由斯實學者之淵海生民之日月所以波崙菩薩慈悲等照震雷光於炎塗弭魔賊於險澤泛靈舟於信風接浮生於苦海聞道諸經製雜凡意教迹邪險是故不傳怪哉道化空被禁錮觀今學者不顧嚴科但得金帛便與其經貧者造之至死不覩貪利無慈逆莫過此又其方術穢濁不清乃扣齒為天鼓咽唾為醴泉馬屎為靈薪老鼠為芝藥資此求道焉能得乎昔秦皇漢武不獲輕身使徐福公孫遠冥雲波祈候通仙影響無陳夫間心祛欲則事與道鄰豈假驟涉之勞咽唾嗑齒者乎妄稱真道二逆夫質懋纁霞者言神丹之功開明淨智者必𦿆花之氣雖保此為真而未能無終況復張陵妄稱天師既侮慢人鬼即身受報漢興平末為蟒蛇所吸子衡奔尋無處畏負清議之報譏乃假設權方以表靈化之迹生縻鶴足置石崖頂謀事辦畢尅期發之到建安元年遣使告曰正月七日天師升玄都米民山獠蟻集閾外雲臺治民等稽首再拜言伏聞聖駕玄都臣等長辭蔭接尸塵方享九幽方夜衡入久之乃出詭稱曰吾旋駕辰華爾各還所治淨心持行存師念道衡便密抽遊鶴直衝虛空民獠愚戅僉言登仙販死利生欺罔天地合氣釋罪三逆夫滅情去欲則道心明真羣斯班姓妄造黃書呪癩無端以伏輕誚呪曰天道畢三五成日月俱出窈窈入冥冥氣入真氣通神氣布道氣行姦邪鬼賊皆消亡視我者盲聽我者聾敢有謀圖我者反受其殃我吉而彼凶至甲子詔冥醮録男女媟合尊卑無別吳陸修靜復勤勤行此乃開命門抱真人嬰兒回戲龍虎作如此之勢用消災散禍其可然乎其可然乎漢時儀君行此為道魑魅亂俗被斥燉煌後至孫恩佚蕩滋甚士女溷漫不異禽獸夫色塵易染愛結難消況交氣丹田延命仙穴肆兵過玉門之禁變態窮龍虎之勢生無忠貞之節死有青庭之苦誠願明天檢鏡斯輩物我端清莫負冥詔挾道作亂四逆夫冥宗難曉聲華易惑緣纍重淵嶽德輕風露如黃巾等鳶望漢室反易天明罪悉伏誅次有子魯復稱鬼道神祗不佐為野麋所突末後孫恩復稱紫道不以民賤之輕欲圖帝貴之重作雲響於幽竇發妄想於空玄水仙惑物枉殺老稚破國壞民豈非凶逆是以宋武皇帝為之慨然乃龍飛千里虎步三江掩撲羣妖不勞浹辰含識懷歡草木春光章書代德五逆夫至化餘塵不可誣蔽詮諡靈𩲸務依明德道無真體妄逐妖空輒言東行醉酒沒故如此頑瞢寧非陋僻又遷達七祖文意淺薄乞免擔沙石長作道鬼夫聖智窮微有念斯照何煩祭酒橫費紙墨若必須辭訴然後判者始知道君無玄鑒之能天曹無天眼之照三官疲於謹案伺吏勞於討捕聞其奏章本擬急疾而戊辰之日上必不達不達太上則生民枉死嗚呼哀哉實為五逆畏鬼帶符妖法之極一夫真心履順者妖忤革其氣是以至聖高賢無情於萬化故能洞遊金石臥宿煙霞此純誠感通豈佩帶使然哉其經辭致姱慢鬼弊云左佩太極章右佩昆吾鐵指日則停暉擬鬼千里血若受黃書赤章言即是靈仙硠屐入靖不朝太上至於使六甲神而跪拜圊廁如郭景純亦云仙流登圊度厄竟不免災愚癡顛倒豈識儀節聞其著符昔時軍標張角黃符子魯戴絳盧悚紫標孫恩孤虛並矯惑王師終滅人鬼制民課輸欺巧之極二夫五斗米教出自天師後生邪濁復立米民世人厭畏是以子明杜恭俱困魔蟒又塗炭齋者事起張魯氐夷難化故制斯法乃驢𩥇泥中黃鹵泥面擲頭懸柳埏埴使熟此法指在邊陲不施華夏至義熙初有王公其次貪寶憚苦竊省打拍吳陸修靜甚知源僻猶埿揬額懸縻而已癡僻之極幸勿言道解廚纂門不仁之極三夫開闉大施與物通美左道餘氣乃纂門解厨矜身與食懷哤斑之態昔張子魯漢中解福大集祭酒及諸鬼卒鬼卒鬼民鬼吏鬼道此是子魯輕於民夷作此名也又天師係師嗣師及三女師此是張魯自稱美也又道姑道男冠女官道父道母神君種民此是合氣之後贈物名也又米民米性都功祭酒此是荒時撫化名也又貧道三洞法師長安僧禕作此名也又先生道民仙公王秣陵縣民王靈期作也又道士蟻賊制酒米賊此是世人之所目也又法師都講侍經者是陸修靜傍佛依世制此名也又天公地公及稱臣妾太平之道五斗米道大道紫道鬼神師若仙此作賊時假威名也又膠東樂大拜五利將軍雖有茅土而無臣節漢武之末不復稱之也酣進過常遂致醟逸醜聲遐布遠達岷方劉璋教曰夫靈仙養命猶節松霞而厚身嗜味奚能尚道子魯聞之憤恥意深罰其掃路世傳道士後會舉標以防斯難兼制廚令酒限三升漢末已來謂為制酒至王靈期削除舋目先王道民並其賑錫雖有五利之貴更為妖物之名度厄苦生虛妄之極四夫質危秋蒂命薄春氷業風吹蕩蓬回化境所以景公任於緣命孫子記為行尸迷徒湫學不識大方至有疾病衰禍妄甚妖崇之原淵鬼鸜以為災渡危厄於遐川詹釣星於懸溜雪丹章於華山乃蹙顰眉貌謑詬冥鬼云三官使者已送光歸逝者故然空喪辭貨斯實祭酒規巾糈之利蠶食百姓公私並損致使火宅驚於至聖歸歌動於人思矣夢中作罪頑癡之極五夫天屬化始乃識照為原棄捨身命草木非數然大地丘山莫非我故塵滄川㵿漫皆是我淚血以此而觀誰非親友或夢見先亡輒云變怪夫人鬼雖別生滅固同恩愛之情時復影響羣邪無狀不識逆順召食鬼吏兵奏章斷之割截幽靈單心誰照幸願未來勿尚迷言使天堂無輟食之思氷河靜災念之聲輕作寒暑凶之極六夫淵默心口者萬行之真德而塵界衆生率無慈愛虓凶邪侫符章競作懸門貼戶以誑愚俗高賢有識未之安也造黃神越章用持殺鬼又制赤章用持殺人趣悅世情不計殃罪隂謀懷嫉經有舊準死入鐵鉗火獄生出鴟鶪瘖啞精骸惛朽淪離永劫誰知斯乎老鬼民輩道相不然事之宜質夫諫刺雖苦智者甘聞故略致言幸試三思能拂迹改圖即與大化同風矣良其不革請俟明德備照聲曲以曉長夜豈是今日弱辭所陳哉釋僧順釋三破論十九條本論道士假張融作弘明集編梁劉協滅惑論後論曰泥洹是死未見學死而得長生此滅種之化也釋曰夫生生之厚至於無生則張毅單豹之徒是其匹矣是以儒家云人莫不愛其死而患其生老氏云及吾無身吾有何患莊周亦自病痛其一身此三者聖達之流叵以生為患夫欲求無生莫若泥洹泥洹者無為之妙稱談其迹也則有王宮雙樹之文語其實也則有常住常樂之説子方輪回五道何由聞涅槃之要或有三盲摸象得象耳者爭云象如簸箕得象鼻者爭云象如春杵雖獲象一方終不得全象之實子説泥洹是死真摸象之一盲矣論云太子不廢妻使人斷種釋曰夫聖實湛然迹有表應太子納妃於儲二者蓋欲示人倫之道已足遂能棄茲大寶忽彼恩愛耳至如諸天夕降白驥飛城十號之理斯在何妻子之可有哉且世之孥孺為纍最深飢寒則生於盜賊飽暖則發於驕奢是以厲婦夕産忽求火照惟恐似已復更為厲凡夫之種若厲産焉經云一切衆生皆有佛性仰尋此旨則是佛種捨家從道棄厲就佛為樂為利寧復是加子迷於俗韻滯於重惑夢中之夢何當曉哉論云太子不剃頭使人落髮釋曰在家則有二親之愛出家則有嚴師之重論其愛也髮膚為上稱其嚴也剪落為難所以就剃除而歡若辭父母而長往者蓋欲去此煩惱即彼無為髮膚之戀尚或可棄外物之徒有何可惜哉不輕髮膚何以尊道不辭天屬何用嚴師譬如喪服出紹大宗則降其本生隆其所後將使此子執人宗廟之重割其歸顧之情還本政自一期非恩之薄所後頓伸三年實義之厚禮記云出必降者有愛我而厚其例矣經云諸天奉刀持髮上天不剃之談是何言也子但勇於穿鑿怯於尋旨相為慨然論云子先出家母後作尼則敬其子失禮之甚釋曰出家之人尊師重法棄俗從道寧可一槩而求且太子就學父王致敬漢祖善家令之言以太皇為臣魏之高貴敬齊王作私制晉之儲后臣厥父於公庭引此而判則非疑矣論云剃頭為浮圖釋曰經云浮圖者聖瑞靈圖浮海而至故云浮圖也吳中石佛泛海倏來即其事矣今子毀圖像之圖為刑屠之屠則泰伯端委而治故無慙德仲雍剪髮文身從容致化遭子今日必罹吠聲之尤事有似而非非而似者外書以仲尼為聖人內經云尼者女也或有謂仲尼為女子子豈信之哉猶如屠圖之相類亦何以殊論云喪門者死滅之門也釋曰門者本也明理之所出入出入從本而興焉釋氏有不二法門老子有衆妙之門書云禍福無門皆是會通之林藪機妙之淵宅出家之人得其義矣喪者滅也滅塵之勞通神之解即喪門也桑當為乘字之誤耳乘門者即大乘門也煩想既滅遇物斯乘故先云滅門末云乘門焉且八萬四千皆稱法門奚獨喪桑二門哉論云西域不信虛無老子入關故作形像之化也釋曰原夫形像始立非為教本意當由滅度之後係戀罔已旃檀香像亦有明文且仲尼既卒三千之徒永言興慕以有若之貌最似夫子坐之講堂之上令其説法門徒咨仰與往日不殊曾參勃然而言曰子起此非子之座推此而談思仰可知也羅什法師生自殊方聰敏淵博善談法相襁負佛經流布關輔詮以真俗二名驗以境照雙寂振無為之高風激玄流於未悟所謂遣之至於無遣也子謂西域不信虛無誠非篤論君子且強理有優劣不係形像子以形像而語不亦攻乎異端論云毀形本不求佛為服西土今中國人士不以正神自訓而取西域之法釋曰夫六戎五狄四夷八蠻藝生之衆不聞佛法者不行信受事均八難方今聖主隆三五之治闡一乘之法天人同慶四海欣欣跂行喙息咸受其賴蠉蠕之蟲自云得所子脫不自思厝言云云宜急緘其舌亦何勞提耳論云沙門者沙汰之謂也釋曰息心達源號曰沙門此則練神濯穢反流歸潔即沙汰之謂也子欲毀之而義逾美真可仰之彌高鑽之彌堅者也論云入國破國釋曰夫聖必緣感無往非應結繩以後民澆俗薄末代王教挻揚堯孔至如妙法所沾固助俗為化不待刑戮而自淳無假楚撻而取正石主師澄而興國古王咨勃以隆道破國之文從何取説論云入家破家釋曰釋氏之訓父慈子孝兄愛弟敬夫和妻柔備有六睦之美有何不善而能破家唯聞末學道士有赤章呪咀發擲隂私行壇被髮呼天叩地不問親疏親相厭殺此即破家之法矣論云入身破身釋曰夫身之為纍甚於桎梏老氏以形骸為糞土釋迦以三界為火宅出家之士故宜去奢華棄名利悟逆旅之難常希寂滅之為樂流俗之徒反此以求全即所謂殺生者不死生生者不生也近代有好名道士自云神術過人剋期輕舉白日登天曾未數丈橫墜於地迫而察之正大鳥之雙翼耳真所謂不能奮飛者也驗滅亡於即事不旋踵而受誅漢之張陵誣誷貢高呼曰米賊亦被夷剪入身破身無乃角弓乎論曰歌哭不同者釋曰人哭亦哭俗內之冥迹臨喪能歌方外之坦情原壤喪親登木而歌孔子過而不非者此亦是名教之一方耳論云不朝宗者釋曰孔子云儒有上不臣天子下不事公侯儒者俗中之一物尚能若此況沙門者方外之士乎昔伯成子高子州交伯但希玄慕道似不近屑人事論云剃頭犯毀傷釋曰髮膚之解具於前答聊更略而陳之凡言不敢毀傷者正是防其非僻觸冒憲司五刑所加致有殘缺耳今沙門者服膺聖師遠求十地剃除鬚髮被服法衣立身不乖揚名得道還度天屬有何不可而入毀傷之義守文之徒未達文外之旨耳輪扁尚不移術於其兒豫何言哉論云出家者未見君子皆是避役釋曰噫唉何子之難喻邪左傳云言者身之文莊周云言不廣不足以明道余欲無言其可得乎夫出家之士皆靈根宿固德宇淵深湛乎斯照確乎不拔者也是以其神凝其心通超然遐想宇宙不能點其胸懷淡爾無寄塵垢何能攪其方寸割慈親之重恩棄房櫳之歡愛虛室生白守玄行禪或頭陀林野委身餒獸或靜節蔬餐精心無怠將勤求十力超登無上解脫天羅銷散地網兆百福於未萌濟蒼生於萬劫斯實大丈夫之宏圖非吾子所得聞也避役之談是何言歟孔子頨喙三尺者雖言出於口終不以長舌犯人則子之喙三尺矣何多口之為纍傷人之深哉論云三丁二出一何無緣者釋曰無緣即是緣無緣生有緣即是緣有緣起何以知其然邪世有闔門入道故曰緣有緣起有生不識比丘者故曰緣無緣生十六王子同日出家隨父入道是則緣之所牽闔門頓至何其宜出二之有哉無緣者自就無緣中求反諸己而已矣子方永墜無間遑復論此將不欲倒置干戈乎若能反迷殊副所望論云道家之教育德成國者釋曰道有九十六種佛為最尊梵志之徒蓋是培塿假使山川之神能出雲雨者亦是有國有家之所祀焉其云育德成國不無多少但廣濟無邊永拔塗炭我金剛一聖巍巍獨雄夫太極剖判之初已自有佛但于時衆生因緣未動故宜且昧名稱何以言之推三皇已上何容都無禮易則乾坤兩卦履豫二爻便當與天地俱生雖曰俱生而名不俱出者良由機感不發施用未形其理常在其迹不著耳中外二聖其揆一也故法行云先遣三賢漸誘俗教後以佛經革邪從正李老之門釋氏之偏裨矣經云處處自説名字不同或為儒林之宗國師道士或寂漠無為而作佛事金口所説合若符契何為東西跳梁不避高下邪嗟乎外道藉我智慧資我神力遂欲撓亂我經文虔劉我教訓人之無良一至於此也論云道者氣釋曰夫道之名以理為用得其理也則於道為備是故沙門號曰道人陽平呼曰道士釋聖得道之宗彭聃居道之末得道宗者不待言道而道自顯居道之末者常稱道而道不足譬如仲尼博學不以一事成名遊夏之徒全以四科見目莊周有云生者氣也聚而為生散而為死就如子言道若是氣便當有聚有散有生有死則子之道是生滅法非常住也嘗聞子道又有合氣之事願子勿言此真辱矣莊子又云道在屎溺此屎溺之道得非吾子合氣之道乎並弘明集狼牙修國王婆伽達多奉梁武帝表天監十四年遣使阿撤多奉表大吉天子足下離淫怒癡哀愍衆生慈心無量端嚴相好身光明朗如水中月普照十方眉間白毫其白如雪其色照耀亦如月光諸天善神之所供養以垂正法寶梵行衆增莊嚴都邑城閣高峻如乾陀山樓觀羅列道途平正人民熾盛快樂安穩著種種衣猶如天服於一切國為極尊勝天王愍念羣生民人安樂慈心深廣律儀清淨正法化治供養三寶名稱宣揚布滿世界百姓樂見如月初生譬如梵王世界之主人天一切莫不歸依敬禮大吉天子足下猶如現前忝承先業慶嘉無量今遣使問訊大意欲自往復畏大海風波不達今奉薄獻願大家曲垂領納婆利國王憍陳如奉武帝表天監十六年伏承聖王敬重三寶興立塔寺校飾莊嚴周遍國土四衢平坦清淨無穢臺殿羅列狀若天宮壯麗微妙世無與等聖主出時四兵具足羽儀導從布滿左右都人士女麗服光飾市廛豐富充積珍寶王法清整無相侵奪學徒皆至三乘競集敷説正法雲布雨潤四海流通交會萬國長江眇漫清泠深廣有生咸資莫能消穢隂陽和暢災厲不作大梁揚都聖王無等臨覆上國有大慈悲子育萬民平等忍辱怨親無二加以周窮無所藏積靡不照燭如日之明無不受樂猶如淨月宰輔賢良羣臣貞信盡忠奉上心無異想伏惟皇帝是我真佛臣是婆利國王今敬稽首禮聖王足下惟願大王知我此心此心久矣非適今也山海阻遠無緣自達今故遣使獻金席等表此丹誠于陀利國王毗邪跋摩奉武帝表天監十七年遣長史毗貟跋摩奉表常勝天子陛下諸佛世尊常樂安樂六通三達為世間尊是名如來應供正覺遺形舍利造諸塔像莊嚴國土如須彌山邑居聚落次第羅滿城郭館宇如忉利天宮具足四兵能伏怨敵國土安樂無諸患難人民和善受化正法慶無不通猶處雪山流注雪水八味清淨百川洋溢周回屈曲順趨大海一切衆生咸得受用於諸國土殊勝第一是名震旦大梁揚郡天子仁廕四海德合天心雖人是天降生護世功德寶藏救世大悲為我尊主威儀具足是故至誠敬禮天子足下稽首問訊奉獻金芙蓉雜香藥等願納受盤盤國王奉武帝表大通元年揚州閻浮提震旦天子萬善莊嚴一切恭敬猶如天淨無雲明耀滿目天子身心清淨亦復如是道俗濟濟並蒙聖王光化濟度一切永作舟航臣聞之慶善我等至誠敬禮常勝天子足下稽首問訊今奉薄獻願哀受丹丹國王奉武帝表中大通二年伏承聖主至德仁洽信重三寶佛法興顯衆僧殷集法事日盛威嚴整肅朝望國執慈愍蒼生八方六合莫不歸服化鄰諸天非可言喻不任慶善若暫奉見尊足謹奉送牙像及塔各二軀并獻火齊珠吉貝雜香藥等中天竺國王曲多表名屈多奉武帝表天監初遣長史竺羅達奉表伏聞彼國據江傍海山川周固衆妙悉備莊嚴國土猶如化城宮殿莊飾街巷平坦人民充滿歡娛安樂王出遊四兵隨從聖明仁愛不害衆生國中臣民循行正法大王仁聖化之以道慈悲羣生無所遺棄常修淨戒式導不及無上法船沈溺以濟百官氓庶受樂無恐諸天護持萬神侍從天魔降服莫不歸仰王身端嚴如日初出仁澤普潤猶如大雲於彼震旦最為殊勝臣之所住國土首羅天守護令國安樂王王相承未曾斷絶國中皆七寶形像衆妙莊嚴臣自修檢如化王法臣名屈多奕世王種惟願大王聖體和平今以此國羣臣民庶山川珍重一切歸屬五體投地歸誠大王使人竺達多由來忠信是故今遣大王若有所須珍奇異物悉當奉送此之境土便是大王之國王之法令善道悉當承用願二國信使往來不絶此信返還願賜一使具宣聖命備敕所宜欵至之誠望不空返所白如允願加採納今奉獻琉璃唾壺雜香吉貝等物師子國王伽葉伽羅訶梨邪天竺旁國奉武帝表大通元年謹白大梁明主雖山海殊隔而音信時通伏承皇帝道德高遠覆載同於天地明照齊乎日月四海之表無有不從方國諸王莫不奉獻以表慕義之誠或泛海三年陸行千日畏威懷德無遠不至我先王以來唯以修德為本不嚴而治奉事正法道化天下欣人為善慶若己身欲與大梁共弘三寶以度難化信還伏聽告敕今奉薄獻願納受並梁書海南夷傳欽定四庫全書
