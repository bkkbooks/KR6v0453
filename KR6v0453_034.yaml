body:
  text: 明梅鼎祚輯北齊文宣帝姓高氏諱洋字子進渤海蓨人神武帝歡次子都鄴詔釋僧稠僧稠姓孫巨鹿廮陶人魏末於定州創開歸戒齊天保元年文宣下詔苦相敦喻勑構雲門寺於鄴城居之久聞風德常思言遇今勑定州令師赴鄴教化羣生義無獨善希即荷錫暫遊承明思欲弘宣至道濟斯苦壤至此之日脫須還山當任東西無所留縶續高僧傳禁祭酒道詔天保年中釋道二門交競優劣文宣帝令上統法師與道士陸修靜等捔試靜等緘伏乃下詔法門不二真宗在一求之正路寂泊為本祭酒道者世中假妄俗人未悟仍有祇崇麴糵是味清虛焉在胊脯斯甘慈悲永隔上異仁祠下乖祭典皆宜禁絶不復遵事頒勒遠近咸使知聞其道士歸伏者並付昭玄大統上法師度聽出家未發心者可令染剃勒續高僧傳作勑問釋道兩教制詔天保五年舉秀才詔問樊遜策對第一廣弘明作問沙汰釋李詔齊書不載朕聞專精九液鶴竦玄州之境苦心六歲釋擔煩惱之津或注神鬼之術明尸解之方或説因緣之要見泥洹之道是以太一闡法竟於輕舉如來證理環於寂滅自祖龍寢迹劉莊感夢從此以歸紛然遂廣至有委親遺纍棄國忘家館舍盈於山藪伽藍遍於州郡若黃金可化淮南不應就戮神威自在央掘豈得為剠若以御龍非實荊山有攀髯之戀控象為虛瀍洛寤夜光之詭是非之契朕實惑焉乃有緇衣之衆參半於平俗黃服之徒數過於正戶所以國給為此不充王用因茲取乏欲擇其正道蠲其左術一則有潤邦家二則無惑羣品且積競繇來行之已久頓於中路沙汰實難至如兩家升降二途修短可指言優劣無鼠首其辭廣弘明集樊遜對釋道兩教策遜字孝謙河東北猗氏人歷員外散騎侍郎臣聞天道性命聖人所不言蓋以理絶涉求難為稱謂伯陽道德之論莊周逍遙之旨遺言取意猶有可尋至若玉簡金書神經祕録三尸九轉之奇絳雪玄霜之異淮南成道犬吠雲中王喬得仙劍飛天上皆是憑虛之説海棗之談求之如繫風學之如捕影而燕君齊后秦皇漢帝信彼方士冀遇其真徐福去而不歸欒大往而無獲猶謂升霞倒影抵掌可期祭鬼求神庶或不死江璧既反還入驪山之墓龍媒已至終下茂陵之墳方知劉向之信洪寶沒有餘責王充之非黃帝此為不朽又未葉已來大存佛教寫經西土畫像南宮昆池地黑以為劫燒之灰春秋夜明謂是降神之日法王自在變化無窮置世界於微塵納須彌於黍米蓋理本虛無示諸方便而妖妄之輩棄家出家藥王燔軀波斯灑血假未能然猶當克念寧有改形易貌有異生人恣意放情還同俗物龍宮餘論鹿野前言此而得容道風將墜伏惟陛下受天明命屈己濟民山鬼效靈海神率職湘中石燕沐時雨而羣飛臺上銅鳥訴和風而獨轉以周都洛邑治在鎬京漢宅咸陽魂歸豐沛汾晉之地王迹維始眷言巡幸且勞經略猶復降情文苑斟酌百家想執玉於瑤池念求珠於赤水竊以王母獻環由感舜德上天錫珮實報禹功二班勒史兩馬製書未見三世之辭無聞一乘之旨帝樂王禮尚有時而沿革左道怪民亦何疑於沙汰臣某謹對北齊書廣弘明集棄家作苟求波斯作波崙生作世訴作嗉轉作囀以周都作但周都眷言巡幸作既疲遊幸錫作賜二班句作兩馬記言二班書事廢帝諱殷字正道文宣長子孝昭篡立廢為濟南王僧稠喪事詔稠乾明元年卒於鄴城雲門寺勑遣襄樂王宣慰故大禪師志力精苦感果必然栖心寂默虛來實返妙業玄風事高緇素運往神遷實深嗟惘資崇有嘉用申悽敬可施物五百段送千僧供於雲門以崇追福孝昭帝諱演字延安神武子廢殷自立為僧稠起塔詔皇建二年故大禪師德業高迥三寶棟梁滅盡化終神遊物外可依中國之法闍毗起塔建千僧齋贈物千段標樹芳迹示諸後代並續高僧傳後主諱緯字仁綱武成帝長子稅僧尼令黃門侍郎顏之推奏請立關市邸店之稅開府鄧長顒贊成之後主大説於是以其所入供御府聲色之費稅僧尼令曰僧尼坐受供養遊食四方損害不少雖有薄斂何足為也杜氏通典劉晝字孔昭渤海阜城人舉秀才不第竟無仕進上高歡書言佛法詭誑避役又詆訶淫蕩滯惑解但云上書不言上歡尼與優婆夷實是僧之妻妾損胎殺子其狀難言今僧尼二百許萬并俗女向有四百餘萬六月一損胎如是則年族二百萬戶矣驗此佛是疫胎之鬼也楊云按大藏律文佛告諸弟子汝慎勿妄度沙彌尼女人恣態難保悅在須以後佛生惡意不真菩薩不可妄度據此則尼之醜行固亦佛法所惡也姦僧宄梵托佛倚法而亂人族以損天胎地獄之設彼惡得不自入哉向居士致慧可書慧可一名僧可姓姬氏虎牢人初名神光久居伊洛博覽羣書善談玄理事達磨於少林得法傳衣為東土二祖有向居士者於天保初道味相師致書通好命筆回示居士捧披祖偈乃伸禮覲密承印記開皇中管城宰加以非法遂委順焉影由形起響逐聲來弄影勞形不識形為影本揚聲止響不識聲是響根除煩惱而趣涅槃喻去形而覔影離衆生而求佛喻默聲而尋響故迷悟一途愚智非別無名作名因其名則是非生矣無理作理因其理則諍論起矣幻化非真誰是誰非虛妄無實何空何有將知得無所得失無所失未及造談聊申此意伏望答之不識形為影本續高僧傳作不知形之是影趣作求涅槃下有者字造談作造謁伏望作想為慧可命筆回示備觀來意皆如實真幽之理竟不殊本迷摩尼謂瓦礫豁然自覺是真珠無明智慧等無異當知萬法即皆如愍此二見之徒輩伸詞措筆作斯書觀身與佛不差別何須更覔彼無餘傳燈録備觀來意高僧傳説此真法真幽之理作與真幽理邢邵字子才河間鄭人中書監攝國子祭酒文襄皇帝金像銘妙形難象至理希詮形之所及理亦在焉悟茲空假勞此蓋纏式圖往祕用結來緣丹青並飾金玉同鐫神儀內瑩寶相外宣圓光照耀映被無邊靈應肸響感發大千鍾福旒纊其永如天歸慶怙恃壽等南山凡厥親類宜其永年歸誠妙覺標志上玄託銘斯在曠劫方傳獻武皇帝寺銘惟睿作聖有縱自天匡國庇民再造區夏功高伊呂道邁桓文雖住止域中而神遊方外影響妙法咫尺天人曉夜自分不勞雞鶴之助六時靡惑非待壺箭之功永寄將來傳之不朽辭曰用分行坐以敦戒行苦罪祈福傲狠成敬萬國咸亨一人有慶方傳自久是用成詠景明寺碑九土殊方四生舛類昏識異受修短共時德表生民不救太山之朽壤義同列辟豈濟欒水之淪胥漂鹵倒戈之勢孚江架海之力孰不曠息相催飛馳共盡泡沫不足成喻風電詎可為言而皆遷延愛欲馳逐生死眷彼深塵迷茲大夜坐積薪於火宅負沈石於苦海結習靡倦憂畏延長身世其猶夢想榮名譬諸幻化未能照彼因緣體茲空假祛洗纍惑擯落塵埃苦器易雕危城難久自發迹有生會道無上劫代緬邈朕迹遐長草木不能況塵沙莫之比及日晷停流星光輟運香雨旁注甘露上懸降靈迦衛擁迹忍土智出須彌德踰大地道尊世上義重天中銘曰大道何名至功不器理有罔適法無殊致能以托生降體凡位七覺如遠一念斯至德尊三界神感四天川流自斷火室不然衣生寶樹座踊芳蓮智固有極道暢無邊并州寺碑夫至道密微無迹可覩神功感應有理斯存雖慧日已照而大夜莫曉香雨時流而深塵未息曠劫悠緬歷代遐長眇眇世羅無能免其一目泛泛欲網孰敢解其三面自大教遷流行於中土希向之士煙踊波屬恆沙未足為言積塵所不能喻皆云出沒生死之河浮沉愛欲之海未有矯然獨悟脫落身名望彼岸而攸往泛寶船而利涉並藝文類聚魏收字伯起小字佛助巨鹿下曲陽人尚書右僕射北齊武成帝以三臺宮為大興聖寺詔門下皇居帝邑揆日瞻星仞雉有常几席斯在雖今古推移文質代變而成世作範義貴適時朕奄家四海作孚萬國當陽負扆深存庇氓濟下利物無忘懷抱昭仁訓俗不遺造次今臨嚮聽朝咸極崇廣宴息之所不足溫華每謂為之者勞居之者逸至於離宮別館有時遊幸耳目所及聊可忘懷而乃千門洞啓萬柱周架上迫雲漢下臨雷雨巧極金銅麗殫珠璧眷然長想良非宿心三臺並列蕪穢自久天保之末經構甫興仍創棟宇規摹宏博有司過實匠人逞巧氓庶勞止糜費難量既非殿寢正所便為虛衛之地凝華生白經歷歲年不翦茅茨事頗逼下卑其宮室有可庶幾顧茲侈麗豈伊寧處自魏朝失政九域崩離人神無主實求明聖我太祖獻武皇帝握茲乾紀執斯地綱懸持日月嘯吒風雲紀忠貞以成務感靈徵而大造爰以克定之初躬圖道場之業神迹冥果理燭幽明朕嗣膺寶祚永惟家祉仰祇先志尚竦玄門思展聿修之重念歸喜捨之大肌膚匪吝國城何寶期濟率土至於圓極可以三臺宮為大興聖寺此處極土木之壯窮丹素之妍奇怪備於刻削光華畢於圖彩願使靈心肸蠁神物奔會真覺唯寂有感必通化為淨土廣延德衆心若琉璃法輪常轉灑甘露於大千照慈燈於曠劫北齊三部一切經願文三有分區四生稟性共遊火宅俱淪欲海所以法王當洲渚之運覺者應車乘之期導彼沈迷歸茲勝地自寶雲西映法河東瀉甘露橫流隨風感授皇家統天尊道崇法拔羣品於有待驅衆生於不二所以刻檀作繢構石雕金遍於萬國塵沙數等復詔司存有事緇素精誠踰於皮骨句偈盡於龍宮金口所宣總勒繕寫各有三部合若干卷用此功德心若虛空以平等施無思不洽藉我願力同登上果並廣弘明集章仇子陀魏郡人齊武平中為儒林學士上後主表於時崇重佛法造制窮極傾竭府藏悉充福田子陀上疏凡十餘紙帝震怒禁錮經年周武平齊出之帝王上事昊天下字黎庶君臣夫婦綱紀有本自魏晉已來胡妖亂華背君叛父不妻不夫而姦蕩奢侈控御威福坐受加敬輕欺士俗妃主晝入僧房子弟夜宿尼室又云臣不惶不恐不避鼎鑊輒沐浴輿櫬奉表以聞廣弘明集馮衮冀人通經解史齊時奉貢入臺皈依鄴下大覺寺釋惠光道俗來咨口隨説法終於光門捧心論諸行者不得信此無明昏心覓長覓短聽經學問嚴飾我心須識詐賊覓他過惡不求其長則吾我漸歇特須分疏勿迷自他我過常起熾然法界他道少過便即瞋他常須看心自己多過若思量者雖在世間無有滋味終無歡心以味喪我何由有樂此心將我上至非想還下地獄常誘誑我如怨家如愛奴豈可學問長養賊心巧作細作使覓名利造疽妬也故經云常為心師不師於心八歲能誦百歲不行不救急也續高僧傳釋法上姓劉朝歌人住相州定國寺周時卒答高麗國丞相問法教始末事略上齊時詔為戒師高句驪國大丞相王高德遣僧向鄴問法教始末敘略云釋迦文佛入涅盤來至今幾年又於天竺幾年方到漢地初到何帝年號是何又齊陳佛法誰先傳告從爾至今歷幾年帝遠請具注并問十地智論等人法所傳上答略云佛以姬周昭王二十四年甲寅歲生十九出家三十成道當穆王二十四年癸未之歲穆王聞西方有化人出便即西入而竟不還以此為驗四十九年在世滅度已來至今齊代武平十年丙申凡經一千四百六十五年後漢明帝永平十年經法初來魏晉相傳至今流布續高僧傳那連提黎耶舍北天竺鳥萇國人終隋西京大興善寺法勝阿毗曇心論序大德優婆扇多釋高齊天竺三藏那連提黎耶舍譯今欲解釋阿毗曇心利益弟子故問曰不須解釋所以者何古昔論師已釋阿毗曇心利益弟子故不須釋答曰不然應須解釋所以者何古昔論師雖釋阿毗曇心太廣太略彼未學者迷惑煩勞無由能取我今離於廣略但先顯修多羅自性是故須釋問曰何故釋毗曇心利益弟子耶答曰彼中已説不顛倒法相釋不顛倒法相令彼覺悟真實是故離諸過惡生諸功德得勇猛第一義利問曰若如是者隨意解釋答曰我當解釋但諸師造論以吉為初一切吉中三寶最勝是故本師為顯三寶少分功德故於論初先説此偈大藏承字函欽定四庫全書
