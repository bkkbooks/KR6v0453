body:
  text: 明梅鼎祚輯梁九釋僧祐姓俞其先彭城人世居建業大精律部造立經藏齊梁間見重宮省抄撰三藏記法苑記世界記釋迦譜弘明集等行世天監中終建初寺出三藏記集序夫真諦玄凝法性虛寂而開物導俗非言莫津是以不二默酬會於義空之門一音震辨應乎羣有之境自我師能仁之出世也鹿苑唱其初言金河究其後說契經以誘小學方典以勸大心妙輪區別十二惟部法聚總要八萬其門至善逝晦跡而應真結藏始則四含集經中則五部分戒大寶斯在含識資焉然道由人弘法待緣顯有道無人雖文存而莫悟有法無緣雖並世而弗聞聞法資乎時來悟道藉於機至機至然後理感時來然後化通矣昔周代覺興而靈津致隔漢世像教而妙典方流法待緣顯信有徵矣至漢末安高宣譯轉明魏初康會注述漸暢道由人弘於茲驗矣自晉氏中興三藏彌廣外域勝稠疊以總至中原慧士暐曄而秀生提什舉其宏綱安遠震其奧領渭濱務逍遙之集廬嶽結般若之臺像法得人於斯為盛原夫經出西域運流東方提挈萬里轉梵漢國音各殊故文有同異前後重來故題有新舊而後之學者鮮克研核遂乃書寫繼踵而不知經出之歲誦說比肩而莫測得法之人授之受道亦已闕矣夫一時聖集猶五事證經况千載交譯寧可昧其人世哉昔安法師以鴻才淵鑒爰撰經録訂正聞見炳然區分自兹已來妙典間出皆是大乘寶海時競講習而年代人名莫有銓貫嵗月逾邁本源將沒後生疑惑爰所取明祐以庸淺豫憑法門翹仰玄風誓弘大化每至昏曉諷持秋夏講說未嘗不心馳菴園影躍靈鷲於是牽課羸恙沿波討源綴其所聞名曰出三藏記集一撰緣記二銓名録三總經序四述列傳緣記撰則原始之本克昭名録銓則年代之目不墜經序總則勝集之時足徵列傳述則伊人之風可見竝鑽仰內經研鏡外籍參以前識驗以舊聞若人代有據則表為司南聲傳未詳則文歸蓋闕秉牘凝翰志存信史三復九思事取實録有證者既標則無源者自顯庶行潦無雜於醇乳燕石不亂於荊玉但井識管窺多慚博練如有未備請寄明哲大藏跡字函出三藏記集雜録序夫靈源啓潤則萬流脉散玄根育萌則千條雲積何者本大而末盛基遠而緒長也自尊經神運秀出俗典由漢屆梁世歷明哲雖復緇服素飾並異跡同歸講議讚㭊代代彌精注述陶練人人競密所以記論之富盈閣以牣房書序之繁充車而被軫矣宋明皇帝投心淨境載餐玄味乃中書侍郎陸澄撰録法集陸博識洽聞苞舉羣籍銓品名例隨義區分凡十有六帙一百有三卷其所閲古今亦已備矣今即其本録以相綴附雖非正經而毗讚道化可謂聖典之羽儀法門之警衛足以輝顯前緒照進後學是以寄於三藏集末以廣枝葉之覽焉太宰竟陵文宣王子良法集録序夫五時九部之契三請四卷之機玄哉邈乎奧不可議已然法海無涯航而知大慧藏不極採而得寶是以弘誓之士隨時斟酌馬鳴抽其幽宗龍樹振其絶緒提婆㭊其名數訶梨總其條理並翼讚妙典俘剪外學迷津見衢長夜逢曉故智慧之日名飛於摧邪功德之月績翔於闡化亦已盛矣但羣萌殊葉根力異品運季道澆信淡識淺至於披瞽發聾事資懇厲藥愚針惑宜務切近是以後代敷訓顯晦不一或揚言以汛解或提耳而指授所以卷舒教義抑揚風軌豈滯恆方期於悟俗而已齊太宰竟陵文宣王淨剎萌因忍土現果慧自天成道為期出孝忠淳和之深仁智博愛之厚率由而極因心則至若乃棲神二諦宅業三寶瞻前卓爾望後不羣用能降帝子之尊灼淨土之操屏朱觀之貴下白屋之禮磨踵以拯俗刻髓以徇道望億劫以長驅凌千載而獨上若乃闡經律弘福施濟蒼黎育翾動未嘗不慮積昏明慈洽巨細感靈瑞於顯徵通覺應於宵夢固已威蕤民譽昭皙神聽矣至於苞括儒訓藻鏡釋典空有雙該內外咸照常欲廣彼洲渚熾此法燈駐四生之風波燭九居之霾霧指來際以為期總大千以為任故惻隱乘教殷勤敷道於是鋭臨雲之思壯談天之文網羅字輪儀形法印是以淨住命氏啓入道之門華嚴纓珞標出世之術決定要行進趣乎金剛戒果莊嚴克成乎甘露爾其衆經注義法塔讚頌僧制藥記之流導文願疏之屬莫不誠在言前理出辭表大者鉤深測幽小者馳辨感俗森成條章鬱為卷帙可謂開士住心道場初跡冠一代之妙化乘千祀之勝範者也祐昔以道緣預屬嘉會律任法使謬荷其寄齊堂梵席時枉其請哲人徂謝而道心不亡靜尋遺篇僾乎如在遂序茲集録以貽來世云爾竟陵王世子撫軍巴陵王法集序蓋聞世諦善論法海所總嚴飭文辭初位是攝自大化東漸沿世詠歌魏來雜製間出羣集至於才中含章思入精理固法門之羽纛梵聲之金石也齊竟陵文宣王世子故撫軍巴陵王稟璿華於琨峯敏明璣於珠海慧發觿辰識表觭歲孝友淳至機穎朗徹故幼無弱弄夙有老成甫在志學固已總括墳典矣雅好辭賦允登高之才藉意隸書均臨池之敏業盈竹素慮滿風月是時齊方有德文宣翼讚康衢既熙慧教傍達世子以枝葉之慶藩守浙河下車風舉升席治立含靜臺以御己𡸁蘭蕙以振俗郡富名山巖多靈寺故勝業愈高清心彌往每遊踐必訓思若淵泉信足以揄揚至道炳發玄極觀其摛賦經聲述頌繡像千佛願文捨身弘世四城九相之詩釋迦十聖之讚並英華自凝新聲間出故僕射范雲篤賞文會雅相嗟重以為後進之佳才也至隆昌之時始兆無妄永元之末運屬道消葛藟失庇磐石傾翦虎兕出柙宗室致猜而樂天知命夷憂味道在艱不虧其貞處約無改其莭鏡因果而靡晦洞真俗其如曉專精於大覺之門懍烈於經典之奧於是下帷墐戶注解百論拔出幽旨妙盡纖典乃躬算縑素手寫方等所書大經凡有千部鋒刀刊削風趣妍靡論其思理所徹業藝所貫有餘箕裘之能克副青藍之敏矣夫深宮寡識著自格言梁肉多驕聞之前記而能拔類獨立超然高舉豈非內鑄堅芳之性外瑩過庭之風哉以法而說譬金龍之嗣信相由俗而議邁允恭之紹陳思可謂開士宿因栴檀眷屬無忝堂構克勝負荷者也余昔緣法事承覿清暉及律集稽川屢延供禮惜乎早世文製未廣今撰録法詠以繼文宣內集使干祀之外知蘭菊之無絶焉法集總目録序嘗聞瀝泣助河之談捧土裨岱之論雖誚發於古而愧集於今矣僧祐漂隨前因報生閻浮幼齡染服早備僧數而慧解弗融禪味無紀剎那之息徒積錙毫之勤未基是以懼結香朝慙動鐘夕茫茫塵劫空閲斬籌然竊有堅誓志是大乘頂受方等遊心四含加以山房寂遠泉松清密以講席間時僧事餘日廣評衆典披覽為業或專日遺餐或通夜繼燭短力共尺波爭馳淺識與寸隂競晷雖復管窺迷天蠡測惑海然遊目積心頗有微悟遂綴其聞誡言法寶仰稟羣經傍採記傳事以類合義以例分顯明覺應故序釋迦之譜區辨六趣故述世界之記訂正經譯故編三藏之録尊崇律本故銓師資之傳彌綸福源故撰法苑之篇護持正化故集弘明之論且少受律學刻意毗尼旦夕諷持四十許載春秋講說七十餘遍既稟義先師弗敢墜失標括章條為律記十卷并雜碑記撰為一帙總其所集凡有八部冀微啓於今業庶有籍於來津豈曰善述庶非妄作但理遠識近多有未周明哲儻覽取諸其心使道場之果異跡同臻焉釋迦譜目録序蓋聞菩提之為極也神妙寂通圓智湛照道絶於形識之封理畢於生滅之境形識久絶豈實誕於王宮生滅已畢寧真謝於堅固哉但羣萌長寢同歸大覺緣來斯化感至必應若應而不生誰與悟俗化而無名何以導世是以標號釋迦擅種剎利體域中之尊冠人天之秀然後脫屣儲宮貞觀道樹捨金輪而御大千明玉毫而制法界此其所以垂跡也爰自降胎至於分塔瑋化千條靈瑞萬變並義炳經典事盈記傳而羣言參差首尾散出事緒舛駮同異莫齊散出首尾宜有貫一之區莫齊同異必資會通之契故知傳訊難該而總集易覽也祐以不敏業謝多聞時因疾隟頗存尋玩遂乃披經案記原始要終敬述釋迦譜記列為十卷若夫𦙍裔託生之源得道度人之要泥洹塔像之徵遺法將滅之相總衆經以正本綴世記以附末使聖言與俗說分條古聞共今跡相證萬里雖邈有若躬踐千載誠隱無隔面對今抄集衆經述而不作庶脫尋訪力半功倍敬率丹心略敷誓願僧祐前禮最勝尊稽首清淨無比法次歸離垢應真僧三寶慈護永住世像末少信信不純邪見迷沒陷衆苦三藏遐曠難究尋懈怠障礙令法沒故集本師源緣記經律傳證增信根仰承大士誓願心敢厝弘意於後世願同見聞隨喜福法燈延照盡來際大藏將字函出三藏記無願文解屣作脫屣十卷作五卷世界記目録序夫三界定位六道區分粗妙異容苦樂殊跡觀其原始不離色心檢其會歸莫非生滅生滅輪回是曰無常色心影幻斯謂苦本故涅槃喻之於大河法華方之於火宅聖人超悟息駕反源拔出三有然後為道也尋世界立體四大所成業和緣合與時而興數盈災起復歸乎滅所謂壽短者謂其長壽長者見其短矣夫虛空不有故厥量無邊世界無窮故其狀不一然則大千為法王所統小千為梵主所領須彌為帝釋所居鐵圍為藩牆之域大海為八維之浸日月為四方之燭總總羣生於茲是宅瑣瑣含識莫思塗炭沈俗而觀則迂誕之奢言大道而察乃掌握之近事耳但世宗周孔雅伏經書然辨括宇宙臆度不了易稱天玄蓋取幽深之名莊說蒼蒼近在遠望之色於是野人信明謂旻青如碧儒士據典謂乾黑如漆青黑誠異乖體是同儒野雖殊不知一也是則俗尊天名而莫識天實豈知六欲之嚴麗十梵之光明哉至於准步地勢則虛信章亥圖度日月則深委算術未值一隅差以千里雖復夏革說地不過戶牖之間鄒子談天甫在奧窔之內鍊石既誣鼇足亦詭俗書徒繁竟無顯說世士蒙昧莫詳厥體是以憑惠獨慮閟六合之相持桓談拒問率五藏以為喻通人碩學思鬱理窮况乃牆見其能辨乎嗟夫區界現事猶莫之知不思妙義固其已矣竊惟方等大典多說深空惟長鋡樓炭辨章世界而文博偈廣難卒檢究且名師法匠職競玄義事源委積未必曲盡祐以庸固志在拾遺故抄集兩經以立根本兼附雜典互出同異撰為五卷名曰世界集記將令三天階序煥若披圖六趣羣分照如臨鏡庶溺俗者發蒙服道者瑩解共建慧眼之因俱成覺智之業焉薩婆多部師資記目録序大聖遷輝歲紀綿邈法僧不墜其惟律乎初集律藏一軌共學中代異執五部各分既分五部則隨師傳習惟薩婆多部偏行齊土蓋源起天竺流化罽前聖後賢重明疊耀或德升住地或道證四果或顯相標瑞或晦跡同凡皆秉持律儀闡揚法化舊記所載五十三人自茲以後睿哲繼出並嗣徽於在昔垂軌於當今季世五衆依斯立教遺風餘烈炳然可尋夫䕃樹者護其本飲泉者敬其源寧可服膺玄訓而不記列其人哉祐幼齡憑法年踰知命仰前覺之弘慈奉先師之遺德猥以庸淺承業十誦諷味講說三紀於茲每披聖文以凝感望遐蹤以翹心遂搜訪古今撰薩婆多記其先傳同異則並録以廣聞後賢未絶則製傳以補闕總其新舊九十餘人使英聲與至教永被懋實共日月惟新此撰述之大旨也條序餘部則委之眀勝疾恙惛漠辭乏銓藻儻有覽者略文取心法苑雜緣原始集目録序夫經藏浩汗記傳紛綸所以導達羣方開示後學設教緣跡煥然備悉訓俗事源鬱爾咸在然而講匠英德鋭精於玄義新進晚習專志於轉讀遂令法門常務月修而莫識其源僧衆恆儀日用而不知其始不亦甚乎余以率情業謝多聞六時之隟頗好尋覽於是檢閲事緣討其根本遂綴翰墨以藉所好庶辨始以驗末明古以證今至於經唄道師之集龍華聖僧之會菩薩稟戒之法止惡興善之教或制起帝皇或功積黎庶並八正基趾十力逵路雖事寄形迹而勳遍空界宋齊之隆實弘斯法大梁受命道冠百王神教傍通慧化冥被自幼屆老備觀三代常願一乘寶訓與天地而彌新四部盛業隨日月而長照是故記録舊事以章勝緣條列叢雜故謂之法苑區以類別凡為十卷豈足簡夫淵識蓋布之眷屬而已弘明集目録序見出三藏記集弘明集不載夫覺海無涯慧鏡圓照化妙域中實陶鑄於堯舜理擅繫表乃埏埴乎周孔矣然道大信難聲高和寡須彌峻而藍風起寶藏積而怨賊生昔如來在世化震大千猶有天魔稸忿六師懷毒况乎像季其可勝哉自大法東漸歲幾五百緣各信否運亦崇替正見者敷讚邪惑者謗訕至於守文典儒則拒為異教巧言左道則引為同法距有拔本之迷引有朱紫之亂遂令詭論稍繁訛辭孔熾夫鶡鴠鳴夜不白日之光精衛銜石無損滄海之勢然以暗亂明以小罔大雖莫動毫髮而有塵視聽將令弱植之徒隨僞辨而長迷倒置之倫逐邪說而永溺此幽塗所以易墜淨境所以難陟者也祐以末學志深弘護靜言浮俗憤慨於心遂以藥疾微間山棲餘暇撰古今之名篇總道俗之雅論其有刻意剪邪建言衛法製無大小莫不畢採又前代勝士書記文述有益三寶亦皆編録類聚區分列為十卷夫道以人弘教以文明弘道明教故謂之弘明集兼率淺懷附論於末庶以㳙埃微瀛岱但學孤識寡愧在褊局博練君子惠增廣焉弘明集後序余所集弘明為法禦侮通人雅論勝士妙說摧邪破惑之衝弘道護法之塹亦已備矣然智者不迷迷者乖智若導以深法終於莫領故復撮舉世典指事取徵言非榮華理歸質實庶迷塗之人不遠而復總釋衆疑故曰弘明論云夫二諦差別道俗斯分道法空寂包三界以等觀俗教封滯執一國以限心心限一國則耳目之外皆疑等觀三界則神化之理常照執疑以迷照羣生所以永淪者也詳檢俗教並憲章五經所尊惟天所法惟聖然莫測天形莫窺聖心雖敬而信之猶矇矇弗了况乃佛尊於天法妙於聖化出域中理絶繫表肩吾猶驚怖於河漢俗士安得不疑駭於覺海哉既駭覺海則驚同河漢一疑經說迂誕大而無徵二疑人死神滅無有三世三疑莫見真佛無益國治四疑古無法教近出漢世五疑教在戎方化非華俗六疑漢魏法微晉代始盛以此六疑信心不樹將溺宜拯故較而論之若疑經說迂誕大而無徵者蓋以積劫不極世界無邊也今世咸知百年之外必至萬歲而不信積萬之變至於曠劫是限心以量造化也咸知赤縣之表必有四極而不信積極之遠復有世界是執見以叛太虛也昔湯問革曰上下八方有極乎革曰無極之外復無無極無盡之中復無無盡朕是以知其無極無盡也上古大賢據理酬聖千載符契懸與經合井識之徒何智得異夫以方寸之心謀己身而致謬圓分之眸隔牆壁而弗見而欲誣尊經背聖說誣積劫罔世界可為愍傷者一也若疑人死神滅無有三世是自誣其性靈而蔑棄其祖禰也然則周孔制典昌言鬼神易曰游魂為變是以知鬼神之情狀既情且狀其無形乎詩云三后在天王配于京升靈上旻豈曰滅乎禮云夏尊命事鬼敬神大禹所祇寧虛誕乎書稱周公代武云能事鬼神姬旦禱親可虛罔乎苟亡而有靈則三世如鏡變化輪回孰知其極俗士執禮而背叛五經非直誣佛亦誣聖也若信鬼於五經而疑神於佛說斯固聾瞽之徒非議所及可為哀矜者二也若疑莫見真佛無益國治則禋祀望秩亦宜廢棄何者蒼蒼稽空誰見上帝之貌茫茫纍塊安識后祇之形民自躬稼社神何力人造庸畷蠟鬼奚功然猶盛其犧牲之費繁其歲時之祀者豈不以幽靈宜尊教民美報耶况佛智周空界神凝域表上帝成天緣其陶鑄之慈聖王為人依其亭育之戒崇法則六天咸喜廢道則萬神斯怒今人莫見天形而稱郊祀有福不覩金容而謂敬事無報輕本重末可為震懼者三也若疑古無佛教近出漢世者夫神化隱顯孰測始終哉尋羲農緬邈政績猶湮彼有法教亦安得聞之昔佛圖澄知臨淄伏石有舊像露盤犍陀勒見槃鵄山中有古寺基墌衆人試掘並如其言此萬代之遺徵晉世之顯驗誰判上古必無佛乎列子稱周穆王時西極有化人來入水火貫金石反山川移城邑乘虛不墜觸實不礙千變萬化不可窮極既能變人之形又且易人之慮穆王敬之若神事之若君觀其靈跡乃開士之化大法萌兆已見周初感應之漸非起漢世而封執一時可為歎息者四也若疑教在戎方化非華夏者則是前聖執地以定教非設教以移俗也昔三皇無為五帝德化三王禮刑七國權勢地當諸夏而世教九變今反以至道之源鏡以大智之訓感而遂通何往不被夫禹出西羌舜生東夷孰云地賤而棄其聖孔欲居夷聃適西戎道之所在寧選於地夫以俗聖設教猶不繫於華夷况佛統大千豈限化於西域哉案禮王制云四海之內方三千里中夏所據亦已不廣伊洛本夏而鞠為戎墟吳楚本夷而成華邑道有運流而地無恆化矣且夫厚載無疆寰宇異統北辰西北故知天竺居中今已區分中土稱華以距正法雖欲距塞而神化常通可為悲涼者五也若疑漢魏法微晉代始盛者道運崇替未可致詰也尋沙門之修釋教何異孔氏之述唐虞乎孔修五經垂範百王然春秋諸侯莫肯遵用戰伐蔑之將墜於地爰至秦皇復加燔燼豈仲尼之不肖而詩書之淺鄙哉邇及漢武始顯儒教舉明經之相崇孔聖之術寧可以見輕七國而遂廢後代乎案漢元之世劉向序仙云七十四人出在佛經故知經流中夏其來已久逮明帝感夢而傅毅稱佛於是秦景東使而攝騰西至乃圖像於關陽之觀藏經於蘭臺之室不講深文故莫識奧義是以楚王修仁潔之祠孝桓建華蓋之祭法相未融惟神之而已至魏武英鑒書述妙化孫權雄略崇造塔寺晉武之初機緣漸深耆域耀神通之跡竺護集法寶之藏所以百辟縉紳洗心以進德萬邦黎憲刻意而遷善暨晉明睿悟秉一棲神手畫寶像表觀樂覽既而安上弘經於山東什公宣法於關右精義既敷實相彌照英才碩智並驗理而伏膺矣故知法雲始於觸石慧水流於濫觴教必有漸神化之常感應因時非緣如何故儒術非愚於秦而智於漢用與不用耳佛法非淺於漢而深於晉明與不明耳故知五經恆善而崇替隨運佛化常熾而通塞在緣一以此思可無深惑而執疑莫悟可為痛悼者六也夫信順福基迷謗禍門而况矇矇之徒多不量力以己所不知而誣先覺之遍知以其所不見而罔至人之明見鑒達三世反號邪僻專拘目前自謂明智於是迷疑塞胸謗讟盈口輕議以市重苦顯誹以賈幽罰言無錙銖之功慮無毫釐之益逝川若飛藏山如電一息不還奄然後世報隨影至悔其可追夫神化茫茫幽明代運五道變化於何不之天宮顯驗趙簡秦穆之錫是也鬼道交報杜伯彭生之見是也修德福應殷代宋景之驗是也多殺禍及白起程普之證是也現世幽徵備詳典籍來生冥應布在尊經但緣感理奧因果義微微奧難領故略而不陳前哲所辨關鍵已正聊率鄙懷繼之於末雖文非圭璋而事足盤鑑惟愷悌君子自求多福焉大藏駕字函出三藏記集未載十誦義記目録序夫戒律者蓋四雙之雲梯五衆之鎔範也性以止制為本體以無作為相始祛十惡終圓萬善在昔覺世因事制戒心跡俱防輕重備設持戒堅淨則羅睺惟最曉律精明則波離為首至於泥洹遺囑殷勤金色迦葉結集斯藏洲渚所依莫踰茲典逮至中葉學同說異五部之路森然競分仰惟十誦源流聖賢繼踵師資相承業盛東夏但至道難凝微言易爽果向之人猶跡有兩說况在凡識孰能一論是以近代談講多有同異大律師上積道河西振德江東綜學月朗砥行氷潔行以尸羅為基學以十誦為本且幼選明師歷事名勝校理精密無幽不貫常以此律廣授二部教流於京寓之中聲高於宋齊之世可謂七衆之宗師兩代之元匠者矣是以講肄之座𤨔春接冬稟業之徒雲聚波沓僧祐藉法乘緣少預鑽仰扈錫侍筵二十餘載雖深言遠旨未敢庶幾而章條科目竊所早習每服佩思尋懼有墜失遂集其舊聞為義記十卷夫心識難均意見多緒竊同芻蕘時綴毫露輒布其別解録之言未盡意率其木訥指序條貫而已昔少述私記辭句未整而好事傳寫數本兼行今削繁補略以後撰為定敬述先師之旨匪由庸淺之說明哲儻覽採其正意焉法集雜記銘目録序祐少長山居遊息淨衆雖業勤罔立而誓心無墜常願覺道流於忍土正化隆於像運是以三寶勝跡必也詳録四衆福緣每事述記所撰法集已為七部至於雜記碎文條例無附輒別為一帙以序時事并山寺碑銘僧衆行記文自彼製而造自鄙衷竊依前古總入於集雖俗觀為煩而道緣成業矣並出三藏記集雜録菩薩善戒菩薩地持二經記祐尋舊録此經十卷是宋文帝世三藏法師求那跋摩於京都譯出經文云此經名善戒名菩薩地名菩薩毗尼摩夷名如來藏名一切善法根名安樂國名諸波羅蜜聚凡有七名第一卷先出優波離問受戒法第二卷始方有如是我聞次第列品乃至三十而復有別本題為菩薩地經檢此兩本文句悉同惟一兩品分品品名小小有異義亦不殊既更不見有異人重出推之應是一經而諸品亂雜前後參差菩薩地本分為三假第一假十八品第二假有四品第三假有八品未詳兩本孰是三藏所出正本也又菩薩地持經八卷有二十七品亦分三假第一假十八品第二假四品第三假五品是晉安帝世曇摩讖於西涼州譯出經首禮敬三寶無如是我聞似撰集佛語文中不出有異名而今此本或題云菩薩戒經或題云菩薩地經與三藏所出菩薩善戒經二文雖異五名相涉故同一記又此二經明義相類根本似是一經異國人出故成別部也並次第明六度品名多同製辭各異祐見菩薩地經一本其第四卷第十戒品乃是地持經中戒品又少第九施品當是曝曬誤雜後人不悉便爾傳寫其本脫多恐方亂惑若細尋內題了然可見若有菩薩地經闕無第九施品者即是誤本也大集虛空藏無盡意三經記祐尋舊録大集經是晉安帝世天竺沙門曇摩讖於西涼州譯出有二十九卷首尾有十二段說共成一經第一瓔珞品第二陀羅尼自在王第三寶女第四不眴第五海慧第六無言第七不可說第八虛空藏第九寶幢第十虛空目第十一寶髻第十二無盡意更不見異人別譯而今別部惟有二十四卷尋其經文餘悉同惟不可說菩薩品後寶幢分前中間闕無虛空藏所問品五卷又經惟盡寶髻菩薩品復無最末無盡意所說不可思議品四卷略無二品九卷分所餘二十卷為二十四卷耳又尋兩本並以海慧菩薩品為第五越至無言菩薩品第七無第六品未詳所以又檢録別有大虛空藏經五卷成者即此經虛空藏品當是時世有益甄為異部又別無盡意經四卷成者亦是此經末無盡意品也但護公録復出無盡意經四卷未詳與此本同異賢愚經記釋僧祐新撰十二部典蓋區別法門曠劫因緣既事照於本生智者得解亦理資於譬喻賢愚經者可謂兼此二義矣河西沙門釋曇學成德等凡有八僧結志遊方遠尋經典於于闐大寺遇般遮于瑟之會般遮于瑟者漢言五年一切大衆集也三藏諸學各弘法寶說經講律依業而教學等八僧隨緣分聽於是競習梵音釋以漢義精異通譯各書所聞還至高昌乃集為一部既而踰越流沙齎到涼州于時沙門釋慧朗河西宗匠道業淵博總持方等以為此經所記原在譬喻譬喻所明兼載善惡善惡相則賢愚之分也前代傳經已多譬喻故因事改名號曰賢愚焉元嘉二十二年歲在乙酉始集此經京師天安寺沙門釋弘宗者戒力堅淨志業純白此經初至隨師河西時為沙彌年始十四親預斯集躬覩其事洎梁天監四年春秋八十有四凡六十四臘京師之第一上座也經至中國則七十年矣祐總集經藏訪告遐邇躬往咨問面質其事宗年耆德峻心直據明故標諜為録以示後學焉並出三藏記集略成實論記新撰成實論十六卷羅什法師於長安出之曇晷筆受曇影正寫影欲使文玄後自轉為五餘悉依舊本齊永明七年十月文宣王招集京師碩學名僧五百餘人請定林僧柔法師謝寺慧次法師於普弘寺迭講欲使研核幽微學通疑執即座仍請祐及安樂智稱法師更集尼衆二部名德七百餘人續講十誦律志令四衆淨業還白公每以大乘經淵深漏道之津涯正法之樞紐而近世陵廢莫或敦修棄本逐末喪功繁論故即於律座令柔次等諸論師抄比成實簡繁存要略為九卷使辭約理舉易以研尋八年正月二十三日解座設三業三品別施獎有功勸不及上者得三十餘件中者得二十許種下者數物而已即寫略論百部流通教使周顒作論序今録之於後梵漢譯經音義同異記夫神理無聲因言辭以寫意言辭無跡緣文字以圖音故字為言蹄言為理筌音義合符不可偏失是以文字應用彌綸宇宙雖跡繫翰墨而理契乎神昔造書之主凡有三人長名曰梵其書右行次曰佉樓其書左行少者蒼頡其書下行梵及佉樓居于天竺黃史蒼頡在於中夏梵佉取法於淨天蒼頡因華於鳥跡文畫誠異傳理則同矣仰尋先覺所說有六十四書鹿輪轉眼筆制區分龍鬼八部字體殊式惟梵及佉樓為世勝文故天竺諸國謂之天書西方寫經雖同祖梵文然三十六國往往有異譬諸中土猶篆籕之變體乎案蒼頡古文治世代變古移為籕籕遷至篆篆改成隸其轉易多矣至於傍生八體則有仙龍雲芝二十四書則有楷草針殳名實雖繁為用蓋鮮然原本定義則體備於六文適時為敏則莫要於隸法東西之書源亦可得而略究也至於梵音為語單復無恆或一字以攝衆理或數言而成一義尋大涅槃經列字五十總釋衆義十有四音名為字本觀其發語裁音宛轉相資或舌根脣末以長短為異且梵字一音不得成語必餘言足句然後義成譯人傳意豈不艱哉又梵書製文有半字滿字所以名半字者義未具足故字體半偏猶漢文月字虧其傍也所以名滿字者理既究竟故字體圓滿猶漢文日字盈其形也故半字惡義以譬煩惱滿字善義以譬常住又半字為體如漢文言字滿字為體如漢文諸字以者配言方成諸字諸字兩合即滿之例也言字單立即半之類也半字雖單為字根本緣有半字得成滿字譬凡夫始於無明得成常住故因字製義以譬涅槃梵文義奧皆此類也是以宣領梵文寄在明譯譯者釋也交釋兩國言謬則理乖矣自前漢之末經法始通譯音胥訛未能明練故浮屠桑門遺謬漢史音字猶然况於義乎案中夏典誦詩執禮師資相授猶有訛亂詩云有兔斯首斯當作鮮齊語音訛遂變詩文此桑門之例也禮記云孔子蚤作蚤當作早而字同蚤虱此古字同文即浮屠之例也中國舊經而有斯蚤之異華戎遠譯何怪於屠桑哉若夫度字傳義則置言由筆所以新舊衆經大同小異天竺語稱維摩詰舊譯解云無垢稱關中譯云淨名淨即無垢名即是稱此言殊而義均也舊經稱衆祐新經云世尊此立義之異旨也舊經云𠃵沓和新經云𠃵闥婆此國音之不同也略舉三條餘可類推矣是以義之得失由乎譯人辭之質文繫於執筆或善梵義而不了漢旨或明漢文而不曉梵意雖有偏解終隔圓通若梵漢兩明意義四暢然後宣述經奧於是乎正前古譯人莫能曲練所以舊經文意致有阻礙豈經礙哉譯之失耳昔安息世高聰哲不羣所出衆經質文允正安玄嚴調既亹亹以條理支越竺蘭亦彬彬而雅暢凡斯數賢並見美前代及護公專精兼習華梵譯文傳經不愆于舊逮乎羅什法師俊神金照秦僧融肇慧機水鏡故能表發揮翰克明經奧大乘言於斯炳煥至曇讖之傳涅槃跋陀之出華嚴辭理辨暢明踰日月觀其為美繼軌什公矣至於雜類細經多出四含或以漢來或自晉出譯人無名莫能詳究然文過則傷艷質甚則患野野艷為弊同失經體故知明允之匠難可世遇矣祐竊尋經言異論咒術言語文字皆是佛說然則言本是一而梵漢分音義本不二則質文殊體雖傳譯得失運通隨緣而尊經妙理湛然常照矣既仰集始緣故次述末譯緣興於西方末譯行於東國故原始要終寓之記末云爾小乘迷學竺法度造異儀記夫至人應世觀衆生根根力不同設教亦異是以三乘立軌隨機而發五時說法應契而化沿粗以至妙因小以及大階漸殊時教之體也自正法稍遠受學乖互外域諸國或偏執小乘最後涅槃顯明佛性而猶執初教可謂膠柱鼓瑟者也元嘉中外國商人竺婆勒久停廣州每往來求利於南康郡生兒仍名南康長易字金伽後得入道為曇摩耶舍弟子改名法度其人貌雖外國實生漢土天竺科軌非其所諳但性存矯異欲以攝物故執學小乘云無十方佛惟禮釋迦而已大乘經典不聽讀誦反抄著衣以此為法常用銅鉢無別應器乃令諸尼作鎮肩衣似尼師壇縫之為囊恆著肩上而不用坐以表衆異每至出路相捉而行布薩悔過但伏地相向而不習天竺跪法善間漢言至授戒先作梵語不令漢知案律之明文授法資解言不相領不得法事而竺度昧罔面行詭術明識之衆咸共駭棄惟宋故丹陽尹顏竣女宣業寺尼法弘交州刺史張牧女弘寺尼普明等信受其教以為真實雖出貴族而識謝慧心毀呰方等既絶法雨妄學詭科乖背律儀來苦方深良可愍傷自正化東流大乘日曜英哲頂受遍㝢服膺而使迷僞之人專行偏教莫或振止何其甚哉昔慧導拘滯疑惑大品曇樂偏執非撥法華罔天下之明信己情之謬關中大衆固已指為無間矣至如彭城僧淵誹謗涅槃舌根銷爛現表厥殃大乘難誣亦可驗也尋三人之惑並惡止其躬而竺度之悖以毒飲人凡女人之性智弱信強一受僞教則同惑相挻故經師數寺遂塵異法東境厄衆亦時染此風將恐邪路易開淄汙不已嗟乎斯豈魔斷大乘故先侮女人歟此實開士之所痛悼而法主所宜匡制也大方便經云釋迦如來昔為比丘專以四阿含教化謗毀方等於無數劫受大苦報從阿鼻出發大乘心致成正覺後進之賢宜思防斷古今明誡可不慎乎並出三藏記集録請禁丹陽琅琊二郡搜捕啓武帝十二年下詔去宗廟犧牲上定林寺沙門僧祐龍華邑正柏超度等上啓敕付尚書詳之江貺王述謝幾卿並議惟述以斷為是尚書臣亶僕射臣昂全瑩已下並同貺議帝使周捨難貺於是從述議斷又敕太醫不得以生類合藥公家織官紋錦並斷仙人鳥獸之形以為褻衣截剪有乖仁恕至乃析告天地宗廟以去殺之理被之含識郊廟皆以為牲牷其饗萬國用菜蔬去生類其山川諸祀則否乃敕有司京畿既是福地而鮮食之族猶布筌網並驅之客尚馳鷹犬非所以仰稱皇朝優治之旨請丹陽琅琊二境水陸並不得搜捕議郎江貺議聖人之道以百姓為心仁者之化以躬行被物皇德好生協于上下日就月將自然改俗一朝抑絶容恐愚民且獵山之人例堪跋涉捕水之客不憚風波江寧有禁即達牛渚延陵不許便往陽羡取生之地雖異殺生之數是同空有防育之制無益全生之術兼都令史王述議京邑翼翼四方所視民漸至化必被萬國今祁寒暑雨人尚無怨况去俗入真所以可悅謂斷之為是左丞謝幾卿議不殺之禮誠如王述所議然聖人為教亦與俗推移即之事迹恐不宜偏斷若二郡獨有此禁更似外道謂不殺戒皆有界域因時之宜敬同議郎江貺議周捨難江貺禮云君子遠庖廚血氣不身翦見生不忍其死聞聲不食其肉此皆即目興仁非關及遠三驅之禮向我者舍背我者射武帝敕有司敕後有前臣曰一假未明誰何今附注近以神實愛民不責無識所貴誠信非尚血膋凡有水旱之患使歸咎在上不用牲牢止告知而已而萬姓祈求諂黷為事山川小祗難期正直晴雨或乖容市民怨愚夫滯習難用理移自今祈請報答可如俗法所用以身塞咎事自依前廣弘明集前臣曰夫神道茫昧求諸不一或尚血腥之祀或歆蘊藻之誠設教隨時貴其為善其誠無忒何往不通若祭享理無則四代之風為爽神明實有三世之道為弘語其無不待牲牷之潔據其有宜存去殺之仁周文禴祭由來尚矣苟有明德神其吐諸而以為牲於義未達方之紋錦將不矛盾乎釋明徹姓夏吳郡錢塘人齊永明中受學僧祐隨出揚都住建初寺入梁卒臨終辭啓徹天監初自荊州復還都邑究博深文洞明奧旨遘疾將卒奉表告辭武帝敕答之因果深明倚伏寄逭明徹雖復愚短忝窺至籍將謝之間豈復遺吝但知恩知慶輒欲言之明徹本出東荒賤民而已有善識得廁釋門契闊少年綢繆玄覽雖未能體道微得善性運來不輟遇會昌時遂親奉御筵提攜法席且仁且訓備沐恩獎恆願舒展丹誠奉揚慈化豈意報窮便歸塵土仰戀聖世何可而言特願陛下永劫永住益蔭無涯具足莊嚴道場訓物天垂海外同為淨土勝果遐流雍容遠集明徹以奉值之慶論道之善脫億代還生猶冀奉覲惟生惟死俱希濟拔臨盡之間如夢雖欲申心心何肯盡不勝悲哀之誠謹遣表以聞武帝敕答省疏增其憂耿人誰不病何以遽終過甚法師至性堅明道行純備往來淨土去留安養方除四魔理無五畏惟應正念諸佛不捨大願與般若相應直至種智發菩提心彼我相攝方結來緣敬如所及菩薩行業非千百年善思至理勿起亂想覽筆悽悶不復多云續高僧傳釋寶唱姓岑吳人師僧祐住揚都莊嚴寺文采鋪贍梁武簡文撰集多令兼贊經律異相序如來應跡投緣隨機闡教兼被龍鬼匪直天人化啓憍陳道終須跋文積巨萬簡纍大千自西徂東羌難得而究也若乃劉向校書玄言久蘊漢明感夢靈證彌彰自茲厥後譯相繼三藏奧典雖已略周九部雜言通未區集皇帝同契等覺比德遍知大弘經教並利法俗廣延博古旁採遺文於是散偈流章往往復出今之所獲蓋亦多矣聖㫖以為像正浸末信樂彌衰文句浩漫鮮能該洽以天監七年敕釋僧旻等備鈔衆典顯證深文控會神宗辭略意曉於鑽求者已有大半之益但希有異相猶散衆篇難聞祕說未加標顯又以十五年敕寶唱鈔經律要事皆使以類相從令覽者易了又敕新安寺釋僧豪興皇寺釋法生等相助撿讀於是博綜經籍搜採祕要上詢宸慮取則成規凡為五十卷又目録五卷分為五袠名為經律異相將來學者可不勞而博矣大藏路字函比丘尼傳序原夫貞心抗志奇操異節豈惟體率由於天真抑亦勵景行於仰止故曰希顏之士亦顏之儔慕驥之馬亦驥之乘斯則風烈英徽流芳不絶者也是以握筆懷鉛之客將以語厥方來比事記言之士庶其勸誡於後世故雖欲忘言斯不可已也昔大覺應乎羅衛佛日顯於閻浮三界歸依四生向慕比丘尼之興發源於愛道登地證果仍世不絶列之法藏如日經天自拘尸滅影雙樹匿跡歲歷蟬聯陵夷訛紊於是時澆信謗人或存亡微言興而復廢者不肖亂之也正法替而復隆者賢達維之也像法東流淨檢為首綿載數百碩德係興善妙淨圭窮苦行之節法辨僧果盡禪觀之妙至若僧端僧基之立志貞固妙相法令之弘震曠遠若此之流往往間出並淵深嶽峙金聲玉振實惟叔葉之楨幹季緒之四依也夫年代推移清規稍遠英風將範於千載志事未集乎方冊每懷慨歎其歲久矣始乃博採碑頌廣搜記集或訊之傳聞或訪之故老詮序始終為之立傳起晉咸和訖梁普通凡六十五人不尚繁華務存要實庶乎求解脫者勉思齊之德而寡見庸疏或有遺漏博雅君子針其闕焉大藏功字函名僧傳序略唱天監初搜括列代僧録為名僧傳三十一卷自為序夫深求寂滅者在於視聽之表考乎心行者諒須丹青之工是知萬象森羅立言之不可以已者也大梁之有天下也威加赤縣功濟蒼生皇上化範九疇神遊八正頂戴法橋服膺甘露竊以外典鴻文布在方冊九品六藝尺寸罔遺而沙門淨行獨亡紀述玄宗敏德名絶終古擁歎長懷靡茲永歲律師釋僧祐道心貞固高行超邈著述諸記振發宏要寶唱不敏預班二落禮誦餘日捃捨遺漏續高僧傳傳後自序云豈敢謂僧之董狐庶無曲筆耳釋慧皎未詳氏族會稽上虞人學通內外住郡嘉祥寺高僧傳序皎以唱公所著名僧頗多浮沈因著高僧傳示王曼穎曼與皎書皎答原夫至道沖漠假蹄筌而後彰玄致幽凝藉師保以成用是由聖迹迭興賢能異託辨忠烈孝慈以定名教之道明詩書禮樂以成風俗之訓或忘功遺事尚彼虛沖或體任榮枯重茲達命而皆教但域中功在近益斯蓋漸染之方未奧盡其神性至若能仁之為訓也考業果之幽微則循復三世言至理之高妙則貫絶百靈若夫啓十地以辨慧宗顯三諦以詮智府窮神盡性之旨管一樞極之致餘方亦猶羣流之歸巨壑衆星之拱北辰懋哉邈矣信難得以言尚至乃教滿三千形遍六道皆所以接引幽昏為大利益而以淨穢異聞升墜殊見故秋方先音形之奉東國後見聞之益雲龍表於夜明風虎彰乎宵夢洪風既扇大化斯融自爾西域名僧往往而至或傳度經法或教授禪道或以異迹化人或以神力拯物自漢之梁紀歷彌遠世踐六代年將五百此土桑門含章秀發羣英間出迭有其人衆家記録敘載各異沙門法濟偏敘高逸一迹沙門法安但列志節一行沙門僧寶止命遊方一科沙門法進乃通撰論傳而辭事闕略並皆互有繁簡出沒成異考之行事未見其歸宋臨川康王義慶宣驗記及幽明録太原王琰冥祥記彭城劉悛益部寺記沙門曇宗京師寺記太原王延秀感應傳朱君台徵應傳陶淵明搜神録並傍出諸僧敘其風素而皆是附見亟多疏闕齊竟陵文宣王三寶記傳或稱佛史或號僧録既三寶共敘辭旨相關混濫難求更為蕪昧琅琊王屮所撰僧史意似該綜而文體未足沙門僧祐撰三藏記止有三十餘僧所無甚衆中書郗景興東山僧傳治中張孝季廬山僧傳中書陸明霞沙門傳各競舉一方不通今古務存一善不及餘行逮于即時亦繼有作者然或褎贊之下過相揄揚或敘事之中空引辭費求之實理無的可稱或復嫌以繁廣刪減其事而抗迹之疇多所遺削謂出家之士處國賓王不應勵然自遠高蹈獨絶辭榮棄愛本以異俗為賢若此而不論竟何所紀嘗以暇日遇覽羣作輒搜撿雜録數十餘家及晉宋齊梁春秋書史秦趙燕涼荒朝僞歷地理雜篇孤文片記并博咨故老廣訪先達校其有無取其同異始于漢明帝永平十年終至梁天監十八年凡四百五十三載二百五十七人又傍出附見者二百餘人開其德業大為十例一曰譯經二曰義解三曰神異四曰習禪五曰明律六曰遺身七曰誦經八曰興福九曰經師十曰唱導然法流東土蓋由傳譯之勳或踰越沙險泛漾洪波皆亡形殉道委命弘法震旦開明一焉是賴茲德可崇故列之篇首至若慧解開神則道兼萬億通感適化則彊暴以綏靖念安禪則功德森茂弘贊毗尼則禁行清潔忘形遺體則矜吝革心歌誦法言則幽顯含慶𣗳興福善則遺像可傳凡此八科並以軌迹不同化洽殊異而皆德效四依功在三業故為羣經之所稱美衆聖之所褒述及夫討核源流商榷取捨皆列諸贊論備之後文而論所著辭異恆體始標大意類猶前序未辨時人事同後議若間施前後如謂煩雜故總布一科之末通稱為論其轉讀宣唱原出非遠然而應機悟俗實有偏功故齊宋雜記咸條列秀者今之所取必其製用超絶及有一介通感乃編之傳末如或異者非所存焉凡十科所敘皆散在衆記今止刪聚一處故述而無作俾夫披覽於一本之內可兼諸要其有繁辭虛贊或德不及稱者一皆省略故述六代賢異止為十三卷并序録合十四軸號曰高僧傳自前代所撰多曰名僧然名者本實之也若實行潛灮則高而不名寡德適時則名而不高名而不高本非所紀高而不名則備今録故省名音代以高字其間草創或有遺逸今此十四卷備贊論者意以為定如未隱括覽者詳焉大藏輦字函踐一作涉發一作起引一作列王曼穎與慧皎法師書平原人著續冥祥記家貧卒建安王偉給其喪見南史弟子孤子王曼穎頓首和南一日蒙示所撰高僧傳並使其掎托力尋始竟但見偉才紙弊墨渝迄未能罷若乃至法既被名德已興年幾五百時經六代自摩騰法蘭發軫西域安侯支讖荷錫東都雖跡標出沒行實深淺咸作舟梁大為利益固宜緇素傳美鉛槧定辭昭示後昆揄揚往秀而道安羅什間表秦書佛澄道進雜聞趙冊晉史見拾復恨局當時宋典所存頗因其會兼且巉出君台之記糅在元亮之說感應或所商榷幽明不無梗概泛顯傍文未足光闡間有諸傳文非隱括景興偶採居山之人僧寶偏綴游方之士法濟惟張高逸之例法安止命志節之科康泓專紀單開王季但稱高座僧瑜卓爾獨載玄暢超然孤録惟釋法進所造王屮有著意存該綜可擅一家然進名博而未廣屮體立而不就梁來作者亦有病諸僧祐成簡既同法濟之責孝秀染毫復獲景興之誚其唱公纂集最實近之求其鄙意更恨繁冗法師此製始所謂不刊之鴻筆綿亘古今包括內外屬辭比事不文不質謂繁難省云約豈加以高為名既使弗逮者恥開例成廣足使有善者勸向之二三諸子前後撰述豈得潔長量短同年共日而語之哉信門徒竟無一言可豫卜市肆空設千金之賞方入簉龍函上登麟閣出內瓊笈卷舒玉笥弟子雖實不敏少嘗好學頃日尫餘觸途多昧且獲披來袠斯文在斯鑽仰弗暇討論何所誠非子通見元則之論良愧處道知休奕之書徒深謝安慕竺曠風流殷浩憚支遁才俊耳不見旬日窮情已勞扶力此白以代訴盡弟子孤子王曼穎頓首和南拾廣弘明作檢答王曼穎書君白一日以所撰高僧傳相簡意存針艾而來告纍紙更加拂拭顧惟道藉人弘理由教顯而弘道釋教莫尚高僧故漸染已來昭明遺法殊功異行列代而興敦厲後生理宜綜綴貧道少乏懷書抱策自課之勤長慕鉛墨塗青揚善之美故於聽覽餘閒厝心傳録每見一介可稱輒有懷再省但歷尋衆記繁約不同或偏列參差或行事出沒已詳別序兼具來告所以不量寸管輕𣗳十科商榷條流意言略舉而筆路蒼茫辭語陋拙本以自備疏遺豈宜濫入高聽檀越既學兼孔釋解貫玄儒抽文綴藻內外淹劭披覽餘暇脫助詳閲故忘鄙俚用簡龍門然事高辭野久懷多愧來告吹噓更增㥏𭟓今以所著讚論十科重以相簡如有紕謬請備斟酌釋慧皎白高僧傳行廣弘明作續策作篋輕作輒慧皎白作君白釋僧果高僧傳後記右此傳是會稽嘉祥寺釋慧皎法師所撰法師學通內外精研經律著涅槃疏十卷梵網戒等義疏並為世軌又撰此高僧傳及序共十四卷梁末承聖二年太歲癸酉避侯景難來至湓城少時講說甲戌歲二月捨化春秋五十有八江州僧正慧恭為首經營葬于廬山禪閣寺墓時龍光寺釋僧果同避難在山遇見時事聊記之云耳高僧傳釋曇斐姓王會稽剡人居法華臺寺善小品淨門合密持經記出三藏記云剡西臺曇斐記案記注支恭明蓋出自恭明也合密持陀鄰尼總持三本佛說無量門密持經佛說阿難陀目佉尼呵離陀鄰尼經佛說總持經一名成道降魔得一切智二本後皆有此名此經凡有四本三本並各二名一本三名備如後列其中文句參差或梵或漢音殊或隨義制語各有左右依義順文皆可符同所為異處後列得法利三乘階級人數及動地雨華諸天妓樂供養多不悉備意所未詳一本一名無量門密之持二名成道降魔得一切智此一本名行於世為常舊本一本一名阿難陀目佉尼阿離陀羅尼二名疾使人民得一切智一本一名無端底門總持之行二名菩薩降却諸魔堅固於一切智一本一名出生無量門持二名一生補處道行三名成道降魔得一切智此本備明法利及動地妓樂事四本皆各標前一名於經首第二第三名不以題經也後舍利弗請名佛說名皆備如前列欽定四庫全書
