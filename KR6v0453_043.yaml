body:
  text: 明梅鼎祚輯隋六蔣州僧慧文等與智顗論毀寺書開皇中有旨壞諸空寺取其材用慧文等請顗申達晉王求旨王書答之奉誠寺慧文龍光寺法令光宅寺智勝等稽首和南伏見使人賫符壞諸空寺若如即目所覩全之與破及有僧無僧毀除不少伏惟大王菩薩植信崇明興建三尊慈仁化物豈不宏護佛法留心塔寺但此處僧徒忽見毀廢咸懷憂恐大王雖照同朝日而聖德高遠衆情傾仰無因簡徹伏惟智者禪師道俗歸止有所言勸悉善為先文等不揆庸微馳來奉告必願運大慈悲垂為申達冀未壞之寺庶得安全敢藉護持輒此祈仰謹和南開皇十二年二月八日智顗與晉王述蔣州僧書今獲蔣州奉誠寺慧文律師書敬呈如別仰惟匡持三寶行菩薩慈近年寇賊交橫寺塔燒燼仰承大力建立將危遂使佛法安全道俗蒙賴收拾經像處處流通誦德盈衢銜恩滿路昔居戎在陳尚得存心況息武興文方應光顯至如慧文所述抽剔伽藍必由在所官人多生僻解致令外僧惶惑憂懼不寧貧道常念無堪謬當知識若論愛惜形命豈敢言忤公門特是佛法相關亦由香火事大意之所為惟憂冥道寧忘即日之身必存未來之議若不述愚心則虛當四事復乖三稔香火是何人乎是何人乎在所官司惟悕事辦豈慮因果將來善惡耶當願聖德尊嚴履萬安之路福祿隆重高而不危修菩薩行棟梁佛法牆塹三寶澤覃四海風芳萬代若謂寺多州少國或不聽方便善權仰由安立若須營造治葺城隍江南竹木之鄉採伐彌易仰希宏紹提拔將沈故寺若存新福更長冀蒙矜允幽顯沾恩法事仰干追深愧踖沙門某敬白三月十一日晉王答蔣州事書弟子總持和南爰逮高旨騰蔣州僧所及竊以僧居望剎食惟分衛所立精舍本依聚落近年奉詔專征弔民伐罪江東混一海內乂寧塔安其堵市不易業斯亦智者備所明見而亡殷頑民不慚懷土有苗恃險敢恣螳螂橫使寺塔焚燒如比屋流散鐘梵輟響雞犬不聞廢寺同於火宅持鉢略成空返僧衆無依實可傷歎彼地福盡方城丘墟所餘堂塔本不壞毀其有現僧亦許房住唯虛廊簷宇會當倒壓所以移來還充寺館其外椽版權借築城若空寺步廊有完全者亦貸為府廨須一二年間民力展息即於上江結筏以新酬故本勒所司具條孔目無慮零漏恐遠僧未能曲見頓用仰誣必願言提冥諸其掌猥延滿軋戀側良深謹和南並國清百録長安曇暹禪師與智顗禪師書開皇十三年九月十三日京師興國寺曇暹和南天台山禪師足下仰惟聲高道邁疑和上之來儀德遠智深想彌天之再託言思頂禮申接足於丹誠佇望東山戀光儀之若渴時來寒重願善起居衆生難調化宏勞念仰承遠遊荊鎮利物宏多棲思青溪足暢懷抱冀德光迥被用展翹誠化導周行蒙沾勝益願珍道德續結祗承謹和南率奉醍醐願領微意迥被北藏作回被導因寺惠嵒等致智顗書竊以妙理沖玄隔言象之外應機濟物寄真俗之談自鵠樹潛儀金棺晦迹微言託於傳授密教假於宏通故有五種法師四依開士邇後連蹤繼迹數百年中雖復慧炬潛輝而法流恆瀉加以專思碩學並願盡性窮源然性不可窮源何易盡鹿羊之文既惑兔馬之説猶疑若不假以大心終歸永蔽仰惟禪師盛德清高跨衆流之表奇才內密越詞人之上雖不衣錦還鄉且見懷珠反本屬以天清地肅王道康夷四衆傾心民庶欣仰各願咨受咸思採聽幸以慧雲之潤忘祕吝于未聞師子之音廣宣揚于渴仰暫移浪迹之步權啓滅定之門俯就羣心哀憐祈請書云朝聞夕殞法説一句染神必不纍月經年繁勞視聽庶曾聞一實者決了衣珠未發菩提心並知回向賢愚喜躍凡聖歡愈豈不宏法棟梁含生舟楫不任引領謹遣十住寺臻法師歸依座下普述衆心鵠望泉涌之資側遲洪鐘之響輒以塵聞咸懷喜躍荊州道俗陳子秀等請智顗講法華疏導因寺東巖菩薩戒弟子陳子秀等稽首和南竊以法門不二理絶言忘應病隨機假名相説雖復常居寂滅而廣示威儀不起道場躬升自在義談廣狹迹現淺深普是有識津梁含生舟楫論其汲引莫不方便為先語其提攜無非譬喻為本宅童孺識三車而競出傭賃窮子知糞穢之可除仰惟禪師居大慈之位懷普洽之心懷貫三空智階百法輒欲奉屈宣揚法華一部展禽邵伯術小功微尚復布政棠陰宣風柳下沉復親承三點高修六度必願俯就傾誠留心鑽仰漢皇白水由昌大風桑井可嘉無容默已庶令貴賤上下咸識一乘大葉小枝等蒙慈潤幸使高源鑿井速見洪泉醉臥惛迷還知昔寶輒述衆情罔知陳具謹請開皇十三年八月十日蔣山棲霞寺衆保恭等恭姓崔青州人唐初終京師大莊嚴寺請智顗講法華疏棲霞寺衆保恭等和南竊以瞻慕明德灰管屢遷展覲以來炎涼再隔伏餐至法用稟教門定水淡而無涯詞峯高而不極至如止觀方等之儀龍樹馬鳴之文莫不殫其理窟究其沖妙恭雖不敏少遊講席窺玩南北經論法師三十餘年求其奧旨不悟觀諸法海寄在餘生所冀傾蠡猶欣飽腹然道安之遇澄上人便稱北面惠永之逢遠上首即創東林是知得奉勝人須安勝地者也恭雖疏薄竊欣往彥但所居棲霞寺者宋代明徵君宅僧紹之所建立也鐫山現像疏巖敞殿似若飛來無慙踴出若其林泉爽麗房宇縈紆桂嶺春芳雲窗晝歇自昔高行是用遊寫故寺衆齊誠請延威德惟願傍觀曩哲爰降彼居依經受用必垂納處所有園田基業具在別條謹共開府士柳顧言證成斯誓庶金剛之域與鷲嶺而長存法寶斯傳等雞山而不滅謹疏開皇十五年八月六日保恭等疏釋吉藏姓安本安息人隋初止會稽嘉祥寺煬帝晉蕃置四道場召入慧日唐初終與智顗書吉藏啓景上至奉旨伏慰下情薄熱不審尊體何如伏願信後寢膳勝常誨授無乃上損吉藏粗蒙隨衆拜覲未即伏增戀結願珍重今遣智照還啓不宣謹啓又景上至奉師慈旨不勝踊躍久願伏膺甘露頂戴法橋吉藏自顧慵訥不堪指授但佛日將沈羣生眼滅若非大師宏忍何以克興伏願廣布慈雲啓發朦滯吉藏謹當竭愚奉稟誨誘窮此形命遠至來劫伏願大師密垂加授夏亦竟即馳覲今行遣智照咨問謹啓又吉藏啓景上未至數日之間便爾感夢又景上至已後仍復得夢一二智照口述景上尋皈亦因委咨謹啓請智顗講法華經疏吉藏百餘人奉疏請講法華不赴吳州會稽縣嘉祥寺吉藏稽首和南伏聞山號嶵嵬道安登而説法峯名匡岫慧遠棲以安禪未若茲嶺宏麗接漢連霞濬壑飛流衝天灌日赤城丹水仙宅隩區佛隴香罏聖果福地復經擅美孫賦稱奇智者棲憑二十餘載禪慧門徒化流遐邇昔同壽英彥才解通經法淨俊神正傳禪業若非道參窮學德侔補處豈能經論洞明定慧兼照至如周旦沒後孔子命世馬鳴化終龍樹繼後如內外不墜信在人宏光顯大乘開發祕教千年之與五百實復在於今日南嶽睿聖天台明哲昔三業住持今二尊紹係豈止灑甘露於震旦亦當振法鼓於天竺生知妙悟魏晉以來典籍風謠實無連類釋迦教主童英發疑盧舍法王善財訪道敢緣前迹諦想崇誠謹共禪衆一百餘僧奉請智者大師演暢法華一部此典衆聖之喉襟諸經之關鍵伏願開佛知見耀此重昏示真實道朗茲玄夜庶以三千國土來稟未聞百劫後生奉遵大義築場戒節析木將臨搖落山莊玄黃均野桂巖玉蘂菊岸華榮彌切聲聞之心頗傷緣覺之抱吉藏仰謝前達俯愧詢求兢懼惟深但增戰悚謹請開皇十七年八月二十一日釋智越姓鄭氏南陽人智者授以禪法深達五門窮通六妙賀晉王為皇太子啓開皇二十年晉王立為皇太子智顗弟子智越遣僧使灌頂智璪奉啓入京稱賀并謝創寺新成天台寺故智者弟子沙門智越一衆啓伏惟殿下睿德自天恭膺儲副生民慶賴萬國歡寧凡在道俗莫不舞忭況復越等早蒙覆護曲奉慈惠不任悅豫之誠謹遣僧使灌頂智璪等奉啓以聞謹啓衆謝造寺成啓仁壽元年十月三日天台寺故智者弟子沙門智越一衆啓伏聞龍樹遷化天竺為立伽藍寶志云亡梁國盛修開善良由菩薩本誓互相顯發凡是聲聞但知稱讚伏惟亡故和尚具難思之德作天人之師安禪涅槃示希有事披按經律千載一聞妙德昭彰興于聖世伏惟尊師重道爰繕伽藍建立之所甚得山相先師嘗言其地必待良緣追尋此記彌會今日即寺居五峯之內夾兩澗之流堂殿華敞房宇嚴祕方之淨土用集神仙成就已來先師恆垂影迹聖境雖遙有感斯應既興塔廟故現靈奇爰示諸佛咸同攝受越等庸薄謬齒門徒仰慙棟宇俯勵心力常于寺內別修齋懺恆專禪禮庶藉熏修奉酬聖澤不任喜荷謹遣使灌頂智璪奉啓謝聞謹啓皇太子登極衆遣賀啓天台寺沙門智越一衆啓竊聞金輪紺寶奕世相傳重離少陽時垂御辨伏惟皇帝菩薩聖業平成纂臨洪祚四海萬邦道俗稱幸越等不任喜踊之至謹遣僧使智璪奉啓以聞謹啓仁壽四年十一月三日括州臨海縣天台寺僧智越等啓煬帝勑答皇帝敬問括州天台寺沙門智越法師等餘寒道體如宜也僧使智璪至得書具意大業元年正月十三日衆謝啓天台寺沙門智越等啓使智璪還奉宣正月十三日勑旨并施物五百段謹即集衆佛前敬對使人如法呪願智越等有幸喜逢聖世伏蒙慈勑喜懼已隆復領厚賚恩賜彌重竊惟輪王地水已覺難消況天府妙物寧供受用庶藉勑慈又承佛力罄竭心膂導師遺訓專修禮誦上答天澤不任悚荷之至謹附揚州使奉謝以聞謹啓大業元年三月十七日輿駕巡江都宮寺衆參啓天台寺沙門智越一衆啓仲秋已冷伏惟皇帝陛下起居萬福越等早蒙垂覆曲荷慈恩山衆常得安心奉國行道伏聞輿駕巡撫江都寺衆欣踊不任馳戀之誠謹遣僧使智璪奉啓以聞謹啓大業元年八月三十日釋灌頂字法雲姓吳義興人從智顗禪師為法上終天台國清寺國清百録序先師以陳太建七年歲次乙未初隱天台所止之峯舊名佛隴詢訪土人云遊其山者多見佛像故相傳因而成稱至大建十年歲在戊戌降陳宣帝勑名修禪寺吏部尚書毛喜題篆榜送安寺門到大隋開皇十八年其歲戊午太尉晉王於山下為先師創寺因山為稱是曰天台王登尊極以大業元年龍集乙丑勑江陽名僧云昔為智者創寺權因山稱今須立名經論之內有何勝目可各述所懷朕自詳擇諸僧表兩名一云禪門一云五淨居其表未奏而僧使智璪啓國清之瑞勑云此是我先師之靈瑞即用國清勑取江都宮大牙殿榜填以雌黃書以大篆遣兼內史通事舍人盧政力送安寺門國清之稱從而為始先師神光而生結跏而滅處證妙法出作帝師備是渚宮法論會稽智果國清灌頂等三傳所載又沙門智寂編集先師遣迎信命搜訪未周而智寂身故筆墨之功與氣俱棄余覽其草本續更撰次諸經方法等合得一百條呼為國清百録貽示後昆知盛德之在茲大藏起字函曇暹至此並國清百録釋法經等上文帝論衆經目録書案翻經沙門及學士撰序目録五卷此云七卷今在大藏百字函大興善寺翻經衆沙門法經等敬白皇帝大檀越去五月十日太常卿牛弘奉勑須撰衆經目録經等謹即修撰總計衆經合有二千二百五十七部五千三百一十卷凡有七卷別録六卷總録一卷繕寫始竟謹用進呈經等又敬白仰惟無上法寶道洽無窮像運中途緣被茲土昔方朔覩昆明下灰令問西域取決劉向校書天祿閣録載已見佛經方知前漢之世正法久至非為後漢始流此地矣但自道淡情華真偽玄隔人鮮宗敬雖有若亡又致明帝夢感金容親應者當是聖道憑藉皇王大啓宏奉之端耳於是發使西域專求佛經緣此摩騰法蘭創出四十二章世高支讖廣譯諸餘經部是後通道之士相尋而至爰暨魏晉京洛之日雖有支謙康會驟宣於金陵竺護蘭炬飛譯於雍洛然而信敬尚簡奉行固微比逮東晉二秦之時經律粗備但法假人宏賢明日廣於是道安法師創條諸經目録詮品譯材的明時代求遺索缺備成録體自爾達今二百年間製經録者十有數家或以數求或用名取或憑時代或寄譯人各紀一隅務存所見獨有揚州律師僧祐撰三藏記録頗近可觀然猶小大雷同三藏雜糅抄集參正傳記亂經考始括終莫能該備自外諸録胡可勝言僧衆既未獲盡見三國經本校驗異同今惟且據諸家目録刪簡可否總摽綱紀位為九録區別品類有四十二分九初六録三十六分略示經律三藏大小之殊粗顯傳譯是非真偽之別後之三録集傳記注前三分者並是西域聖賢所撰以非三藏正經故為別録後之三分並是此方諸德所修雖不類西域所製莫非毗贊正經發明宗教光輝前緒開進後學故兼載焉又法經等更復竊思諸家經録多是前代賢哲修撰敬度前賢靡不皆號一時稽古而所修撰不至詳審者非彼諸賢才不足而學不周直是所遇之日天下分崩九牧無主名州大郡各號帝畿壃場艱關並為戰國經出所在悉不相知學者遙聞終身莫覩故彼前哲雖有才能若不逢時亦無所申述也當今經等識學誠不及古而宿緣多幸運屬休辰四海為家六合清泰殊方異俗宛若目前正朔所班書軌無外又皇帝大檀越雖復親綜萬機而耽道終日興復三寶為法輪王永關四趣之門大啓天人之路在域羣生莫不蒙賴而況經等夫何復論所恨識慧無長猥參嘉運不能盡獲三國經本及遺文逸法造次修撰多有罔昧進思退省慙慨良深敬白衆經目録釋道林姓李同州郃陽人唐武德初終啓文帝道林出家入太白山開皇之始創啓玄宗勑度七人選窮翹楚有司加訪搜得林焉文帝親命出家苦辭不可乃啓云云帝曰名實相副其來久矣禪師但隸公府身任山栖林不從逃還太白貧道聞山林之士往而不返浩然之氣獨結林泉望得追蹤既往故應義絶凡貫陛下大敞法門載清海陸乞以此名遺虛仰者續高僧傳釋曇延臨終遺文帝啓曇延姓王蒲州桑泉人住京師延興寺宏識英辨為文帝所禮重開皇八年臨終遺啓文帝帝聞哀慟贈物設齋延逢法王御世偏荷深恩往緣業淺早相乖背仰願至尊護持三寶始終莫二但末世凡僧雖不如法簡善度之自招聖福續高僧傳釋曇遷姓王博陵饒陽人初棲楊都道場寺終西京禪定寺己是非論遷為帝王挹敬侯伯邀延或謂滯于榮寵者乃著己是非論夫自是非彼美己惡人物莫不然以皆然故舉世紛紛無自正者也斯由未達是非之患乃致於此言至患者有十不可一是非無主二自性不定三彼我俱有四更互為因五迭不相及六隱顯有無七性自相違八執者偏著九是非差別十無是無非初明無適主者此云我是彼云我是彼此競取乃令是無定從彼云此非此云彼非彼此競興遂使非無適趣或者必欲以是自歸以非屬彼者此有何理而可然耶理不然故強為之者莫不致敗耳物豈知其然哉修佛像奏文帝幸岐州勑蜀王行獵逐一獸入故窑既失蹤迹但滿窑破落佛像具以事聞遷因奏帝悵然下詔比經周代毀道靈塔聖儀填委溝壑者多蒙陛下興建已得修營至於碎身遺影尚遍原野貧道觸目增慟有心無事文帝詔諸有破故佛像仰所在官司精加檢括運送隨近寺內並續高僧傳釋行友蒲晉沙門入唐召充弘福譯之選釋智通論通姓程河東人大業中卒見幢蓋塔廟曰吾生淨土矣行友為傳因著論夫法本不生今則無滅如身實相觀佛亦然因斯以談則三界與一識冥歸生死共涅槃同體又何容淨穢彼此於其間哉則凡夫學人妄情未盡不能齊彼我均苦樂遺欣猒亡是非故須回向願求標心所詣然後往生耳其實則不然譬猶明鏡現形空谷應聲影響之來豈是遠乎而惑者以暗識生疑謂淨土越度三有超過九定絶域寥廓經途敻遠自非三乘極位及十地聖人積行纍功安能生彼何其謬歟觀斯上人雖稟性溫柔為人清潔其所修習則福德偏長定慧之功蓋不足紀直以一生之散善臨命之虛心遂能自覩光明親見幢相動搖神象夢感旁人是知九品之業有徵十念之功無爽凡我同志豈不勗哉若夫尋近大乘修行止觀察微塵之本際訊一念之初源便可荊棘播無常之音梟獍説甚深之法十方淨國未必過此如其眷戀妻孥槃桓斃執營生未猒逐物已疲摧百齡於倉卒之間畢一世於遑忙之際內無所措外無所恃則長劫冥沒亦奚能自返良可悲矣釋海順姓任氏河東蒲坂人仁壽寺僧終于唐三不為篇順神晤駭羣出言可録曾從容曰自任則樂而未曾制物從我隨物則苦而未曾以我達物且鳥不栖淵魚不巢樹未必解修和讓之道而各得其所宜者亦猶我不奪物榮物不好我辱矣又作三不為篇其一曰我欲偃文修武身死名存斫石通道祈井流泉君肝在內我身處邊荊軻拔劍毛遂捧盤不為則已為則不然將恐兩虎共鬬勢不俱全永存今好長絶來怨是以返迹荒徑息影柴門其二曰我欲刺股錐刃懸頭屋梁書臨雪彩牒映螢光一朝鵬舉萬里鸞翔縱任才辨遊説君王高車反邑衣錦還鄉將恐鳥殘以羽蘭折由芳籠餐詎貴鉤餌難嘗是以高巢林藪深穴池塘其三曰我欲衒才鬻德入市趨朝四衆瞻仰三槐附交標形引勢身達名超箱盈綺服厨富甘肴諷揚絃管詠美歌謠將恐塵栖弱草露宿危條無過日旦靡越風朝是以還傷樂淺非惟苦遙致道傑書海順以法輪罕遇遂欣禪味有沙門道傑者穎秀定慧希慕風景乃致書傑得書美其鋭情玄暢也報之敢稽首大師門下每欲理靜攝心山泉畢志但以無明大夜非慧炬不輝故栖寄法筵聽覽玄旨至於人物聚集頗勞低仰況乃大限百年小期一念儻從風燭前路奚憑所以策駑駘之疲想千里之遠定門玄妙輒希趣入逆其不逮益用盤桓伏願開含養之懷退人以禮釋道傑姓楊河東安邑人住蒲州栖巖寺報海順書促路非騏驥之逸轡灌木豈鸞鳳之栖息故當引水而沐枯魚戢翼而朋寡鶴耳脫其不爾幸無略光陰釋智詵答原缺智詵字惠成姓徐益州成都人隋初於長安敷楊律藏蜀王秀奏請還蜀住法聚寺道俗歸崇乃辭入龍居山幽栖深阻軌迹不通延出辭疾意欲登劍閣掃清井絡與詵書令歸國化使略答云攜得書示軍衆先作禮曰人物爭歸律師之力也以唐武德元年終此書本傳載與何人未有明確考南北藏並同當是辭疾之下脫落一段攜是其所與人名也據書語亦蜀人辱使至止并以誠信披閲循環一言三復文清淥水理破秋毫貧道戒行多闕化術無方宅身荒谷四十餘載狎魚鳥侶樵歌習禪那思般若以此卒嵗分填溝壑不謂耆年有幸運屬休明伏惟相王殿下德隆三古道振百王公攘臂而歸舊里衣錦而旋本邑百姓有再生之期萬物起息肩之望搢紳君子捧玉帛而來儀慷慨丈夫委干戈而伏道昔長卿返蜀徒擅清文鄧艾前來未能偃武公華陽甲族井絡名家捧日登朝懷金問道劍南長幼並俟來蘇豈藉微風自然草靡當勸諸首領越境參迎以上並續高僧傳釋寶貴大興善寺沙門周道安弟子新合金光明經序開皇十七年貴見昔晉世沙門支敏度合兩支兩竺一百五家首楞嚴五本為一部作八卷又合一支兩竺三家維摩三本為一部作五卷今沙門僧就又合二讖羅什耶舍四家大集四本為一部作六十卷賫遂依承以為規矩而金光明見有三本初曇無讖譯四卷其次崛多譯為五卷又真諦譯復為七卷其序略云曇無讖法師稱金光明經篇品闕漏每尋文揣義謂此説有徵而讐校無指永懷寤寐梁武皇帝愍三趣之輪回悼四生之漂沒泛寶舟以救溺秉慧炬以照迷大同年中勑遣直後張泛等送扶南獻使反國仍請名僧及大乘諸論雜華經等彼國乃屈西天竺優禪尼國三藏法師波羅末陀梁言真諦并賫經論恭膺帝旨法師遊歷諸國故在扶南風神爽悟悠然自遠羣藏淵部罔不研究太清元年始至京邑引見殿內武皇躬伸頂禮於寶雲殿供養欲翻經論寇羯憑陵大法斯舛國難夷謐沙門僧隱始得咨稟法師譯經經目果闕三身分別業障滅陀羅尼最淨地依空滿願等四品全別成為七卷今新來經一百六十部內其間復有銀主陀羅尼品及囑纍品更請崛多三藏出沙門彥琮重覆校勘故貴今合分為八卷品部究足始自乎斯文號經王義稱深妙願言幽顯頂戴護持大唐內典録釋僧燦徐州人初以白衣謁二祖可祝髮傳衣是為三祖信心銘至道無難唯嫌揀擇但莫憎愛洞然明白毫釐有差天地懸隔欲得現前莫存順逆違順相爭是為心病不識玄旨徒勞念靜圓同太虛無欠無餘良由取捨所以不如莫逐有緣勿住空忍一種乎懷泯然自盡止動歸止止更彌動唯滯兩邊寧知一種一種不通兩處失功遣有沒有從空皆空多言多慮轉不相應絶言絶慮無處不通歸根得旨隨照失功須臾反照勝卻前空前空轉變皆由妄見不用求真唯須息見二見不住慎莫追尋才有是非紛然失心二由一有一亦莫守一心不生萬法無無無法不生不心能隨境滅境遂能沈境由能境能由境能欲知兩段元是一空一空同兩齊含萬象不見精粗寧有偏黨大道體寬無易無難小見狐疑轉急轉遲執之失度必入迷路放之自然體無去住任性合道逍遙絶惱繫念乖真昏沈不好不好勞神何用疏親欲取一乘勿惡六塵六塵不惡還同正覺智者無為愚人自縛法無異法妄有愛著將心用心豈非大錯迷生寂亂悟無好惡一切二邊良由斟酌夢幻虛花何勞把捉得失是非一時放卻眼若不寐諸夢自除心若不異萬法一如如如體玄兀爾忘緣萬緣齊觀復歸自然泯其所以不可方比止動無動動止無止兩既不成一何有爾究竟窮極不存軌則契心平等所作皆息狐疑淨盡正信調直一切不留無可記憶虛明自照不勞心力非思量處識智難測真如法界無他無自要急相應唯言不二不二皆同無不包容十方智者皆入此宗宗非促延一念萬年無在不在十方目前極小同大意絶境界極大同小不見邊表有即是無無即是有若不如是必不須守一即一切一切即一但能如此何慮不畢信心不二不二信心言語道斷非去來今歷代佛祖通載釋智首姓皇甫安定人住西京禪定寺精講戒律唐貞觀初卒續薩婆多毗尼毗婆沙序世雄息化律藏枝分遂使天竺聖人隨部別釋自佛教東流年代綿久西土律論頗傳此方然此薩婆多即解其十誦智首宿緣積善早預緇門始進戒品即為毗尼藏學至於諸律諸論每備披尋常慨斯論要妙而文義闕少乃至江左淮右爰及關西諸有藏經皆親檢閲悉同雕落罕有具者雖復求之彌懇而緣由莫測每恨殘缺滯於譯人靜言思此恆深悲歎比奉詔旨來居禪定幸逢西蜀寶玄律師共談此論闕義玄言本鄉備有非意聞之不勝慶躍於是殷勤三覆問其所由方知此典譯在於蜀若依本翻有其九卷往因魏世道武毀滅法門乃令茲妙旨首末零落遂使四方皆傳闕本其真言圓備尚蘊成都智首乃託印憖行人井絡良信經涉三周所願方果以皇隋之馭天下二十六載大業二年嵗次丙寅冬十二月躬獲此本傳之京邑智首深願流茲覺水散此惠燈悟彼學徒補其法寶已有一本附齊州神通寺僧沙禪師令於海岱之間諸藏傳寫猶恨晉魏燕趙未獲流布相州靜洪律師毗尼匠主復是智首生年躬蒙訓導今謹附一本屈傳之河朔故具述由序標之卷初願尋覽諸賢無猜惑也大藏氣字函釋智永會稽人王徽之之後為永興寺僧書迹遠祖逸少兼能諸體於草最優千文今傳題右軍樂毅論後樂毅論者正書第一梁世模出天下珍之自蕭阮之流莫不臨學陳天嘉中人得以獻文帝帝賜始興王王作牧境中即以見示吾昔聞其妙今覩其真閲玩良久匪朝伊夕始興薨後仍屬廢帝廢帝既歿仍屬餘杭公主公主以帝王所重恆加寶愛陳世諸王皆求不得及天下一統四海同文處處追尋纍載方得此書留意運工特盡神妙其間書誤兩字不欲點除遂雌黃治定然後用筆陶隱居云大雅吟樂毅論太師針等筆力鮮媚紙墨精新斯言得之矣釋智永記張懷瓘法書要録月儀獻歲帖孟子舟御史所藏黃長睿以為何璧書獻歲將終青陽應節和風動物麗景光輝翠柳舒鱗紅桃結綬想弟優遊勝地縱賞嘉賓酌桂醑以申心玩琴書而寫志無令披聚敘會何期謹遣一介希還數字陸友仁研北雜志釋智果會稽剡人永興寺僧嘗師智永終東都慧日寺太子東巡頌果善書勢逼右軍煬帝為晉王召寫書辭云眼暗王怒長囚江都及為太子出巡楊越乃上太子東巡頌釋之其序略云智果振衣出俗慕義遊梁感昔日之提獎喜今晨之嘉慶續高僧傳心成頌回展右肩頭項長者向右展寧宣臺尚字是非是頭項長長舒左足有腳者向左舒實其典字是謂人彳木才之類非其典之類峻拔一角字方者擡右角國用周字是潛虛半腹畫少粗於左右亦須著遠近均勻遞相覆蓋放令右虛用見岡月字是間開間合無字四點四畫為綜上心開則下合也隔仰隔覆並字隔二疆字隔三皆斟酌二三字仰覆用之回互留放謂字有磔掠重者若文字上住下放茶字上放下住是也不可并放變換垂縮謂兩豎畫一垂一縮并字右縮左垂斤字右垂左縮上下亦然繁則減除王書懸字虞書毚字皆去下一點張書盛改血從皿疏當補續王書神字處字皆加一點𨚫字從阜字是也分若抵背州册之類皆須自立其抵背鍾王歐虞皆守之合如對目八字州字之類皆須前相矚視孤單必大一點一畫成其獨立者是也重並仍促昌呂爻棗等字上小林棘絲羽等左促森渺字兼用之以側映斜為斜乀為側交欠以入之類是以斜附曲謂𡿨為曲女安必互之類是覃精一字功歸自得盈虛向背仰覆垂縮回互不失也統視連行妙在相承起伏行行皆相映帶聯屬而不背違也宋蘇霖書法鉤玄釋慧斌姓和氏兖州人初住秦州存道寺後入京師唐貞觀中卒義井銘斌父朗有子七人斌第二也仁壽中徵為京師弘福寺主以朗齒耄生別愛敬無因乃于汶水之陰九逵之會建義井一區樹碑用裨其德其銘略曰哀哀父母載生載育亦既弄璋我顧我復一朝棄豫山川滿目雲掩重關風驚大谷愛敬之道天倫在茲殷憂暮齒見子無期鑿井通給託事興詞百年幾日對此長悲玉檢之南嶧陽之北獲麟之野秉禮之國居有美政俗多儒墨玉井洞開高碑斯勒天台佛壟山神送釋智晞疏智晞姓陳氏潁川人居天台佛壟創造伽藍唯經臺未構衆議香罏峯柳柏木可共取之以充供養晞以山神護惜不可造次夜夢人送疏即便營辦採伐香罏峯柳柏樹盡皆捨給經臺續高僧傳摩竭提國碑文闍提斯那住中天竺摩竭提國學兼羣藏藝術異能通練於世以本國忽然大地震裂所開之處極深無底於其岸側獲一石碑文云乃募道俗五十餘人以仁壽二年至仁壽宮計初地震獲碑之時即此土開皇十四年也時正文帝感得舍利立塔諸州東方震旦國名大隋城名大興王名堅意建立三寶起舍利塔續高僧傳隋江夏縣緣果道場磚塔下舍利記夫至理空沖尋求之源悠緬法身寂寞無方之應奄臻至如花疊未燃駐影留髮香薪已燎散體分形故有寶塔珍龕崔嵬四園之上雲興地踊照曜八國之中俾我聖迹未之湮墜緣果道場者梁天監十二年太歲癸巳長史劉端捨宅為寺有命過僧歸闍梨盡心建造闍梨降自江缺一字氏族未詳戒慧總持甚有靈驗於是鴻基勝趾締搆日新三業薰修七財具足以今大隋大業九年昭暘之歲江夏縣緣果鄉長劉大懿等遵依勑旨共三鄉仕民奉缺二字齊與道場七層磚塔一所安鎮此地次有清信弟子黃慧龔慧俊慧達等兄弟並德缺一字佳雅難兄難弟誓立五根願宏四事於所住宅福瑞纍彰亡父於大業三年二月乃於食內感舍利一枚大小相歡覩茲希有安止水器且浸且浮旋繞久之光明遍室頂戴虔禮日申供養到七年正月俊女雞娘又感二枚斯實迹現難思抑聞圖籍次有弟子李藥王信首宿馳賢才簡匹雖室無瑞井手闕金錢每用放濟居心傾捨為業以開皇草年行至常州境感舍利一枚到大業五年於所住宅又感二枚昔者阿難捧函如來讚其希有康會瓶寫吳主嗟其神異詢諸經誥今古同符以今季夏六月八日奉送散身永窆基下衆緣贊助普設大齋方俟七級巍峩接霄房而揚采九盤煜曜寶鐸韻而流聲上資帝朝爰洎遐邇設使芬盡方城五分之身常住石銷天袂金剛之地嶷然敢忘議善乃為銘曰茫茫宇宙悠悠世間九地銜海四缺二字山三途有獄五道無關魂隨動泊識缺一字循還至聖何像嶷爾淡泊示現無方迦維垂迹等救燒燃通悲幽溺息衆權城椎輪火宅八十化盡天人喪師撫膺雨淚香水缺一字毗四王典護八國均持機緣靡隔靈祥俟時坊墳式建層表臨空非因鬼力詎假神工金盤仰露寶鐸搖風山移川徙徽業興隆金薤琳琅大興善寺鍾銘序皇帝道叶金輪示居黃屋覆燾萬方舟航三界欲使雲和之樂共法鼓而同宣雅頌之聲隨梵音而俱遠乃命鳧氏範茲金錫響合風雷功侔造化騰驤猛虞負簨業而將飛宛轉盤龍繞乘風而如動希聲旦發楗槌夕震莫不傾耳以證無生入神而登正覺圓海有竭福祚無窮方石易銷願力無盡廣弘明集欽定四庫全書
