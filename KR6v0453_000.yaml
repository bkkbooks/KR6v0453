body:
  text: 欽定四庫全書集部八釋文紀總集類提要臣等謹案釋文紀四十五卷明梅鼎祚編鼎祚字禹金宣城人是書成於崇禎辛未裒輯歷代名僧之文以及諸家之文為釋氏而作者冠以經典所釋西域梵書一卷溯其源也二卷以迄四十三卷為東漢至陳隋之作四十四卷四十五卷則無名氏時代者然皆唐以前人所著也採托極為繁富每人名之下各著爵里每篇題之下各著事實亦頗便檢閲其中如王屮頭陀寺碑載在文選顏之推歸心篇載在家訓人人習讀而搜遠略近失之眉睫之前又如智永題右軍樂毅論後與月儀獻歲帖其人雖釋氏之徒而其文實不為釋氏作一概收之亦稱泛濫皆不免於小疵然六代以前之義學則已班班然矣又其時文士競以藻麗相高即緇流亦具有詞采故大抵吐屬𡢃雅論説亦皆根據經典尤不類唐以後諸方語録徒以俚語掉弄機鋒即論其文章亦不失為斐然可觀也乾隆四十四年九月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀欽定四庫全書
