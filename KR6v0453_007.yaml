body:
  text: 明梅鼎祚輯晉五釋支遁字道林姓關陳留人或云河東林慮人終於餘姚塢山中或云終剡沃洲山與高驪道人論竺法深書上坐竺法深中州劉公之弟子體德貞峙道俗綸綜往在京邑維持法綱內外俱曕弘道之匠也頃以道業靖濟不耐塵俗考室山澤修德就閒今在剡縣之𡵙山率合同遊論道說義高栖皓然遐邇有詠高僧傳還東山上哀帝書哀帝頻遣兩使徵遁出都止東安寺講道行波若涉將三載乃還東山上書告辭詔即資送一時名流餞別遁頓首言敢以不才希風世表未能鞭後用愆靈化蓋沙門之義法出佛之聖雕淳反朴絶欲歸宗游虛玄之肆守內聖之則佩五戒之貞毗外王之化諧無聲之樂以自得為和篤慈愛之孝蠕動無傷銜撫恤之哀永悼不仁秉未兆之順遠防宿命挹無位之節履亢不悔是以哲王御世南面之重莫不欽其風尚安其逸軌探其順心略其形敬故令歷代彌新矣陛下天種聖德雅尚不倦道遊靈模日昃忘御可謂鐘鼓晨極聲滿天下清風既劭莫不幸甚上願陛下齊齡二儀弘敷至法去陳信之妖誣尋久禱之弘議絶小塗之致泥奮宏轡於夷路若然者太山不歆季氏之旅得一以成靈王者非員丘而不禋得一以永貞若使貞靈各一人神相忘君君而下無親舉神神而咒不加靈玄德交被民荷冥祐恢恢六合成吉祥之宅洋洋大晉為元亨之宇常無為而萬物歸宗執大象而天下自往國典刑殺則有司存焉若生而非惠則賞者自得戮而非怒則罰者自刑弘公器以厭神意提詮衡以極冥量所謂天何言哉四時行焉貧道野逸東山與世異榮采蔬長阜潄流清壑縷畢世絶窺皇階不悟乾光曲曜猥被蓬蓽頻奉明詔使詣上京進退惟谷不知所厝自到天庭屢蒙引見優游賓禮策以微言每愧才不拔滯理無拘新不足對揚玄模允塞視聽踧踖侍人流汗位席曩四翁赴漢干木蕃魏皆出處有由默語適會今德非昔人動靜乖理游魂禁省鼓言帝側將困非據何能有為且歲月僶俯感若斯之歎況復同志索居綜習遼落回首東顧孰能無懷上願陛下特蒙放遣歸之林薄以鳥養鳥所荷為優謹露板以聞伸其愚管裹糧望路伏待慈詔高僧傳歷代三寶紀參校谷傳作咎庭紀作衢與梅太尉論州符求沙門名籍書隆安三年四月五日京邑沙門等頓首白夫標極有宗則仰之者至理契神冥則沐浴彌深故尼父素室顏氏流連豈不以道隆德盛直往忘返者哉貧道等雖人凡行薄奉修三寶愛自天至信不待習但日損功德無心增愾賴聖主哲王復躬弘其道得使山居者騁業城傍者間道緣皇澤曠灑朽幹蒙榮然沙門之於世也猶虛舟之寄大壑耳其來不以事退亦乘閒四海之內竟自無宅邦亂則振錫孤游道洽則欣然俱萃所以自遠而至良有以也將振宏綱於季世展誠心於百代而頃頻被州符求沙門名籍煎切甚急未悟高旨野人易懼抱憂實深遂使禪人失靜勤士廢行喪精絶氣達旦不寐索然不知何以自安伏願明公扇唐風於上位待白足於其下使懷道獲濟有志俱全則身亡體盡畢命此矣天聽殊邈或未具簡謹於上聞伏追悚息弘明集逍遙論世說新語云支道林在白馬寺將馮太常芙語因及逍遙支卓然標新理於郭向二家之表立異義於衆賢之外皆是諸名賢尋味之所不得後遂用支理夫逍遙者明至人之心也莊生建言大道而寄指鵬鷃鵬以營生之路曠故失適於體外鷃以在近而笑遠有矜伐於心內至人乘天正而高興遊無窮於放浪物物而不物於物則遙然不我得玄感不為不疾而速則逍然靡不適此所以為逍遙也若夫有欲當其所足足於所足快然有似天真猶饑者一飽渴者一盈豈忘蒸嘗於糗糧絶觴爵於醪醴哉苟非至足豈所以逍遙乎此向郭之注所未盡世說注即色論世說云支道林造即色論示王中郎中郎都無言支曰默而識之乎王曰既無文殊誰能見賞夫色之性也不自有色色不自有雖色而空故曰色即為空色復異空世說注引支道林集妙觀章大小品對比要抄序夫般若波羅蜜者衆妙之淵府羣智之玄宗神王之所由如來之照功其為經也至無空豁廓然無物者也無物於物故能齊於物無智於智故能運於智是故夷三脫於重玄齊萬物於空同明諸佛之始有盡羣靈之本無登十住之妙階趣無生之徑路何者耶賴其至無故能為用夫無也者豈能無哉無不能自無理亦不能為理理不能為理則理非理矣無不能自無則無非無矣是故妙階則非階無生則非生妙由乎不妙無生由乎生是以十住之稱興乎未足定號般若之智生乎教迹之名是故言之則名生設教則智存智存於物實無迹也名生於彼理無言也何則至理冥壑歸乎無名無名無始道之體也無可不可者聖之慎也苟慎理以應動則不得不寄言宜明所以寄宜暢所以言理冥則言廢忘覺則智全若存無以求寂希智以忘心智不足以盡無寂不足以冥神何則故有存於所存有無於所無存乎存者非其存也希乎無者非其無也何則徒知無之為無莫知所以無知存之為存莫知所以存希無以忘無故非無之所無寄存以忘存故非存之所存莫若無其所以無忘其所以存忘其所以存則無存於所存遺其所以無則忘無於所無忘無故妙存妙存故盡無盡無則忘玄忘玄故無心然後二迹無寄無有冥盡是以諸佛因般若之無始明萬物之自然衆生之喪道溺精神乎欲淵悟羣俗以妙道漸積損至無設玄德以廣教守谷神以存虛齊衆首於玄同還羣靈乎本無蓋聞出小品者道士也嘗遊外域歲數悠曩未見典載而不詳其姓名矣嘗聞先學共傳云佛去世後從大品之中抄出小品世傳其人唯目之以淳德驗之以事應明其致而已亦莫測其由也夫至人也覽通羣妙凝神玄冥靈虛響應感通無方建同德以接化設玄教以悟神述往迹以搜滯演成規以啓源或因變以求通事濟而化息適任以全分分足則教廢故理非乎變變非乎理教非乎體體非乎教故千變萬化莫非理外神何動哉以之不動故應變無窮無窮之變非聖在物物變非聖聖未始於變故教遺興乎變理滯生乎權接應存物理致同乎歸而辭數異乎本事備乎不同不同之功由之萬品神悟遲速莫不緣分分暗則功重言積而後悟質明則神朗觸理則玄暢輕之與重未始非分是以聖人之為教不以功重而廢分分易而存輕故羣品所以悟分功所以成必須重以運通因其宜以接分此為悟者之功重非聖教之有煩令統所以約教功所以全必待統以適任約文以領玄領玄則易通因任則易從而物未悟二本之不異統致同乎宗便以言數為大小源流為精粗文約謂之小文殷謂之大順常之為通因變之為舞守數之為得領統之為失而彼揩文之徒羇見束教頃著阿含神匱分淺才不經宗儒墨大道域定聖人志局文句詰教難權謂崇要為達諒領統為傷宗須徵驗以明實效應則疑伏是以至人順羣情以徵理取驗乎沸油明小品之體本塞羣疑幽滯因物之徵驗故示驗以應之今不可以趣徵於一驗目之為淳德效喪於事實謂之為常人而未達神化之權統玄應於將來暢濟功於殊塗運無方之一致而察殊軌為異統觀奇化為逆理位大寶為欣王聚濟貨為欲始徒知至聖之為教而莫知所以教是以聖人標域三才玄定萬品教非一途應物萬方或損教違無寄通適會或抱一御有繫文明宗崇聖典為世軌則夫體道盡神者不可詰之以言教遊無𮛫虛者不可求之於形器是以至人於物遂通而已明乎小大之不異暢玄標之有寄因順物宜不拘小派或以大品辭茂事廣喻引宏奧雖窮理有外終於玄同然其明宗統一會致不異斯亦大聖之時教百姓之分致苟以分致之不同亦何能求簡於聖哉若以簡不由聖豈不寄言於百姓夫以萬聲鍾響響一以持之萬物感聖聖亦寂以應之是以聲非乎響言非乎聖明矣且神以知來夫知來者莫非其神也機動則神朗神朗則逆鑒明夫來往常在鑒內是故至人鑒將來之希纂明才致之不並簡教迹以崇順擬羣智之分向窺之者易知希之者易行而大品言數豐具辭領富溢問對衍奧而理統宏邃雖玄宗易究而詳事難備是以明夫為學之徒須尋迹㫖關其所往究覽宗致標之興盡然後悟其所滯統其玄領或須練紘羣問明其酬對探幽研賾盡其妙致或以教衆數溢諷讀難究欲為寫崇供養力致無階諸如此例羣仰分狹𨶳者絶希是故出小品者參引王統簡領羣目筌域事數標判由宗以為小品而辭喻清約運㫖亹亹然其往往明宗而標其會致使宏統有所於理無損自非至精孰其明矣又察其津塗尋其妙會覽始原終研極奧旨領太品之王縹備小品之玄致縹縹馬覽津乎玄味精矣盡矣無以加矣斯人也將神王於冥津羣形於萬物量不可測矣宜求之於筌表寄之於玄外惟昔聞之曰夫大小品者出於本品本品之文有六十萬言今遊天竺未適於晉今此二抄出於本品大本出者不同也而小品出之在先然斯二經雖同出於本品而時往有不同者或小品之所具大品所不載大品之所備小品之所闕所以然者或以二者之事同互相以為賴明其本一故不並矣而小品至略玄總事要舉宗大品雖辭致婉巧而不喪本歸至於說者或以專句推事而不尋況旨或多以意裁不依經本故使支流相背義致同乖羣義偏狹喪其玄旨或失其引統錯徵其事巧辭辨僞以為經體雖文藻清逸而理統乖宗是以先哲出經以梵為本小品雖抄以大為宗推梵可以明理徵大可以驗小若苟任胸懷之所得背聖教之本旨徒常於新聲苟競於異常異常未足以徵本新聲不可以經宗而遺異常之為談而莫知傷本之為至傷本則失統失統則理滯理滯則或殆若以殆而不思其源困而不尋其本斯則外不關於師資內不由於分得豈非仰資於有知自塞於所尋困蒙於所滯自窮於所通進不暗常退不研新說不依本理不經宗而忽詠先舊毀訾古人非所以為學輔其自然者哉夫物之資生靡不有宗事之所由莫不有本宗之與本萬理之源矣本喪則理絶根朽則枝傾此自然之數也未紹不然矣於斯也徒有天然之才淵識邈世而未見大品覽其源流明其理統而欲寄懷小品率意造義欲寄其分得標顯目然希邈常流徒尚名賓而竭其才思玄格聖言趣悅羣情而乖本違宗豈相望乎大品也哉如其不悟將恐遂其所惑以罔後生是故推考異同驗其虛實尋流窮源各有歸趣而小品引宗時有諸異或辭倒事同而不乖旨歸或取其初要廢其後致或筌次事宗倒其首尾或散在羣品略撮玄要時有此事乖互不同又大品事數甚衆而辭曠浩衍本欲推求本宗明驗事㫖而用思甚多勞審功又寡且稽驗廢事不覆速急是故余今所以例玄事以駢比標二品以相對明彼此之所在辨大小之有先雖理惑非深奧而事對之不同故採其所究精粗並兼研盡事迹使驗之有由故尋源以求實趣定於理宗是以考大品之宏致驗小品之總要搜玄沒之所存求同異之所寄有在尋之有軌爾乃也疑貫綜首尾推步玄領究其槃結辨其凝滯使文不違㫖理無負宗棲驗有寄辨不失徵且於希詠之徒浪神遊宗陶冶玄妙推尋源流關虛考實不亦夷易乎若其域乖體極對非理標或其所寄者願俟將來摩訶薩幸為研盡備其未詳也出三藏記集字有訛舛八關齊詩序間與何驃騎期當為合八關齊以十月二十二日集同意者在吳縣土山墓下三日清晨為齊始道士白衣凡二十四人清和肅穆莫不靜暢至四日朝衆賢各去余既樂野室之寂又有掘藥之懷遂便獨住於是乃揮手送歸有望路之想靜拱虛房悟外身之真登山採藥集巖水之娛遂援筆染翰以慰二三之情詠禪思道人詩序孫長樂作道士坐禪之像并而讚之可謂因俯對以寄誠心來參焉於衡軛圖巖林之絶勢想伊人之在茲余精其制作美其嘉文不能默已聊著詩一首以繼于左釋迦文佛像讚并序夫立人之道曰仁與義然則仁義有本道德之謂也昔姬周之末有大聖號佛天竺釋王白淨之太子也俗氏母族厥姓裘曇焉仰靈胄以丕承藉儶哲之遺芳吸中和之誕化稟白淨之皓然生自右脅弱而能言諒天爵以不加為䝿誡逸祿以靡須為足故常夕惕上位逆旅紫庭紆軫儲宮擬翮區外俄而高逝周覽郊野四闢皇扉三鑒疾苦風人厲辭以激興乃甘心受而莫逆訊大猷於有道慨在茲之致淹遂乃明發遐征栖遲幽閒脫皇儲之重任希無待以輕舉禠龍章之盛飾貿窮巖之襹褐資送之儔自崖而反矣爾乃抗志匪石安仁以山斑卉匡居摧心立盟釐安般之氣緒運十算以質心併四籌之八記從二隨而簡巡絶送迎之兩際緣妙一於鼻端發三止之矇秀洞四觀而合泯五陰遷於還府六情虛於靜林涼五內之欲火廓太素之浩心濯般若以進德潛七住而挹玄搜冥魚於六絶齒既立而廢筌豁萬劫之積習同生知於當年掩五濁以擅曜嗣六佛而徵傳偉唯丈六體佩圓光啓度黃中色艷紫金運動陵虛悠往倐忽八音流芳逸豫楊彩沙覽未兆則卓絶六位曲成已著則化隆三五沖量弘乎太虛神蓋宏於兩儀易簡待以成體太和擬而稱邵圓蓍者象其神寂方卦者法其智周照積祐之留詳元宿命以制作或綢之以德義或疏之以沖風亮形搖於日新期妙主於不盡美既青而青藍逞百練以就粹導庶物以歸宗堯孔之外犍屬八億以語極罩墳索以興典掇道行之三無絡冊周以曾玄神化著於西域若朝暉升於暘谷民望景而興行猶曲調諧於宮商當是時也希夷緬邈於羲風神奇卓絶於皇軒蔚彩沖漠於周唐頌味有餘於鄒魯信可謂神化之都領皇王之宗謨也年逾從心泯迹泥洹夫至人時行而時止或隱此而顯彼迹絶於忍土冥歸於維衛俗狥常以駭奇固以存亡而統之至於靈覺之性三界殄悴豁若川傾頽如乾墜黔首與永夜同幽冥流與涸津並匱六度與崩岑俱禠三乘與絶軸解轡門徒泣血而心喪百靈銜哀而情悸夫道高者應卑因巡者親譽故不祈哭而哭豈非兼忘天下易使天下兼忘難靈風播越周六合歷數終於赤縣後死所以與聞景仰神儀而事絶於千載祗洹既已漂落玉樹卒亦荒蕪道喪人亡時亦已矣遁以不才仰遵大猷追朝陽而弗暨附桑榆而未升神馳在昔願言再欽遂援筆興古述厥遐思其詞曰太上邈矣有唐統天孔亦因周籧廬三傳明明釋迦實惟帝先應期睿作化融竺乾交養恬和濯粹沖源邁軌世王領宗中玄堂構洪謨揭秀負靈峻誕崑嶽量裒太清大象罕窺乃圓其明玄音希和文以八聲煌煌慧炬燭我宵征人欽其哲孰識其冥望之霞舉即亦雲津威揚夏烈溫柔晞春比器以形卓機以神卷即烟滅騰亦龍伸鼓舞舟壑靈氣惟新誰與茲作獨運陶鈞三無衷玄八億致遠二部既弘雙翰惟典充以瓌奇恬以易簡藏諸韞櫝實之令善可善善因乃讚乃演致存言性豈伊弘闡日月貞朗顯晦周遍生如紛霧曖來已晞至人全化跡隨世微假云泥洹言告言歸遺風六合佇方赤畿象罔不存誰與悟機鏡心乘翰庶覿冥暉阿彌陀佛像讚并序夫六合之外非典籍所模神道詭世豈意者所測故曰人之所知不若其所不知每在常輒欲以所不能見而斷所未能了故令井蛙有坎宅之矜馮夷有秋水之伐故其冥矣余遊大方心倦無垠因以靜暇復伸諸奇麗佛經記西方有國國名安養回遼回邈路踰恆沙非無待者不能遊其疆非不疾者焉能致其速其佛號阿彌陀晉言無量壽國無王制班爵之序以佛為君三乘為教男女各化育於蓮華之中無有胎孕之穢也館宇宮殿悉以七寶皆自然懸構制非人匠苑囿池沼蔚有奇榮飛沈天逸於淵藪逝寓羣獸而率真閶闔無扇於瓊林王響天諧於簫管冥霄隕華以闔境神風拂故而納新甘露徵化以醴被蕙風導德而芳流聖音應感而雷響慧澤雲垂而沛清學文吸兮而䝿言真人冥宗而廢玩五度憑虛以入無般若遷知而出玄衆妙於茲大啓神化所以永傳別有經記以録其懿云此晉邦五末之世有奉佛正戒諷誦阿彌陀經誓生彼國不替誠心者命終靈逝化往之彼見佛神悟即得道矣遁生末蹤忝廁殘跡馳心神國非所敢望乃因匠人圖立神表仰瞻高儀以質所天詠言不足遂復係以微頌其詞曰王猷外釐神道內綏皇矣正覺實兼宗師泰定軫曜黃中秀姿恬智交泯三達玄夷啓境金方緬路悠回于彼神化悟感應機五度砥操六慧研微空有同狀玄門洞開詠歌濟濟精義順神玄肆洋洋三乘詵詵藏往摹故知來惟新二才孰降朗滯由人造化營域雲搆峩峩紫館辰峙華宇星羅玉闈通方金墉啓阿景傾朝日豔蔚晨霞神提回互九源曾深浪無筌忘鱗罕餌淫澤不司虞駭翼懷林有客驅徒雨埋機心甘露敦洽蘭蕙助馨化隨雲濃俗與風清葳蘂消散靈飇掃英瓊林諧響八音文成珉瑤沈粲芙蕖晞陽流澄其潔蘂播其香潛爽冥萃載哲來翔孕景中葩結靈幽芳類諸風化妙兼于長邁軌一變同規坐忘文殊師利讚童真領玄致靈化實悠長昔為龍種覺今則夢遊方恍惚乘神浪高步維耶鄉擢此希夷質映彼虛閒堂觸類興清遘目擊洞兼忘梵釋欽嘉會間邪納流芳彌勒讚大人軌玄度弱喪升虛遷師通資自廢釋迦登幽閒彌勒承神第聖録載靈篇乘乾因九五龍飛兜率天法鼓震玄宮逸響亮三千晃晃凝素姿結跏曜芳蓮寥朗高懷興八音暢自然恬智冥徼妙縹眇詠重玄盤紆七七紀應運蒞中幡挺此四八姿映蔚華林園亹亹玄輪奏三攄在昔緣維摩詰讚維摩體神性陵化昭機庭無可無不可流浪入形名民動則我疾人恬我氣平恬動豈形影形影應機情玄韻乘十哲頡頏傲四英忘期遇濡首亹亹讚死生善思菩薩讚玄和吐清氣挺茲命世童登臺發春詠高興希遐蹤乘虛感靈覺震網發童蒙外見憑寥廓有無自冥同忘高故不下蕭條數仞中因華請無著陵虛散芙蓉能仁暢玄句即色自然空空有交映迹冥知無照功神期發筌悟豁爾自靈通法作菩薩不二入菩薩讚乃昔有嘉會茲日多神靈維摩發淵響請定不二名玄音將進和法作率所情亹亹玄心運寥寥音氣清粗二標起分妙一寄無生閈首菩薩讚閈首齊吾我造理因兩虛兩虛似得妙同象反入粗何以絶塵迹忘一歸本無空同何所貴無貴乃恬愈不眴菩薩讚有愛生四淵淵況世路永未若觀無得德物物自靜何以虛靜間恬智翳神頴絶迹遷靈梯有無無所騁不眴冥玄和栖神不二境善宿菩薩讚體神在忘覺有慮非理盡色來投虛空響朗生應軫託陰遊重冥冥亡影迹隕三界皆勤求善宿獨玄泯善多菩薩讚自大以跨小小者亦駭大所謂大道者遺心形名外都忘絶鄙常冥默自玄會善多體沖姿豁豁高懷泰首立菩薩讚為勞由無勞應感無所思悠然不知樂物通非我持渾形同色欲思也誰及之嘉會言玄志首立必體茲月光童子讚靈童綏神理恬和自交忘弘規愍昏俗統體稱月光心為兩儀蘊迹為流溺梁英姿秀乾竺名播赤縣鄉神化詭俗綱玄羅摯遊方丘巖積陳痾長驅幸玉堂汲引興有待冥歸無盡場戢翼栖高嵎凌風振奇芳並廣弘明集竺法護像讚法護事高座為師遊歷西域後隱深山山有泉經穢而燥護徘徊感歎泉復流滿支遁為像讚護公澄寂道德淵美微吟穹谷枯泉潄水邈矣護公天挺弘懿濯足流沙傾拔玄致于法蘭讚蘭嘗於冬雪在山一虎入房神色無忤虎亦甚馴于氏超世綜體玄旨嘉遁山澤仁感虎兕于道邃像讚郗超圖寫其形支遁為著銘讚英英上人識通理清朗質玉瑩德音蘭馨座右銘遁于沃州小嶺立寺行道僧衆百餘時有惰者乃著座右銘以勗之勤之勤之至道非彌奚為淹滯弱喪神奇茫茫三界眇眇長羇煩勞外湊冥心內馳徇赴欽渴緬邈忘疲人生一世涓若露垂我身非我云云誰施達人懷德知安必危寂寥清舉濯纍禪池謹守明禁雅玩玄規綏心神道抗志無為寥朗三蔽融冶六疵空洞五陰虛豁四肢非指喻指絶而莫離妙覺既陳又玄其知宛轉平任與物推移過此以往勿議勿思敦之覺父志在嬰兒並高僧傳彌法苑作孜濯作潔玩作說竺道潛字法深琅邪人丞相王敦弟出家師中州劉元貞為道俗標領寧康初終𡵙山答支遁書潛還剡𡵙山遁致書潛求買𡵙山之側沃洲小嶺潛答欲來便給未聞巢由買山而隱高僧傳便一作輒未一作豈世說支道林因人就深公買印山深公答曰未聞巢由買山而隱高逸沙門傳曰遁得深公之言慙恧而已竺僧敷未詳氏族學通衆經止瓦官寺盛開講席神無形論時異學之徒咸謂心神有形但妙於萬物敷乃著論愜然信服有形便有數有數則有盡神既無盡故知無形高僧傳釋道嵩住瓦官寺高僧傳宋有鍾山定林寺釋道嵩姓夏高密人與道安稱竺僧敷書僧敷同寺沙門道嵩才解相次與道安書敷公研微秀發非吾等所及也竺法汰東管人少與道安同學太元中終瓦官寺與道安追論竺僧敷書敷著神無形論又著放光道行等義疏終瓦官寺汰與安書數述敷義每憶敷上人周旋如昨逝沒奄復多年與其清談之日未嘗不相憶思得與君共覆疏其美豈圖一旦永為異世痛恨之深何能忘情其義理所得披尋之功信難可圖矣並高僧傳比丘尼戒本所出本末序晉孝武帝世出此序出三藏記不載名今據序有法汰云云似其所造因附拘夷國寺甚多修飾至麗王宮雕鏤立佛形像與寺無異有寺名達慕藍百七十僧北山寺名致藍六十僧劍慕王新藍五十僧溫宿王藍七十僧右四寺佛圖舌彌所統寺僧皆三月一易屋床坐或易藍者未滿五臘一宿不得無依止王新僧伽藍九十僧有年少沙門字鳩摩羅乃才大高明大乘學與舌彌是師徒而舌彌阿含學也阿麗藍百八十比丘尼輪若干藍五十比丘尼阿麗跋藍二十尼道右三寺比丘尼統依舌彌受法戒比丘尼外國法不得獨立也此三寺尼多是葱嶺以東王侯婦女為道遠集斯寺用法自整大有檢制亦三月一易房或易寺出行非大尼三人不行多持五百戒亦無師一宿者輒彈之今所出比丘尼大戒本此寺常所用者也舌彌乃不肯令此戒來東僧純等求之至勤每嗟此後出法整唯之斯戒末乃得之其解色以息不在止冶容也不欲以止竊不在謹封藏也解色則無情於外形何計飾容與不飾乎不欲則無心於珠玉何須慢藏與緘縢乎所謂無關而不可開無約而不可解也內鍵既爾外又毀容粗服進退中規非法不視非時不餐形如朽柱心若涇灰斯戒之謂也豈非聖人善救人故無棄人也哉然女人之心弱而多放佛達其微防之宜密是故立戒每倍於男也大法流此五百餘年比丘尼大戒了餘其文以此推之外國道士亦難斯人也法汰頃年鄙當世為人師處一大域而坐視令無一部僧法推求出之竟不能具吾昔得大露精比丘尼戒而錯得其藥方一匣持之自隨二十餘年無人傳譯近欲參出殊非尼戒方知不相關通至於此也賴僧純於拘夷國來得此戒本令佛念曇摩侍慧常傳始得具斯一部法矣然弘之由人不知斯人等能遵行之不耳出三藏記集竺法曠姓皋下邳人寓居吳興終長干寺答簡文帝曠止潛之青山石室簡文帝咨以妖星請曠為力曠答乃與弟子齊懺有頃菑滅昔宋景修福妖星移次陛下光輔已來政刑允輯天下任重萬機事殷失之毫釐差以千里惟當勤修德政以塞天譴貧道必當盡誠上答正恐有心無力耳高僧傳竺道一姓陸吳人王珣遊嚴陵瀨詩敘道一姓竺氏名德沙門題目道一文峯富贍答丹陽尹書一太和中出都止瓦官寺從汰公學為簡文帝知重及東止虎丘學徒苦留丹陽尹移一還都一答蓋聞大道之行嘉遁得肆其志唐虞之盛逸民不奪其性弘方由於有外致遠待而不踐大晉光熙德被無外崇禮佛法弘長彌大是以殊域之人不遠萬里被褐振錫洋溢天邑皆割愛棄欲洗心清玄遐期曠世故道深常隱志存慈救故游不滯方自東徂西惟道是務雖萬物惑其日計而識者悟其歲功今若責其屬籍同役編戶恐游方之士望崖於聖世輕舉之徒卓長往而不反虧盛明之風有謬主相之旨且荒服之賓無關天臺幽藪之人不書王府幸以時審讞詳而後集也高僧傳帛道猷姓馮山陰人終虎丘與竺道一書一止虎丘時若耶山有帛道猷以篇牘著稱好丘壑與道一有講筵之遇與一書一乃東適耶溪相會定交林下始得優游山林之下縱心孔釋之書觸興為詩陵峯採藥服餌蠲痾樂有餘也但不與足下同日以此為恨耳高僧傳竺曇無蘭晉云法正本西域人太元中於揚都謝鎮西寺譯經六十一部見開元釋教録三十七品經序三十七品者三世諸佛之舟輿聲聞支佛亦皆乘之而得度三界衆生靡不載之故經曰大乘道之輿一切度天人然則三十七品或離或合在一增四法而有四意止四神足無四意斷五法則有五根五力七法無七覺意八法而有八等則為五經也依如此比當應為七經如此則離也而諸經多合唯一增爾耳中阿含身意止有安般出入息事將是行四意止時有亂意起者執對行藥也又諸經三十七品文辭不同余因閒戲尋省諸經撮采事備辭巧便者差次條貫伏其位使經體不毀而事有異同者得顯於義又以三三昧連之乎末以具泥洹四十品五根中云四禪四諦有目無文故復屬之於後令始涉者覽之易悟不亦佳乎又以諸經之異者注於句末也小安般三十七品後則次止觀律法義決三十七品後次四諦小十二門後次三向爾為泥洹四十品止觀四諦成道之行不可以相無也是故集止觀三三昧四禪四諦繫之於三十七品後欲令行者覽之易見而其行也序二百六十五字本二千六百八十五字子二千九百七十字凡五千九百二十字除後六行八十字不在計中晉泰元二十一年歲在丙申六月沙門竺曇無蘭在揚州謝鎮西寺撰千佛名號序賢劫經說二千一百諸度無極竟喜王菩薩仍問今此會中寧有大士得此定竟入斯八千四百諸度無極及八萬四千度無極法入八萬四千諸三昧門乎佛答言有不但此諸開士也當來賢劫一千如來亦得入也除四正覺喜王白佛唯願世尊說諸佛名字姓號佛為喜王說諸佛號字號字一千數之有長而興立發意二品重說皆齊慧業而止以此二品檢之有以二字為名者三字名者有以他字足成音句非其名號亦時有字支異者想梵本一耳將是出經人轉其音辭令有左右也長而有者或當以四五六字為名號也興立發意不盡名自慧業以下難可詳也余今別其可了各為佛名意所不了則全舉之又以字異者注之於下然或能分合失所深見達士其有覺省可為改定恕余不逮大比丘二百六十戒三部合異序夫戒者人天所由生三乘所由成泥洹之關要也是以世尊授藥以戒為先焉戒者乃三藏之一也若不以戒自禁馳心於六境而欲望免於三惡道者其猶如無舟而求度巨海乎亦如魚出於深淵鴻毛入于盛火悕不死燋者未之有也行者以戒自嚴猛意五十八法者取道也何難哉蘭自染化務以戒律為意昔在於廬山中竺僧舒許得戒一部持之自隨近二十年每一尋省恨文質重會曇摩侍所出戒規矩與同然侍戒衆多施有百一十事爾為戒有二百六十也釋法師問侍侍言我從持律許口受一一記之莫知其故也尼戒衆多施亦爾百有一十三十事中第二十一二百五十者云長鉢過十日捨墮續言是比丘當持此鉢與比丘僧二十二二百六十者云鉢破綴齊五更未得新鉢故者當歸衆僧推其理旨宜如二百五十者在長鉢後事與破鉢并者為重長也余以長鉢後事注於破鉢下以子從母故也九十事中多參錯事不相對復徙就二百六十者令事類相對亦時有不相似者重飯食無餘因緣墮應對重飯不屬人言不足此除因緣事與別請并故以對別請此一戒在重飯一戒在別請亦為有餘緣則得重飯亦得越次受請也不舒手受食自恐教人恐怖此二戒無對將傳寫脫耶梵本闕乎衆多施亦有不相對不相似者莫知所以也余因閒暇為之三部合異粗斷起盡以二百六十戒為本二百五十者為子以前出常行戒全句繫之於事末而亦有永乖不相似者有以一為二者有以三為一者余復分合令事相從然此三戒或能分句失旨賢才聰睿若有攬者加思為定恕余不逮晉泰元六年歲在辛邜六月二十五日比丘竺曇無蘭在揚州丹陽郡建康縣界謝鎮西寺合此三戒到七月十八日訖故記之並出三藏記集支曇諦姓康本康居國人籍吳興從法姓支義熙七年終故鄣崑山詳誄高僧傳宋元嘉末卒當誄為正燈贊既明遠理亦弘近教千燈同輝百枝並曜飛煙清夜流光洞照見形悅景悟旨測妙藝文類聚靈鳥山銘序昔如來遊王舍城憩靈鳥山舊云其山峯似鳥而威靈故以為名焉衆美咸歸壯麗畢備太平御覽釋僧衛荊州長沙寺沙門學業甚著為殷仲堪所重尤善十住為之注解十住經合注序夫冥壑以沖虛靜用百川以之本至極以無相標玄品物以之宗故法性住湛一以居妙寂紛纍以運通靈根朗圓燭以遂能乘涉動以開用然能要有資用必有本用必有本故御本則悟涉無方能要有資故悟虛則遂其通通則苞鏡六合而有無圓照塞則用隨緣感而應必慮偏照圓則神功造極慮偏則顛覆興焉故四瀆開溢則洪川灌壑玄像差轍則三光晦曜因此而推固知運通有宗化積有本夫運通之宗因緣開其會無相極其終化積之本十道啓其謀心術兆其始故心術憑無則靈照通而大乘廓滯有則神慮塞而九宅開矣然推而極之則唯心與法別而張之則綿彰八極請辨而目焉夫萬法浩然宗一無相靈魄彌綸統極圓照斯蓋目體用為萬法言性虛為無相稱動王為心識謂靜御為智照故滯有慮塞則曰心曰識憑靈照通則曰智曰見見者正見也始曉之偏目也智者正遍知也體極之圓號也正見創入轍之始正遍標體極之終四者蓋精魄彌綸水鏡萬法雖數隨緣感然靈照常一而不變者也夫體用無方則用實異照故亂識為塵穢心欲開見謂寶廓智謂種穢心故五欲為鴆醴之室開見故三寶為荊石之門亂識故六塵為幻惑之肆廓智故一切種為驪龍之淵四者實萬法浩然同實異照雖感應交映宗一無相者也故識御六塵以矇性心起五欲以昏慮見憑四諦以洗鑒智撫無相以通照然則境雖理故心緣精魄彌綸體故靈照靈照故統名一心所緣故總號一法若夫名隨數變則浩然無際統以心法則未始非二故十住為經將窮𦣱心術之原本遂真悟之始辨神功啓于化彰八萬歸于圓照使靈機無隱伏之數大造無虛竊之名爾乃落𣻉識以反鑒貞真慧以居宗開十道運其用恬無相遠其通合三義以廓能則表宏稱謂菩提菩提者包極十道之尊號括囊通物之妙稱乃十住啓靈照之圓極遠宏大通之逸軌故十住者靜照息機反鑒之容目者也夫所以冠大業之始唱統十地之通目表稱十住諒義存於茲焉義存於茲焉然則十住之興蓋廓明神覺之向牖發瑩真慧之砥礪如來反流盡源之舟輿世雄撫會誕化之天府乃衆經之宗本法藏之淵源實鑒始領終之水鏡光宣佛慧之日月者也夫致弘不可以言象窮道玄不可以名數極故文約而義豐辭婉而㫖弘非百行開于心轍啓八萬舉其一隅非夫探鉤玄亹研機孰能亢貞鑒致於希微開拔英悟返于三隅者哉悲夫守習之迷雖服膺舊聞不玩斯要譬負日月而彌昏玄津而莫濟矣當請引而攉焉夫舉高必詣遠致深則興玄故廓六天以妙處引法雲以勝衆蓋非勝無以扣其玄處非妙不足光其道道光要有方玄扣必得人故位妙處以殊方則境絶衆穢開玄肆以引衆則英彥蓋時處極六天則寶映七珍衆舉法雲則體鏡九宅廓六變以開運朗耀世之宏觀叩三說以開興撫玄中之統韻發五情以宣到慮衆誠以彌淳遞二七以運感互交用於玄端開神轍于三轉之際兆靈覺於九識之淵匹夫衆經以比興不得同日而語開八萬以辨用焉可共劫而言非夫體包三義道總兩端孰有若斯之弘哉孰有若斯之弘哉以此而斷其道淵矣其致玄矣夫以金剛之幽植總神辨以居用猶曰不可究其深況自降茲者乎然道不獨運弘必由人故令千載之下靈液有寄焉夫外國法師鳩摩羅耆婆者挺天悟於命世邁英風于季俗乘冥寄而孤遊因泰運以弘道撫玄節於希聲暢微言于像外可以祛故納新非擬三益悟宗入轍幾於過半運啓其願彌遭其會以鉛礫之質廁南金之肆誠悟無返三之機思無稽玄之謀然存聞賞事庶無惑焉故撫經靜慮感尋疇昔每苦其文約而致弘言婉而㫖玄使靈燭映于隱藪大宗昧于偏文神標繇是以權範玄風自茲用澆淳至于閒詣靖唯扣膺津門則何常不遙然長慨撫頽薄以興懷哉故遂撰記上聞略為注釋豈曰淵壑之待晨露蓋以伸其用己之心耳庶後來明哲有以引而補焉出三藏記釋道慈案高僧釋道猷傳猷以宋末元徽中卒後有豫章沙門道慈注猷所傳勝鬘經序載出三藏記乃名法慈計在宋齊間此云道慈序中阿含則晉安帝隆安五年距元徽七十餘載而勝鬘之出始自元嘉十二年以傳猷及慈此道慈當非注勝鬘者中阿含經序中阿含經記云昔釋法師於長安出中阿含增一阿毗曇廣說僧伽羅義阿毗曇心婆須密三法度二衆從解脫緣此諸經律凡百餘萬言並違本失㫖名不當實依悕屬辭句味亦差良由譯人造次未善晉言故使爾耳會燕秦交戰關中大亂於是良匠背世故以弗獲改正乃經數年至關東小清冀州道人釋法和罽賓沙門僧伽提和招集門徒俱遊洛邑四五年中研講遂精其人漸曉漢語然後乃知先之失也於是和乃追恨先失即從提和更出阿毗曇及廣說也自是之後此諸經律漸皆譯正唯中阿含僧伽羅義婆須蜜從解脫緣未更出耳會僧伽提和進遊京師應運流化法施江左于時晉國大長者尚書令衛將軍東亭侯優婆塞王元琳當護持正法以己任即檀越也為出經故造立精舍延請有道釋慧持等義學沙門四十許人於諸所安四事無乏又預請經師僧伽羅義長供數年然後乃以晉隆安元年丁酉之歲十一月十日於揚州丹陽郡建康縣界在其精舍更出此中阿含請罽賓沙門僧伽羅義令講梵本請僧伽提和轉梵為晉豫州沙門道慈筆受吳國李寶唐化共書至來二年戊戌之歲六月二十五日草本始訖此中阿含凡有五誦都十八品有二百二十二經合五十一萬四千八百二十五字分為六十卷時遇國大難未即正書乃至五年辛丑之歲方得正寫校定流傳其人傳譯准之先出大有不同於此二百二十二經中若委靡順從則懼失聖㫖若從本制名類多異舊則逆忤先習不協衆情是以其人不得自專時有改本從舊名耳然五部異同孰知其正而道慈愚意怏怏於𨘤本故諸改名者皆抄出注下新舊兩存別為一卷與目録相連以示於後將來諸賢令知同異得更採訪脫遇高明外國善晉梵方言者訪其得失刊之從正出三藏記集欽定四庫全書
