body:
  text: 明梅鼎祚輯隋煬帝諱廣文帝子弒父自立遣延釋智顗書帝晉王時為揚州總管遣使奉迎師曰我與晉王深有緣契即束衣順流不日而至王製文請授菩薩戒自此至敕度四十九人衆謝啓並為智顗金風御節玉露調時道體休和安樂行不法師抗志名山棲心慧定法門靜悅戒行熏修籍甚徽猷久承音德欽風已積味道為勞冀託舟航用披雲霧故遣使人往彼延屈希能輕舉以沃虛襟佇望來儀不乖眷意也弟子楊廣和南受菩薩戒疏晉王躬製請戒文顗授律儀告曰大王為度遠濟為宗名實相符可法名為總持用攝相兼之道也王頂受教曰大師禪慧內融道之法澤輒奉名為智者自後書疏往來皆以此稱使持節上柱國太尉揚州總管諸軍事揚州刺史晉王弟子楊廣稽首奉請十方三世諸佛本師釋迦如來當降此土補處彌勒一切尊經無量法寶初心以上金剛以降諸尊大權摩訶薩埵辟支緣覺獨脫明悟二十七賢聖他心道眼乃至三有最頂十八梵王六欲天子帝釋天主四天大王天仙龍神蜚騰隱顯任持世界作大利益守塔衛法防身護命護淨戒無量善神咸願一念之頃承佛神力俱會道場證明弟子誓願攝受弟子功德竊以識暗萌興即如來性無明俯墜本有未彰理數斯歸物極則反欲顯當果必積于因是調御世雄備歷生死草木為籌不可勝計恆沙集起固難思議深染塵勞方能厭離法王啓運本化菩薩譬如日出先照高山隨逗根宜權為方便如彼衆流咸宗大海弟子基承積善生在皇家庭訓早趨貽教夙漸福理攸鍾妙機須悟恥崎嶇於小徑希優游於大乘笑止息於化城誓舟航於彼岸但開士萬行戒善為先菩薩十受專持最上喻造宮室必因基址徒架虛空終不成立弗揆庸懵抑又聞之孔老釋門咸資鎔鑄不有軌儀吾將安仰誠復釋迦能仁本為和尚文殊師利冥作闍黎而必藉人師顯傳聖授自近之遠感而遂通薩陀波崙罄髓於無竭善財童子忘身於法界經有明文敢為臆說深信佛語聿遵明導天台智顗禪師佛法龍象童真出家戒珠圓淨年將耳順定水淵澄因靜發慧安無礙辨先物後己謙挹盛風名稱普聞衆所知識弟子所以虔誠遙注命楫遠延每畏緣差值諸留難亦既至止心路豁然及披雲霧即銷煩惱謹以今開皇十一年十一月二十三日總管金城設千僧蔬飯敬屈禪師授菩薩戒戒名為孝亦名制止方便智度歸親奉極以此勝福奉資至尊皇后作大莊嚴同如來慈普諸佛愛等視四生猶如一子弟子即日種羅㬋業生生世世還生佛家如日月燈明之八王子如大通智勝十六沙彌眷屬因緣法成等侶俱出有流到無為地平均六度恬和四等衆生無盡度脫不窮結僧那於始心終大悲以赴難博遠如法界究竟若虛空具足成就皆滿願海楊廣和南止息續高僧傳作息止因作先成立作能成吾作孰本作奉敢為作非徒聿遵明導作幸願遵持盛作成普作遠延作迎亦既至止作師亦既至二十三日下云於揚州總管金城設千僧會親作宗貽廣弘明作胎王嚫戒師衣物等聖種納袈裟一緣黃紋舍勒一腰綿三十屯鬱泥南布袈裟一緣黃絲布襪一具絹四十匹鬱泥絲布偏袒一領黃紬臥褥一領布三十禪鬱泥絲布坐褥一具烏紗蚉幬一張紙二百張鬱泥絲布裙一腰紫綖靴一量錢五十貫鬱泥雲龍綾被一緣龍鬚席一領蠟燭十挺鬱泥羅頭帽一領須彌氊一領銅硯一面高麗青坐布一具烏皮履一量墨二挺黃絲布背襠一領南榴枕一枚和香一合鐵錫杖一柄象牙管一管麈尾一柄烏油鐵鉢一口并袋斑竹筆二管銅匕筯一具犀角如意一柄并匣白檀曲几一枚銅重碗三口鍮石香奩一具山水繩牀一張銅搔勞一口銅香火匕筯一具白檀支頰一枚銅澡罐一口楠榴夾膝一枚桃竹蠅拂一柄鐵翦刀一口蒱移文木案并褥犀裝瓜刀一口鐵剃刀一口黃絲布隱囊一枚紫檀巾箱一具鐵鑷子一具白瓦唾壺一口并籠巾柿心筆格一枚銅燭擎一具鍮石裝柿心經格一具犀裝書刀一口白團扇一柄師嚴教尊右四字爪喜捨供養右四字龍習惱餘氣右四字懸針緣覺侵斷右四字垂露咸登常樂右四字飛白豈如菩薩右四字倒薤能施所受右四字魚聲聞是證右四字科斗戒定慧滿右四字篆苦集滅道右四字大篆穀皮屏風一具爪篆龍魚科斗飛白垂露倒薤等書淨人善心年十一右牒開皇十一年十一月二十三日治禪衆寺答智顗書顗授戒既畢出居城外禪衆寺開皇十二年復還廬山深具謙挹之旨但高人遊處觸地是安然法宇僧坊須盡嚴正經云四事供養一不可虧已敕有司修葺願忘懷受施也弟子楊廣和南法諱奉智者書此下並與智者書弟子總持和南柳顧言還奉旨垂示六種捨施及留受用弟子一日恭嚫猶以陋薄不稱宿心來旨既以轉施功德彌為增上悲敬福田深是平等固非蔽識所能周見事事仰依其所留者既以不多願恆留受用故遣報咨謹和南參智者書弟子總持和南履長戒辰在俗咸慶伏惟吐納禪慧與時休和弟子稟受以來粗堪靜攝謹遣參承謹和南請留智者書開皇十一年十一月授晉王戒畢出居禪衆寺即欲西上王遣柳顧言致書請留待來年二月約至棲霞送別十二年三月顗將啓行王復致書請就攝山安居度夏顗不許遂止廬山弟子總持和南爰逮來誨須往荊楚辭致首尾仰具高懷但祗稟淨戒事成甫爾宿昔凝滯匪遑咨決闍黎和尚經稱勝田種子雖投嘉苗未植方用心形永伸供養庶憑善誘日灑塵勞凡厥共緣依止有地斯亦舟航兼運利益弘多如來化導何必止還天竺菩薩應變本無定方深願坦然以虛受物遲延展禮面當咨遜謹和南重留智者書弟子總持和南逮旨須取明二日垂別修復未周便深傾欷弟子前昨晝夜熟更惟忖智者至止以來未經一夏兼荊潭路遠安居將促江波浩蕩行程難期既去此處又不至前所半途結夏投止亦難又按經律一夏供養安居僧福田無量况乎師道及大衆力凡夫淺薄本資勝緣菩薩大慈須受應供暮春行謝首夏向臻九旬忽違四事虛棄修心與理於情匪安今欲仰留度夏發遣兾不半途飄露脫疑邑下喧湫須依林壑安居攝山亦當為便若法歲將滿預勒蔣州裝船南出石頭西浮彌易既乘爽節因得順風去留之宜事理咸會此間彼處仰聽擇一意不可盡辭豈多宣謹和南三月一日許智者行書弟子總持和南復逮今旨欲遂前心功德因緣豈敢違忤謹遵宿願即命所司發遣發日離晨仰聽詳擇庶解夏非遠秋水乘流賜答來期必當無爽用茲歡喜以蠲悲欷謹和南尺牘節取首夏非遠五句作陳宣帝書象教皮編取六句作秦孝王書並誤謝法門書弟子總持和南奉旨今日齊竟即事登舟暌阻方遙彌以傾欷垂示法相雖文旨淵源本難尋而教門方便開悟易益恭承善誘永以受持庶藉津梁得無退轉自服膺至道每沾弘護將事遵途復降良藥沐浴慈被伏用悽荷謹和南遣使往匡山參書開皇十二年七月王遣書廬山參省八月顗往衡山營建功德十一月王遣書潭州奉迎十二月至荊州創建玉泉寺弟子總持和南親信傅仲詵還逮去月朔告用慰延結熱猶熾願道體休和仰承經過攝山鍾岫寺塔安善徒衆和肅仍留二十僧權停開善進至匡嶽結夏安居東林禪閣還為一寺峯頂精舍復皆隨喜敬緣勸發獲此熏修用耨身田方流法雨金光明福喜荷彌深弟子去月十四日始度朱方風土異宜流金在節攝衛多不調適每有劣然二十九日來石頭稍已平復自江浦違心馳情彭蠡以日為歲無時暫忘願未解夏前預整裝束法歲若滿即事西浮彼間酬願務令在促非但弟子蔽識希護周爰深恐禪慧學徒咸思鑽仰宣尼在陳致歎自衛便歸屈道紆情事非為己今遣主簿王灌指往祗承并貢別牒用忘存省敢略繁辭謹和南七月一日法衣六件鹽一百斛米一百斛右件其鹽米悉出江州正倉王灌賫合魚開送重遣匡山參書弟子總持和南東林山寺使至逮八月八日誨用慰馳結仰承已往衡山至當稍久法緣若竟願即沿流冀在歲陰必期展覲弟子渡江還去月初移新住多有造次未善安立來旨勗以法事實用慙悚始於所居外援建立慧日道場安置照禪師以下江陵論法師亦已遠至於內援建立法雲道場安置潭州覺禪師已下即建深善輒以咨知仰承相次為營功德深荷扶助難用遠陳而發此至江州遂下請僧料云何能得相資前施鹽米其米回入東林鹽以上路盈長之外乃可別營功德今山僧返路行用仰酬尋別遣使迎延願預整歸計江山遼敻豈盡誠曲謹和南十月十日象教皮編載秦孝王俊與顗書云暌阻方遙彌以傾欷朱方風土異宜流金在即攝衛多不調適每有劣然冀在歲陰必期展覲按此乃晉王參匡山二書中語尺牘又作朱方帖並誤遣使潭州迎書弟子總持和南歲聿云暮寒氣殊重禪悅經行願常安樂弟子頃來每多勞疾但暌覲稍久惟用傾結仰度所營功德已當究竟今遣左親信伏達奉迎願便事沿流延遲咨具謹和南十一月十五日遣使荊州迎書開皇十三年王入朝行次陝州遣書荊州迎顗弟子總持和南暄和道體勝悆仰揆衡嶽法事久當圓滿江陵功德復應成就隨喜之至難用勝言弟子今入朝覲行次陝州馳仰之誠與時而積故遣使人迎候希便進道來月下旬惟遲祗接路首匆促豈復委宣謹和南二月二十二日入朝遣使參書弟子總持和南仰違移歲馳誠載勞兼事入朝彌增延屬武關雖阻荊近於吳是以暫停陝州遣使承接行人返命具奉覼縷非惟年尊疾動又以結夏安居理事相推固須停止弟子還鎮非久便願沿流仰會江都庶應旦夕將聖德果亦復差機因緣多端請不勞慮謹和南九月十日又弟子總持和南僧使智邃來奉五月一日誨用慰馳結仰承衡嶽功德圓滿便致荊巫履涉虧和深以傾悚弟子於江都入朝至陜關眩瞀停岐陽腹內又不調適去月末還京輦如欲相承猶自羸薾未即祗覲望雲延願珍納行人今返辭豈宣具謹和南尺牘刪取猶自羸薾以下五語作柳顧言與顗書誤又顗遣智邃奉書上玉泉伽藍圖并求南衡禪師碑因獻萬春樹皮袈裟王答書弟子總持和南奉旨於荊州當陽縣境玉泉山陲為建造伽藍招提行道圖寫地形具以賜示伏以布金遍地買園建立奉置三尊永流萬代唱誦所不能讚算數所不能量孰意輕微頓蒙創造循復來旨爽然失厝既事出神心理生望表無容違拒苟作形迹即具聞奏嘉號乃覃名符天冠道場聲滿恆沙世界福報仰歸遜辭難涉謹和南又弟子總持和南垂旨令撰衡嶽禪師碑文郭有道之無愧辭高德逾此陸士衡之披文相質弟子多慙既蒙獎成不無剋勵邯鄲絶妙深恐難工還鎮病瘳庶或勉強循覽行狀用難思議佛澄道安寧復過是和南又弟子總持和南垂賜萬春樹皮袈裟一緣述是梁武帝時外國惟獻四領今餘其一乃建初烏瓊法師所披謹尋菩薩戒稱所著袈裟皆染使壞色况復自然嘉樹妙彩天成相應之言無勞外假萬春表長生之稱二翼合善譬之辭永服周旋恆充布薩常事半月豈惟元日著如來衣深荷慈獎謹和南又弟子總持和南率施別牒五彩幡錦香爐袒等十種示表微誠薄申法貺鮮陋追悚謹和南五色四十九尺幡二張五色斑羅經巾二枚絹五十匹錦香罏袒十張熏陸香二斤剃刀十口鵄納袈裟一領油鐵鉢十口雄黃七斤青須彌氊五領右牒在京遣書弟子總持和南仰違已久馳係實深獻歲非遙傾遲虔禮暮春届節當遣奉侯謹和南九月二十四日在京重遣書弟子總持和南適逮近旨用慰馳情春暄願道體康勝玉泉創立道場嚴整禪衆歸集靜慧日新隨喜之深難以辭諭弟子始服三石散竟調息勞心秋仲歸蕃請夏訖沿下在于拜覲差當匪奢其間珍德今遣統軍魯子譽往祗承謹和南從駕東岱於路遣書岱一作嶽弟子總持和南仲秋轉冷仰惟道體康悆弟子即日粗可行末由虔禮但增延結願珍德謹遣修承謹和南於路次書弟子總持和南寒氣漸嚴仰惟康豫動寂怡神興居安悅弟子陪奉鑾駕旅次長奉遠憑勝力行往安穩瞻言祗覲庶或匪遙願珍重此不宣具謹和南十月十九日還蕃遣迎書開皇十五年春晉王自京師還鎮遣使迎顗止揚州禪衆寺奉書求學禪慧顗書答王復重請乃以所著淨名義疏初卷奉王弟子總持和南獻歲春明仰惟道體勝豫禪悅法喜衆咸集業功歸有在悉由明導敬憶江都暫欲西上先到衡嶽用賽師恩次往渚宮以報生處虔承此旨衛送大江陽子臨流具申來請即蒙開許還至觀濤年來歲往寒暑屢變恭聞功德圓滿遠難讚述弟子多幸生在佛家過庭所聞匪直詩禮轉輪斯奉實惟旦暮今者陪扈鑾發自京師言停洛陽又止歷下柴望之禮本自虞書巡會之聲盛於姬典至尊憲章先古允叶人神相風指南奉朝東岱以今月十一日吉辰宗事云畢於時天地載廓日月增華休氣神光燭近被遠靈芝競吐山谷連木並秀宮壇瘖聾矇躄之徒無醫而自愈扶老攜幼之侶不謀而同到臣子殫見事非虛飾一物得所萬里斯應師資至重敢不稍聞苐率從便蕃即辭行所夾鍾將末必届揚州今遣奉迎便願沿下餘春未盡必希拜覲其間珍德續復祗承謹和南正月二十日謝天冠仍請淨名義疏疏一作書總持和南前揆菩薩天冠率爾式之樣深嫌不工即用呈簡爰逮今製思出神襟圖比目連妙逾郢匠開士五明此居其一金剛種智茲焉標萬是智因地化物不可思議接引隨方奚能盡達冠尊于身端嚴稱首跪承頂戴覽鏡裴徊有飾陋容增華改觀弟子多幸謬稟師資無量劫來悉憑開悟色心無作觸仰勝緣度脫舟航何慮不果但戒為基趾信實行先保解毗尼昔年虔受身雖疏漏心護明珠而定品禪枝屏散歸靜猥以凡薄荷國鎮蕃為子為臣難虧難怠豈藉四緣能入三昧此非臆斷實荷誠說經稱非禪不智非智不禪定解相資能證無漏又電光斷結其例甚多慧解脫人厥明不少即日欲服膺智斷率先名教永泛法流兼同治國未知底滯可開化不師嚴道尊可降意不宿世根淺可發萌不菩薩應機可逗時不若未堪敷化且暫息緣如可津梁便開祕藏書云民生在三事之如一况覃釋典而不從師今之慊言備瀝素欵成就事重請棄飾辭謹和南六月二十一日受續高僧傳作奉品作水例作類同作用智顗答讓請義書爰逮纍翰殷勤至法匹夫行善止度一身仁王弘道含生荷賴蓋登地菩薩應生大家所以發心興隆大道曷可量也孰可比哉貧道山僧本懷夙志於天台舊居言念無捨庶因世境安樂更得寄趾幽林仰惟行道非惟城邑近歲謬承人乏擬迹師資顧此疏蔽似非時許况聖澤日隆復垂今命省諸庸鄙彌匪克堪貧道稟承師教禪慧頗持耳去眼流如華上水採聽經論其功既淺賴荷禪門憑定修習比于專學數論區分理乃弗違業乖至熟自非如來明達種智高圓擅材殊能誰肯雙揖况乎去聖滋遠曉悟甚微徒欲承恩懼乖深寄有招幽譴兼虧聖德特願更回神慮別俟聖賢妙果芳因使無斷絶經稱一句染神歷劫不朽大智慧海信為能入固知深解大乘佛法久墜功德易滿智慧最高守質抱愚仰希聽覽徒申庸俚終不自宣沙門某白聖賢佛祖統紀作勝賢續高僧承恩作沈吟重與智者請義書弟子總持和南仰逮還旨猶秉謙尊循復久之恍如自失切以學貴承師事推物論歷求法緣厝心有在若習毗曇則滯有情著若修三論又入空過甚成實雖復兼舉猶帶小乘釋論地持但通一經之旨如使次第遍修僧家尚難盡備况居俗而欲兼善當今數論法師無過此地但恨不因禪發多起諍心達者無違求那明偈仰惟厚習善根非一生得初乃由學俄逢聖境南嶽禪師親所記莂說法第一無以仰過照禪師來具述此事于時心喜已域寸誠智者昔入陳朝彼國明式瓦官大集衆論鋒起榮公強口先被折角兩瓊繼軌才獲交綏忍師讚歎惟唱希有弟子仰延之始便事勝集屈登無畏釋難如流親所聽聞衆咸瞻仰適承前往荊楚講法華經舊學名僧莫不歸服故知非禪不智驗乎金口比聞名僧所說智者融會盡有階差譬若羣流歸乎大海此之包舉始得佛意弟子即日而不依請譬彼彌勒今當問誰惟願未得令得未度令度樂說無窮法施無盡復使顧言稽首虔拜謹和南六月二十五日緣續高僧傳作界厚習作久植惟作嗟聽聞作聞見名僧所說作釋侶所談階差作階位按智者大師別傳云師為沈君理於瓦官開講法華小莊嚴寺慧榮負才輕誕其日揚眉舞扇扇便墮地雙構巨難難不稱捷建初寶瓊相逢讓路曰方秋遇賢年又老矣庶因渴仰纍世提攜佛祖統紀注云兩瓊者彭城寶瓊建初寶瓊也並梁朝人謝義疏書弟子總持和南逮旨送初卷義疏跪承法寶粗覽綱宗悉檀內外耳未曾聞故知龍樹代佛不可思議今所著述肉眼未覩明暗謹復研尋遲此覲接謹和南論荊州諸寺書顗以荊州立玉泉及所修十住寺請王為檀越王即移書達荊州總管復致書勸留顗復答書弟子總持和南荊州玉泉十住兩寺近既賜令檢校今須書及江陵總管當勒所由終聽僧使奢促弟子仰蒙淨戒宿世因緣稍希義理智波羅密爰降開許始制義疏方憑啓沃向入慧門昔年仰請棲霞時往觀行政為密邇朝發暮到應可咨决不異邑居行道本貴安心寧勞過遠天台之路幸願輟情屈己為人菩薩有賜于專契弗敢違前都不知淨人善心已墮僧數濟度無隔惟用隨喜謹和南七月二十七日智顗重述天台復晉王書前所咨天台山事本聽後期爰逮報示不然夙志棲霞乃言咫尺非關本誓之心天台既是寄終之地所以恆思果遂每囑弟子恐命不待期一旦無常身充禽鳥焚燒餘骨送往天台願得次生還棲山谷修業成辦乃可利人但仰赴義門多慙芻淺發心既重輒課庸微去聽慈恩庶無匆促政言天台營理本擬十方安立僧徒非專為己昔年修葺願創伽藍形可隨緣香燈難絶故欲遣修葺冀憑方便同途校具淨人得蒙勝舉并祈一旨事並前咨方乞寺名屈作檀越懼多煩沓未敢同時處處結緣功德彌大玉泉十住許垂恩為唯待教旨即遣僧使冀藉光威三寺遙荷伽藍未整功德已圓仰鬧頻煩言何能謝沙門某白三月二十日復答智者書總持和南復垂誨旨益具仁慈開士虛懷隨感必應本誓願力何患不果政言服道日淺未堪違遠深憑護念開示悟入玉泉十住天台本居仰由勝功能得建立方須影響永至金剛江陵書及會稽教下並勒所司以時發遣謹和南七月二十九日與上柱國蘄郡公荊州總管達奚儒書智者禪師德尊望重近年紆道爰授淨戒今修治彼州十住寺造力西徂玉泉寺並見請為檀越復聞公等多結勝緣大乘運通良深隨喜師今遣僧使志果法才二人還就玉泉寺法燦道慧法師十住寺道臻法師經理想加心影響獎成妙業公私覃福幽顯同賴法事遠白不復暄涼也楊廣呈八月二日迎智者入城礙雨移日書王迎顗入城懇辭東歸此下並與顗總持和南方要仰延雨乃暫阻明間若晴別當遣信謹和南七月二十六日次迎入城書總持和南霜寒道體康勝弟子還來甫爾未暇迎延馳誠已深今遣候接冀近祗覲謹和南九月十六日遣使入天台參書總持和南麥序氣清道體和適福慧莊嚴與時高勝弟子至來未久粗復可行近頻降兩書爰垂示功德玄義刪削文句入初其舊維新從粗至妙會須披接方豁煙雲春律已謝夏坐方結敢違經教涉暑出迎白露宵團秋風葉下必預舟楫迎覲江陽然仰勞著述已涉數載般若多障近願成功日就月將庶方啓沃率貢別牒示表虔誠在敬無文仰揆弘亮其間珍德續事音語謹和南納袈裟十領龍鬚席二領須彌氊二領猫牛酥三瓶熏陸香一合遣使入天台迎書總持和南霜氣已緊蚊熱久祛方恐洞𣲐預取調適今遣奉迎祗禮非奢謹和南九月二十二日𣲐徑山刻作沍𣲐即沍遣使參病書開皇十七年王使迎顗行次石城乃稱疾遣醫進藥及齊並不聽總持和南仰承出天台已次到剡石城寺感患未歇菩薩示疾在疾亦愈但於翹誠交用悚灼今遣醫李膺往處治少得康損願徐進路遲禮覲無遠謹和南智顗終後弔山衆書書一作文正月二十九日總持和南白諸行無常是生滅法諸佛及緣覺尚捨無常身大師智者移應遷神哀摧抽惱不能自勝念當戀慕追慟難忍永矣奈何當復奈何侍者灌頂普明二人賫送別書觀心論淨名疏犀角如意蓮華香并智越法師一衆啓見對增哽德音若存即遣條流移神靈迹祥瑞炳著自述分明舍利全身于今安坐非證聲聞小果定入菩薩大位素聞得法華三昧方驗不退法輪面覩彌陀觀音大勢至以宿命智反照斯土四部弟子豈不努力自揆寡薄無以申報惟當敬依付囑不敢弭忘應建伽藍指畫區域須達引繩天宮即應至金剛際既有要道當建繕造一遵本意昔宣尼亡沒弟子守墓三年子貢之徒乃至六載况乎方置精舍永樹福基彼現前僧慎勿張散但使謀道何患無食期取來生西方非遠必若懈退寶池極遙今遣使人于佛隴峯頂虔誠懺禮修福建齊具如願文略伸鄙意二僧今返持此慰書楊廣白十一月五日普明本名法京姓朱會稽人出家天台智者弟子灌頂智越見後天台山衆謝啓天台沙門智越一衆啓司馬王弘至僧使灌頂普明遠奉正月二十九日教賜垂慰問并宣口教優訪殷勤謹對龕門焚香跪讀言理哀切痛絶魂心遺囑纍從亡存戴荷師在之日常有誨云今得寺基為王創造非爾小僧所辦別有大力勢人後當成就恨吾不見寺成爾時莫測所由今蒙繕造方醒前記冥相符合不可思議經藏法寶出世舟航諸佛所師衆生津導永鎮佛隴依止受持鐘幡香等施安供養法鼓警悟利益人祗千僧法會功德圓滿伏想幽靈慈悲遠鑑謹于齊日披讀願文法席悚心求入願海蒙賚齊糧恩給田地基業無盡施命無窮有待多煩隆恩難答教旨維是現前僧不令張散伏惟弘護事重精舍將圓同學門人方憑依止龕室儼然何心違離况垂嚴教益懼丹誠謹當克厲倍加心力但一衆失廕永遠慈願追慶夙緣還蒙覆護欣悲交至臨啓涕零謹啓開皇十八年二月十五日遣使入天台設周忌書王遣典籤吳景賢入山以諱日設五百衆齊歲序推移日月如逝智者遷化已將一周追深悲痛情不能已念慕感慟何堪自居今遣典籤吳景賢往彼設齊奉為亡日追福遲知一二楊廣和南開皇十八年天台山衆謝功德啓天台沙門智越一衆啓典籤吳景賢至奉教為先師亡日設齊僧衆五百一時雲集冥途雖隔感應道通越等不能灰滅奄及諱晨追慕慈顏悲哽稽首𢪛淚銜餐不勝荷戴謹啓謝聞謹啓與天台山衆令書仁壽元年正月永嘉僧法曉生聞智者勝德特至龕所旋繞千拜一夕龕戶自開光照林木衆共瞻禮又張造者年邁足登龕拜祝願得度脫忽聞龕中應聲及以彈指灌頂等啓聞皇太子與書僧使灌頂智璪至覽十一月三日書并陳靈龕應迹現形放光彈指流音應念傳響斯實不思議力變化多方感悟有緣示希有事慎終追遠感歎相深在昔雙林示滅非滅多寶獨塔俟時涌現爰在狼跡迦葉分身乃至鷲山迦文留影眉毫散彩指端震室豈非像教能度無邊是大因緣聞善知識永惟宿昔獲承師範德音盈耳神光在目方憑靈瑞係踵菩提肅承靈誥宣慰南服山衆法徒同志為友會成等侶方共舟航歲暮凝寒念皆道勝天台名嶽海岸所推修建大林多慙重閣三時失供四事不周想甘禪悅以同法喜其間敬德信次相聞今遣員外散騎侍郎張乾威送僧使還山于舊所設供庶同甘露能變粗澀亦憑香積證道融銷書不盡言反此無悉楊廣和南僧使灌頂等所領今施物目仁壽元年十二月十七日白石香罏一具并香合三枚大銅鐘一口鵄納袈裟一領鵄納褊袒二領四十九尺幡七口黃綾裙一腰氊二百領絲布祗支二領小幡一百口和香二合胡桃一籠衣物三百段麥一合石鹽一合酥六瓶天台山衆謝啓天台寺故智者弟子沙門智越一衆啓使者兼通事舍人張乾威至謹領前件物等並皆完淨仍即陳羅先師舍利龕前具宣來令并唱施物又千僧法齊伏惟弘護殷勤慈澤周至香罏微妙天匠莊嚴洪鐘和雅震集凡聖勝幡舒斾疑懸梵宮酥鹽桃請同香積法衣淨飾無著離塵氊物豐多驚眩視聽千僧雲集布滿山庭爰降王人光顯林谷奉對靈龕必神通攝受標擬衆聖冀願海莊嚴越等凡微謬當恩沐慈潤重沓難可克勝合衆虔虔如履冰刃不任戴荷之至謹啓謝聞謹啓仁壽二年正月六日重令書灌頂智璪等至枉寺衆來書財施為輕法門標重檀波羅蜜般若尊成不具兩緣寧俱解脫施受咸共忘言理至迹指寧復辭弗楊廣和南右庶子王弘宣令施天台物目飛龍綾法衣一百六十領幡一百五十張光明鹽一石酥五瓶天台山衆謝啓天台寺故智者弟子沙門智越一衆啓慈澤隆重喜捨頻煩僧使後還復垂恩賚雜彩勝幡莊嚴殿宇綾羅法服光洽衆僧貓酥五瓶充身去患光明一斛藥食兼濃越等山野糞掃分衛今則被服溫華食味珍甘不自度量彌增戰懼不任敬悚謹啓謝聞謹啓仁壽二年四月十五日天台建功德願文菩薩戒弟子總持和南十方三世諸佛一切尊法三乘聖衆上界天仙龍神他心道眼護持應現畟塞虛空無量幽顯切聞諸佛菩薩不捨本誓為天人師拔濟含識次令和尚闍黎代作宗範引接後來與佛無異資敬之重具在經律不有明導豈濟苦海匪報厚德豈𭣣福田遺行可追謹依佛語菩薩戒先師天台智者來踰剡嶺遷化石城初聞訊至哀情摧勔敬惟勝行逾滿熙連佛許臨終自說所得今開侍者所書巨有異相稱我位居五品弟子事在法華十住信心文具瓔珞於是空聲異響遍滿山房索披大衣云觀音來至驗知入決定聚面覩彌陀靜攝遷神安坐身證及移晦朔容相儼然斯蓋無量劫來檀慧具足深護佛法發起羣生非夫顯晦出沒其孰能於此歟有始有終者其唯聖人乎設以辨才千萬億偈讚師福慧終不能盡夏初遣信到山期法歲竟迎接僧臘既滿尚疑溪谷毒厲意取氣交霜雪杯渡鏡水及届剡下便承臥痾豈言信次騰神淨域遂不獲重覩音容再咨法味維摩義疏蘊而莫宣良由宿障根深致違心契已悔於前須補于後近於此州禪衆舊居仰為設會并就天台指畫之地創造寺塔而於彼山頭陀之處未獲熏修今夤覽別書囑寄佛法不思議事感歎銘襟無已之誠今遣往於佛隴峯頂集衆結齊願承三寶之力速達西方智者證知淨土記莂生生世世長為大師弟子未得佛前早相度脫不棄緣感弘到菩提并乞衆力為弟子懺悔自從無明住地以來至于今日恆沙惑障煩惱迷昏五蓋十纏輪回界內八萬四千塵勞增長願憑積慶及茲功德衆罪霜露慧日消除衆善普會法雨洋溢神通道力照藹皇家寶祚靈長覃被億兆開皇十八年正月二十九日天台設齊願文菩薩戒弟子皇太子總持稽首和南十方三世法佛報佛應佛法身應身化身諸佛所師所謂法也以法常故諸佛亦常佛常法常比丘僧常世間皆空而實不空諸佛妙有而實不有不有而有不空而空至寂恬然始名至樂凡情弊報皆生極苦迷之者則生盲皓首得之者則罔像玄珠弟子幸憑勝緣微因宿種方便智度生在佛家至尊皇后慈仁胎教有八王子日月燈明之恩十六沙彌大通智勝之勗加以昔蒞淮海欽尚釋門先師天台智者顗禪師膺請江都授菩薩戒由是開悟歸憑有在而夢楹託諷梁木先頽合掌安禪端坐示滅于今數載儼然若思適現儀形續於光焰彈指之聲震于龕室僧使報述遐邇聳踊皆由佛法僧力感應相關汲引含靈故現斯瑞肅奉明詔暫輟監國巡慰淮海銜籲毗黎思報佛恩少酬師道以今大隋仁壽元年歲次辛酉十二月十七日謹遣員外散騎侍郎通事舍人張乾威到天台山寺敬設蔬飯雖調八水多慚百味庶同純陀之末供有如淨名之遙請色香細軟遍滿十方歡喜甘餐寧唯百億天仙龍神並希雲布任持世界盡望星羅以智者之分身納師資之攝受經稱信為能入智為能度願銷甘露咸濟苦海應變穢土通同淨國天覆地載長轉金輪七廟六宗永安玉座本支百世紹隆萬紀男女緇素皆染大乘水陸空行咸知佛性須彌入於芥子未足成難食頃猶如巨劫曷以為怪井蛙不識江海蚊睫安知鵬翼以我今懺並乞冰銷以我今誠皆入願海發菩提心遍在諸物菩提心者即是佛心下度衆生上求佛果不可以身得不可以心得以無所得即菩提心無所得即是得無所得稽首歸命十方三寶敬靈龕文維隋仁壽元年歲次辛酉十二月十七日丙寅菩薩戒弟子皇太子總持和南敬告天台山寺先師智者全身舍利靈龕之座曰竊聞民生在三事之如一皆資聖範能遂賢功顏回不值宣尼豈鄰殆庶尹喜不逢老氏安致長齡况乎乘般若之舟望菩提之岸弗有明導豈至寶所復因信使俱次法城所謂自利利他人我兼利師及弟子智斷具足抑又聞曰疏傅告老太子贈以黃金桓師退辭家庭陳於喪服斯並有為方內少用報恩豈臻無際空表盡酬師力弟子宿植德本早承道教身戒心慧蒙瑩明珠旱穗寒菱盡沾甘露雖復時流歲永生滅不追行住坐臥伏膺如在爰以景昧謬齒元良守器非才升離多懼復奉明詔囊經作伯暫輟監撫還省宸方瞻望天台有如地踊僧使續來龕瑞重疊多寶妙塔如意分身玉毫金光分宵破暗應念彈指自室空聲有一於此已稱顯應四者難并豈非希有自曇光坐滅之後道猷身證已來興公飛錫所不能稱靈運山居未有斯事盛矣哉是我大師證道之基趾也至矣哉是我良田之報歲也詩云無言不酬無德不報經稱知恩報恩諸佛皆爾近年雖遵誡約修搆祗洹多慚布金止因山宇庶同心淨域勝土莊嚴幸僧衆無虧熏練不輟冥力深扶人功多愧今遣員外散騎侍郎兼通事舍人張乾威送僧使灌頂等還山於寺設會稽首接足十方三世一切三寶無量幽顯現前大衆以此功德仰資先師智者早證正覺具如臨終證現已生安養頃來留瑞久現彌陀踵武觀音連衡大勢回眸東視不捨娑婆轉睇南閻彌憐震旦滄溟巨海尚不讓於涓流嵩華峻極安苟排於微𡏖敢陳薄供願垂攝受當使無邊法身盡承甘露無量化影咸進醍醐涅槃餐之不可窮般若味之而不竭盡我念力遵我師道銷我煩惱滿我誓願現在未來長惠提拔家國眷屬俱入大乘密往潛來恆垂影響塵勞障纍銷除隱塞究竟等虛空圓滿如法界斯則大師勝力諸佛荷擔弟子銜慈出如來藏無離文字以求解脫文字之性即解脫也不著世間如蓮華常善入於空寂行達諸法相無罣礙稽首如空無所依菱南藏作茭議天台寺名敕大業元年敕江陽名僧僧使智璪啓聞又敕昔為智者創寺因山為稱號曰天台今須立名經論之內有何勝目可各述所懷朕自詳擇續高僧傳注比百録稍詳智璪請寺名啓璪姓張清和人受道智者昔陳世有定光禪師德行難測遷神已後智者夢見其靈云今欲造寺未是其時若三國為一家有大力勢人當為禪師起寺寺若成國即清必呼為國清寺伏聞敕旨欲立寺名不敢默然謹以啓聞謹啓又敕此是我先師之靈瑞即用即用可取大牙殿榜填以雌黃書以大篆付使人安寺門敕度四十九人法名皇帝敕皇帝敬問括州國清寺沙門智越法師等僧使智璪至得書具至懷天台福地實為勝境所以敬為智者建立伽藍法緣既深尊師義重欲使宗匠遺範奉而弗墜菩薩淨業久而彌新然則去聖久遠學徒陵替規求利養不斷俗緣滋味甘腴違犯戒律此乃增長罪垢豈謂福田師等離有為法求無上道棄俗諸漏鑑在雅懷尤須獎訓末學虔修淨行俾夫法門等侶咸歸和合諸佛禁戒畢竟遵行又此寺嘉應事表先覺既理由冥感即號國清寺并有施物用申隨喜冬序甚寒道體清豫朕巡省風俗爰届江都瞻望山川載深勞想故遣兼通事舍人盧政力往指此不多衆謝啓天台山國清寺沙門智越一衆啓兼通事舍人盧政力至奉宣十月二十九日敕云天慈訓誨賚寺瑞名施物二千段米一千斛熏陸香二斛千僧法齊度四十九人出家修治寺宇即集衆燒香宣唱仰惟聖治德合乾坤子養萬邦安撫四海助佛教化度脫衆生光大之恩誠無等等越等雖披法衣行不稱照乃侍先師每乖宗範日夜克責無地啓處伏奉敕旨頂戴受持但凡庸小劣不識菩薩大智昔陳世之時親聞師說三國為一有大力勢人當為造寺寺若立國土即清必為國清寺於時車書未一不識何言自爾以來抱疑弗曉奉敕賚寺國清之名還符本瑞山僧山民載欣載喜始知諸願菩薩更相啓發或作五品或統萬機光顯三尊利益國土慶此含情幸聞休瑞仰瞻寺額即如悟道但慈恩普被日下同霑而天台一方偏感弘澤名衣上服相次光臨妙物粳糧前後降集越等三學無功一餐難受况米物盈積豈可恭弘深懼不堪慮延罪過庶藉慈宥展竭愚誠奉酬宸極但天台幽遠自昔以來單權獨行今太平在運國清寺立四十九人一日出家髮落障消實為希有冀其心力增進學行日新念念功熏奉資皇國又千僧結齊凡聖雲集日色華朗僧徒欣戴仰惟先師妙德不可思議感應神通必當鑑降午後對使人開發靈龕希有聖瑞備是使人等公私道俗共見越等悲喜交至謹以啓知謹啓大業元年十一月二十四日括州國清寺沙門智越等啓並國清百録賜釋慧覺書慧覺姓孫秣陵人止攝山栖霞寺煬帝作牧淮甸乃賜覺書法師安善涼暑惟宜承栖遲龜山之域闡揚龍樹之旨其義端雄辨獨演暢於稽陰談柄微言偏引汲於鏡水弟子欽風籍甚味道尤深今於城內建慧日道場延屈龍象大弘佛事盛轉法輪上人名稱普聞衆所知識今遣迎候遲能光拂也請釋灌頂書灌頂從智者止天台寺晚出稱心精舍開講法華仁壽二年王為皇太子下令延請灌頂見後夏序炎赫道體休宜禪悅資神故多佳致近令慧日道場莊論二師講淨名經全用智者義疏判釋經文禪師既是大師高足法門委寄今遣延屈必希霈然并法華經疏隨使入京也佇遲來儀書不盡意禁僧抗禮敕大業中駐蹕南郊下敕僧鳳引經抗論理僉詳贍軍國有容中外不革尊主崇上遠存名體資生運通理數有儀三大懸於老宗兩敬立於釋府條格久頒如何抗禮並續高僧傳行道度人天下敕大業三年正月二十八日菩薩戒弟子皇帝總持稽首和南十方一切諸佛十方一切尊法十方一切賢聖僧竊以妙靈不測感報之理遂通因果相資機應之途無爽是以初心爰發震動波旬之宮一念所臻咫尺道場之地雖則聚沙蓋鮮實覆簣於耆山水滴已微乃濫觴於法海弟子階緣宿殖嗣膺寶命臨御區宇寧濟蒼生而德化弗弘刑罰未止萬方有罪實當憂責百姓不足用增塵纍夙夜戰兢如臨淵谷是以歸心種覺必冀慈愍謹於率土之內建立勝緣州別請僧七日行道仍總度一千人出家以此功德並為一切上及有頂下至無間蜎飛蠕動預稟識性無始惡業今生罪垢藉此善緣皆得清淨三塗地獄六趣怨親同至菩提一時作佛廣弘明集寶臺經藏願文菩薩戒弟子楊廣和南仰惟如來應世聲教被物殷勤微密結集法藏帝釋輪王既被付囑菩薩聲聞得揚大化度脫無量以迄于今至尊拯溺百王混一四海平陳之日道俗無虧而東南愚民餘熸相煽爰受廟略重清海濱役不勞師以時寧復深慮靈像尊經多同煨燼結鬘繩墨湮滅溝渠是以遠命衆軍隨方收聚未及朞月輕舟總至乃命學司依名次録并延道場義府覃思澄明所由用意推比多得本類莊嚴修葺其舊惟新寶臺四藏將十萬軸因發弘誓永事流通仍書願文悉連卷後頻屬朝覲著功始畢今止寶臺正藏親躬受持其次藏已下則慧日法靈道場日嚴弘善靈剎此外京都寺塔諸方精舍而梵宮互有小大僧徒亦各衆寡並隨經部多少斟酌分付授者既其懇至受者亦宜殷重長存法本遠布達摩必欲傳文來入寺寫勿使零落兩失無作前佛後佛諒同金口即教當教寧殊玉牒須彌山上衆聖共持金剛海底天龍盡護散在閻浮亦復如是追念繕寫之者厥誠至隆心手勤到何量功德捨撤淨財豈可稱計所資甘雨用沃焦芽能生諸佛本是般若人能弘法非道弘人恕己深恩即是自為今陳此意乃似執著若不開警則不深固自行化他備在經律顧循菲識誠愧通方因果相推何殊眼見豈不知獨善且最勝無為第一樂內典法奧自關衆僧何事區區橫相負荷但慶憑宿植生長王宮謁陛趨庭勗存遠大出受藩寄每用祗兢非唯禮樂政刑一遵成旨而舟航運出彌奉弗墜無容棄稷離而同園綺變菩薩而作聲聞越用乖方既其不可篤信受付竊敢當仁然五種法師俱得六根清淨而如說修行涅槃最近徒守經律不依佛戒口便說空心滯於有無上醫王隨病逗藥開乳含酥為方既異甜冷苦熱取療亦殊譬前後教門別赴機性根莖枝葉受潤終齊總會津梁無不入道猶如問孝問仁孔酬雖別治身治國老意無乖殊途同歸一致百慮內外相融義同泯合何處有學毗曇而不成聖執黎耶即能悟真師子嚴鎧反貽毀於螺目象足至底翻取誚於蜂房心同劒㦸諍踰水火經意論意都不如斯通經通論何因若此恐施甘露更成毒藥儻均味海則致醍醐聖御紺寶天飛金輪雲動納萬善於仁壽總一乘於普會開發含識濟度羣生今所傳經遍于宇內衆聖潛力必運他方共登菩提早證常樂則是弟子之伸順弘誓於無窮平等坦然通遣唱白達識體之念隨喜也廣弘明集殤子銘煬帝晉蕃時臨太尉第三子夭殂瘞于濟法寺乃勒銘因施寺僧法藏靈壽杖世途若幻生死如浮殤子何短彭祖何修嗚呼余子有逝無留永為法種長依法儔施杖教每策此杖時賜相憶法藏答王殤幼子長就法門藏策靈壽何敢輒忘續高僧傳秦孝王楊俊字阿祗文帝第三子厯并州總管致智顗書秦王出鎮揚州致書延顗顗謂使者曰雖欲相見終恐緣差竟不成行冬暮寒切道體何如法務勤辛有以勞悆安州方等寺奉為皇帝修立屈法師向彼行道甚不可言已令所司發遣供給願以熏修為懷不憚利涉也道深敬德遣白不具弟子楊俊和南十二月十七日又傾仰每深甚熱禪師道體何如修習不乃勞心也未由有展企結良深願珍德遣白不具弟子楊俊和南五月十九日奉施沈香等如別至願撿領沉香十斤棧香十斤熏陸少許右牒薄申供養國清百録漢王楊諒文帝第五子任并州總管宣揚正法教諒鎮晉陽造內城寺引釋志念等居之又令咨議參軍王頍宣教大衆即推念焉寡人備是帝子民父蒞政此蕃召請法師等遠來降趾道不虛運必藉人弘正欲闡揚佛教使慧日清朗兆庶蒙賴法之力也宜銓舉業長者可於大興國寺宣揚正法續高僧傳齊王楊暕字世朏按此楊暕乃隋煬帝子封齊王楊用修尺牘誤齊為代遂列南齊王弇州尺牘又以梁有王暕復列于梁且注云儉子作齊非則非之非者也大藏所載自明延師智聚書智聚姓朱住虎丘東山寺暕作牧淮海乃降教書延之弟子下車舊楚亟改炎涼逖聽清規其來有日敬承幽栖山谷多厯年所道風勝氣獨擅當今故以德冠林遠道超生什炳斯慧炬以悟羣迷獨步江東何甚之美未獲稽疑下筵餐承高義杼軸之勞載盈懷抱據虎之岫川途不遙翔鷺之濤風煙相接必願振忍辱之衣赴翹勤之望續高僧傳後梁主蕭琮字溫文𧦴孫歸隋拜內史改封梁公與智顗書遠欽高風未獲展侍憮然西顧以日易年承游止玉泉創搆坊宇名僧雲會問道遠集山林高勝有助禪悅即事倐然風雲永歎凉暑珍嗇續附承修神足今還敢申訊謁信驛有會方願祗承蕭琮和南國清百録欽定四庫全書
