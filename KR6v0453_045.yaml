body:
  text: 明梅鼎祚輯無名氏二此下記論竝未詳作者第以世代為次後漢晉符秦姚秦北涼宋齊後魏隋般舟三昧經記後漢般舟三昧經光和二年十月八日天竺菩薩竺佛朔於洛陽出菩薩法護時傳言者月支菩薩支讖授與河南洛陽孟福字元士隨侍菩薩張蓮字少安筆授令後之著在建元十三年於佛寺中校定悉具足後有寫者皆得南諸佛又言建安三年歲在戊子八月八日於昌寺校定須真天子經記西晉須真天子經泰始二年十一月八日於長安青門內白馬寺中天竺菩薩曇摩羅察口授出之時傳言者安文惠帛元信手受者聶承遠張玄伯孫休達十二月三十日未時訖阿維越致遮經記晉言不退轉法輪四卷太康五年十月十四日菩薩沙門法護於燉煌從龜茲副使羌子侯得此梵書不退轉法輪經口敷晉言授沙門法乘使流布一切咸悉聞知大藏此字函亦録持心經後記持心經太康七年三月十日燉煌開士竺法護在長安說出梵文授承遠正法華經記太康七年八月十日燉煌月支菩薩沙門法護手執梵經口宣傳出正法華經二十七品授優婆塞聶承遠張仕明張仲政共筆受竺德成竺文盛嚴威伯續文承趙友義張子龍陳長玄等共勸助歡喜九月二日訖大弟子陳慎力茲居士帛元信共參校元年二月畢工記又言元康元年長安孫伯虎以四月十五日寫文殊師利淨律經記經後記云沙門竺法護於京師遇西國寂志誦出此經經後尚有數品其人忘失輒宣現者轉之為晉更得其本補令具足太康十年四月八日白馬寺中聶道真對筆受勸助劉元謀傅公信侯彥長等魔逆經記太康十年十二月二日月支菩薩法護手執梵書口宣晉言聶道真筆受於洛陽城西白馬寺中始出㭊顯元寫使功德流布一切蒙福度脫正法華經後記永熙元年八月二十八日比丘康那律於洛陽寫正法華品竟時與清戒界節優婆塞張季博董景玄劉長武長文等手執經本詣白馬寺對與法護口校古訓講出深義以九月大齊十四日於東牛寺中施檀大會講誦此經竟日盡夜無不咸歡重已校定如來大哀經記元康二年三月七日燉煌菩薩支法護手執梵經經名加益乃命沙門聶承遠道真正書晉言以其年八月二十有九日親自覆校當令大法光顯流布其有覽觀吾文者曉暢譯妙法聖法印經記天竺名阿遮曇摩文圖元康四年十二月二十五日月支菩薩沙門法護於酒泉演出此經弟子竺法首筆受令此深法普流十方大乘常住賢劫經記賢劫經永康元年七月二十一日月支菩薩竺法護從罽賓法門得是賢劫三昧手執口宣時竺法友從洛寄來筆受者趙文龍使其功德福流十方普遂蒙恩離於罪孽見是經者次見千佛稽受道化受菩薩決致無生忍至一切法十方亦爾大藏恃字函亦録放光經記惟昔大魏潁川朱士行以甘露五年出家學道為沙門出塞西至于闐國寫得正品梵書梵本九十章六十萬餘言以太康三年遣弟子弗如檀晉字法饒送經梵本至洛陽住三年復至許昌二年後至陳留界倉垣水南寺以元康二年五月十五日衆賢者共集議晉世初流行諸梵本者于闐沙門無乂羅優婆塞竺叔蘭先光陳之玄周玄明共筆受正書九十章凡二萬八千二百有二十一言時倉垣諸賢者等大小皆勸刊行乃以其年十二月二十四日寫都訖經義深奧又前後寫者參校不能善悉至太安二年十一月十五日沙門竺法寂來至倉垣水北寺求經本寫時檢取現品五部并梵本與竺叔蘭更共考校書寫永安元年四月二十訖於前後所寫校最為差定其前所寫可更取校晉梵音訓暢義難通諸開士大學文生書寫供養諷誦讀者願留三思恕其不逮也普曜經記普曜經永嘉二年太歲在戊辰五月本齊菩薩沙門法護在天水寺手執梵本口宣晉言時筆受者沙門康殊帛法炬首楞嚴後記東晉咸和三年歲在癸酉涼州刺史張天錫在州出此首楞嚴經于時有月支優婆塞支施崘手執梵本支博綜衆經於方等三昧特善其志業大乘學也出首楞嚴須賴上金光首如幻三昧時在涼州州內正聽堂湛露軒下集時譯者茲王子世帛延善晉梵音延博解梵文妙音兼綜受者常侍西海趙潚會水令馬亦內有大維總持三人皆是俊德有心道德時在坐沙門諸淨寂光等行涼州自屬辭辭旨如本不加文飾飾亦如明其道文質兼唯聖有之耳六卷泥洹記摩竭提國巴連弗邑阿育王塔天王精舍優婆塞伽羅先見晉土道人釋法顯遠遊此土為求法故深感其人即為寫此大般泥洹經如來祕藏願令此經流布晉土一切衆生悉成平等如來法身義熙十三年十月一日於謝司空石所立道場寺出此方等大般泥洹經至十四年正月一日校定盡訖禪師佛大跋陀手執梵本寶雲傳譯于時座有二百五十人文殊師利發願經記晉元熙二年歲在庚申於揚州𩰖場寺禪師新出云外國四部衆禮佛時多誦此經以發願求佛道關中近出尼二種壇文夏坐雜十二事并雜事共卷前中後三記苻秦卷初記云太歲己卯鶉火之次十一月十一日在長安出此比丘尼大戒其月二十六日記僧純於茲佛陀舌彌許戒本曇摩侍傳佛念執梵慧常筆受卷中間有缺少數字後記云此土無大比丘尼戒乏斯一部共一萬言中土雖有五百戒比丘尼而戒是覓歷古今無有異道似聖人所制法汰道林聲鼓而正之可謂法門之棟梁也法汰去年亦令外國人出少許復不足行常涼州得五百戒一卷直戒戒復之似人之所作其義淺近未及僧純曇充拘夷國來從雲慕藍寺於高德沙門佛圖舌彌許得此比丘尼大戒及授戒法受坐已下至劒慕法遂令佛圖卑為譯曇摩侍傳之乃知真是如來所制也而不止五百數比丘戒有二百六十問侍所以言莫知其故也然以理推之二百五十及五百是舉全數耳又授比丘尼大戒文少將即用授大比丘法而出其異也八簸賴夷無二亦當依比足之耳亦當略授十七僧迦衛尸沙一章也又授比丘尼大戒尼三師教授師更與士尼壇外問內法壇外問內法於事為重故外國師云壇外問當言正爾上場衆僧中當問汝汝當爾答壇上問則言令衆僧中問汝也正爾令曇充還拘夷訪授比丘尼大戒定法須報以為式也授六法文無乏也二師而已無教授師也卷後又記云秦建元十五年十一月五日嵗在鶉尾比丘闕丘慈高德沙門佛圖舌彌許得此授闕及二嵗戒儀從受坐至屬授諸雜事闕佛圖卑為譯慧常筆受凡此諸事是所施闕為人師而不練此此無異於土牛後人也闕道人竺道曼於丘慈因此異事來與燉煌道人此沙門各各所住祠或二百或三百人為一部僧比丘尼向三百人凡有五祠各各從所使僧祠依准為界內無共說戒法也常暮說戒說戒之日比丘尼差二人往曰所依僧云今日當說戒僧即差二人往詣比丘尼僧知人數還白大僧云比丘尼凡有若干於某祠清淨說戒普共聞知如是三白比丘尼便自共行籌說戒如法僧事曇充云大齊說律六十日竟尼亦寄聽若遇說戒亦寄聽戒唯不與舍羅籌耳七月十五日各於所止處受戒如法遣三人詣所依僧承受戒分齊耳其餘如僧法此與尼戒違將是不知也比丘尼當三受戒五百戒比丘尼滿十二嵗乃中為師初受十戒時索二女師當使持律沙門授戒乃付女師令教道之次受二百五十戒年滿二十直使女三師授之耳威儀俯仰如男子受戒法無異也彌離尼受六法無三師沙彌亦無三師二師而已耳六法云缺十謬傳之受戒後周一年無誤失乃得受闕受戒時三師七僧如中受時直使前闕百五十事合前為五百耳直授之不闕儀委曲也戒文如男子戒耳事事如之八犍度阿毗曇根犍度後別記斯經序曰其人忘因緣一品故闕文焉近自罽賓沙門曇摩卑暗之來經蜜川僧伽禘婆譯出此品八犍度文具也而卑云八犍度是體耳別有六足可自百萬言卑誦二足今無譯可出慨恨良深秦建元十五年正月十九日於揚州瓦官佛圖記僧伽羅剎集經後記大秦建元二十年十一月三十日罽賓比丘僧伽跋澄於長安石羊寺口誦此經及毗婆沙佛圖羅剎翻譯秦言未精沙門釋道安朝賢趙文業研核理趣每存妙盡遂至留連至二十一年二月九日方訖且婆須蜜經及曇摩難提口誦增一阿含并幻網經使佛念為譯人念乃學通內外才辨多奇常疑西域言質謂此土好華每存瑩飾文句減其繁長安公趙郎之所深疾窮校考定務存典骨既方俗不同許其五失梵本出闕外毫不可差五失如安公大品序所載余闕此卷後使知釋趙為法之至菩薩波羅提木義後記姚秦夫闕無始萬行始於戒信之玄兆是故天竺闕法師心首持誦什言此戒出梵網經中而什闕玩大方齊異學於迦夷淳風東扇故弘始三年秦王道契百王之業奉心大法於逍遙觀中三千學士與什參定大小乘經五十餘部唯菩薩十戒四十八輕最後誦出時融影三百人等一時受行修菩薩道豈唯當時之益乃有纍劫之津也故慧融書三千部流通於後代持誦相授屬諸後學好道之君子願未劫不絶共見千佛龍華同坐大智論記究摩羅耆婆法師以秦弘始三年歲在辛丑十二月二十日至長安四年夏於逍遙園中西門閣上為姚天王出釋論七年十二月二十七日乃訖其中兼出經本禪經戒律百論禪法要解向五十萬言并此釋論一百五十萬言論初品三十四卷解釋一品是全論其本二品已下法師略之取其要足以開釋文意而已不復備其廣釋得此百卷若盡出之將十倍於此成實論記大闕歲次豕韋九月八日尚書令姚顯請闕九月十五日訖外國法師拘摩羅耆闕自傳譯曇晷筆受大涅槃經記北涼此大涅槃經初十卷有五品其梵本是東方道人智猛從天竺將來暫憩高昌有天竺沙門曇無讖廣學博見道俗兼綜遊方觀化先在燉煌河西王宿植洪業素心冥契契應王公躬統士衆西定燉煌會遇其人神解悟識請迎詣州安止內苑遣使高昌取此梵本命讖譯出此經初分唯有五品次六品已後其本久在燉煌讖因出經下際知部黨不足訪慕餘殘有梵道人應期送到此經梵本都二萬五千偈後來梵本想亦近具足但頃來國家殷猥未暇更譯遂少停滯諸可流布者經中大意宗塗悉舉無所少也今現已有十三品作四十卷為經文句執筆者一承經師口所譯不加華飾其經初後所演佛性廣略之聞耳無相違也每自惟省雖復西垂深幸此遇遇此大典開解常滯非言所盡以諸家譯經之致大不允其旨歸疑謬後人是故竊不自辭輒作徒勞之舉冀少有補益闕尋前後略舉初五品為私記餘致准闕優婆塞戒經記太歲闕月二十三日河西王世子撫軍將軍録尚書事大沮渠興國與諸優婆塞等五百餘人共於都城之內請天竺法師曇摩讖譯此在家菩薩戒至秋七月二十三日都訖秦沙門道養筆受願此功德令國祚無窮將來之世值遇彌勒初聞悟解逮無生忍十方有識咸同斯誓二十卷泥洹記出智猛遊外國傳智猛傳云毗耶離國有大小乘學不同帝利城次華氏邑有婆羅門氏族甚多其稟性敏悟歸心大乘博覽衆典無不通達家有銀塔縱廣八尺高三丈四龕銀像高三尺餘多有大乘經種種供養婆羅門問猛言從何來答言秦地來又問秦地有大乘學不即答皆大乘學其乃驚愕雅歎云希有將非菩薩往化耶智猛即就其家得泥洹梵本還於涼州出得二十卷禪要祕密治病經記河西王從弟大沮渠安陽侯於于闐國衢摩帝太寺從天竺闕乘沙門佛陀斯𨚗其人天才特拔諸國獨闕兼明禪法內外綜博無籍不練故世闕沮渠親面稟受憶誦無滯以宋孝闕日於竹園精舍書出此經至其月二十闕為濬越大藏善字函亦録華嚴經記宋華嚴經梵本凡十萬偈昔道人支法領從于闐國得此三萬六千偈以晉義熙十四年嵗次鶉火三月十日於揚州司空謝石所立道場寺請天竺禪師佛度跋陀羅手執梵文譯梵為晉沙門釋法業親從筆受時吳郡內史孟顗右衛將軍褚叔度為檀越至元熙二年六月十日出訖凡再校梵本至大宋永初二年辛丑之嵗十二月二十八日校畢大藏垂字函亦録摩得勒伽記宋元嘉十二年歲在乙亥揚州聚落丹陽郡秣陵縣平樂寺三藏與弟子共出此律從正月起至九月二十二日草成二十五日寫畢白衣優婆塞張道孫敬信執寫八吉祥記八吉祥經宋元嘉二十九年太歲壬辰正月三日天竺國大闕釋求𨚗跋陀羅於荊州城內譯出此經闕使持節侍中都督荊湘雍益梁寧南闕事司空荊州刺史領南蠻校尉南譙闕為檀越善見律毗婆沙記南齊齊永明闕歲次實沈三月十日禪林比丘尼淨秀聞僧伽跋陀羅法師於廣州共僧禕法師譯出梵本善見毗婆沙律一部十八卷京師未有渴仰欲見僧伽跋陀羅其年五月還南憑上寫來以十一年歲次大梁四月十日得律還都頂禮執讀敬寫流布仰惟世尊泥洹已來年載至七月十五日受歲竟於衆前謹下一點年年如此感慕心悲不覺流淚百句譬喻經記永明十年九月十日中天竺法師求那毗地出修多羅藏十二部經中抄出譬喻聚為一部凡一百事天竺僧伽斯法師集行大乘為新學者撰說此經道行經後記後魏光和二年十月八日河南洛陽孟元士口授天竺菩薩竺佛朔時傳言譯者月支菩薩支謙時侍者南陽張少安南海子碧勸助者孫和周提立正光二年九月十五闕城西菩薩寺中沙門佛大寫之竝出三藏經集善住意天子所問經翻譯記下竝翻譯後魏夫闕是依季行於此非賢豈伏三藏法師毗闕烏萇剎利王種幼履慈蹤長躡悲跡攝化闕惡導善常為衆生不請之友執此法燈照彼昏暗魏皇都鄴崇福以資興和二年歲次實沈佛法加持出此經典名善住意天子所問建午閏月朔次丁丑戊寅建功乙巳畢功助譯弟子瞿曇流支對譯沙門曇林之筆庶俟存道敬法之賢如實印記示令不惑耳大藏裳字函序回諍論翻譯記回諍論者龍樹菩薩之所作也數舒盧迦三十二字此論正本凡有六百大魏都鄴興和三年歲次大梁建辰之月朔次癸酉辛卯之日烏萇國人剎利王種三藏法師毗目智仙共天竺國婆羅門人瞿曇流支在鄴城內金華寺譯時日所費二十餘功大數凡有一萬一千九十八字對譯沙門曇林之筆驃騎大將軍開府儀同三司御史中尉勃海高仲密啓請供養具記時事以彰以聞令樂法者若見若聞同崇翻譯矣大藏華字函轉法輪經優波提舍翻譯之記轉闕優波提舍義門之名天親菩薩之闕憍陳如等義行此方必主其人魏驃騎大將軍開府儀同三司御史中尉勃海高仲密善求闕真揀僞故請法師毗目智仙并其弟子瞿曇流支於鄴城內在金華寺出此義門優波提舍興和三年歲次大梁建酉之月朔次庚子十一日譯三千九百四十二言沙門曇林對譯録記大藏次字函三具足經優婆提舍翻譯記施戒聞三備攝衆行是以如來說名具足法門深邃淺識未窺天親菩薩慈心開示唯顯經義弗釋章句是故名為優婆提舍昔出中國今現魏都三藏法師毗目智仙婆羅門人瞿曇流支愛敬法人沙門曇林於鄴城內在金華寺興和三年歲次辛酉月建在戌朔次庚午十三日譯千百十言驃騎大將軍開府儀同三司御史中尉勃海高仲密啓請供養守護流通大藏造字函寶髻經四法優波提舍翻譯記寶髻經者是大集中之一集也其宗四法玄深奧密天親菩薩闕其門是故名為優波提舍聖自在力行之闕會出於此今興和三年歲次辛酉闕烏萇國人剎利王種三藏法師毗目智仙共天竺國婆羅門人瞿曇流支護法大士魏驃騎大將軍開府儀同三司御史中尉勃海高仲密愛法闕沙門曇林道俗相假於鄴城內金華寺譯四千九百九十七字大藏弗字函毗耶婆問經翻譯記菩薩方便攝化衆生必以大悲引邪從正毗耶娑仙即其人也為導羣迷令識因果將諸異見至如來所歸命咨啓聽聞正法因其請說即以名經故因此部毗耶娑問魏尚書令儀同高公愍諸錯習示其歸則簡集能人善辭義者在宅上面出此經典求正法人沙門曇林婆羅門名瞿曇流支興和四年歲次壬戌月建在申朔次乙丑畢功凡有一萬四千四百五十七字大藏推字函金色王經翻譯記釋迦如來本生無量且於一時作金色王檀行因緣自致成佛說施法門引彼為證因名此經為金色王魏尚書令儀同高公敦捨之心往齊金色為開此門普示一闕上面出斯妙典沙門曇林瞿曇流支興闕戌月建在酉朔次乙未癸丑日譯闕一十四字大藏忘字函第一義法勝經翻譯記夫闕善根涅槃經云供佛二恆魏尚書令儀同高公重法心成生上財想博採梵文廣崇翻譯且第一義法勝經者諸法門中此其髓也公意殷誠感之題額沙門曇林瞿曇流支興和四年歲次壬戌九月一日甲子換文始末四功質義乃定五千五百七十六字大藏貞字函不必定入定入印經翻譯記出世智道亦名為印此經印義或然不然私情有指未許官用何者私情今且當向發心修行證會名入所乘強劣有定不定聖說定入說不定入言義如是決定名印說如是故名如是經其門要密通必有寄魏尚書令儀同高公深知佛法出自中天翻為此典萬未有一采揀集人在第更譯沙門曇林瞿曇流支興和四年歲次降婁月建在戌朔次甲子壬午之日出此如左九千一百九十三字大藏法字函順中論翻譯記諸國語闕音正彼言𨚗伽夷離淳𨚗此云龍勝名人言龍樹者片合一箱未是全當闕師依大般若而造中論衆典於義闕師名阿僧佉解未解處別為此部魏闕公延國上賓瞿曇流支在第供養正通佛闕曇林出斯義論武定元年嵗次癸亥八月十日丙寅揮辭凡有一萬三千七百二十七字大藏移字函正誣論弘明集載牟子理惑論後案稱石崇周嵩則晉以下人撰也有異人者誣佛曰尹文子有神通者愍彼西戎西戎父子聚麀貪婪忍害昧利無恥侵害不厭屠裂羣生不可遜讓厲不可談議喻故具諸事云云又令得道弟子變化云云又禁其殺生斷其婚姻使無子孫伐戎之術孰良於此云云正曰誣者既云無佛復云文子有神通復云有得道弟子能變化恢廓盡神妙之理此真有胸無心之語也夫尹文子即老子弟子也老子即佛弟子也故其經云聞道竺乾有古先生善入泥洹不始不終永存綿綿竺乾者天竺也泥洹者梵語晉言無為也若佛不先老子何得稱先生老子不先尹文何故請道德之經耶以此推之佛故文子之祖宗闕元始也安有弟子神化而師不能乎且闕以道蒞之遠人不服則綏以文德不闕以除暴止戈拯濟羣生行小殺以闕秋之世諸侯征伐動仗正順敵國闕彰其過總義兵以臨罪人不以暗昧而行闕服則柔而撫之不苟淫刑極武勝則以喪禮居之殺則以悲哀泣之是以深貶誘執大杜絶滅之原若懷惡而討不義假道以成其暴皆經傳變文譏貶纍見故會宋之盟抑楚而先晉者疾衷甲之詐以崇咀信之美也夫敵之怨惠不及後嗣惡止其身四重罪不濫此百王之明制經國之令典也至於季末之將佳兵之徒患道薄德衰始任詐力競以譎詭之計濟殘賊之心野戰則肆鋒極殺屠城則盡坑無遺故白起刎首於杜郵董卓屠身於宮門君子知其必亡舉世哀其灰戮兵之弊也遂至於此此為可痛心而長歎者矣何有聖人而欲大縱陰毒翦絶黎元者哉且十室容賢而況萬里之廣重華生於東夷文王出乎西羌聖哲所興豈有常地或發音於此默化於彼形教萬方而理運不差原夫佛之所以夷跡於中嶽而曜奇於西域者蓋有至趣不可得而縷陳矣豈闕疾敵之強而其欲覆滅使無孑遺哉此闕不蠲良淑縱火中原蘭蕕俱焚桀紂闕縱令異國信多惡逆以暴易暴又闕此為辭適足肆謗言眩愚豎豈允闕難乎又誣云闕欺之天有二十二重云云又妄牽樓炭經云諸天之宮廣長二十四萬里面開百門門廣萬里云云正曰佛經說天地境界高下階級悉條貫部分敘而有章而誣者或附著生長枉造僞說或顛倒淆亂不得要實何有二十四萬里之地而容四百萬里之門乎以一事覆之足明其錯謬者多矣臧獲牧豎猶將知其不然況有識乎欲以見博秖露其愚焉又誣云佛亦周遍五道犯衆過行凶惡猶得佛此非怖為惡者之法也又計生民善者少而惡者多惡人輒死輒充六畜爾則開闢至今足為久矣今畜宜居十分之九而人種已應希矣正曰誠如所言佛亦曾為惡耳今所以得佛者改惡從善故也若長惡不悛迷而後遂往則長夜受苦輪轉五道而無解脫之由矣今以其能掘衆惡之栽滅三毒之燼修五戒之善盡十德闕之纍劫倦而不已曉了本際暢三世空闕虛外無為之場耳計天下蜫蟲之數闕在九州之內若毫未之在馬體闕故天地之性以人為貴榮期所以闕貴賤之分明也今更不復自賴於人類不闕畜生以芻水為甘膳以羈絡為非謫安則為之無所多難也又誣云有無靈下經無靈下經妖怪之書耳非三墳五典訓誥之言也通才達儒所未究覽也三曾五祖之言又似解奏之文此殆不詰而虛妄自露矣今且聊復應之凡俗人常謂人死則滅無靈無鬼然則無靈則無天曹無鬼則無所𭣣也若子孫奉佛而乃追譴祖先祖先或是賢人君子平生之時未必與子孫同事而天曹便收伐之令顏冉之尸羅枉戮之痛仁慈祖考加虐毒於貴體此豈聰明正直之神乎若其非也則狐貉魍魎淫厲之鬼何能反制仁賢之靈而困禁戒之人乎以此為誣鄙醜盡矣又誣云道人聚斂百姓大搆寺塔華飾奢侈糜費而無益云云正曰夫教有深淺適時應物悉已備於首論矣請復申之夫恭儉之心莫過堯舜而山龍華蟲黼黻絺繡左傳曰錫鸞和鈴昭其聲也三辰旗旗昭其明也五色比象昭其物也故王者之居必金門玉陛闕乎凡庶令貴賤有章也夫人情從闕鼓鼙之音覩羽麾之象則思將師之臣闕聲觀庠序之儀則思朝廷之臣遷地易觀闕俱變令悠悠之徒見形而不及道者莫不貴嵩高而忽仄陋是以諸奉佛者仰慕遺跡思存髣佛故銘列圖像致其虔肅割捐珍玩以增崇靈廟故上士遊之則忘其蹄筌取諸遠味下士遊之則美其華藻玩其炳蔚先悅其耳目漸率以義方三塗汲引莫有遺逸猶器之取水隨量多少唯穿底無當乃不受耳又專誣以禍福為佛所作可謂元不解矣聊復釋之夫吉凶之與善惡猶善惡之乘形聲自然而然不得相免也行之由已而理玄應耳佛與周孔但共明忠孝信順從之者吉背之者凶示其渡水之方則使資舟楫不能令步涉而得濟也其誨人之法救厄死之術亦猶神農唱粒食以充饑虛黃帝垂衣裳以禦寒暑若閉口而望飽裸袒以求溫不能強與之也夫和鵲之所以稱良醫者以其應疾投藥不失其宜耳不責其令闕民也且扁鵲有云吾能令當生者不死非能令當死者必生也若夫為子則不孝為臣則不忠闕而不悟進良藥而不御而受禍臨死闕深恨良醫非徒東走其勢投穽矣又誣云闕在京洛者多矣而未曾聞能令主上延年益壽上不能調和陰陽使年豐民富消菑却疫克靜禍亂云云下不能休糧絶粒呼吸清醇扶命度厄長生久視云云正曰不然莊周有云達命之情者不務命之所無奈何審期分之不可遷也若令性命可以智德求之者則武周二子足令文父致千齡矣顏子死則稱天喪豫惜之至也無以延之耳且陰陽數度期運所當百六之極有時而臻故堯有滔天之洪湯有赤地之菑涿鹿有漂櫓之血坂泉有橫野之尸何不坐而消之救其未然邪且夫熊經鳥曳導引吐納輟黍稷而御英蘂吸風露以代餱糧俟此而壽有待之倫也斯則有時可夭不能無窮者也沙門之視松喬若未孩之兒耳方將抗志於二儀之表延祚於不死之鄉豈能屑心營近與涓彭爭長哉難者苟欲騁飾非之辨立距諫之強言無節奏義無宮商嗟夫北里闕惡緣之奪黃也其餘噪之音曾無紀綱闕之章闕者合兵於徐州刺史陶謙謙使之闕遂斷盜官以自利人大起佛寺闕酒食云云後為劉繇所攻見殺云云正曰闕待繩約而自縛也夫佛教率以慈仁不殺忠信不愆廉貞不盜為首老子云兵者不祥之器邇者凶而融阻兵安忍結附寇逆犯殺一也受人使命取不報主犯欺二也斷割官物以自利入犯盜三也佛經云不以酒為惠施而融縱之犯酒四也諸戒盡犯則動之死地矣譬猶吏人解印脫冠而橫道肆暴五尺之童皆能制之矣笮氏不得其死適足助明為惡之獲殃耳又誣云石崇奉佛亦至而不免族誅云云正曰石崇之為人余所悉也憍盈耽酒放僭無度多藏厚斂不恤惸獨論才則有一割之利計德則盡無取焉雖託名事佛而了無禁戒即如世人貌清心穢色厲內荏口詠禹湯而行偶桀紂自貽伊禍又誰之咎乎又誣云周仲智奉佛亦精進而竟復不蒙其福云云正曰尋斯言似乎幸人之菑非通言也仲智雖有好道之意闕受戒為弟子也論其率情亮直具涉㒞闕有強梁之纍未合道家嬰兒之旨闕喪敗理耳縱如難者之言精闕何異顏項夙夭夷叔餒死比干盡忠而有剖心之禍申生篤孝而致雉經之痛若此之比不可勝計孔子云仁者壽義者昌而復或有不免固知宿命之證至矣信矣又誣云事佛之家樂死惡生屬纊待絶之日皆以為福祿之來無復哀戚之容云云正曰難者得無隱心而居物不然何言之逆乎夫佛經自謂得道者能玄同彼我渾齊修短涉生死之變泯然無槩步禍福之地而夷心不坦樂天知命安時處順耳其未體之者哀死慎終之心乃所以增其篤也故有大悲宏誓之以下缺
